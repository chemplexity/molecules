<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reaction Network D3 Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #f8f8fa;
        color: #111;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      #network-container {
        width: 100vw;
        height: 100vh;
        position: absolute;
        z-index: 1;
        background: #f8f8fa;
      }

      /* ── Drawer ── */
      #drawer {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 310px;
        z-index: 20;
        display: flex;
        flex-direction: row;
        transform: translateX(0);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #drawer.collapsed {
        transform: translateX(-310px);
      }
      #drawer-panel {
        width: 310px;
        height: 100%;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(14px);
        border-right: 1px solid rgba(0, 0, 0, 0.07);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.07);
        padding: 28px 22px 22px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #drawer-tab {
        /* The pull tab that sticks out on the right side of the drawer */
        position: absolute;
        right: -32px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 64px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid rgba(0, 0, 0, 0.07);
        border-left: none;
        border-radius: 0 10px 10px 0;
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.07);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: background 0.2s;
      }
      #drawer-tab:hover {
        background: #f0f0f0;
      }
      #drawer-tab svg {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #drawer.collapsed #drawer-tab svg {
        transform: rotate(180deg);
      }

      #drawer-panel h3 {
        margin: 0 0 4px 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      #drawer-panel .subtitle {
        font-size: 11px;
        color: #888;
        margin: 0 0 20px 0;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: #555;
        margin-bottom: 4px;
        margin-top: 14px;
      }
      label:first-of-type {
        margin-top: 0;
      }
      input[type='text'],
      input[type='number'] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
        font-family: monospace;
        background: #fafafa;
        color: #111;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type='text']:focus,
      input[type='number']:focus {
        border-color: #999;
        background: #fff;
      }
      .input-action-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      .input-action-row input {
        min-width: 0;
        flex: 1;
      }
      #random-btn {
        flex: 0 0 auto;
        padding: 0 11px;
        border: 1px solid #d7d7d7;
        border-radius: 8px;
        background: #fff;
        color: #222;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      #random-btn:hover {
        border-color: #aaa;
        background: #f4f4f5;
      }
      #random-btn:disabled {
        color: #aaa;
        border-color: #e5e5e5;
        cursor: default;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .row > div {
        flex: 1;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
      }
      .toggle-row label {
        margin: 0;
        font-size: 12px;
        color: #444;
      }
      input[type='checkbox'] {
        accent-color: #333;
        width: 14px;
        height: 14px;
        cursor: pointer;
      }
      #generate-btn {
        margin-top: 20px;
        width: 100%;
        padding: 11px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      #generate-btn:hover {
        background: #333;
      }
      #generate-btn.cancel {
        background: #b91c1c;
      }
      #generate-btn.cancel:hover {
        background: #991b1b;
      }
      #generate-btn:disabled {
        background: #aaa;
        cursor: default;
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        color: #888;
        min-height: 16px;
        text-align: center;
      }
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .slider-row {
        margin-top: 14px;
      }
      .slider-row .slider-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .slider-row label {
        margin: 0;
        font-size: 11px;
        font-weight: 500;
        color: #555;
      }
      .slider-row .slider-val {
        font-size: 11px;
        color: #888;
        font-variant-numeric: tabular-nums;
      }
      input[type='range'] {
        width: 100%;
        height: 4px;
        cursor: pointer;
        accent-color: #333;
        background: #e0e0e0;
        border-radius: 4px;
        outline: none;
        border: none;
        appearance: none;
        -webkit-appearance: none;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #333;
        cursor: pointer;
      }

      .node circle {
        stroke: #fff;
        stroke-width: 2px;
        transition: stroke 0.2s;
      }
      .node:hover circle {
        stroke: #555;
        stroke-width: 3px;
      }
      .node-label {
        pointer-events: none;
        font-size: 11px;
        fill: #444;
        font-weight: 500;
      }
      .link {
        stroke: #bbb;
        stroke-opacity: 0.9;
      }
      .link-text {
        fill: #666;
        font-size: 9px;
        pointer-events: none;
      }

      #template-settings-btn {
        position: fixed;
        left: 18px;
        bottom: 18px;
        z-index: 35;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.97);
        color: #222;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.2s,
          border-color 0.2s;
      }
      #template-settings-btn:hover,
      #template-settings-btn.active {
        background: #f4f4f5;
        border-color: rgba(0, 0, 0, 0.22);
      }
      #template-settings-btn.active {
        transform: rotate(30deg);
      }
      #template-settings-panel {
        position: fixed;
        left: 18px;
        bottom: 72px;
        z-index: 34;
        width: min(430px, calc(100vw - 36px));
        max-height: min(640px, calc(100vh - 96px));
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.16);
        display: none;
        flex-direction: column;
        overflow: hidden;
      }
      #template-settings-panel.open {
        display: flex;
      }
      .template-settings-header {
        padding: 14px 16px 12px;
        border-bottom: 1px solid #eee;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .template-settings-title {
        font-size: 13px;
        font-weight: 600;
        color: #222;
      }
      #template-settings-count {
        font-size: 11px;
        color: #888;
        white-space: nowrap;
      }
      .template-settings-actions {
        padding: 10px 16px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        gap: 8px;
      }
      .template-settings-actions button {
        border: 1px solid #ddd;
        background: #fff;
        color: #333;
        border-radius: 7px;
        padding: 6px 9px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
      }
      .template-settings-actions button:hover {
        background: #f4f4f5;
        border-color: #bbb;
      }
      .template-settings-actions button:disabled {
        color: #aaa;
        border-color: #e5e5e5;
        cursor: default;
      }
      #template-settings-list {
        overflow-y: auto;
        padding: 8px 10px 12px;
      }
      .template-row {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        gap: 9px;
        align-items: start;
        margin: 0;
        padding: 9px 6px;
        border-bottom: 1px solid #f2f2f2;
      }
      .template-row:last-child {
        border-bottom: none;
      }
      .template-row input[type='checkbox'] {
        margin-top: 1px;
      }
      .template-name {
        font-size: 12px;
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
      }
      .template-smirks {
        font-family: monospace;
        font-size: 10px;
        line-height: 1.35;
        color: #666;
        word-break: break-all;
      }

      /* ── Right info drawer ── */
      #info-drawer {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 280px;
        z-index: 20;
        display: flex;
        flex-direction: row-reverse;
        transform: translateX(0);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #info-drawer.collapsed {
        transform: translateX(280px);
      }
      #info-panel {
        width: 280px;
        height: 100%;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(14px);
        border-left: 1px solid rgba(0, 0, 0, 0.07);
        box-shadow: -4px 0 24px rgba(0, 0, 0, 0.07);
        padding: 24px 18px 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #info-drawer-tab {
        position: absolute;
        left: -32px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 64px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid rgba(0, 0, 0, 0.07);
        border-right: none;
        border-radius: 10px 0 0 10px;
        box-shadow: -4px 0 12px rgba(0, 0, 0, 0.07);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: background 0.2s;
      }
      #info-drawer-tab:hover {
        background: #f0f0f0;
      }
      #info-drawer-tab svg {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #info-drawer.collapsed #info-drawer-tab svg {
        transform: rotate(180deg);
      }

      #info-smiles-section {
        margin-bottom: 16px;
      }
      #info-smiles-label {
        font-size: 10px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }
      #info-smiles {
        font-family: monospace;
        font-size: 12px;
        color: #222;
        background: #f3f4f6;
        border-radius: 7px;
        padding: 8px 10px;
        word-break: break-all;
        min-height: 34px;
      }
      #info-smiles svg {
        width: 100%;
        height: auto;
        max-height: 160px;
        display: block;
        margin: 0 auto;
        overflow: visible;
      }
      .info-section {
        margin-top: 14px;
      }
      .info-section-title {
        font-size: 10px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .info-section-title span {
        font-size: 10px;
        color: #bbb;
        font-weight: 400;
      }
      .info-mol-item {
        font-family: monospace;
        font-size: 11px;
        color: #444;
        background: #fafafa;
        border: 1px solid #eee;
        border-radius: 6px;
        padding: 5px 9px;
        margin-bottom: 5px;
        cursor: default;
        word-break: break-all;
      }
      .info-mol-item svg {
        width: 100%;
        height: auto;
        max-height: 90px;
        display: block;
        margin: 4px auto;
        overflow: visible;
      }
      .info-mol-item:hover {
        background: #f0f4ff;
        border-color: #93c5fd;
      }
      .info-empty {
        font-size: 11px;
        color: #bbb;
        font-style: italic;
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <div id="drawer">
      <div id="drawer-panel">
        <h3>Reaction Network Viewer</h3>
        <p class="subtitle">Requires <code>server.js</code> on port 3737.</p>

        <label for="smiles-input">SMILES</label>
        <div class="input-action-row">
          <input type="text" id="smiles-input" placeholder="e.g. CCO" value="CCO" spellcheck="false" />
          <button id="random-btn" title="Load a random complex SMILES case">Random</button>
        </div>

        <div class="row">
          <div>
            <label for="depth-input">Depth</label>
            <input type="number" id="depth-input" min="1" value="5" />
          </div>
          <div>
            <label for="maxnodes-input">Max Nodes</label>
            <input type="number" id="maxnodes-input" min="1" value="300" />
          </div>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="flatten-input" checked />
          <label for="flatten-input">Flatten (molecule → molecule edges)</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="scaffolds-input" checked />
          <label for="scaffolds-input">View Scaffold Network</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="decorated-scaffolds-input" checked />
          <label for="decorated-scaffolds-input">Decorated Scaffolds</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="extended-scaffolds-input" checked />
          <label for="extended-scaffolds-input">Extended Scaffolds</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="hide-simple-scaffolds-input" checked />
          <label for="hide-simple-scaffolds-input">Hide Simple Scaffolds</label>
        </div>

        <button id="generate-btn">Generate Network</button>
        <div id="status"></div>

        <div class="slider-row" id="distance-row">
          <div class="slider-header">
            <label for="distance-slider">Node Distance</label>
            <span class="slider-val" id="distance-val">0</span>
          </div>
          <input type="range" id="distance-slider" min="-3000" max="600" value="0" step="5" />
        </div>

        <div class="slider-row">
          <div class="slider-header">
            <label for="bond-length-slider">Bond Length</label>
            <span class="slider-val" id="bond-length-val">1.5</span>
          </div>
          <input type="range" id="bond-length-slider" min="0.5" max="2.5" value="1.5" step="0.1" />
        </div>
      </div>

      <!-- Pull tab -->
      <div id="drawer-tab" title="Toggle panel">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2L4 6L8 10" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
    </div>

    <svg id="network-container"></svg>

    <button id="template-settings-btn" type="button" title="Reaction SMIRKS settings" aria-label="Reaction SMIRKS settings" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path
          d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M19.4 15a1.9 1.9 0 0 0 .38 2.1l.05.05a2.2 2.2 0 0 1-3.11 3.11l-.05-.05a1.9 1.9 0 0 0-2.1-.38 1.9 1.9 0 0 0-1.15 1.74V22a2.2 2.2 0 0 1-4.4 0v-.09a1.9 1.9 0 0 0-1.15-1.74 1.9 1.9 0 0 0-2.1.38l-.05.05a2.2 2.2 0 0 1-3.11-3.11l.05-.05a1.9 1.9 0 0 0 .38-2.1 1.9 1.9 0 0 0-1.74-1.15H2a2.2 2.2 0 0 1 0-4.4h.09a1.9 1.9 0 0 0 1.74-1.15 1.9 1.9 0 0 0-.38-2.1L3.4 6.49a2.2 2.2 0 0 1 3.11-3.11l.05.05a1.9 1.9 0 0 0 2.1.38A1.9 1.9 0 0 0 9.81 2.1V2a2.2 2.2 0 0 1 4.4 0v.09a1.9 1.9 0 0 0 1.15 1.74 1.9 1.9 0 0 0 2.1-.38l.05-.05a2.2 2.2 0 0 1 3.11 3.11l-.05.05a1.9 1.9 0 0 0-.38 2.1 1.9 1.9 0 0 0 1.74 1.15H22a2.2 2.2 0 0 1 0 4.4h-.09A1.9 1.9 0 0 0 19.4 15Z"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <div id="template-settings-panel" aria-hidden="true">
      <div class="template-settings-header">
        <div class="template-settings-title">Reaction SMIRKS</div>
        <div id="template-settings-count">Loading...</div>
      </div>
      <div class="template-settings-actions">
        <button id="templates-enable-all" type="button">Enable all</button>
        <button id="templates-disable-all" type="button">Disable all</button>
      </div>
      <div id="template-settings-list"></div>
    </div>

    <!-- Right info drawer -->
    <div id="info-drawer" class="collapsed">
      <div id="info-drawer-tab" title="Toggle info panel">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M4 2L8 6L4 10" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div id="info-panel">
        <div id="info-smiles-section">
          <div id="info-smiles-label">Hovered Molecule</div>
          <div id="info-smiles" class="info-empty">Hover a molecule…</div>
        </div>
        <div class="info-section">
          <div class="info-section-title">To <span id="info-to-count"></span></div>
          <div id="info-to"><div class="info-empty">—</div></div>
        </div>
        <div class="info-section">
          <div class="info-section-title">From <span id="info-from-count"></span></div>
          <div id="info-from"><div class="info-empty">—</div></div>
        </div>
      </div>
    </div>

    <script>
      const width = window.innerWidth;
      const height = window.innerHeight;
      const zoomBehavior = d3.zoom().on('zoom', event => g.attr('transform', event.transform));
      const svg = d3.select('#network-container').call(zoomBehavior);
      const g = svg.append('g');

      // Arrow-key panning
      const PAN_STEP = 40;
      document.addEventListener('keydown', e => {
        if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) return;
        e.preventDefault();
        const t = d3.zoomTransform(svg.node());
        const dx = e.key === 'ArrowLeft' ? PAN_STEP : e.key === 'ArrowRight' ? -PAN_STEP : 0;
        const dy = e.key === 'ArrowUp' ? PAN_STEP : e.key === 'ArrowDown' ? -PAN_STEP : 0;
        svg.call(zoomBehavior.translateBy, dx / t.k, dy / t.k);
      });

      // Pre-declare slick arrow heads
      svg
        .append('defs')
        .append('marker')
        .attr('id', 'arrow')
        .attr('viewBox', '0 -5 10 10')
        .attr('refX', 22) // Anchor off slightly to avoid edge clipping!
        .attr('refY', 0)
        .attr('markerWidth', 5)
        .attr('markerHeight', 5)
        .attr('orient', 'auto')
        .append('path')
        .attr('fill', '#666')
        .attr('d', 'M0,-5L10,0L0,5');

      // ── Info drawer toggle ──
      const infoDrawer = document.getElementById('info-drawer');
      document.getElementById('info-drawer-tab').addEventListener('click', () => infoDrawer.classList.toggle('collapsed'));

      const infoSmiles = document.getElementById('info-smiles');
      const infoTo = document.getElementById('info-to');
      const infoFrom = document.getElementById('info-from');
      const infoToCount = document.getElementById('info-to-count');
      const infoFromCount = document.getElementById('info-from-count');

      function updateInfoPanel(d, linksData, nodeById) {
        if (!d) {
          infoSmiles.textContent = 'Hover a molecule…';
          infoSmiles.className = 'info-empty';
          infoTo.innerHTML = '<div class="info-empty">—</div>';
          infoFrom.innerHTML = '<div class="info-empty">—</div>';
          infoToCount.textContent = '';
          infoFromCount.textContent = '';
          return;
        }
        infoSmiles.innerHTML = d.svg || d.formula || d.id;
        infoSmiles.className = '';

        const toItems = []; // edges where source === d.id (this node points TO these)
        const fromItems = []; // edges where target === d.id (these point FROM somewhere TO this)
        for (const l of linksData) {
          const sid = typeof l.source === 'object' ? l.source.id : l.source;
          const tid = typeof l.target === 'object' ? l.target.id : l.target;
          const formatStr = (base, delta) =>
            delta ? `${base} <div style="color:#aaa; font-size:10px; text-align:center; border-top: 1px solid #eee; padding-top:4px; margin-top:4px; font-weight:600;">Δ ${delta}</div>` : base;

          if (sid === d.id) {
            const tgt = nodeById.get(tid);
            if (tgt) toItems.push({ id: tid, html: formatStr(tgt.svg || tgt.formula || tgt.conditions?.templateName || tid, l.delta) });
          }
          if (tid === d.id) {
            const src = nodeById.get(sid);
            // l.delta here represents the change from the source to 'this' node (the target).
            if (src) fromItems.push({ id: sid, html: formatStr(src.svg || src.formula || src.conditions?.templateName || sid, l.delta) });
          }
        }
        const renderList = (items, el, countEl) => {
          const unique = [];
          const seen = new Set();
          for (const item of items) {
            if (!seen.has(item.html)) {
              seen.add(item.html);
              unique.push(item);
            }
          }
          countEl.textContent = unique.length ? `(${unique.length})` : '';
          if (!unique.length) {
            el.innerHTML = '<div class="info-empty">—</div>';
            return;
          }
          el.innerHTML = unique.map(u => `<div class="info-mol-item clickable-mol" data-id="${u.id}" style="cursor:pointer;" title="Click to focus">${u.html}</div>`).join('');
        };
        renderList(toItems, infoTo, infoToCount);
        renderList(fromItems, infoFrom, infoFromCount);
      }

      // ── Drawer toggle ──
      const drawer = document.getElementById('drawer');
      document.getElementById('drawer-tab').addEventListener('click', () => {
        drawer.classList.toggle('collapsed');
      });

      const btn = document.getElementById('generate-btn');
      const randomBtn = document.getElementById('random-btn');
      const status = document.getElementById('status');
      const templateSettingsBtn = document.getElementById('template-settings-btn');
      const templateSettingsPanel = document.getElementById('template-settings-panel');
      const templateSettingsList = document.getElementById('template-settings-list');
      const templateSettingsCount = document.getElementById('template-settings-count');
      const templatesEnableAllBtn = document.getElementById('templates-enable-all');
      const templatesDisableAllBtn = document.getElementById('templates-disable-all');
      let reactionTemplateDefinitions = null;
      let currentGenerationController = null;
      let isGenerating = false;

      const bondLengthSlider = document.getElementById('bond-length-slider');
      const bondLengthVal = document.getElementById('bond-length-val');
      bondLengthSlider.addEventListener('input', () => {
        bondLengthVal.textContent = Number(bondLengthSlider.value).toFixed(1);
      });

      function visibleGraphViewport() {
        const drawerInset = drawer.classList.contains('collapsed') ? 48 : 342;
        const infoInset = infoDrawer.classList.contains('collapsed') ? 48 : 312;
        const topInset = 36;
        const bottomInset = 36;
        return {
          x: drawerInset,
          y: topInset,
          width: Math.max(220, width - drawerInset - infoInset),
          height: Math.max(180, height - topInset - bottomInset)
        };
      }

      function clearGraph() {
        g.selectAll('*').remove();
        updateInfoPanel(null, [], new Map());
      }

      function setGenerationState(active) {
        isGenerating = active;
        btn.disabled = false;
        randomBtn.disabled = active;
        templateSettingsList.querySelectorAll('input[type="checkbox"]').forEach(input => {
          input.disabled = active;
        });
        templatesEnableAllBtn.disabled = active;
        templatesDisableAllBtn.disabled = active;
        btn.classList.toggle('cancel', active);
        btn.innerHTML = active ? 'Cancel' : 'Generate Network';
      }

      function setTemplateSettingsOpen(open) {
        templateSettingsPanel.classList.toggle('open', open);
        templateSettingsPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
        templateSettingsBtn.classList.toggle('active', open);
        templateSettingsBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      function updateTemplateSettingsCount() {
        const checkboxes = [...templateSettingsList.querySelectorAll('input[type="checkbox"]')];
        if (!checkboxes.length) {
          templateSettingsCount.textContent = reactionTemplateDefinitions === null ? 'Loading...' : '0 enabled';
          return;
        }
        const enabledCount = checkboxes.filter(input => input.checked).length;
        templateSettingsCount.textContent = `${enabledCount} of ${checkboxes.length} enabled`;
      }

      function getEnabledTemplateKeys() {
        if (reactionTemplateDefinitions === null) {
          return null;
        }
        return [...templateSettingsList.querySelectorAll('input[type="checkbox"]')].filter(input => input.checked).map(input => input.value);
      }

      function setAllTemplateCheckboxes(checked) {
        templateSettingsList.querySelectorAll('input[type="checkbox"]').forEach(input => {
          input.checked = checked;
        });
        updateTemplateSettingsCount();
      }

      function renderTemplateSettings(templates) {
        reactionTemplateDefinitions = templates;
        templateSettingsList.innerHTML = '';
        for (const template of templates) {
          const row = document.createElement('label');
          row.className = 'template-row';
          row.title = template.smirks;

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.value = template.key;
          checkbox.checked = true;
          checkbox.addEventListener('change', updateTemplateSettingsCount);

          const body = document.createElement('div');
          const name = document.createElement('div');
          name.className = 'template-name';
          name.textContent = template.name;
          const smirks = document.createElement('div');
          smirks.className = 'template-smirks';
          smirks.textContent = template.smirks;

          body.append(name, smirks);
          row.append(checkbox, body);
          templateSettingsList.append(row);
        }
        templatesEnableAllBtn.disabled = isGenerating;
        templatesDisableAllBtn.disabled = isGenerating;
        updateTemplateSettingsCount();
      }

      async function loadTemplateSettings() {
        try {
          const res = await fetch('http://localhost:3737/templates');
          if (!res.ok) {
            const e = await res.json();
            throw new Error(e.error || res.statusText);
          }
          const data = await res.json();
          renderTemplateSettings(data.templates ?? []);
        } catch (e) {
          reactionTemplateDefinitions = null;
          templateSettingsCount.textContent = 'Unavailable';
          templateSettingsList.innerHTML = '<div class="info-empty" style="padding:10px 6px;">Could not load reaction templates.</div>';
          templatesEnableAllBtn.disabled = true;
          templatesDisableAllBtn.disabled = true;
          console.error(e);
        }
      }

      templateSettingsBtn.addEventListener('click', () => {
        setTemplateSettingsOpen(!templateSettingsPanel.classList.contains('open'));
      });
      templatesEnableAllBtn.addEventListener('click', () => setAllTemplateCheckboxes(true));
      templatesDisableAllBtn.addEventListener('click', () => setAllTemplateCheckboxes(false));
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          setTemplateSettingsOpen(false);
        }
      });
      document.addEventListener('mousedown', event => {
        if (!templateSettingsPanel.classList.contains('open')) {
          return;
        }
        if (templateSettingsPanel.contains(event.target) || templateSettingsBtn.contains(event.target)) {
          return;
        }
        setTemplateSettingsOpen(false);
      });

      async function cancelGeneration() {
        if (!isGenerating) {
          return;
        }

        status.textContent = 'Cancelling generation…';
        try {
          await fetch('http://localhost:3737/cancel-generation');
        } catch (e) {
          console.error(e);
        }
        currentGenerationController?.abort();
        setGenerationState(false);
      }

      async function generate() {
        if (isGenerating) {
          await cancelGeneration();
          return;
        }

        const smiles = document.getElementById('smiles-input').value.trim();
        const depth = document.getElementById('depth-input').value;
        const maxNodes = document.getElementById('maxnodes-input').value;
        const flatten = document.getElementById('flatten-input').checked;
        const scaffolds = document.getElementById('scaffolds-input').checked;
        const decoratedScaffolds = document.getElementById('decorated-scaffolds-input').checked;
        const extendedScaffolds = document.getElementById('extended-scaffolds-input').checked;
        const hideSimpleScaffolds = document.getElementById('hide-simple-scaffolds-input').checked;
        const bondLength = bondLengthSlider.value;
        const enabledTemplateKeys = getEnabledTemplateKeys();

        if (!smiles) {
          status.textContent = 'Please enter a SMILES string.';
          return;
        }

        const controller = new AbortController();
        currentGenerationController = controller;
        setGenerationState(true);
        status.textContent = '';

        const url = new URL('http://localhost:3737/generate');
        url.searchParams.set('smiles', smiles);
        url.searchParams.set('depth', depth);
        url.searchParams.set('flatten', String(flatten));
        url.searchParams.set('maxNodes', maxNodes);
        url.searchParams.set('scaffolds', String(scaffolds));
        url.searchParams.set('decoratedScaffolds', String(decoratedScaffolds));
        url.searchParams.set('extendedScaffolds', String(extendedScaffolds));
        url.searchParams.set('hideSimpleScaffolds', String(hideSimpleScaffolds));
        url.searchParams.set('bondLength', bondLength);
        if (enabledTemplateKeys !== null) {
          url.searchParams.set('enabledTemplates', enabledTemplateKeys.join(','));
        }

        try {
          const res = await fetch(url, { signal: controller.signal });
          if (!res.ok) {
            const e = await res.json();
            throw new Error(e.error || res.statusText);
          }
          const data = await res.json();
          status.textContent = `${data.nodes.length} nodes · ${data.links.length} links`;
          renderGraph(data);
        } catch (e) {
          if (e.name === 'AbortError') {
            status.textContent = 'Generation cancelled.';
          } else {
            status.textContent = `Error: ${e.message}`;
            console.error(e);
          }
        } finally {
          if (currentGenerationController === controller) {
            currentGenerationController = null;
            setGenerationState(false);
          }
        }
      }

      async function renderMoleculePreview(smiles, loadedMessage) {
        clearGraph();
        status.textContent = 'Rendering molecule preview…';

        const res = await fetch(`http://localhost:3737/preview?smiles=${encodeURIComponent(smiles)}&bondLength=${bondLengthSlider.value}`);
        if (!res.ok) {
          const e = await res.json();
          throw new Error(e.error || res.statusText);
        }

        const data = await res.json();
        renderGraph(data);
        status.textContent = loadedMessage;
      }

      async function loadRandomSmiles() {
        if (isGenerating) {
          return;
        }

        randomBtn.disabled = true;
        btn.disabled = true;
        status.textContent = 'Loading random complex case…';
        clearGraph();

        try {
          const res = await fetch('http://localhost:3737/random-smiles');
          if (!res.ok) {
            const e = await res.json();
            throw new Error(e.error || res.statusText);
          }
          const data = await res.json();
          document.getElementById('smiles-input').value = data.smiles;
          await renderMoleculePreview(data.smiles, `Loaded random case ${data.index + 1} of ${data.count}`);
        } catch (e) {
          status.textContent = `Error: ${e.message}`;
          console.error(e);
        } finally {
          randomBtn.disabled = false;
          btn.disabled = false;
        }
      }

      btn.addEventListener('click', generate);
      randomBtn.addEventListener('click', loadRandomSmiles);
      document.getElementById('smiles-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') generate();
      });
      loadTemplateSettings();

      function renderGraph(data) {
        g.selectAll('*').remove(); // Wipe previous iterations

        // Native traversal intercept to tag bidirectional topology loops dynamically
        // and compute degree (connections) for each node to scale drawing radius.
        const nodeById = new Map(data.nodes.map(d => [d.id, d]));
        data.nodes.forEach(d => (d.degree = 0));

        const linkMap = new Map();
        data.links.forEach(l => {
          const key1 = `${l.source.id || l.source}->${l.target.id || l.target}`;
          const key2 = `${l.target.id || l.target}->${l.source.id || l.source}`;
          if (linkMap.has(key2)) {
            l.bidirectional = true;
            linkMap.get(key2).bidirectional = true;
          }
          linkMap.set(key1, l);

          const sNode = nodeById.get(l.source.id || l.source);
          const tNode = nodeById.get(l.target.id || l.target);
          if (sNode) sNode.degree++;
          if (tNode) tNode.degree++;
        });

        const RENDER_SCALE = 0.5;
        const nodeScale = d => {
          if (d.type === 'scaffold') return 2.2;
          if (d.type !== 'molecule') return 1;
          const deg = d.degree || 1;
          return 1 + Math.max(0, Math.log10(deg)) * 0.4;
        };
        const pillHalfWidth = d => {
          const name = d.conditions?.templateName || d.id || '';
          const short = name.length > 22 ? name.slice(0, 21) : name;
          return Math.max(short.length * 6.2 + 22, 60) / 2;
        };
        const nodeRadius = d => {
          if ((d.type === 'molecule' || d.type === 'scaffold') && d.width && d.height) {
            const ns = nodeScale(d);
            return Math.sqrt(((d.width * RENDER_SCALE * ns) / 2) ** 2 + ((d.height * RENDER_SCALE * ns) / 2) ** 2) + (d.type === 'scaffold' ? 24 : 12);
          }
          if (d.type === 'reaction') {
            return pillHalfWidth(d) + 6; // pill half-width + small margin
          }
          return 20;
        };

        const fitGraphToView = ({ animate = true } = {}) => {
          if (!data.nodes.length) {
            return;
          }

          const padding = 44;
          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;

          for (const d of data.nodes) {
            const r = nodeRadius(d) + padding;
            minX = Math.min(minX, d.x - r);
            minY = Math.min(minY, d.y - r);
            maxX = Math.max(maxX, d.x + r);
            maxY = Math.max(maxY, d.y + r);
          }

          const graphW = Math.max(1, maxX - minX);
          const graphH = Math.max(1, maxY - minY);
          const viewport = visibleGraphViewport();
          const scale = Math.max(0.04, Math.min(1.35, Math.min(viewport.width / graphW, viewport.height / graphH)));
          const graphCx = (minX + maxX) / 2;
          const graphCy = (minY + maxY) / 2;
          const targetCx = viewport.x + viewport.width / 2;
          const targetCy = viewport.y + viewport.height / 2;
          const transform = d3.zoomIdentity.translate(targetCx - graphCx * scale, targetCy - graphCy * scale).scale(scale);

          const target = animate ? svg.transition().duration(650) : svg;
          target.call(zoomBehavior.transform, transform);
        };

        // Pre-position nodes in a radial spiral so simulation starts spread out
        // instead of all piling at (0,0) and needing many ticks to untangle.
        const cx = width / 2,
          cy = height / 2;
        const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ~137.5°
        data.nodes.forEach((d, i) => {
          const r = 60 + 35 * Math.sqrt(i);
          const angle = i * goldenAngle;
          d.x = cx + r * Math.cos(angle);
          d.y = cy + r * Math.sin(angle);
        });

        const avgRadius = data.nodes.reduce((s, d) => s + nodeRadius(d), 0) / Math.max(data.nodes.length, 1);

        // Calibrate heavy simulation physics natively
        let linkGap = parseInt(document.getElementById('distance-slider').value, 10);
        const linkDistFn = d => {
          const srcR = nodeRadius(d.source);
          const tgtR = nodeRadius(d.target);
          return srcR + tgtR + linkGap;
        };

        const simulation = d3
          .forceSimulation(data.nodes)
          .force(
            'link',
            d3
              .forceLink(data.links)
              .id(d => d.id)
              .distance(linkDistFn)
          )
          .force(
            'charge',
            d3.forceManyBody().strength(d => -Math.pow(nodeRadius(d), 2) * 0.4)
          )
          .force('center', d3.forceCenter(cx, cy))
          .force('collide', d3.forceCollide().radius(nodeRadius).strength(0.85).iterations(4))
          .alphaDecay(0.015)
          .velocityDecay(0.4);
        let shouldAutoFitOnSettle = true;

        // Wire the always-visible slider to live-update link distance.
        const distSlider = document.getElementById('distance-slider');
        const distVal = document.getElementById('distance-val');
        distVal.textContent = linkGap;

        distSlider.addEventListener('input', () => {
          shouldAutoFitOnSettle = false;
          linkGap = parseInt(distSlider.value, 10);
          distVal.textContent = linkGap;
          simulation.force('link').distance(linkDistFn);
          simulation.alpha(0.25).restart();
        });

        const link = g.append('g').selectAll('g').data(data.links).enter().append('g');

        const line = link
          .append('path')
          .attr('class', d => (d.edgeType === 'membership' ? 'link membership' : 'link'))
          .attr('stroke-width', d => (d.edgeType === 'membership' ? 1.5 : 2))
          .attr('stroke-dasharray', d => (d.edgeType === 'membership' ? '5,5' : null))
          .attr('stroke', d => (d.edgeType === 'membership' ? '#c084fc' : '#bbb'))
          .attr('fill', 'none')
          .attr('marker-end', d => (d.edgeType === 'membership' ? null : 'url(#arrow)'));

        const linkLabels = link
          .append('text')
          .attr('class', 'link-text')
          .attr('text-anchor', 'middle')
          .attr('dy', -6)
          .text(d => {
            if (d.delta) return d.delta;
            return '';
          });

        const node = g
          .append('g')
          .selectAll('g')
          .data(data.nodes)
          .enter()
          .append('g')
          .attr('class', 'node')
          .call(
            d3
              .drag()
              .on('start', (event, d) => {
                shouldAutoFitOnSettle = false;
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
              })
              .on('drag', (event, d) => {
                d.fx = event.x;
                d.fy = event.y;
              })
              .on('end', (event, d) => {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
              })
          );

        node.each(function (d) {
          const el = d3.select(this);
          if ((d.type === 'molecule' || d.type === 'scaffold') && d.svg) {
            el.html(d.svg);

            const svgNode = el.select('svg');

            // PAD gives charge labels / superscripts room outside the tight bounding box
            const ns = nodeScale(d);
            const SCALE = 0.5 * ns;
            const PAD = 40; // unscaled px added on each side — massive room for charge labels
            const padW = d.width + PAD * 2;
            const padH = d.height + PAD * 2;

            svgNode
              .attr('width', padW * SCALE)
              .attr('height', padH * SCALE)
              .attr('x', -(padW * SCALE) / 2)
              .attr('y', -(padH * SCALE) / 2)
              .attr('viewBox', `-${PAD} -${PAD} ${padW} ${padH}`)
              .attr('overflow', 'visible');

            // Formulate a beautiful rounded boundary casing exactly over the dynamic topological limits
            svgNode
              .select('rect')
              .attr('rx', 14)
              .attr('stroke', d.type === 'scaffold' ? '#a855f7' : '#333')
              .attr('stroke-width', d.type === 'scaffold' ? 3.5 : 3)
              .attr('stroke-dasharray', d.type === 'scaffold' ? '6,3' : null)
              .attr('fill', d.type === 'scaffold' ? '#faf5ff' : '#ffffff');
          } else if (d.type === 'reaction') {
            // Reaction node — pill badge showing the template name
            const name = d.conditions?.templateName || d.id;
            const short = name.length > 22 ? name.slice(0, 21) + '…' : name;
            const PW = Math.max(short.length * 6.2 + 22, 60);
            const PH = 22;

            el.append('rect')
              .attr('x', -PW / 2)
              .attr('y', -PH / 2)
              .attr('width', PW)
              .attr('height', PH)
              .attr('rx', PH / 2)
              .attr('fill', '#fff')
              .attr('stroke', '#ddd')
              .attr('stroke-width', 1.5);

            // Small colour dot on the left
            el.append('circle')
              .attr('cx', -PW / 2 + 10)
              .attr('cy', 0)
              .attr('r', 4)
              .attr('fill', '#ff6b6b');

            el.append('text')
              .attr('x', -PW / 2 + 20)
              .attr('y', 0)
              .attr('dominant-baseline', 'central')
              .attr('font-size', '9px')
              .attr('font-family', 'Inter, sans-serif')
              .attr('fill', '#444')
              .text(short);
          } else {
            // Fallback molecule node (no svg)
            el.append('circle').attr('r', 14).attr('fill', '#33ccff');
            el.append('text')
              .attr('class', 'node-label')
              .attr('dx', 18)
              .attr('dy', 4)
              .text(d.smiles || '');
          }
        });

        // ── Hover interactions ──
        // Build an adjacency lookup: nodeId → Set of link elements touching it
        let hoveredId = null;
        let lockedId = null;
        let tempHoverId = null;
        let connectedIds = new Set();

        // Apply node scale transforms — called from both tick (while running) and hover handlers (when stopped)
        const applyNodeTransforms = () =>
          node.attr('transform', d => {
            let s = 1;
            if (d.id === hoveredId || d.id === tempHoverId) s = d.type === 'scaffold' ? 1.2 : 2.8;
            else if (connectedIds.has(d.id)) s = d.type === 'scaffold' ? 1.05 : 1.65;
            return `translate(${d.x},${d.y})${s !== 1 ? ` scale(${s})` : ''}`;
          });
        const nodeLinks = new Map();
        data.nodes.forEach(d => nodeLinks.set(d.id, new Set()));

        // We need access to the rendered link elements per datum — index by source/target id
        const linkByDatum = [];
        line.each(function (d) {
          linkByDatum.push({ el: this, d });
        });

        linkByDatum.forEach(({ d }) => {
          const sid = typeof d.source === 'object' ? d.source.id : d.source;
          const tid = typeof d.target === 'object' ? d.target.id : d.target;
          if (nodeLinks.has(sid)) nodeLinks.get(sid).add(d);
          if (nodeLinks.has(tid)) nodeLinks.get(tid).add(d);
        });

        function applyHighlight(d, el) {
          hoveredId = d.id;

          connectedIds = new Set();
          const myLinks = nodeLinks.get(d.id) || new Set();
          myLinks.forEach(ld => {
            const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
            const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
            connectedIds.add(sid);
            connectedIds.add(tid);
          });
          connectedIds.delete(d.id);

          el.raise();
          applyNodeTransforms();
          updateInfoPanel(d, data.links, nodeById);

          el.select('rect').transition().duration(120).attr('stroke', '#3b82f6').attr('stroke-width', 6);

          line
            .transition()
            .duration(120)
            .attr('stroke', ld => {
              const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
              const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
              if (sid === d.id || tid === d.id) {
                return ld.edgeType === 'membership' ? '#a855f7' : '#3b82f6';
              }
              return ld.edgeType === 'membership' ? '#f3e8ff' : '#e5e7eb';
            })
            .attr('stroke-width', ld => {
              const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
              const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
              return sid === d.id || tid === d.id ? (ld.edgeType === 'membership' ? 3 : 2.5) : 1;
            })
            .attr('stroke-opacity', ld => {
              const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
              const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
              return sid === d.id || tid === d.id ? (ld.edgeType === 'membership' ? 1 : 0.85) : 0.45;
            });

          node.each(function (nd) {
            if (connectedIds.has(nd.id)) {
              d3.select(this)
                .select('rect')
                .transition()
                .duration(120)
                .attr('stroke', nd.type === 'scaffold' ? '#d8b4fe' : '#93c5fd')
                .attr('stroke-width', nd.type === 'molecule' || nd.type === 'scaffold' ? 5 : 2.5);
            }
          });
        }

        function clearHighlight() {
          hoveredId = null;
          connectedIds = new Set();
          applyNodeTransforms();
          updateInfoPanel(null, data.links, nodeById);

          node
            .select('rect')
            .transition()
            .duration(180)
            .attr('stroke', nd => (nd.type === 'scaffold' ? '#a855f7' : nd.type === 'molecule' ? '#333' : '#ddd'))
            .attr('stroke-width', nd => (nd.type === 'scaffold' ? 3.5 : nd.type === 'molecule' ? 3 : 1.5));

          line
            .transition()
            .duration(180)
            .attr('stroke', ld => (ld.edgeType === 'membership' ? '#c084fc' : '#bbb'))
            .attr('stroke-width', ld => (ld.edgeType === 'membership' ? 1.5 : 2))
            .attr('stroke-opacity', 0.9);
        }

        // SVG background click to unlock
        svg.on('click', event => {
          if (event.target.tagName.toLowerCase() === 'svg' && lockedId) {
            lockedId = null;
            clearHighlight();
          }
        });

        const infoDrawer = document.getElementById('info-drawer');

        infoDrawer.addEventListener('mouseover', e => {
          const item = e.target.closest('.info-mol-item');
          if (!item) return;
          const targetId = item.getAttribute('data-id');
          const targetData = nodeById.get(targetId);
          if (!targetData || targetData.type !== 'molecule') return;

          tempHoverId = targetId;
          applyNodeTransforms();

          const graphNodeEl = node.filter(nd => nd.id === targetId).node();
          if (graphNodeEl) {
            d3.select(graphNodeEl).select('rect').transition().duration(120).attr('stroke', '#10b981').attr('stroke-width', 6);
            d3.select(graphNodeEl).raise();
          }
        });

        infoDrawer.addEventListener('mouseout', e => {
          const item = e.target.closest('.info-mol-item');
          if (!item) return;
          const targetId = item.getAttribute('data-id');

          tempHoverId = null;
          applyNodeTransforms();

          const graphNodeEl = node.filter(nd => nd.id === targetId).node();
          if (graphNodeEl) {
            const isLocked = lockedId === targetId;
            const isConnected = connectedIds.has(targetId);
            d3.select(graphNodeEl)
              .select('rect')
              .transition()
              .duration(120)
              .attr('stroke', isLocked ? '#3b82f6' : isConnected ? '#93c5fd' : '#333')
              .attr('stroke-width', isLocked ? 6 : isConnected ? 5 : 3);
          }
        });

        // Delegate drawer clicks to act like node clicks and pan the camera
        infoDrawer.addEventListener('click', e => {
          const item = e.target.closest('.info-mol-item');
          if (!item) return;
          const targetId = item.getAttribute('data-id');
          const targetData = nodeById.get(targetId);
          if (!targetData || targetData.type !== 'molecule') return;

          const graphNodeEl = node.filter(nd => nd.id === targetId).node();
          if (graphNodeEl) {
            if (lockedId) clearHighlight();
            lockedId = targetId;
            applyHighlight(targetData, d3.select(graphNodeEl));

            // Pan smoothly to focus the selected node in the center of the screen
            const currentScale = d3.zoomTransform(svg.node()).k;
            const newT = d3.zoomIdentity
              .translate(width / 2, height / 2)
              .scale(currentScale)
              .translate(-targetData.x, -targetData.y);

            svg.transition().duration(400).call(zoomBehavior.transform, newT);
          }
        });

        node
          .on('mouseover', function (event, d) {
            if (d.type !== 'molecule' && d.type !== 'scaffold') return;
            if (lockedId && lockedId !== d.id) return;
            applyHighlight(d, d3.select(this));
          })
          .on('mouseout', function (event, d) {
            if (d.type !== 'molecule' && d.type !== 'scaffold') return;
            if (lockedId) return; // If anything is locked, ignore mouseout (either staying on the locked node, or we were passing over it while locked to another)
            clearHighlight();
          })
          .on('click', function (event, d) {
            if (d.type !== 'molecule' && d.type !== 'scaffold') return;
            event.stopPropagation(); // prevent SVG background click from catching it

            if (lockedId === d.id) {
              lockedId = null; // unlock self
              // we're still hovering, so we leave it visually highlighted! it will clear on mouseout.
            } else {
              if (lockedId) clearHighlight(); // flush previous lock if switching
              lockedId = d.id;
              applyHighlight(d, d3.select(this));
            }
          });

        simulation.on('tick', () => {
          // Helper logic isolating the exact intersection perimeter computationally for variable width nodes
          const intersectRect = (w, h, dx, dy) => {
            if (Math.abs(dx) < 1e-6 && Math.abs(dy) < 1e-6) return { x: 0, y: 0 };
            const s = Math.min(w / Math.abs(dx), h / Math.abs(dy));
            return { x: dx * s, y: dy * s };
          };

          line.attr('d', d => {
            const dx = d.target.x - d.source.x;
            const dy = d.target.y - d.source.y;

            const SCALE = 0.5;
            const srcW = d.source.type === 'molecule' ? (d.source.width * SCALE) / 2 + 1 : 8;
            const srcH = d.source.type === 'molecule' ? (d.source.height * SCALE) / 2 + 1 : 8;
            // Add an explicit padding offset onto the terminal target so the arrow head draws flush!
            const tgtW = d.target.type === 'molecule' ? (d.target.width * SCALE) / 2 + 9 : 14;
            const tgtH = d.target.type === 'molecule' ? (d.target.height * SCALE) / 2 + 9 : 14;

            const srcShift = intersectRect(srcW, srcH, dx, dy);
            const sX = d.source.x + srcShift.x;
            const sY = d.source.y + srcShift.y;

            const tgtShift = intersectRect(tgtW, tgtH, -dx, -dy);
            const tX = d.target.x + tgtShift.x;
            const tY = d.target.y + tgtShift.y;

            if (d.bidirectional) {
              const dr = Math.sqrt(dx * dx + dy * dy);
              return `M${sX},${sY}A${dr},${dr} 0 0,1 ${tX},${tY}`;
            } else {
              return `M${sX},${sY}L${tX},${tY}`;
            }
          });

          linkLabels
            .attr('x', d => {
              let x = (d.source.x + d.target.x) / 2;
              if (d.bidirectional) {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const len = Math.hypot(dx, dy) || 1;
                const nx = -dy / len;
                x += nx * 18; // Pull perpendicularly outside the topological curve
              }
              return x;
            })
            .attr('y', d => {
              let y = (d.source.y + d.target.y) / 2;
              if (d.bidirectional) {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const len = Math.hypot(dx, dy) || 1;
                const ny = dx / len;
                y += ny * 18;
              }
              return y;
            });

          applyNodeTransforms();
        }); // end simulation.on("tick")

        simulation.on('end', () => {
          if (!shouldAutoFitOnSettle) {
            return;
          }
          shouldAutoFitOnSettle = false;
          fitGraphToView();
        });
      } // end renderGraph
    </script>
  </body>
</html>
