<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reaction Network D3 Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #f8f8fa;
        color: #111;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      #network-container {
        width: 100vw;
        height: 100vh;
        position: absolute;
        z-index: 1;
        background: #f8f8fa;
        user-select: none;
        -webkit-user-select: none;
      }
      #network-container * {
        user-select: none;
        -webkit-user-select: none;
      }

      /* ── Drawer ── */
      #drawer {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 310px;
        z-index: 20;
        display: flex;
        flex-direction: row;
        transform: translateX(0);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #drawer.collapsed {
        transform: translateX(-310px);
      }
      #drawer-panel {
        width: 310px;
        height: 100%;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(14px);
        border-right: 1px solid rgba(0, 0, 0, 0.07);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.07);
        padding: 28px 22px 22px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #drawer-tab {
        /* The pull tab that sticks out on the right side of the drawer */
        position: absolute;
        right: -32px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 64px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid rgba(0, 0, 0, 0.07);
        border-left: none;
        border-radius: 0 10px 10px 0;
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.07);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: background 0.2s;
      }
      #drawer-tab:hover {
        background: #f0f0f0;
      }
      #drawer-tab svg {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #drawer.collapsed #drawer-tab svg {
        transform: rotate(180deg);
      }

      #drawer-panel h3 {
        margin: 0 0 4px 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      #drawer-panel .subtitle {
        font-size: 11px;
        color: #888;
        margin: 0 0 20px 0;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: #555;
        margin-bottom: 4px;
        margin-top: 14px;
      }
      label:first-of-type {
        margin-top: 0;
      }
      input[type='text'],
      input[type='number'] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
        font-family: monospace;
        background: #fafafa;
        color: #111;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type='text']:focus,
      input[type='number']:focus {
        border-color: #999;
        background: #fff;
      }
      .input-action-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      .input-action-row input {
        min-width: 0;
        flex: 1;
      }
      #random-btn {
        flex: 0 0 auto;
        padding: 0 11px;
        border: 1px solid #d7d7d7;
        border-radius: 8px;
        background: #fff;
        color: #222;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      #random-btn:hover {
        border-color: #aaa;
        background: #f4f4f5;
      }
      #random-btn:disabled {
        color: #aaa;
        border-color: #e5e5e5;
        cursor: default;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .row > div {
        flex: 1;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
      }
      .toggle-row label {
        margin: 0;
        font-size: 12px;
        color: #444;
      }
      input[type='checkbox'] {
        accent-color: #333;
        width: 14px;
        height: 14px;
        cursor: pointer;
      }
      #generate-btn {
        margin-top: 20px;
        width: 100%;
        padding: 11px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      #generate-btn:hover {
        background: #333;
      }
      #generate-btn.cancel {
        background: #b91c1c;
      }
      #generate-btn.cancel:hover {
        background: #991b1b;
      }
      #generate-btn:disabled {
        background: #aaa;
        cursor: default;
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        color: #888;
        min-height: 16px;
        text-align: center;
      }
      #generation-progress {
        margin-top: 8px;
      }
      #generation-progress[hidden] {
        display: none;
      }
      #generation-progress-track {
        height: 5px;
        overflow: hidden;
        background: #e5e5e5;
        border-radius: 999px;
      }
      #generation-progress-bar {
        width: 0;
        height: 100%;
        background: #222;
        border-radius: inherit;
        transition: width 0.15s ease-out;
      }
      #generation-progress-detail {
        margin-top: 5px;
        color: #888;
        font-size: 10px;
        line-height: 1.3;
        text-align: center;
      }
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .slider-row {
        margin-top: 14px;
      }
      .slider-row .slider-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .slider-row label {
        margin: 0;
        font-size: 11px;
        font-weight: 500;
        color: #555;
      }
      .slider-row .slider-val {
        font-size: 11px;
        color: #888;
        font-variant-numeric: tabular-nums;
      }
      input[type='range'] {
        width: 100%;
        height: 4px;
        cursor: pointer;
        accent-color: #333;
        background: #e0e0e0;
        border-radius: 4px;
        outline: none;
        border: none;
        appearance: none;
        -webkit-appearance: none;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #333;
        cursor: pointer;
      }

      .node circle {
        stroke: #fff;
        stroke-width: 2px;
        transition: stroke 0.2s;
      }
      .node:hover circle {
        stroke: #555;
        stroke-width: 3px;
      }
      .node-label {
        pointer-events: none;
        font-size: 11px;
        fill: #444;
        font-weight: 500;
      }
      .link {
        stroke: #bbb;
        stroke-opacity: 0.9;
      }
      .link-text {
        fill: #666;
        font-size: 9px;
        pointer-events: none;
      }

      #template-settings-btn {
        position: fixed;
        left: 18px;
        bottom: 18px;
        z-index: 35;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.97);
        color: #222;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.2s,
          border-color 0.2s;
      }
      #template-settings-btn:hover,
      #template-settings-btn.active {
        background: #f4f4f5;
        border-color: rgba(0, 0, 0, 0.22);
      }
      #template-settings-btn.active {
        transform: rotate(30deg);
      }
      #template-settings-panel {
        position: fixed;
        left: 18px;
        bottom: 72px;
        z-index: 34;
        width: min(430px, calc(100vw - 36px));
        max-height: min(640px, calc(100vh - 96px));
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.16);
        display: none;
        flex-direction: column;
        overflow: hidden;
      }
      #template-settings-panel.open {
        display: flex;
      }
      .template-settings-header {
        padding: 14px 16px 12px;
        border-bottom: 1px solid #eee;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .template-settings-title {
        font-size: 13px;
        font-weight: 600;
        color: #222;
      }
      #template-settings-count {
        font-size: 11px;
        color: #888;
        white-space: nowrap;
      }
      .template-settings-actions {
        padding: 10px 16px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        gap: 8px;
      }
      .template-settings-actions button {
        border: 1px solid #ddd;
        background: #fff;
        color: #333;
        border-radius: 7px;
        padding: 6px 9px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
      }
      .template-settings-actions button:hover {
        background: #f4f4f5;
        border-color: #bbb;
      }
      .template-settings-actions button:disabled {
        color: #aaa;
        border-color: #e5e5e5;
        cursor: default;
      }
      #template-settings-list {
        overflow-y: auto;
        padding: 8px 10px 12px;
      }
      .template-row {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        gap: 9px;
        align-items: start;
        margin: 0;
        padding: 9px 6px;
        border-bottom: 1px solid #f2f2f2;
      }
      .template-row:last-child {
        border-bottom: none;
      }
      .template-row input[type='checkbox'] {
        margin-top: 1px;
      }
      .template-name {
        font-size: 12px;
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
      }
      .template-smirks {
        font-family: monospace;
        font-size: 10px;
        line-height: 1.35;
        color: #666;
        word-break: break-all;
      }

      /* ── Right info drawer ── */
      #info-drawer {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 280px;
        z-index: 20;
        display: flex;
        flex-direction: row-reverse;
        transform: translateX(0);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #info-drawer.collapsed {
        transform: translateX(280px);
      }
      #info-panel {
        width: 280px;
        height: 100%;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(14px);
        border-left: 1px solid rgba(0, 0, 0, 0.07);
        box-shadow: -4px 0 24px rgba(0, 0, 0, 0.07);
        padding: 24px 18px 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #info-drawer-tab {
        position: absolute;
        left: -32px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 64px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid rgba(0, 0, 0, 0.07);
        border-right: none;
        border-radius: 10px 0 0 10px;
        box-shadow: -4px 0 12px rgba(0, 0, 0, 0.07);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: background 0.2s;
      }
      #info-drawer-tab:hover {
        background: #f0f0f0;
      }
      #info-drawer-tab svg {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #info-drawer.collapsed #info-drawer-tab svg {
        transform: rotate(180deg);
      }

      #info-smiles-section {
        margin-bottom: 16px;
      }
      #info-smiles-label {
        font-size: 10px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }
      #info-smiles {
        font-family: monospace;
        font-size: 12px;
        color: #222;
        background: #f3f4f6;
        border-radius: 7px;
        padding: 8px 10px;
        word-break: break-all;
        min-height: 34px;
      }
      #info-smiles svg {
        width: 100%;
        height: auto;
        max-height: 160px;
        display: block;
        margin: 0 auto;
        overflow: visible;
      }
      .info-section {
        margin-top: 14px;
      }
      .info-section-title {
        font-size: 10px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .info-section-title span {
        font-size: 10px;
        color: #bbb;
        font-weight: 400;
      }
      .info-mol-item {
        font-family: monospace;
        font-size: 11px;
        color: #444;
        background: #fafafa;
        border: 1px solid #eee;
        border-radius: 6px;
        padding: 5px 9px;
        margin-bottom: 5px;
        cursor: default;
        word-break: break-all;
      }
      .info-mol-item svg {
        width: 100%;
        height: auto;
        max-height: 90px;
        display: block;
        margin: 4px auto;
        overflow: visible;
      }
      .info-mol-item:hover {
        background: #f0f4ff;
        border-color: #93c5fd;
      }
      .info-empty {
        font-size: 11px;
        color: #bbb;
        font-style: italic;
        margin: 2px 0;
      }

      /* ── Chemical-space scatterplot ── */
      #chemical-space-panel {
        position: fixed;
        left: 50%;
        bottom: 16px;
        width: min(520px, calc(100vw - 96px));
        height: 292px;
        min-width: 320px;
        min-height: 180px;
        max-width: calc(100vw - 32px);
        max-height: calc(100vh - 32px);
        z-index: 15;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: 12px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #chemical-space-panel * {
        user-select: none;
        -webkit-user-select: none;
      }
      #chemical-space-panel.collapsed {
        height: 38px !important;
        min-height: 38px;
      }
      #chemical-space-panel.collapsed #chemical-space-controls,
      #chemical-space-panel.collapsed #chemical-space-chart-wrap,
      #chemical-space-panel.collapsed #chemical-space-resize-handle {
        display: none;
      }
      #chemical-space-header {
        height: 38px;
        flex: 0 0 38px;
        padding: 0 10px 0 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #eeeeef;
        cursor: move;
        user-select: none;
      }
      #chemical-space-title {
        display: flex;
        min-width: 0;
        align-items: baseline;
        gap: 8px;
      }
      #chemical-space-title h3 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: #222;
      }
      #chemical-space-status {
        color: #888;
        font-size: 10px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #chemical-space-toggle {
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #666;
        cursor: pointer;
        font-size: 11px;
        padding: 5px 7px;
      }
      #chemical-space-toggle:hover {
        background: #f2f3f5;
        color: #222;
      }
      #chemical-space-actions {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .chemical-space-action {
        min-width: 25px;
        height: 24px;
        padding: 0 6px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #555;
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
      }
      .chemical-space-action:hover {
        background: #f2f3f5;
        color: #111;
      }
      #chemical-space-controls {
        height: 38px;
        flex: 0 0 38px;
        padding: 7px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #chemical-space-controls label {
        margin: 0;
        color: #666;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.55px;
      }
      #chemical-space-x-axis,
      #chemical-space-y-axis {
        flex: 1 1 0;
        min-width: 100px;
        padding: 4px 7px;
        border: 1px solid #dedfe2;
        border-radius: 6px;
        color: #333;
        background: #fff;
        font-family: inherit;
        font-size: 11px;
      }
      #chemical-space-chart-wrap {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        padding: 0 8px 8px;
      }
      #chemical-space-chart {
        width: 100%;
        height: 100%;
        display: block;
        -webkit-user-drag: none;
        touch-action: none;
      }
      #chemical-space-empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 11px;
        pointer-events: none;
      }
      #chemical-space-empty[hidden] {
        display: none;
      }
      .chemical-space-axis path,
      .chemical-space-axis line {
        stroke: #d4d4d8;
      }
      .chemical-space-axis text {
        fill: #777;
        font-size: 9px;
      }
      .chemical-space-axis-label {
        fill: #666;
        font-size: 10px;
        font-weight: 500;
      }
      .chemical-space-grid line {
        stroke: #eeeeef;
      }
      .chemical-space-grid text {
        display: none;
      }
      .chemical-space-dot {
        cursor: pointer;
        transition: fill 0.12s, stroke 0.12s, r 0.12s;
      }
      #chemical-space-resize-handle {
        position: absolute;
        right: 2px;
        bottom: 2px;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        z-index: 2;
      }
      #chemical-space-resize-handle::before {
        content: '';
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 7px;
        height: 7px;
        border-right: 2px solid #a1a1aa;
        border-bottom: 2px solid #a1a1aa;
      }
    </style>
  </head>
  <body>
    <div id="drawer">
      <div id="drawer-panel">
        <h3>Reaction Network Viewer</h3>
        <p class="subtitle">Requires <code>server.js</code> on port 3737.</p>

        <label for="smiles-input">SMILES</label>
        <div class="input-action-row">
          <input type="text" id="smiles-input" placeholder="e.g. CCO" value="CCO" spellcheck="false" />
          <button id="random-btn" title="Load a random complex SMILES case">Random</button>
        </div>

        <div class="row">
          <div>
            <label for="depth-input">Depth</label>
            <input type="number" id="depth-input" min="1" value="5" />
          </div>
          <div>
            <label for="maxnodes-input">Max Nodes</label>
            <input type="number" id="maxnodes-input" min="1" value="300" />
          </div>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="flatten-input" checked />
          <label for="flatten-input">Flatten (molecule → molecule edges)</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="scaffolds-input" checked />
          <label for="scaffolds-input">View Scaffold Network</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="decorated-scaffolds-input" checked />
          <label for="decorated-scaffolds-input">Decorated Scaffolds</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="extended-scaffolds-input" checked />
          <label for="extended-scaffolds-input">Extended Scaffolds</label>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="hide-simple-scaffolds-input" checked />
          <label for="hide-simple-scaffolds-input">Hide Simple Scaffolds</label>
        </div>

        <button id="generate-btn">Generate Network</button>
        <div id="status"></div>
        <div id="generation-progress" hidden aria-live="polite">
          <div id="generation-progress-track"><div id="generation-progress-bar"></div></div>
          <div id="generation-progress-detail"></div>
        </div>

        <div class="slider-row" id="distance-row">
          <div class="slider-header">
            <label for="distance-slider">Node Distance</label>
            <span class="slider-val" id="distance-val">0</span>
          </div>
          <input type="range" id="distance-slider" min="-3000" max="600" value="0" step="5" />
        </div>

        <div class="slider-row">
          <div class="slider-header">
            <label for="bond-length-slider">Bond Length</label>
            <span class="slider-val" id="bond-length-val">1.5</span>
          </div>
          <input type="range" id="bond-length-slider" min="0.5" max="2.5" value="1.5" step="0.1" />
        </div>
      </div>

      <!-- Pull tab -->

    <script>
      const width = window.innerWidth;
      const height = window.innerHeight;
      const zoomBehavior = d3.zoom().on('zoom', event => g.attr('transform', event.transform));
      const svg = d3.select('#network-container').call(zoomBehavior);
      // Keep double-click free for selection gestures; wheel, pinch, and drag zoom/pan remain enabled.
      svg.on('dblclick.zoom', null);
      svg.on('dblclick.clearNativeSelection', event => {
        event.preventDefault();
        window.getSelection?.().removeAllRanges();
      });
      const g = svg.append('g');

      // Arrow-key panning
      const PAN_STEP = 40;
      document.addEventListener('keydown', e => {
        if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) return;
        e.preventDefault();
        const t = d3.zoomTransform(svg.node());
        const dx = e.key === 'ArrowLeft' ? PAN_STEP : e.key === 'ArrowRight' ? -PAN_STEP : 0;
        const dy = e.key === 'ArrowUp' ? PAN_STEP : e.key === 'ArrowDown' ? -PAN_STEP : 0;
        svg.call(zoomBehavior.translateBy, dx / t.k, dy / t.k);
      });

      // Pre-declare slick arrow heads
      svg
        .append('defs')
        .append('marker')
        .attr('id', 'arrow')
        .attr('viewBox', '0 -5 10 10')
        .attr('refX', 22) // Anchor off slightly to avoid edge clipping!
        .attr('refY', 0)
        .attr('markerWidth', 5)
        .attr('markerHeight', 5)
        .attr('orient', 'auto')
        .append('path')
        .attr('fill', '#666')
        .attr('d', 'M0,-5L10,0L0,5');

      // ── Info drawer toggle ──
      const infoDrawer = document.getElementById('info-drawer');
      document.getElementById('info-drawer-tab').addEventListener('click', () => infoDrawer.classList.toggle('collapsed'));

      const infoSmiles = document.getElementById('info-smiles');
      const infoTo = document.getElementById('info-to');
      const infoFrom = document.getElementById('info-from');
      const infoToCount = document.getElementById('info-to-count');
      const infoFromCount = document.getElementById('info-from-count');
      const chemicalSpacePanel = document.getElementById('chemical-space-panel');
      const chemicalSpaceHeader = document.getElementById('chemical-space-header');
      const chemicalSpaceToggle = document.getElementById('chemical-space-toggle');
      const chemicalSpaceZoomIn = document.getElementById('chemical-space-zoom-in');
      const chemicalSpaceZoomOut = document.getElementById('chemical-space-zoom-out');
      const chemicalSpaceResetZoom = document.getElementById('chemical-space-reset-zoom');
      const chemicalSpaceXAxis = document.getElementById('chemical-space-x-axis');
      const chemicalSpaceYAxis = document.getElementById('chemical-space-y-axis');
      const chemicalSpaceChart = d3.select('#chemical-space-chart');
      const chemicalSpaceEmpty = document.getElementById('chemical-space-empty');
      const chemicalSpaceStatus = document.getElementById('chemical-space-status');
      const chemicalSpaceResizeHandle = document.getElementById('chemical-space-resize-handle');
      const chemicalSpaceLabels = new Map([...chemicalSpaceXAxis.options].map(option => [option.value, option.textContent]));
      let chemicalSpaceGraph = null;
      let chemicalSpaceDots = null;
      let chemicalSpaceHighlightedId = null;
      let chemicalSpaceLockedId = null;
      let chemicalSpaceView = { xStart: 0, xEnd: 1, yStart: 0, yEnd: 1 };
      let chemicalSpaceExpandedHeight = 292;
      let chemicalSpaceDrag = null;
      let chemicalSpaceResize = null;
      let chemicalSpacePlotBounds = null;
      let chemicalSpacePan = null;
      let chemicalSpaceSuppressClick = false;

      chemicalSpaceToggle.addEventListener('click', () => {
        const isCollapsing = !chemicalSpacePanel.classList.contains('collapsed');
        if (isCollapsing) {
          chemicalSpaceExpandedHeight = chemicalSpacePanel.getBoundingClientRect().height;
          chemicalSpacePanel.classList.add('collapsed');
        } else {
          chemicalSpacePanel.classList.remove('collapsed');
          chemicalSpacePanel.style.height = `${chemicalSpaceExpandedHeight}px`;
          requestAnimationFrame(renderChemicalSpacePlot);
        }
        const collapsed = chemicalSpacePanel.classList.contains('collapsed');
        chemicalSpaceToggle.textContent = collapsed ? 'Show' : 'Hide';
        chemicalSpaceToggle.setAttribute('aria-expanded', String(!collapsed));
      });

      chemicalSpaceHeader.addEventListener('pointerdown', event => {
        if (event.target.closest('button')) return;
        const bounds = chemicalSpacePanel.getBoundingClientRect();
        chemicalSpacePanel.style.left = `${bounds.left}px`;
        chemicalSpacePanel.style.top = `${bounds.top}px`;
        chemicalSpacePanel.style.bottom = 'auto';
        chemicalSpacePanel.style.transform = 'none';
        chemicalSpaceDrag = { pointerId: event.pointerId, offsetX: event.clientX - bounds.left, offsetY: event.clientY - bounds.top };
        chemicalSpaceHeader.setPointerCapture(event.pointerId);
        event.preventDefault();
      });

      chemicalSpaceHeader.addEventListener('pointermove', event => {
        if (!chemicalSpaceDrag || chemicalSpaceDrag.pointerId !== event.pointerId) return;
        const bounds = chemicalSpacePanel.getBoundingClientRect();
        const left = Math.max(0, Math.min(window.innerWidth - bounds.width, event.clientX - chemicalSpaceDrag.offsetX));
        const top = Math.max(0, Math.min(window.innerHeight - bounds.height, event.clientY - chemicalSpaceDrag.offsetY));
        chemicalSpacePanel.style.left = `${left}px`;
        chemicalSpacePanel.style.top = `${top}px`;
      });

      chemicalSpaceHeader.addEventListener('pointerup', event => {
        if (!chemicalSpaceDrag || chemicalSpaceDrag.pointerId !== event.pointerId) return;
        chemicalSpaceHeader.releasePointerCapture(event.pointerId);
        chemicalSpaceDrag = null;
      });

      chemicalSpaceHeader.addEventListener('pointercancel', () => {
        chemicalSpaceDrag = null;
      });

      chemicalSpaceResizeHandle.addEventListener('pointerdown', event => {
        if (chemicalSpacePanel.classList.contains('collapsed')) return;
        const bounds = chemicalSpacePanel.getBoundingClientRect();
        chemicalSpacePanel.style.left = `${bounds.left}px`;
        chemicalSpacePanel.style.top = `${bounds.top}px`;
        chemicalSpacePanel.style.bottom = 'auto';
        chemicalSpacePanel.style.transform = 'none';
        chemicalSpaceResize = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          startWidth: bounds.width,
          startHeight: bounds.height,
          left: bounds.left,
          top: bounds.top
        };
        chemicalSpaceResizeHandle.setPointerCapture(event.pointerId);
        event.preventDefault();
        event.stopPropagation();
      });

      chemicalSpaceResizeHandle.addEventListener('pointermove', event => {
        if (!chemicalSpaceResize || chemicalSpaceResize.pointerId !== event.pointerId) return;
        const maxWidth = Math.max(320, window.innerWidth - chemicalSpaceResize.left);
        const maxHeight = Math.max(180, window.innerHeight - chemicalSpaceResize.top);
        const nextWidth = Math.max(320, Math.min(maxWidth, chemicalSpaceResize.startWidth + event.clientX - chemicalSpaceResize.startX));
        const nextHeight = Math.max(180, Math.min(maxHeight, chemicalSpaceResize.startHeight + event.clientY - chemicalSpaceResize.startY));
        chemicalSpacePanel.style.width = `${nextWidth}px`;
        chemicalSpacePanel.style.height = `${nextHeight}px`;
        chemicalSpaceExpandedHeight = nextHeight;
      });

      chemicalSpaceResizeHandle.addEventListener('pointerup', event => {
        if (!chemicalSpaceResize || chemicalSpaceResize.pointerId !== event.pointerId) return;
        chemicalSpaceResizeHandle.releasePointerCapture(event.pointerId);
        chemicalSpaceResize = null;
      });

      chemicalSpaceResizeHandle.addEventListener('pointercancel', () => {
        chemicalSpaceResize = null;
      });

      new ResizeObserver(() => {
        if (chemicalSpaceGraph && !chemicalSpacePanel.classList.contains('collapsed')) {
          requestAnimationFrame(renderChemicalSpacePlot);
        }
      }).observe(chemicalSpacePanel);

      function paddedDomain(values) {
        const [rawMin, rawMax] = d3.extent(values);
        if (!Number.isFinite(rawMin) || !Number.isFinite(rawMax)) return [0, 1];
        const span = rawMax - rawMin;
        const pad = span > 0 ? span * 0.08 : Math.max(Math.abs(rawMin) * 0.08, 1);
        return [rawMin - pad, rawMax + pad];
      }

      function domainForChemicalSpaceView(domain, start, end) {
        const span = domain[1] - domain[0];
        return [domain[0] + span * start, domain[0] + span * end];
      }

      function zoomChemicalSpaceAt(factor, xFraction = 0.5, yFraction = 0.5) {
        const zoomOut = factor < 1;
        const currentXSpan = chemicalSpaceView.xEnd - chemicalSpaceView.xStart;
        const currentYSpan = chemicalSpaceView.yEnd - chemicalSpaceView.yStart;
        const nextXSpan = Math.min(1, Math.max(1 / 16, currentXSpan / factor));
        const nextYSpan = Math.min(1, Math.max(1 / 16, currentYSpan / factor));
        const anchorX = chemicalSpaceView.xStart + currentXSpan * xFraction;
        const anchorY = chemicalSpaceView.yStart + currentYSpan * yFraction;
        const xStart = Math.max(0, Math.min(1 - nextXSpan, anchorX - nextXSpan * xFraction));
        const yStart = Math.max(0, Math.min(1 - nextYSpan, anchorY - nextYSpan * yFraction));
        chemicalSpaceView = {
          xStart: zoomOut && nextXSpan === 1 ? 0 : xStart,
          xEnd: zoomOut && nextXSpan === 1 ? 1 : xStart + nextXSpan,
          yStart: zoomOut && nextYSpan === 1 ? 0 : yStart,
          yEnd: zoomOut && nextYSpan === 1 ? 1 : yStart + nextYSpan
        };
        renderChemicalSpacePlot();
      }

      function isChemicalSpaceZoomed() {
        return chemicalSpaceView.xEnd - chemicalSpaceView.xStart < 0.999 || chemicalSpaceView.yEnd - chemicalSpaceView.yStart < 0.999;
      }

      function panChemicalSpaceFromStart(pointerX, pointerY) {
        const bounds = chemicalSpacePlotBounds;
        if (!chemicalSpacePan || !bounds) return;
        const xSpan = chemicalSpacePan.view.xEnd - chemicalSpacePan.view.xStart;
        const ySpan = chemicalSpacePan.view.yEnd - chemicalSpacePan.view.yStart;
        const xStart = Math.max(0, Math.min(1 - xSpan, chemicalSpacePan.view.xStart - ((pointerX - chemicalSpacePan.startX) / bounds.innerWidth) * xSpan));
        const yStart = Math.max(0, Math.min(1 - ySpan, chemicalSpacePan.view.yStart + ((pointerY - chemicalSpacePan.startY) / bounds.innerHeight) * ySpan));
        chemicalSpaceView = { xStart, xEnd: xStart + xSpan, yStart, yEnd: yStart + ySpan };
        renderChemicalSpacePlot();
      }

      function refreshChemicalSpaceDotStyles() {
        if (!chemicalSpaceDots) return;
        chemicalSpaceDots
          .attr('r', d => (d.id === chemicalSpaceHighlightedId ? 6.5 : d.id === 'mol_0' ? 5.2 : 4.4))
          .attr('fill', d => (d.id === chemicalSpaceHighlightedId ? '#2563eb' : d.id === 'mol_0' ? '#111827' : '#60a5fa'))
          .attr('stroke', d => (d.id === chemicalSpaceHighlightedId ? '#1d4ed8' : '#ffffff'))
          .attr('stroke-width', d => (d.id === chemicalSpaceHighlightedId ? 2.2 : 1.2))
          .attr('opacity', d => (chemicalSpaceHighlightedId && d.id !== chemicalSpaceHighlightedId ? 0.42 : 0.92));
      }

      function chemicalSpaceTooltipLabel(point) {
        const formula = point.formula || point.id;
        const container = document.createElement('span');
        container.innerHTML = formula;
        return container.textContent || point.id;
      }

      function setChemicalSpaceHighlight(id, { locked = false } = {}) {
        chemicalSpaceHighlightedId = id ?? null;
        chemicalSpaceLockedId = locked ? id ?? null : chemicalSpaceLockedId;
        refreshChemicalSpaceDotStyles();
      }

      function clearChemicalSpaceHighlight({ preserveLock = false } = {}) {
        chemicalSpaceHighlightedId = preserveLock ? chemicalSpaceLockedId : null;
        if (!preserveLock) chemicalSpaceLockedId = null;
        refreshChemicalSpaceDotStyles();
      }

      function clearChemicalSpacePlot() {
        chemicalSpaceChart.selectAll('*').remove();
        chemicalSpaceGraph = null;
        chemicalSpaceDots = null;
        chemicalSpaceHighlightedId = null;
        chemicalSpaceLockedId = null;
        chemicalSpaceView = { xStart: 0, xEnd: 1, yStart: 0, yEnd: 1 };
        chemicalSpaceEmpty.textContent = 'Generate a network to plot molecules';
        chemicalSpaceEmpty.hidden = false;
        chemicalSpaceStatus.textContent = 'Generate a network to plot molecules';
      }

      function renderChemicalSpacePlot() {
        if (!chemicalSpaceGraph) {
          clearChemicalSpacePlot();
          return;
        }

        const xKey = chemicalSpaceXAxis.value;
        const yKey = chemicalSpaceYAxis.value;
        const xLabel = chemicalSpaceLabels.get(xKey) ?? xKey;
        const yLabel = chemicalSpaceLabels.get(yKey) ?? yKey;
        const points = chemicalSpaceGraph.data.nodes.filter(
          node => node.type === 'molecule' && Number.isFinite(node.descriptors?.[xKey]) && Number.isFinite(node.descriptors?.[yKey]) && node.descriptors[xKey] !== 0 && node.descriptors[yKey] !== 0
        );
        chemicalSpaceChart.selectAll('*').remove();
        chemicalSpaceDots = null;

        if (!points.length) {
          chemicalSpaceEmpty.textContent = `No molecule nodes have non-zero ${xLabel} and ${yLabel} values`;
          chemicalSpaceEmpty.hidden = false;
          chemicalSpaceStatus.textContent = `0 plottable molecules · ${xLabel} × ${yLabel}`;
          return;
        }

        chemicalSpaceEmpty.hidden = true;
        chemicalSpaceStatus.textContent = `${points.length} molecule${points.length === 1 ? '' : 's'} · ${xLabel} × ${yLabel}`;
        chemicalSpaceChart.style('cursor', chemicalSpacePan ? 'grabbing' : isChemicalSpaceZoomed() ? 'grab' : 'default');

        const bounds = chemicalSpaceChart.node().getBoundingClientRect();
        const chartWidth = Math.max(260, bounds.width);
        const chartHeight = Math.max(160, bounds.height);
        const margin = { top: 10, right: 14, bottom: 38, left: 70 };
        const innerWidth = chartWidth - margin.left - margin.right;
        const innerHeight = chartHeight - margin.top - margin.bottom;
        const xDomain = paddedDomain(points.map(point => point.descriptors[xKey]));
        const yDomain = paddedDomain(points.map(point => point.descriptors[yKey]));
        chemicalSpacePlotBounds = { margin, innerWidth, innerHeight };
        const x = d3.scaleLinear().domain(domainForChemicalSpaceView(xDomain, chemicalSpaceView.xStart, chemicalSpaceView.xEnd)).range([0, innerWidth]).nice();
        const y = d3.scaleLinear().domain(domainForChemicalSpaceView(yDomain, chemicalSpaceView.yStart, chemicalSpaceView.yEnd)).range([innerHeight, 0]).nice();
        const root = chemicalSpaceChart.attr('viewBox', `0 0 ${chartWidth} ${chartHeight}`).append('g').attr('transform', `translate(${margin.left},${margin.top})`);
        const yAxis = d3.axisLeft(y).ticks(4).tickSize(-innerWidth).tickFormat(d3.format('~s'));
        const xAxis = d3.axisBottom(x).ticks(5).tickFormat(d3.format('~s'));

        const grid = root.append('g').attr('class', 'chemical-space-grid').call(yAxis);
        grid.select('.domain').remove();
        grid.selectAll('.tick text').remove();
        root.append('g').attr('class', 'chemical-space-axis').attr('transform', `translate(0,${innerHeight})`).call(xAxis);
        root.append('g').attr('class', 'chemical-space-axis').call(d3.axisLeft(y).ticks(4).tickFormat(d3.format('~s')));
        root
          .append('text')
          .attr('class', 'chemical-space-axis-label')
          .attr('x', innerWidth / 2)
          .attr('y', innerHeight + 32)
          .attr('text-anchor', 'middle')
          .text(xKey === 'molecularWeight' ? 'Molecular weight (g/mol)' : xLabel);
        root
          .append('text')
          .attr('class', 'chemical-space-axis-label')
          .attr('transform', `translate(${-55},${innerHeight / 2}) rotate(-90)`)
          .attr('text-anchor', 'middle')
          .text(yLabel);

        chemicalSpaceDots = root
          .append('g')
          .selectAll('circle')
          .data(points, point => point.id)
          .enter()
          .append('circle')
          .attr('class', 'chemical-space-dot')
          .attr('cx', point => x(point.descriptors[xKey]))
          .attr('cy', point => y(point.descriptors[yKey]))
          .on('mouseover', function (event, point) {
            chemicalSpaceGraph.onHover(point);
          })
          .on('mouseout', function (event, point) {
            chemicalSpaceGraph.onMouseOut(point);
          })
          .on('click', function (event, point) {
            event.stopPropagation();
            chemicalSpaceGraph.onClick(point);
          });

        chemicalSpaceDots.append('title').text(point => `${chemicalSpaceTooltipLabel(point)}\n${xLabel}: ${point.descriptors[xKey]}\n${yLabel}: ${point.descriptors[yKey]}`);
        refreshChemicalSpaceDotStyles();
      }

      const resetChemicalSpaceView = () => {
        chemicalSpaceView = { xStart: 0, xEnd: 1, yStart: 0, yEnd: 1 };
        renderChemicalSpacePlot();
      };
      chemicalSpaceXAxis.addEventListener('change', resetChemicalSpaceView);
      chemicalSpaceYAxis.addEventListener('change', resetChemicalSpaceView);
      chemicalSpaceChart.on('wheel', event => {
        event.preventDefault();
        const bounds = chemicalSpacePlotBounds;
        if (!bounds) return;
        const [pointerX, pointerY] = d3.pointer(event, chemicalSpaceChart.node());
        const xFraction = Math.max(0, Math.min(1, (pointerX - bounds.margin.left) / bounds.innerWidth));
        const yFraction = Math.max(0, Math.min(1, 1 - (pointerY - bounds.margin.top) / bounds.innerHeight));
        zoomChemicalSpaceAt(event.deltaY < 0 ? 1.2 : 1 / 1.2, xFraction, yFraction);
      });
      chemicalSpaceChart.on('pointerdown.pan', event => {
        if (event.button !== 0 || !isChemicalSpaceZoomed() || event.target.closest?.('.chemical-space-dot')) return;
        const [pointerX, pointerY] = d3.pointer(event, chemicalSpaceChart.node());
        chemicalSpacePan = {
          pointerId: event.pointerId,
          startX: pointerX,
          startY: pointerY,
          view: { ...chemicalSpaceView },
          moved: false
        };
        chemicalSpaceChart.node().setPointerCapture(event.pointerId);
        chemicalSpaceChart.style('cursor', 'grabbing');
        event.preventDefault();

        if (!chemicalSpacePan || chemicalSpacePan.pointerId !== event.pointerId) return;
        const [pointerX, pointerY] = d3.pointer(event, chemicalSpaceChart.node());
        if (Math.abs(pointerX - chemicalSpacePan.startX) > 2 || Math.abs(pointerY - chemicalSpacePan.startY) > 2) {
          chemicalSpacePan.moved = true;
        }
        panChemicalSpaceFromStart(pointerX, pointerY);
        event.preventDefault();

      function updateInfoPanel(d, linksData, nodeById) {
        if (!d) {
          infoSmiles.textContent = 'Hover a molecule…';

          infoFrom.innerHTML = '<div class="info-empty">—</div>';
          infoToCount.textContent = '';
          infoFromCount.textContent = '';
          return;
        }
        infoSmiles.innerHTML = d.svg || d.formula || d.id;
        infoSmiles.className = '';

        const toItems = []; // edges where source === d.id (this node points TO these)
        const fromItems = []; // edges where target === d.id (these point FROM somewhere TO this)
        for (const l of linksData) {
          if (!l.delta) {
            continue;
          }
          const sid = typeof l.source === 'object' ? l.source.id : l.source;
          const tid = typeof l.target === 'object' ? l.target.id : l.target;
          const formatStr = (base, delta) =>
            delta ? `${base} <div style="color:#aaa; font-size:10px; text-align:center; border-top: 1px solid #eee; padding-top:4px; margin-top:4px; font-weight:600;">Δ ${delta}</div>` : base;

          if (sid === d.id) {

          }
          if (tid === d.id) {
            const src = nodeById.get(sid);
            // l.delta here represents the change from the source to 'this' node (the target).
            if (src?.type === 'molecule' || src?.type === 'scaffold') fromItems.push({ id: sid, html: formatStr(src.svg || src.formula || sid, l.delta) });
          }
        }
        const renderList = (items, el, countEl) => {
          const unique = [];

          for (const item of items) {

      function updateGenerationProgress(progress) {
        const maxDepth = Math.max(1, Number(progress.maxDepth) || 1);
        const completedDepth = Math.max(0, Math.min(maxDepth, Number(progress.completedDepth) || 0));
        const generationPercentage = (completedDepth / maxDepth) * 70;
        const moleculeCount = Number(progress.moleculeCount) || 0;
        const attemptedTransforms = Number(progress.attemptedTransformCount) || 0;
        const queuedMolecules = Number(progress.queuedMoleculeCount) || 0;
        const pipelineCompleted = Math.max(0, Number(progress.pipelineCompleted) || 0);
        const pipelineTotal = Math.max(0, Number(progress.pipelineTotal) || 0);
        const pipelineFraction = pipelineTotal > 0 ? Math.min(1, pipelineCompleted / pipelineTotal) : 0;
        const pipelineStages = {
          rendering: { start: 70, span: 13, label: 'Rendering molecule thumbnails' },
          'scaffold-building': { start: 83, span: 6, label: 'Building scaffold network' },
          'scaffold-rendering': { start: 89, span: 6, label: 'Rendering scaffold thumbnails' },
          descriptors: { start: 95, span: 4, label: 'Computing chemical-space descriptors' },
          finalizing: { start: 99, span: 1, label: 'Finalizing graph' }
        };
        const pipelineStage = pipelineStages[progress.phase];
        const percentage = pipelineStage ? pipelineStage.start + pipelineStage.span * pipelineFraction : generationPercentage;

        generationProgress.hidden = false;
        generationProgressBar.style.width = `${Math.max(percentage, 2)}%`;
        if (pipelineStage) {
          const progressText = pipelineTotal > 0 ? ` · ${pipelineCompleted} of ${pipelineTotal}` : '';
          const itemText = progress.pipelineItemState === 'starting' && progress.pipelineItemName ? ` · ${progress.pipelineItemName}` : '';
          generationProgressDetail.textContent = `${pipelineStage.label}${progressText}${itemText}`;
          return;
        }

        const activeDepth = Math.min(maxDepth, Math.max(1, Number(progress.activeDepth) || completedDepth + 1));
        generationProgressDetail.textContent = `Depth ${activeDepth} of ${maxDepth} · ${moleculeCount} molecules · ${queuedMolecules} queued · ${attemptedTransforms} transforms`;
      }

      async function readGenerationEventStream(res, onProgress) {
        if (!res.body) {
          throw new Error('Streaming response is unavailable in this browser.');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          buffer += decoder.decode(value ?? new Uint8Array(), { stream: !done });

          let boundary;
          while ((boundary = buffer.indexOf('\n\n')) !== -1) {
            const eventBlock = buffer.slice(0, boundary);
            buffer = buffer.slice(boundary + 2);
            let eventType = 'message';
            const dataLines = [];
            for (const line of eventBlock.split('\n')) {
              if (line.startsWith('event:')) {
                eventType = line.slice(6).trim();
              } else if (line.startsWith('data:')) {
                dataLines.push(line.slice(5).trim());
              }
            }
            if (!dataLines.length) {
              continue;
            }
            const payload = JSON.parse(dataLines.join('\n'));
            if (eventType === 'progress') {
              onProgress(payload);
            } else if (eventType === 'complete') {
              return payload;
            } else if (eventType === 'error') {
              throw new Error(payload.error || 'Generation failed.');
            }
          }

          if (done) {
            break;
          }
        }
        throw new Error('Generation stream ended before returning a graph.');
      }

      async function generate() {
        if (isGenerating) {
          await cancelGeneration();
          return;

        const smiles = document.getElementById('smiles-input').value.trim();
        const depth = document.getElementById('depth-input').value;
        const maxNodes = document.getElementById('maxnodes-input').value;

        const extendedScaffolds = document.getElementById('extended-scaffolds-input').checked;
        const hideSimpleScaffolds = document.getElementById('hide-simple-scaffolds-input').checked;
        const bondLength = bondLengthSlider.value;
        const enabledTemplateKeys = getEnabledTemplateKeys();

        if (!smiles) {
          status.textContent = 'Please enter a SMILES string.';
          return;
        }

        const controller = new AbortController();
        currentGenerationController = controller;
        setGenerationState(true);
        status.textContent = '';
        updateGenerationProgress({
          activeDepth: 1,
          completedDepth: 0,
          maxDepth: Number(depth),
          moleculeCount: 1,
          queuedMoleculeCount: 1,
          attemptedTransformCount: 0
        });

        const url = new URL('http://localhost:3737/generate');
        url.searchParams.set('smiles', smiles);
        url.searchParams.set('depth', depth);
        url.searchParams.set('flatten', String(flatten));
        url.searchParams.set('maxNodes', maxNodes);
        url.searchParams.set('scaffolds', String(scaffolds));
        url.searchParams.set('decoratedScaffolds', String(decoratedScaffolds));
        url.searchParams.set('extendedScaffolds', String(extendedScaffolds));
        url.searchParams.set('hideSimpleScaffolds', String(hideSimpleScaffolds));
        url.searchParams.set('bondLength', bondLength);
        if (enabledTemplateKeys !== null) {
          url.searchParams.set('enabledTemplates', enabledTemplateKeys.join(','));
        }

        try {
          const res = await fetch(url, {
            signal: controller.signal,
            headers: { Accept: 'text/event-stream' }
          });
          if (!res.ok) {
            const e = await res.json();
            throw new Error(e.error || res.statusText);
          }
          const data = await readGenerationEventStream(res, updateGenerationProgress);
          status.textContent = `${data.nodes.length} nodes · ${data.links.length} links`;
          renderGraph(data);
        } catch (e) {
          if (e.name === 'AbortError') {
            status.textContent = 'Generation cancelled.';
          } else {
            clearGenerationProgress();
            status.textContent = `Error: ${e.message}`;
            console.error(e);
          }
        } finally {
          if (currentGenerationController === controller) {
            currentGenerationController = null;
            setGenerationState(false);
          }
        }
      }

      function renderGraph(data, { fitImmediately = false } = {}) {
        g.selectAll('*').remove(); // Wipe previous iterations

        // Native traversal intercept to tag bidirectional topology loops dynamically
        // and compute degree (connections) for each node to scale drawing radius.
        const nodeById = new Map(data.nodes.map(d => [d.id, d]));
        data.nodes.forEach(d => (d.degree = 0));

        const linkMap = new Map();
        data.links.forEach(l => {
          const key1 = `${l.source.id || l.source}->${l.target.id || l.target}`;
          const key2 = `${l.target.id || l.target}->${l.source.id || l.source}`;
          if (linkMap.has(key2)) {
            l.bidirectional = true;
            linkMap.get(key2).bidirectional = true;
          }
          linkMap.set(key1, l);

          const sNode = nodeById.get(l.source.id || l.source);
          const tNode = nodeById.get(l.target.id || l.target);
          if (sNode) sNode.degree++;
          if (tNode) tNode.degree++;
        });

        const RENDER_SCALE = 0.5;
        const nodeScale = d => {
          if (d.type === 'scaffold') return 2.2;
          if (d.type !== 'molecule') return 1;
          const deg = d.degree || 1;
          return 1 + Math.max(0, Math.log10(deg)) * 0.4;
        };
        const pillHalfWidth = d => {
          const name = d.conditions?.templateName || d.id || '';
          const short = name.length > 22 ? name.slice(0, 21) : name;
          return Math.max(short.length * 6.2 + 22, 60) / 2;
        };
        const nodeRadius = d => {
          if ((d.type === 'molecule' || d.type === 'scaffold') && d.width && d.height) {
            const ns = nodeScale(d);
            return Math.sqrt(((d.width * RENDER_SCALE * ns) / 2) ** 2 + ((d.height * RENDER_SCALE * ns) / 2) ** 2) + (d.type === 'scaffold' ? 24 : 12);
          }
          if (d.type === 'reaction') {
            return pillHalfWidth(d) + 6; // pill half-width + small margin
          }
          return 20;
        };

        const fitGraphToView = ({ animate = true } = {}) => {
          if (!data.nodes.length) {
            return;
          }

          const padding = 44;
          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;

          for (const d of data.nodes) {
            const r = nodeRadius(d) + padding;
            minX = Math.min(minX, d.x - r);
            minY = Math.min(minY, d.y - r);
            maxX = Math.max(maxX, d.x + r);
            maxY = Math.max(maxY, d.y + r);
          }

          const graphW = Math.max(1, maxX - minX);
          const graphH = Math.max(1, maxY - minY);
          const viewport = visibleGraphViewport();
          const scale = Math.max(0.04, Math.min(1.35, Math.min(viewport.width / graphW, viewport.height / graphH)));
          const graphCx = (minX + maxX) / 2;
          const graphCy = (minY + maxY) / 2;
          const targetCx = viewport.x + viewport.width / 2;
          const targetCy = viewport.y + viewport.height / 2;
          const transform = d3.zoomIdentity.translate(targetCx - graphCx * scale, targetCy - graphCy * scale).scale(scale);

          const target = animate ? svg.transition().duration(650) : svg;
          target.call(zoomBehavior.transform, transform);
        };

        // Pre-position nodes in a radial spiral so simulation starts spread out
        // instead of all piling at (0,0) and needing many ticks to untangle.
        const cx = width / 2,
          cy = height / 2;
        const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ~137.5°
        data.nodes.forEach((d, i) => {
          const r = 60 + 35 * Math.sqrt(i);
          const angle = i * goldenAngle;
          d.x = cx + r * Math.cos(angle);
          d.y = cy + r * Math.sin(angle);
        });

        if (fitImmediately) {
          fitGraphToView({ animate: false });
        }

        const avgRadius = data.nodes.reduce((s, d) => s + nodeRadius(d), 0) / Math.max(data.nodes.length, 1);

        // Calibrate heavy simulation physics natively
        let linkGap = parseInt(document.getElementById('distance-slider').value, 10);
        const linkDistFn = d => {
          const srcR = nodeRadius(d.source);
          const tgtR = nodeRadius(d.target);
          return srcR + tgtR + linkGap;
        };

        const simulation = d3
          .forceSimulation(data.nodes)
          .force(
            'link',
            d3
              .forceLink(data.links)
              .id(d => d.id)
              .distance(linkDistFn)
          )
          .force(
            'charge',
            d3.forceManyBody().strength(d => -Math.pow(nodeRadius(d), 2) * 0.4)
          )
          .force('center', d3.forceCenter(cx, cy))
          .force('collide', d3.forceCollide().radius(nodeRadius).strength(0.85).iterations(4))
          .alphaDecay(0.015)
          .velocityDecay(0.4);
        let shouldAutoFitOnSettle = true;

        // Wire the always-visible slider to live-update link distance.
        const distSlider = document.getElementById('distance-slider');
        const distVal = document.getElementById('distance-val');
        distVal.textContent = linkGap;

        distSlider.addEventListener('input', () => {
          shouldAutoFitOnSettle = false;
          linkGap = parseInt(distSlider.value, 10);
          distVal.textContent = linkGap;
          simulation.force('link').distance(linkDistFn);
          simulation.alpha(0.25).restart();
        });

        const link = g.append('g').selectAll('g').data(data.links).enter().append('g');

        const line = link
          .append('path')
          .attr('class', d => (d.edgeType === 'membership' ? 'link membership' : 'link'))
          .attr('stroke-width', d => (d.edgeType === 'membership' ? 1.5 : 2))
          .attr('stroke-dasharray', d => (d.edgeType === 'membership' ? '5,5' : null))
          .attr('stroke', d => (d.edgeType === 'membership' ? '#c084fc' : '#bbb'))
          .attr('fill', 'none')
          .attr('marker-end', d => (d.edgeType === 'membership' ? null : 'url(#arrow)'));

        const linkLabels = link
          .append('text')
          .attr('class', 'link-text')
          .attr('text-anchor', 'middle')
          .attr('dy', -6)
          .text(d => {
            if (d.delta) return d.delta;
            return '';
          });

        const node = g
          .append('g')
          .selectAll('g')
          .data(data.nodes)
          .enter()
          .append('g')
          .attr('class', 'node')
          .call(
            d3
              .drag()
              .on('start', (event, d) => {
                shouldAutoFitOnSettle = false;
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
              })
              .on('drag', (event, d) => {
                d.fx = event.x;
                d.fy = event.y;
              })
              .on('end', (event, d) => {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
              })
          );

        node.each(function (d) {
          const el = d3.select(this);
          if ((d.type === 'molecule' || d.type === 'scaffold') && d.svg) {
            el.html(d.svg);

            const svgNode = el.select('svg');

            // PAD gives charge labels / superscripts room outside the tight bounding box
            const ns = nodeScale(d);
            const SCALE = 0.5 * ns;
            const PAD = 40; // unscaled px added on each side — massive room for charge labels
            const padW = d.width + PAD * 2;
            const padH = d.height + PAD * 2;

            svgNode
              .attr('width', padW * SCALE)
              .attr('height', padH * SCALE)
              .attr('x', -(padW * SCALE) / 2)
              .attr('y', -(padH * SCALE) / 2)
              .attr('viewBox', `-${PAD} -${PAD} ${padW} ${padH}`)
              .attr('overflow', 'visible');

            // Formulate a beautiful rounded boundary casing exactly over the dynamic topological limits
            svgNode
              .select('rect')
              .attr('rx', 14)
              .attr('stroke', d.type === 'scaffold' ? '#a855f7' : '#333')
              .attr('stroke-width', d.type === 'scaffold' ? 3.5 : 3)
              .attr('stroke-dasharray', d.type === 'scaffold' ? '6,3' : null)
              .attr('fill', d.type === 'scaffold' ? '#faf5ff' : '#ffffff');
          } else if (d.type === 'reaction') {
            // Reaction node — pill badge showing the template name
            const name = d.conditions?.templateName || d.id;
            const short = name.length > 22 ? name.slice(0, 21) + '…' : name;
            const PW = Math.max(short.length * 6.2 + 22, 60);
            const PH = 22;

            el.append('rect')
              .attr('x', -PW / 2)
              .attr('y', -PH / 2)
              .attr('width', PW)
              .attr('height', PH)
              .attr('rx', PH / 2)
              .attr('fill', '#fff')
              .attr('stroke', '#ddd')
              .attr('stroke-width', 1.5);

            // Small colour dot on the left
            el.append('circle')
              .attr('cx', -PW / 2 + 10)
              .attr('cy', 0)
              .attr('r', 4)
              .attr('fill', '#ff6b6b');

            el.append('text')
              .attr('x', -PW / 2 + 20)
              .attr('y', 0)
              .attr('dominant-baseline', 'central')
              .attr('font-size', '9px')
              .attr('font-family', 'Inter, sans-serif')
              .attr('fill', '#444')
              .text(short);
          } else {
            // Fallback molecule node (no svg)
            el.append('circle').attr('r', 14).attr('fill', '#33ccff');
            el.append('text')
              .attr('class', 'node-label')
              .attr('dx', 18)
              .attr('dy', 4)
              .text(d.smiles || '');
          }
        });

        // ── Hover interactions ──
        // Build an adjacency lookup: nodeId → Set of link elements touching it
        let hoveredId = null;
        let lockedId = null;
        let tempHoverId = null;
        let connectedIds = new Set();

        // Apply node scale transforms — called from both tick (while running) and hover handlers (when stopped)
        const applyNodeTransforms = () =>
          node.attr('transform', d => {
            let s = 1;
            if (d.id === hoveredId || d.id === tempHoverId) s = d.type === 'scaffold' ? 1.2 : 2.8;
            else if (connectedIds.has(d.id)) s = d.type === 'scaffold' ? 1.05 : 1.65;
            return `translate(${d.x},${d.y})${s !== 1 ? ` scale(${s})` : ''}`;
          });
        const nodeLinks = new Map();
        data.nodes.forEach(d => nodeLinks.set(d.id, new Set()));

        // We need access to the rendered link elements per datum — index by source/target id
        const linkByDatum = [];
        line.each(function (d) {
          linkByDatum.push({ el: this, d });
        });

        linkByDatum.forEach(({ d }) => {
          const sid = typeof d.source === 'object' ? d.source.id : d.source;
          const tid = typeof d.target === 'object' ? d.target.id : d.target;
          if (nodeLinks.has(sid)) nodeLinks.get(sid).add(d);
          if (nodeLinks.has(tid)) nodeLinks.get(tid).add(d);
        });

        function applyHighlight(d, el) {
          hoveredId = d.id;

          connectedIds = new Set();
          const myLinks = nodeLinks.get(d.id) || new Set();
          myLinks.forEach(ld => {
            const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
            const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
            connectedIds.add(sid);
            connectedIds.add(tid);
          });
          connectedIds.delete(d.id);

          el.raise();
          applyNodeTransforms();
          updateInfoPanel(d, data.links, nodeById);
          if (d.type === 'molecule') {
            setChemicalSpaceHighlight(d.id, { locked: lockedId === d.id });
          } else {
            clearChemicalSpaceHighlight();
          }

          el.select('rect').transition().duration(120).attr('stroke', '#3b82f6').attr('stroke-width', 6);

          line
            .transition()
            .duration(120)
            .attr('stroke', ld => {
              const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
              const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
              if (sid === d.id || tid === d.id) {
                return ld.edgeType === 'membership' ? '#a855f7' : '#3b82f6';
              }
              return ld.edgeType === 'membership' ? '#f3e8ff' : '#e5e7eb';
            })
            .attr('stroke-width', ld => {
              const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
              const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
              return sid === d.id || tid === d.id ? (ld.edgeType === 'membership' ? 3 : 2.5) : 1;
            })
            .attr('stroke-opacity', ld => {
              const sid = typeof ld.source === 'object' ? ld.source.id : ld.source;
              const tid = typeof ld.target === 'object' ? ld.target.id : ld.target;
              return sid === d.id || tid === d.id ? (ld.edgeType === 'membership' ? 1 : 0.85) : 0.45;
            });

          node.each(function (nd) {
            if (connectedIds.has(nd.id)) {
              d3.select(this)
                .select('rect')
                .transition()
                .duration(120)
                .attr('stroke', nd.type === 'scaffold' ? '#d8b4fe' : '#93c5fd')
                .attr('stroke-width', nd.type === 'molecule' || nd.type === 'scaffold' ? 5 : 2.5);
            }
          });
        }

        function clearHighlight() {
          hoveredId = null;
          connectedIds = new Set();
          applyNodeTransforms();
          updateInfoPanel(null, data.links, nodeById);
          clearChemicalSpaceHighlight();

          node
            .select('rect')
            .transition()
            .duration(180)
            .attr('stroke', nd => (nd.type === 'scaffold' ? '#a855f7' : nd.type === 'molecule' ? '#333' : '#ddd'))
            .attr('stroke-width', nd => (nd.type === 'scaffold' ? 3.5 : nd.type === 'molecule' ? 3 : 1.5));

          line
            .transition()
            .duration(180)
            .attr('stroke', ld => (ld.edgeType === 'membership' ? '#c084fc' : '#bbb'))
            .attr('stroke-width', ld => (ld.edgeType === 'membership' ? 1.5 : 2))
            .attr('stroke-opacity', 0.9);
        }

        function toggleMoleculeLock(targetData, { pan = false } = {}) {
          if (!targetData || (targetData.type !== 'molecule' && targetData.type !== 'scaffold')) return;
          const graphNodeEl = node.filter(nd => nd.id === targetData.id).node();
          if (!graphNodeEl) return;

          if (lockedId === targetData.id) {
            lockedId = null;
            clearHighlight();
            return;
          }

          if (lockedId) clearHighlight();
          lockedId = targetData.id;
          applyHighlight(targetData, d3.select(graphNodeEl));

          if (pan) {
            const currentScale = d3.zoomTransform(svg.node()).k;
            const newT = d3.zoomIdentity
              .translate(width / 2, height / 2)
              .scale(currentScale)
              .translate(-targetData.x, -targetData.y);
            svg.transition().duration(400).call(zoomBehavior.transform, newT);
          }
        }

        // Any non-molecule click in the network canvas clears the locked selection.
        // Molecule/scaffold handlers stop propagation, so clicking a node still toggles it.
        svg.on('click', () => {
          if (!lockedId) return;
          lockedId = null;
          clearHighlight();
        });

        const infoDrawer = document.getElementById('info-drawer');

        infoDrawer.addEventListener('mouseover', e => {
          const item = e.target.closest('.info-mol-item');
          if (!item) return;
          const targetId = item.getAttribute('data-id');
          const targetData = nodeById.get(targetId);
          if (!targetData || (targetData.type !== 'molecule' && targetData.type !== 'scaffold')) return;

          tempHoverId = targetId;
          applyNodeTransforms();
          setChemicalSpaceHighlight(targetId, { locked: lockedId === targetId });

          const graphNodeEl = node.filter(nd => nd.id === targetId).node();
          if (graphNodeEl) {
            d3.select(graphNodeEl).select('rect').transition().duration(120).attr('stroke', '#10b981').attr('stroke-width', 6);
            d3.select(graphNodeEl).raise();
          }
        });

        infoDrawer.addEventListener('mouseout', e => {
          const item = e.target.closest('.info-mol-item');
          if (!item) return;
          const targetId = item.getAttribute('data-id');

          tempHoverId = null;
          applyNodeTransforms();
          setChemicalSpaceHighlight(lockedId ?? hoveredId, { locked: !!lockedId });

          const graphNodeEl = node.filter(nd => nd.id === targetId).node();
          if (graphNodeEl) {
            const isLocked = lockedId === targetId;
            const isConnected = connectedIds.has(targetId);
            d3.select(graphNodeEl)
              .select('rect')
              .transition()
              .duration(120)
              .attr('stroke', isLocked ? '#3b82f6' : isConnected ? '#93c5fd' : '#333')
              .attr('stroke-width', isLocked ? 6 : isConnected ? 5 : 3);
          }
        });

        // Delegate drawer clicks to act like node clicks and pan the camera
        infoDrawer.addEventListener('click', e => {
          const item = e.target.closest('.info-mol-item');
          if (!item) return;
          const targetId = item.getAttribute('data-id');
          const targetData = nodeById.get(targetId);
          if (!targetData || (targetData.type !== 'molecule' && targetData.type !== 'scaffold')) return;
          toggleMoleculeLock(targetData, { pan: true });
        });

        node
          .on('mouseover', function (event, d) {
            if (d.type !== 'molecule' && d.type !== 'scaffold') return;
            if (lockedId && lockedId !== d.id) return;
            applyHighlight(d, d3.select(this));
          })
          .on('mouseout', function (event, d) {
            if (d.type !== 'molecule' && d.type !== 'scaffold') return;
            if (lockedId) return; // If anything is locked, ignore mouseout (either staying on the locked node, or we were passing over it while locked to another)
            clearHighlight();
          })
          .on('click', function (event, d) {
            if (d.type !== 'molecule' && d.type !== 'scaffold') return;
            event.stopPropagation(); // prevent SVG background click from catching it
            toggleMoleculeLock(d);
          });

        chemicalSpaceGraph = {
          data,
          onHover: point => {
            if (lockedId && lockedId !== point.id) return;
            const graphNodeEl = node.filter(nd => nd.id === point.id).node();
            if (graphNodeEl) applyHighlight(point, d3.select(graphNodeEl));
          },
          onMouseOut: () => {
            if (!lockedId) clearHighlight();
          },
          onClick: point => toggleMoleculeLock(point),
          onDeselect: () => {
            if (!lockedId) return;
            lockedId = null;
            clearHighlight();
          }
        };
        renderChemicalSpacePlot();

        simulation.on('tick', () => {
          // Helper logic isolating the exact intersection perimeter computationally for variable width nodes
          const intersectRect = (w, h, dx, dy) => {
            if (Math.abs(dx) < 1e-6 && Math.abs(dy) < 1e-6) return { x: 0, y: 0 };
            const s = Math.min(w / Math.abs(dx), h / Math.abs(dy));
            return { x: dx * s, y: dy * s };
          };

          line.attr('d', d => {
            const dx = d.target.x - d.source.x;
            const dy = d.target.y - d.source.y;

            const SCALE = 0.5;
            const srcW = d.source.type === 'molecule' ? (d.source.width * SCALE) / 2 + 1 : 8;
            const srcH = d.source.type === 'molecule' ? (d.source.height * SCALE) / 2 + 1 : 8;
            // Add an explicit padding offset onto the terminal target so the arrow head draws flush!
            const tgtW = d.target.type === 'molecule' ? (d.target.width * SCALE) / 2 + 9 : 14;
            const tgtH = d.target.type === 'molecule' ? (d.target.height * SCALE) / 2 + 9 : 14;

            const srcShift = intersectRect(srcW, srcH, dx, dy);
            const sX = d.source.x + srcShift.x;
            const sY = d.source.y + srcShift.y;

            const tgtShift = intersectRect(tgtW, tgtH, -dx, -dy);
            const tX = d.target.x + tgtShift.x;
            const tY = d.target.y + tgtShift.y;

            if (d.bidirectional) {
              const dr = Math.sqrt(dx * dx + dy * dy);
              return `M${sX},${sY}A${dr},${dr} 0 0,1 ${tX},${tY}`;
            } else {
              return `M${sX},${sY}L${tX},${tY}`;
            }
          });

          linkLabels
            .attr('x', d => {
              let x = (d.source.x + d.target.x) / 2;
              if (d.bidirectional) {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const len = Math.hypot(dx, dy) || 1;
                const nx = -dy / len;
                x += nx * 18; // Pull perpendicularly outside the topological curve
              }
              return x;
            })
            .attr('y', d => {
              let y = (d.source.y + d.target.y) / 2;
              if (d.bidirectional) {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const len = Math.hypot(dx, dy) || 1;
                const ny = dx / len;
                y += ny * 18;
              }
              return y;
            });

          applyNodeTransforms();
        }); // end simulation.on("tick")

        simulation.on('end', () => {
          if (!shouldAutoFitOnSettle) {
            return;
          }
          shouldAutoFitOnSettle = false;
          fitGraphToView();
        });
      } // end renderGraph
    </script>
  </body>
</html>
