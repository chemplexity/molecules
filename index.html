<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>molecules</title>

    <script type="importmap">
      {
        "imports": {
          "node:crypto": "data:text/javascript,export const randomUUID = () => globalThis.crypto.randomUUID();"
        }
      }
    </script>

    <link rel="stylesheet" href="src/app/styles.css" />
  </head>

  <body>
    <div id="erase-cursor"></div>
    <div id="wrapper">
      <div id="header">
        <div id="format-toggle">
          <button id="smiles-mode-btn" class="active" onclick="setInputFormat('smiles')">SMILES</button>
          <button id="inchi-mode-btn" onclick="setInputFormat('inchi')">InChI</button>
        </div>
        <div id="collection-picker">
          <select id="collection-select" aria-label="Molecule Catalog...">
            <option value="">Molecule Catalog...</option>
          </select>
        </div>
        <div id="user-input">
          <form onsubmit="return false;">
            <div class="group">
              <input type="text" id="smiles-input" autocomplete="off" spellcheck="false" />
              <span class="highlight"></span>
              <span class="bar"></span>
              <label for="smiles-input" id="input-label">Input SMILES notation...</label>
            </div>
          </form>
        </div>
        <div id="examples">
          <p class="examples" id="examples-list"></p>
        </div>
      </div>

      <div id="content-main">
        <div id="plot">
          <div id="toggle-controls">
            <button id="toggle-btn" onclick="toggleMode()">⚡ Force Layout</button>
          </div>
          <div id="atom-selector">
            <button id="elem-btn-C" title="Carbon" onclick="setDrawElement('C')">C</button>
            <button id="elem-btn-N" title="Nitrogen" onclick="setDrawElement('N')">N</button>
            <button id="elem-btn-O" title="Oxygen" onclick="setDrawElement('O')">O</button>
            <button id="elem-btn-S" title="Sulfur" onclick="setDrawElement('S')">S</button>
            <button id="elem-btn-P" title="Phosphorus" onclick="setDrawElement('P')">P</button>
            <button id="elem-btn-F" title="Fluorine" onclick="setDrawElement('F')">F</button>
            <button id="elem-btn-Cl" title="Chlorine" onclick="setDrawElement('Cl')">Cl</button>
            <button id="elem-btn-Br" title="Bromine" onclick="setDrawElement('Br')">Br</button>
            <button id="elem-btn-I" title="Iodine" onclick="setDrawElement('I')">I</button>
            <button id="periodic-table-btn" type="button" title="Periodic table" aria-label="Periodic table" onclick="togglePeriodicTablePicker()">
              <svg class="periodic-table-icon" viewBox="0 0 24 18" aria-hidden="true">
                <rect x="1" y="1" width="2.2" height="2.2"></rect>
                <rect x="20.8" y="1" width="2.2" height="2.2"></rect>
                <rect x="1" y="4.4" width="2.2" height="2.2"></rect>
                <rect x="4.3" y="4.4" width="2.2" height="2.2"></rect>
                <rect x="14.2" y="4.4" width="2.2" height="2.2"></rect>
                <rect x="17.5" y="4.4" width="2.2" height="2.2"></rect>
                <rect x="20.8" y="4.4" width="2.2" height="2.2"></rect>
                <rect x="1" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="4.3" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="7.6" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="10.9" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="14.2" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="17.5" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="20.8" y="7.8" width="2.2" height="2.2"></rect>
                <rect x="7.6" y="14.6" width="2.2" height="2.2"></rect>
                <rect x="10.9" y="14.6" width="2.2" height="2.2"></rect>
                <rect x="14.2" y="14.6" width="2.2" height="2.2"></rect>
                <rect x="17.5" y="14.6" width="2.2" height="2.2"></rect>
              </svg>
            </button>
            <div id="periodic-table-popover" class="periodic-table-popover" role="dialog" aria-label="Periodic table element picker" hidden>
              <div id="periodic-table-grid" class="periodic-table-grid"></div>
            </div>
          </div>
          <div id="undo-controls">
            <button id="undo-btn" title="Undo (Ctrl+Z)" onclick="undoAction()" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M3 4.5H8a4 4 0 0 1 0 8H4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none" />
                <polyline points="5,2.5 3,4.5 5,6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <button id="redo-btn" title="Redo (Ctrl+Shift+Z)" onclick="redoAction()" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M12 4.5H7a4 4 0 0 0 0 8h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none" />
                <polyline points="10,2.5 12,4.5 10,6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
          <div id="force-controls">
            <button id="label-toggle" title="Toggle atom labels" onclick="toggleLabels()">Atom Labels</button>
            <button id="force-auto-zoom-btn" title="Fit to window" aria-label="Fit to window" onclick="autoZoomView()">⛶</button>
            <button id="force-rotate-ccw" title="Rotate counter-clockwise">&#x21BA;</button>
            <button id="force-rotate-cw" title="Rotate clockwise">&#x21BB;</button>
            <button id="force-flip-h" title="Flip horizontal">&#x2194;</button>
            <button id="force-flip-v" title="Flip vertical">&#x2195;</button>
            <button id="copy-force-svg-btn" title="Copy as SVG" onclick="copyForceSvg()">SVG</button>
            <div class="export-png-stack">
              <div class="paint-tool">
                <button
                  id="force-style-brush-btn"
                  type="button"
                  class="style-brush-btn"
                  title="Paint mode - style colors and opacity"
                  aria-label="Paint mode - style colors and opacity"
                  onclick="togglePaintMode()"
                >
                  <svg class="style-brush-icon" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M10.8 2.4a1.9 1.9 0 0 1 2.7 0l1.3 1.3a1.9 1.9 0 0 1 0 2.7l-5 5-4-4 5-5Z" fill="#9a6a34" />
                    <path d="M4.9 8.5 9.3 13l-2.1 2.1c-.7.7-1.8.7-2.5 0l-1.9-1.9c-.7-.7-.7-1.8 0-2.5l2.1-2.2Z" fill="#42464d" />
                    <path d="M2.7 13.1c-.8.8-1.2 1.9-1.1 3.3 1.4.1 2.5-.3 3.3-1.1" fill="#2b2f35" />
                  </svg>
                </button>
                <div class="paint-style-controls" aria-label="Paint style controls">
                  <input id="force-paint-color-selector" class="paint-color-selector" type="color" value="#3366ff" title="Paint color" aria-label="Paint color" />
                  <div class="paint-range-stack">
                    <input id="force-paint-brush-size-selector" class="paint-brush-size-selector" type="range" min="4" max="32" step="1" value="12" title="Brush size" aria-label="Brush size" />
                    <input id="force-paint-opacity-selector" class="paint-opacity-selector" type="range" min="0" max="1" step="0.05" value="1" title="Paint opacity" aria-label="Paint opacity" />
                  </div>
                </div>
                <div class="paint-tool-drawer" aria-label="Paint mode options">
                  <button
                    type="button"
                    data-paint-tool="brush"
                    title="Paint brush - used for atom and bond coloring"
                    aria-label="Paint brush - used for atom and bond coloring"
                    onclick="setPaintTool('brush')"
                  >
                    <svg class="paint-drawer-icon" viewBox="0 0 20 20" aria-hidden="true">
                      <path d="M10.8 2.4a1.9 1.9 0 0 1 2.7 0l1.3 1.3a1.9 1.9 0 0 1 0 2.7l-5 5-4-4 5-5Z" fill="#9a6a34" />
                      <path d="M4.9 8.5 9.3 13l-2.1 2.1c-.7.7-1.8.7-2.5 0l-1.9-1.9c-.7-.7-.7-1.8 0-2.5l2.1-2.2Z" fill="#42464d" />
                      <path d="M2.7 13.1c-.8.8-1.2 1.9-1.1 3.3 1.4.1 2.5-.3 3.3-1.1" fill="#2b2f35" />
                    </svg>
                  </button>
                  <button type="button" data-paint-tool="bucket" title="Paint bucket - used for ring filling" aria-label="Paint bucket - used for ring filling" onclick="setPaintTool('bucket')">
                    <svg class="paint-drawer-icon" viewBox="0 0 20 20" aria-hidden="true">
                      <g transform="rotate(-28 9.8 9.4)">
                        <path d="M4.7 7.3 12.7 4.6l3 7.1-7.8 2.8-3.2-7.2Z" fill="#4f8ef7" />
                        <path d="M4.7 7.3 12.7 4.6l3 7.1-7.8 2.8-3.2-7.2Z" fill="none" stroke="#214f9a" stroke-width="1.35" stroke-linejoin="round" />
                        <path d="M7 6.5c-.4-2.1.3-3.7 1.9-4.2 1.6-.5 3 .4 3.8 2.4" fill="none" stroke="#214f9a" stroke-width="1.35" stroke-linecap="round" />
                        <path d="M6.6 9.4 13 7.2" stroke="#d9e8ff" stroke-width="1.1" stroke-linecap="round" />
                      </g>
                      <path d="M15.8 12.1c1.1 1.2 1.7 2.1 1.7 2.8a1.6 1.6 0 0 1-3.2 0c0-.7.5-1.6 1.5-2.8Z" fill="#f4a62a" />
                    </svg>
                  </button>
                  <button type="button" data-paint-tool="eraser" title="Paint eraser - clear colors and opacity" aria-label="Paint eraser - clear colors and opacity" onclick="setPaintTool('eraser')">
                    <svg class="paint-drawer-icon" viewBox="0 0 20 20" aria-hidden="true">
                      <path d="M12.7 3.2 17 7.5 9.6 14.9H5.3L2.8 12.4l9.9-9.2Z" fill="#ff8f9f" />
                      <path d="M12.7 3.2 17 7.5 9.6 14.9H5.3L2.8 12.4l9.9-9.2Z" fill="none" stroke="#7a3a44" stroke-width="1.3" stroke-linejoin="round" />
                      <path d="M9.9 5.8 14.2 10.1" stroke="#7a3a44" stroke-width="1.2" stroke-linecap="round" />
                      <path d="M5.3 14.9h10.8" stroke="#777" stroke-width="1.4" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
              </div>
              <button id="copy-force-png-btn" title="Copy as PNG" onclick="copyForcePng()">PNG</button>
            </div>
          </div>
          <div id="rotate-controls">
            <button id="auto-zoom-btn" title="Fit to window" aria-label="Fit to window" onclick="autoZoomView()">⛶</button>
            <button id="rotate-ccw" title="Rotate counter-clockwise">&#x21BA;</button>
            <button id="rotate-cw" title="Rotate clockwise">&#x21BB;</button>
            <button id="flip-h" title="Flip horizontal">&#x2194;</button>
            <button id="flip-v" title="Flip vertical">&#x2195;</button>
            <button id="copy-svg-btn" title="Copy 2D structure as SVG to clipboard" onclick="copySvg2d()">SVG</button>
            <div class="export-png-stack">
              <div class="paint-tool">
                <button
                  id="style-brush-btn"
                  type="button"
                  class="style-brush-btn"
                  title="Paint mode - style colors and opacity"
                  aria-label="Paint mode - style colors and opacity"
                  onclick="togglePaintMode()"
                >
                  <svg class="style-brush-icon" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M10.8 2.4a1.9 1.9 0 0 1 2.7 0l1.3 1.3a1.9 1.9 0 0 1 0 2.7l-5 5-4-4 5-5Z" fill="#9a6a34" />
                    <path d="M4.9 8.5 9.3 13l-2.1 2.1c-.7.7-1.8.7-2.5 0l-1.9-1.9c-.7-.7-.7-1.8 0-2.5l2.1-2.2Z" fill="#42464d" />
                    <path d="M2.7 13.1c-.8.8-1.2 1.9-1.1 3.3 1.4.1 2.5-.3 3.3-1.1" fill="#2b2f35" />
                  </svg>
                </button>
                <div class="paint-style-controls" aria-label="Paint style controls">
                  <input id="paint-color-selector" class="paint-color-selector" type="color" value="#3366ff" title="Paint color" aria-label="Paint color" />
                  <div class="paint-range-stack">
                    <input id="paint-brush-size-selector" class="paint-brush-size-selector" type="range" min="4" max="32" step="1" value="12" title="Brush size" aria-label="Brush size" />
                    <input id="paint-opacity-selector" class="paint-opacity-selector" type="range" min="0" max="1" step="0.05" value="1" title="Paint opacity" aria-label="Paint opacity" />
                  </div>
                </div>
                <div class="paint-tool-drawer" aria-label="Paint mode options">
                  <button
                    type="button"
                    data-paint-tool="brush"
                    title="Paint brush - used for atom and bond coloring"
                    aria-label="Paint brush - used for atom and bond coloring"
                    onclick="setPaintTool('brush')"
                  >
                    <svg class="paint-drawer-icon" viewBox="0 0 20 20" aria-hidden="true">
                      <path d="M10.8 2.4a1.9 1.9 0 0 1 2.7 0l1.3 1.3a1.9 1.9 0 0 1 0 2.7l-5 5-4-4 5-5Z" fill="#9a6a34" />
                      <path d="M4.9 8.5 9.3 13l-2.1 2.1c-.7.7-1.8.7-2.5 0l-1.9-1.9c-.7-.7-.7-1.8 0-2.5l2.1-2.2Z" fill="#42464d" />
                      <path d="M2.7 13.1c-.8.8-1.2 1.9-1.1 3.3 1.4.1 2.5-.3 3.3-1.1" fill="#2b2f35" />
                    </svg>
                  </button>
                  <button type="button" data-paint-tool="bucket" title="Paint bucket - used for ring filling" aria-label="Paint bucket - used for ring filling" onclick="setPaintTool('bucket')">
                    <svg class="paint-drawer-icon" viewBox="0 0 20 20" aria-hidden="true">
                      <g transform="rotate(-28 9.8 9.4)">
                        <path d="M4.7 7.3 12.7 4.6l3 7.1-7.8 2.8-3.2-7.2Z" fill="#4f8ef7" />
                        <path d="M4.7 7.3 12.7 4.6l3 7.1-7.8 2.8-3.2-7.2Z" fill="none" stroke="#214f9a" stroke-width="1.35" stroke-linejoin="round" />
                        <path d="M7 6.5c-.4-2.1.3-3.7 1.9-4.2 1.6-.5 3 .4 3.8 2.4" fill="none" stroke="#214f9a" stroke-width="1.35" stroke-linecap="round" />
                        <path d="M6.6 9.4 13 7.2" stroke="#d9e8ff" stroke-width="1.1" stroke-linecap="round" />
                      </g>
                      <path d="M15.8 12.1c1.1 1.2 1.7 2.1 1.7 2.8a1.6 1.6 0 0 1-3.2 0c0-.7.5-1.6 1.5-2.8Z" fill="#f4a62a" />
                    </svg>
                  </button>
                  <button type="button" data-paint-tool="eraser" title="Paint eraser - clear colors and opacity" aria-label="Paint eraser - clear colors and opacity" onclick="setPaintTool('eraser')">
                    <svg class="paint-drawer-icon" viewBox="0 0 20 20" aria-hidden="true">
                      <path d="M12.7 3.2 17 7.5 9.6 14.9H5.3L2.8 12.4l9.9-9.2Z" fill="#ff8f9f" />
                      <path d="M12.7 3.2 17 7.5 9.6 14.9H5.3L2.8 12.4l9.9-9.2Z" fill="none" stroke="#7a3a44" stroke-width="1.3" stroke-linejoin="round" />
                      <path d="M9.9 5.8 14.2 10.1" stroke="#7a3a44" stroke-width="1.2" stroke-linecap="round" />
                      <path d="M5.3 14.9h10.8" stroke="#777" stroke-width="1.4" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
              </div>
              <button id="save-png-btn" title="Copy 2D structure as PNG to clipboard" onclick="savePng2d()">PNG</button>
            </div>
          </div>
          <div id="clean-controls">
            <button id="pan-mode-btn" class="active" title="Pan / zoom mode" onclick="togglePanMode()">🤚</button>
            <button id="select-mode-btn" title="Selection mode — drag to select atoms and bonds" onclick="toggleSelectMode()">⬚</button>
            <button id="erase-btn" title="Erase mode — click atoms or bonds to delete" onclick="toggleEraseMode()">🗑️</button>
            <button id="clean-2d-btn" title="Clean 2D layout" onclick="cleanLayout2d()">🧹</button>
            <button id="clean-force-btn" title="Clean force layout" onclick="cleanLayoutForce()" style="display: none">🧹</button>
          </div>
          <div id="draw-tools">
            <div id="draw-tool-primary-stack">
              <button id="draw-bond-btn" type="button" title="Draw bond" onclick="handleDrawBondButtonClick()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                  </g>
                </svg>
              </button>
              <button id="ring-template-btn" type="button" title="Ring templates" aria-label="Ring templates" onclick="handleRingTemplateButtonClick()">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="8,2.2 13,5.1 13,10.9 8,13.8 3,10.9 3,5.1" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
                </svg>
              </button>
              <button id="charge-positive-btn" type="button" title="Add positive charge" onclick="setChargeTool('positive')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <circle cx="8" cy="8" r="6" fill="#d64242" />
                  <path d="M8 4.8V11.2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
                  <path d="M4.8 8H11.2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </button>
              <button id="charge-negative-btn" type="button" title="Add negative charge" onclick="setChargeTool('negative')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <circle cx="8" cy="8" r="6" fill="#2f73d9" />
                  <path d="M4.8 8H11.2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </button>
            </div>
            <div id="ring-template-drawer" aria-label="Ring template options">
              <button type="button" data-ring-template-size="3" title="3-member ring" aria-label="3-member ring" onclick="setRingTemplateSize(3)">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="8,2.7 13.6,12.7 2.4,12.7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                </svg>
              </button>
              <button type="button" data-ring-template-size="4" title="4-member ring" aria-label="4-member ring" onclick="setRingTemplateSize(4)">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="3.5,3.5 12.5,3.5 12.5,12.5 3.5,12.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                </svg>
              </button>
              <button type="button" data-ring-template-size="5" title="5-member ring" aria-label="5-member ring" onclick="setRingTemplateSize(5)">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="8,2.2 13.6,6.4 11.5,13.2 4.5,13.2 2.4,6.4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                </svg>
              </button>
              <button type="button" data-ring-template-size="6" title="6-member ring" aria-label="6-member ring" onclick="setRingTemplateSize(6)">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="8,2.2 13,5.1 13,10.9 8,13.8 3,10.9 3,5.1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                </svg>
              </button>
              <button type="button" data-ring-template-size="7" title="7-member ring" aria-label="7-member ring" onclick="setRingTemplateSize(7)">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="8,2 12.7,4.3 13.9,9.4 10.6,13.5 5.4,13.5 2.1,9.4 3.3,4.3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
                </svg>
              </button>
              <button type="button" data-ring-template-size="benzene" title="6-member ring (aromatic)" aria-label="6-member ring (aromatic)" onclick="setRingTemplateSize('benzene')">
                <svg class="ring-template-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <polygon points="8,2.2 13,5.1 13,10.9 8,13.8 3,10.9 3,5.1" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                  <path d="M8.9 4.1L11.8 5.8M11.9 10.1L8.9 11.8M4.1 9.8V6.2" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" />
                </svg>
              </button>
            </div>
            <div id="draw-bond-drawer" aria-label="Bond draw options">
              <button id="draw-bond-type-single" type="button" data-bond-draw-type="single" title="Single bond" onclick="setDrawBondType('single')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                  </g>
                </svg>
              </button>
              <button id="draw-bond-type-double" type="button" data-bond-draw-type="double" title="Double bond" onclick="setDrawBondType('double')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <line x1="3" y1="6.4" x2="13" y2="6.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                    <line x1="3" y1="9.6" x2="13" y2="9.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                  </g>
                </svg>
              </button>
              <button id="draw-bond-type-triple" type="button" data-bond-draw-type="triple" title="Triple bond" onclick="setDrawBondType('triple')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <line x1="3" y1="5.8" x2="13" y2="5.8" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" />
                    <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" />
                    <line x1="3" y1="10.2" x2="13" y2="10.2" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" />
                  </g>
                </svg>
              </button>
              <button id="draw-bond-type-aromatic" type="button" data-bond-draw-type="aromatic" title="Aromatic bond" onclick="setDrawBondType('aromatic')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <line x1="3" y1="6.4" x2="13" y2="6.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                    <line x1="3" y1="9.6" x2="13" y2="9.6" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-dasharray="2.1 1.8" />
                  </g>
                </svg>
              </button>
              <button id="draw-bond-type-wedge" type="button" data-bond-draw-type="wedge" title="Wedge bond" onclick="setDrawBondType('wedge')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <polygon points="3,8 13,5 13,11" fill="currentColor" />
                  </g>
                </svg>
              </button>
              <button id="draw-bond-type-dash" type="button" data-bond-draw-type="dash" title="Dash bond" onclick="setDrawBondType('dash')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <g transform="rotate(-45 8 8)">
                    <line x1="4.6" y1="7.2" x2="4.6" y2="8.8" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" />
                    <line x1="6.5" y1="6.5" x2="6.5" y2="9.5" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" />
                    <line x1="8.4" y1="5.8" x2="8.4" y2="10.2" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" />
                    <line x1="10.3" y1="5.1" x2="10.3" y2="10.9" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" />
                    <line x1="12.2" y1="4.4" x2="12.2" y2="11.6" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" />
                  </g>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div id="sidebar">
          <div id="descriptor-panel">
            <div id="descriptor-tabs">
              <button class="desc-tab active" data-tab="topological">Topological</button>
              <button class="desc-tab" data-tab="physicochemical">Physicochemical</button>
            </div>
            <div id="tab-topological" class="desc-tab-panel">
              <table id="descriptor-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="descriptor-body"></tbody>
              </table>
            </div>
            <div id="tab-physicochemical" class="desc-tab-panel" style="display: none">
              <table id="pc-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="pc-body"></tbody>
              </table>
            </div>
          </div>
          <div id="smarts-panel">
            <div id="smarts-tabs">
              <button class="smarts-tab active" data-tab="functional-groups">Functional Groups</button>
              <button class="smarts-tab" data-tab="reactions">Reactions</button>
              <button class="smarts-tab" data-tab="other">Other</button>
            </div>
            <div id="tab-functional-groups" class="smarts-tab-panel">
              <table id="fg-table">
                <tbody id="fg-body"></tbody>
              </table>
            </div>
            <div id="tab-reactions" class="smarts-tab-panel" style="display: none">
              <table id="reaction-table">
                <tbody id="reaction-body"></tbody>
              </table>
            </div>
            <div id="tab-other" class="smarts-tab-panel" style="display: none">
              <table id="resonance-table">
                <tbody id="resonance-body"></tbody>
                <tbody id="bond-en-body"></tbody>
                <tbody id="bond-lengths-body"></tbody>
                <tbody id="atom-numbering-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="footer">
        <div id="content-info">
          <span id="molecularFormula"></span>
          <span id="molecularWeight"></span>
        </div>
        <div id="content-source">
          <a href="https://github.com/chemplexity/molecules" target="_blank">source</a>
          <button id="options-btn" type="button" title="Options" onclick="openOptionsModal()">⚙</button>
        </div>
      </div>
    </div>

    <div id="options-overlay" hidden>
      <div id="options-modal" role="dialog" aria-modal="true" aria-labelledby="options-title">
        <div class="options-header">
          <h2 id="options-title">Options</h2>
        </div>
        <div class="options-body">
          <section class="options-section">
            <h3>Global</h3>
            <label class="option-row option-toggle" for="options-show-atom-tooltips">
              <span>Atom Tooltips</span>
              <input id="options-show-atom-tooltips" type="checkbox" checked />
            </label>
            <label class="option-row option-toggle" for="options-show-valence-warnings">
              <span>Show Valence Warnings</span>
              <input id="options-show-valence-warnings" type="checkbox" checked />
            </label>
          </section>
          <section class="options-section">
            <h3>2D Layout</h3>
            <label class="option-row" for="options-2d-color-style" title="Color style for 2D structure rendering.">
              <span>Style</span>
              <select id="options-2d-color-style">
                <option value="bw">Black &amp; White</option>
                <option value="color-atoms" selected>Color Atoms</option>
                <option value="color-atoms-bonds">Color Atoms &amp; Bonds</option>
              </select>
            </label>
            <label class="option-row" for="options-2d-atom-font-size">
              <span>Atom Font Size</span>
              <input id="options-2d-atom-font-size" type="number" min="10" max="24" step="1" />
            </label>
            <label class="option-row" for="options-2d-bond-thickness">
              <span>Bond Thickness</span>
              <input id="options-2d-bond-thickness" type="number" min="0.8" max="4" step="0.1" />
            </label>
          </section>
          <section class="options-section">
            <h3>Force Layout</h3>
            <label class="option-row" for="options-force-atom-size">
              <span>Atom Size</span>
              <input id="options-force-atom-size" type="number" min="0.5" max="2.5" step="0.1" />
            </label>
            <label class="option-row" for="options-force-bond-thickness">
              <span>Bond Thickness</span>
              <input id="options-force-bond-thickness" type="number" min="0.5" max="2.5" step="0.1" />
            </label>
          </section>
          <section class="options-section">
            <h3>Other</h3>
            <div class="options-subsection">
              <h4>Font Size</h4>
              <label class="option-row" for="options-bond-en-font-size">
                <span>Bond Electronegativity</span>
                <input id="options-bond-en-font-size" type="number" min="8" max="24" step="1" />
              </label>
              <label class="option-row" for="options-bond-length-font-size">
                <span>Bond Lengths</span>
                <input id="options-bond-length-font-size" type="number" min="8" max="24" step="1" />
              </label>
              <label class="option-row" for="options-atom-numbering-font-size">
                <span>Atom Numbering</span>
                <input id="options-atom-numbering-font-size" type="number" min="8" max="24" step="1" />
              </label>
            </div>
          </section>
        </div>
        <div class="options-actions">
          <button id="options-reset-btn" type="button">Reset</button>
          <button id="options-cancel-btn" type="button">Cancel</button>
          <button id="options-apply-btn" type="button">Apply</button>
        </div>
      </div>
    </div>

    <div class="tooltip" id="atom-tooltip" style="opacity: 0"></div>

    <script>
      var inputMode = 'smiles';
    </script>

    <!-- Load shared molecule lists; each module also exposes a browser global for the picker UI. -->
    <script type="module" src="examples/example-molecules.js"></script>
    <script type="module" src="examples/example-molecules-complex.js"></script>

    <script type="module" src="./src/app/bootstrap/app-entry.js"></script>
  </body>
</html>
