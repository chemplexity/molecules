      /**
       * Distance (px) to shorten the bond from `atom`'s end so it stops at the
       * edge of the atom's label bounding box.  Returns 0 for unlabelled atoms.
       */
      function _labelClearance(atom, otherSVGPt, toSVGPt) {
        const label = getAtomLabel(atom, _hCounts2d, toSVGPt, _mol2d);
        if (!label) return 0;
        const { x, y } = toSVGPt(atom);
        const dx = otherSVGPt.x - x,
          dy = otherSVGPt.y - y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const prefixHydrogenMatch = label.match(/^(H\d*)([A-Z][a-z]?)$/);
        const suffixHydrogenMatch = label.match(/^([A-Z][a-z]?)(H\d*)$/);
        const elementLabel = prefixHydrogenMatch?.[2] ?? suffixHydrogenMatch?.[1] ?? null;
        const heavyNeighbors = atom.getNeighbors(_mol2d).filter(n => n?.name !== 'H');
        const isCarbonylAdjacentHydroxyl =
          atom.name === 'O' &&
          !!elementLabel &&
          heavyNeighbors.length === 1 &&
          heavyNeighbors[0].name === 'C' &&
          heavyNeighbors[0].getNeighbors(_mol2d).some(nb => {
            if (!nb || nb.id === atom.id || nb.name !== 'O') return false;
            const bond = _mol2d.getBond(heavyNeighbors[0].id, nb.id);
            return (bond?.properties.order ?? 1) >= 2;
          });
        const useElementAnchorBox = isCarbonylAdjacentHydroxyl;
        const cx = useElementAnchorBox ? 0 : labelTextOffset(label, FONT_SIZE);
        const hw = useElementAnchorBox ? (FONT_SIZE * 0.38 * elementLabel.length + 4) / 2 + 7 : labelHalfW(label, FONT_SIZE) + 1;
        const hh = labelHalfH(label, FONT_SIZE) + 1;
        const dirX = dx / len;
        const dirY = dy / len;

        const txCandidates = [];
        if (Math.abs(dirX) > 1e-9) {
          txCandidates.push((cx + hw) / dirX);
          txCandidates.push((cx - hw) / dirX);
        }
        const tyCandidates = [];
        if (Math.abs(dirY) > 1e-9) {
          tyCandidates.push(hh / dirY);
          tyCandidates.push(-hh / dirY);
        }

        let best = Infinity;
        for (const t of [...txCandidates, ...tyCandidates]) {
          if (!(t > 0)) continue;
          const px = dirX * t;
          const py = dirY * t;
          if (px < cx - hw - 1e-6 || px > cx + hw + 1e-6) continue;
          if (py < -hh - 1e-6 || py > hh + 1e-6) continue;
          best = Math.min(best, t);
        }
        return Number.isFinite(best) ? best : Math.max(hw, hh);
      }

      function _drawBond(container, bond, a1, a2, mol, toSVGPt, stereoType = null) {
        // a1 is the chiral center (wedge/dash tip) when stereoType is set.
        if (stereoType === 'wedge' || stereoType === 'dash') {
          const s1 = toSVGPt(a1);
          const s2orig = toSVGPt(a2);
          const { nx, ny } = perpUnit(s2orig.x - s1.x, s2orig.y - s1.y);
          // Shorten the far end (a2) if it carries a label (e.g. F, Cl, N…)
          const c2 = _labelClearance(a2, s1, toSVGPt);
          const blen = Math.sqrt((s2orig.x - s1.x) ** 2 + (s2orig.y - s1.y) ** 2) || 1;
          const s2 = {
            x: s2orig.x - ((s2orig.x - s1.x) / blen) * c2,
            y: s2orig.y - ((s2orig.y - s1.y) / blen) * c2
          };
          if (stereoType === 'wedge') {
            container
              .append('polygon')
              .attr('class', 'bond bond-wedge')
              .attr('points', `${s1.x},${s1.y} ` + `${s2.x - nx * WEDGE_HALF_W},${s2.y - ny * WEDGE_HALF_W} ` + `${s2.x + nx * WEDGE_HALF_W},${s2.y + ny * WEDGE_HALF_W}`)
              .style('fill', '#111')
              .style('stroke', 'none');
          } else {
            for (let i = 1; i <= WEDGE_DASHES; i++) {
              const t = i / (WEDGE_DASHES + 1);
              const px = s1.x + t * (s2.x - s1.x);
              const py = s1.y + t * (s2.y - s1.y);
              const hw = WEDGE_HALF_W * t;
              container
                .append('line')
                .attr('class', 'bond bond-hash')
                .attr('x1', px - nx * hw)
                .attr('y1', py - ny * hw)
                .attr('x2', px + nx * hw)
                .attr('y2', py + ny * hw)
                .style('stroke', '#111')
                .style('stroke-width', '1.2px')
                .style('stroke-linecap', 'round');
            }
          }
          return;
        }

        const order = renderBondOrder(bond);
        const s1 = toSVGPt(a1),
          s2 = toSVGPt(a2);
        const c1 = _labelClearance(a1, s2, toSVGPt);
        const c2 = _labelClearance(a2, s1, toSVGPt);
        const dx = s2.x - s1.x,
          dy = s2.y - s1.y;
        const { nx, ny } = perpUnit(dx, dy);
        if (order === 1) {
          const l = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
          addLine(container, l.x1, l.y1, l.x2, l.y2);
        } else if (order === 2) {
          const dir = secondaryDir(a1, a2, mol, toSVGPt);
          const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
          addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
          const ox = nx * BOND_OFF_2D * dir,
            oy = ny * BOND_OFF_2D * dir;
          const lsec = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, Math.max(c1, 4), Math.max(c2, 4));
          addLine(container, lsec.x1, lsec.y1, lsec.x2, lsec.y2);
        } else if (order === 3) {
          for (const d of [-BOND_OFF_2D, 0, BOND_OFF_2D]) {
            const ox = nx * d,
              oy = ny * d;
            const lt = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, d !== 0 ? Math.max(c1, 4) : c1, d !== 0 ? Math.max(c2, 4) : c2);
            addLine(container, lt.x1, lt.y1, lt.x2, lt.y2);
          }
        } else if (order === 1.5) {
          const dir = secondaryDir(a1, a2, mol, toSVGPt);
          const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
          addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
          const ox = nx * BOND_OFF_2D * dir,
            oy = ny * BOND_OFF_2D * dir;
          const ldash = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, Math.max(c1, 5), Math.max(c2, 5));
          addLine(container, ldash.x1, ldash.y1, ldash.x2, ldash.y2, 'bond-dashed');
        }
      }

      function _redraw2dHighlights() {
        g.select('g.atom-highlights').remove();
        if (getHighlightedAtomIds().size === 0 || !_mol2d) return;
        const mol = _mol2d;
        const hCounts = _hCounts2d;
        const toSVGPt = _toSVGPt2d;
        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
        const highlightStyle = HIGHLIGHT_STYLES[getHighlightStyle()] ?? HIGHLIGHT_STYLES.default;
        const OL = 2;
        const hlLayer = g.insert('g', ':first-child').attr('class', 'atom-highlights').attr('opacity', 0.45);
        for (const atomSet of getHighlightedAtomSets()) {
          const mBonds = [];
          for (const bond of mol.bonds.values()) {
            const [ba1, ba2] = bond.getAtomObjects(mol);
            if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
            if (ba1.visible === false || ba2.visible === false) continue;
            if (!atomSet.has(ba1.id) || !atomSet.has(ba2.id)) continue;
            const p1 = toSVGPt(ba1),
              p2 = toSVGPt(ba2);
            const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + 5;
            const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + 5;
            mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
          }
          const mAtoms = [];
          for (const atom of atoms) {
            if (!atomSet.has(atom.id)) continue;
            const { x, y } = toSVGPt(atom);
            const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 5;
            mAtoms.push({ x, y, r });
          }
          const addL = (stroke, extra) => {
            for (const { p1, p2, w } of mBonds)
              hlLayer
                .append('line')
                .attr('x1', p1.x)
                .attr('y1', p1.y)
                .attr('x2', p2.x)
                .attr('y2', p2.y)
                .attr('stroke', stroke)
                .attr('stroke-width', w + extra * 2)
                .attr('stroke-linecap', 'round');
          };
          const addC = (fill, extra) => {
            for (const { x, y, r } of mAtoms)
              hlLayer
                .append('circle')
                .attr('cx', x)
                .attr('cy', y)
                .attr('r', r + extra)
                .attr('fill', fill)
                .attr('stroke', 'none');
          };
          addL(highlightStyle.outline, OL);
          addC(highlightStyle.outline, OL);
          addL(highlightStyle.fill, 0);
          addC(highlightStyle.fill, 0);
        }
      }

      // ---------------------------------------------------------------------------
      // Draw-bond tool helpers
      // ---------------------------------------------------------------------------

      function _restore2dEditViewport(zoomSnapshot, { reactionRestored = false, resonanceReset = false, zoomToFit = false } = {}) {
        if (mode !== '2d') {
          return;
        }
        // When resonance was reset the molecule size is unchanged, so restoring
        // the pre-edit zoom avoids an unwanted viewport jump.
        // reactionRestored is intentionally excluded here: _restoreReactionPreviewSource
        // already called render2d which computed the correct fit for the source
        // molecule.  Restoring the reaction-preview snapshot (captured while
        // reactant + product were visible) would zoom the viewport back out.
        if (resonanceReset && zoomSnapshot) {
          _restoreZoomTransformSnapshot(zoomSnapshot);
          return;
        }
        if (zoomToFit) {
          _zoomToFitIf2d();
        }
      }

      function _prepareResonanceStructuralEdit(mol) {
        const structuralEdit = prepareResonanceStateForStructuralEdit(mol);
        if (structuralEdit.resonanceCleared) {
          mol = mode === 'force' ? currentMol : _mol2d;
        } else if (structuralEdit.resonanceReset) {
          mol = mode === 'force' ? currentMol : _mol2d;
        }
        return { mol: structuralEdit.mol ?? mol, resonanceReset: structuralEdit.resonanceReset };
      }

      function _dearomatizeBondAromaticComponent(mol, startBondId) {
        const visitedBondIds = new Set();
        const atomIds = new Set();
        const queue = [startBondId];

        while (queue.length > 0) {
          const bondId = queue.shift();
          if (visitedBondIds.has(bondId)) continue;
          const bond = mol.bonds.get(bondId);
          if (!bond?.properties?.aromatic) continue;
          visitedBondIds.add(bondId);
          for (const atomId of bond.atoms) {
            atomIds.add(atomId);
            const atom = mol.atoms.get(atomId);
            if (!atom) continue;
            for (const neighborBondId of atom.bonds) {
              if (visitedBondIds.has(neighborBondId)) continue;
              const neighborBond = mol.bonds.get(neighborBondId);
              if (neighborBond?.properties?.aromatic) {
                queue.push(neighborBondId);
              }
            }
          }
        }

        for (const bondId of visitedBondIds) {
          const bond = mol.bonds.get(bondId);
          if (!bond) continue;
          bond.properties.order = Number.isInteger(bond.properties.localizedOrder) ? bond.properties.localizedOrder : 1;
          bond.properties.aromatic = false;
          delete bond.properties.localizedOrder;
        }
        for (const atomId of atomIds) {
          const atom = mol.atoms.get(atomId);
          if (atom) {
            atom.properties.aromatic = false;
          }
        }
      }

      function _promoteBondOrder(bondId, options = {}) {
        const {
          reactionRestored = false,
          skipReactionPreviewPrep = false,
          skipResonancePrep = false,
          skipSnapshot = false,
          zoomSnapshot = mode === '2d' ? _captureZoomTransformSnapshot() : null
        } = options;
        appController.performStructuralEdit(
          'promote-bond-order',
          {
            overlayPolicy: skipReactionPreviewPrep ? ReactionPreviewPolicy.preserve : ReactionPreviewPolicy.prepareBondTarget,
            reactionPreviewPayload: skipReactionPreviewPrep ? null : bondId,
            reactionEdit: skipReactionPreviewPrep ? { bondId, restored: reactionRestored } : null,
            resonancePolicy: skipResonancePrep ? ResonancePolicy.preserve : ResonancePolicy.normalizeForEdit,
            snapshotPolicy: skipSnapshot ? SnapshotPolicy.skip : SnapshotPolicy.take,
            viewportPolicy: ViewportPolicy.restoreEdit,
            zoomSnapshot,
            preflight: ({ mol, mode, reactionEdit }) => {
              const targetBondId = skipReactionPreviewPrep ? bondId : (reactionEdit?.bondId ?? bondId);
              const bond = mol.bonds.get(targetBondId);
              if (!bond) {
                return false;
              }
              if (mode === 'force') {
                const [a1, a2] = bond.getAtomObjects(mol);
                if (a1?.name === 'H' || a2?.name === 'H') {
                  return false;
                }
              }
              return true;
            }
          },
          ({ mol, mode, reactionEdit }) => {
            const targetBondId = skipReactionPreviewPrep ? bondId : (reactionEdit?.bondId ?? bondId);
            let bond = mol.bonds.get(targetBondId);
            if (!bond) {
              return { cancelled: true };
            }

            if (mode === 'force') {
              const [a1, a2] = bond.getAtomObjects(mol);
              if (a1?.name === 'H' || a2?.name === 'H') {
                return { cancelled: true };
              }
            }

            const activeBondId = bond.id;
            const wasAromatic = !!bond.properties.aromatic;
            if (wasAromatic) {
              _dearomatizeBondAromaticComponent(mol, activeBondId);
              bond = mol.bonds.get(activeBondId);
              if (!bond) {
                return { cancelled: true };
              }
            }

            const cur = Math.round(bond.properties.order ?? 1);
            const nextOrder = cur >= 3 ? 1 : cur + 1;
            bond.properties.order = nextOrder;
            bond.properties.aromatic = false;
            delete bond.properties.localizedOrder;

            const [a1, a2] = bond.getAtomObjects(mol);
            const affected = new Set([a1?.id, a2?.id].filter(Boolean));
            mol.clearStereoAnnotations(affected);
            if (!wasAromatic) {
              kekulize(mol);
              refreshAromaticity(mol, { preserveKekule: true });
            }
            mol.repairImplicitHydrogens(affected);

            const forceResult =
              mode === 'force'
                ? {
                    options: { preservePositions: true },
                    beforeRender: () => new Set(simulation.nodes().map(node => node.id)),
                    afterRender: (_context, prevNodeIds) => {
                      const nodes = simulation.nodes();
                      const allLinks = simulation.force('link').links();
                      const newHNodes = nodes.filter(node => node.name === 'H' && !prevNodeIds.has(node.id));
                      const newHIds = new Set(newHNodes.map(node => node.id));
                      if (newHNodes.length > 0) {
                        const H_DIST = 25;
                        const newHByParent = new Map();
                        for (const hNode of newHNodes) {
                          const link = allLinks.find(l => l.source === hNode || l.target === hNode);
                          if (!link) continue;
                          const parent = link.source === hNode ? link.target : link.source;
                          if (!newHByParent.has(parent)) newHByParent.set(parent, []);
                          newHByParent.get(parent).push(hNode);
                        }
                        for (const [parent, hNodes] of newHByParent) {
                          _placeHydrogensAroundParent(parent, hNodes, allLinks, {
                            distance: H_DIST,
                            excludeIds: newHIds
                          });
                        }
                      }
                      for (const node of nodes) {
                        node.vx = 0;
                        node.vy = 0;
                        node.fx = node.x;
                        node.fy = node.y;
                      }
                      simulation.on('end.unfix', () => {
                        for (const node of simulation.nodes()) {
                          node.fx = null;
                          node.fy = null;
                        }
                        simulation.on('end.unfix', null);
                        simulation.alpha(0.08).restart();
                      });
                      simulation.alpha(0);
                    }
                  }
                : null;

            return {
              suppressDrawBondHover: true,
              clearPrimitiveHover: true,
              force: forceResult
            };
          }
        );
      }

      function _changeAtomElements(atomIds, newEl, options = {}) {
        const {
          zoomSnapshot = mode === '2d' ? _captureZoomTransformSnapshot() : null,
          overlayPolicy = ReactionPreviewPolicy.prepareEditTargets,
          reactionPreviewPayload = atomIds.length > 0 ? { atomId: atomIds[0] } : null,
          reactionEdit = null
        } = options;
        if (!atomIds.length) {
          return { performed: false, cancelled: true };
        }
        return appController.performStructuralEdit(
          'change-atom-elements',
          {
            overlayPolicy,
            reactionPreviewPayload,
            reactionEdit,
            resonancePolicy: ResonancePolicy.normalizeForEdit,
            snapshotPolicy: SnapshotPolicy.take,
            viewportPolicy: ViewportPolicy.restoreEdit,
            zoomSnapshot,
            preflight: ({ mol }) =>
              atomIds.some(atomId => {
                const atom = mol.atoms.get(atomId);
                return atom && atom.name !== newEl;
              })
          },
          ({ mol, mode }) => {
            const toChange = atomIds.filter(atomId => {
              const atom = mol.atoms.get(atomId);
              return atom && atom.name !== newEl;
            });
            if (toChange.length === 0) {
              return { cancelled: true };
            }
            for (const atomId of toChange) {
              mol.changeAtomElement(atomId, newEl);
            }
            const affected = new Set(toChange);
            mol.clearStereoAnnotations(affected);
            kekulize(mol);
            refreshAromaticity(mol, { preserveKekule: true });
            mol.repairImplicitHydrogens(affected);
            return {
              force:
                mode === 'force'
                  ? {
                      options: { preservePositions: true, preserveView: true }
                    }
                  : null
            };
          }
        );
      }

      function _replaceForceHydrogenWithDrawElement(atomId, mol = currentMol) {
        if (!mol) return;
        const reactionEdit = _prepareReactionPreviewEditTargets({ atomId });
        if (reactionEdit === null) return;
        const previousSnapshot = reactionEdit.previousSnapshot ?? _captureAppSnapshot();
        const structuralEdit = _prepareResonanceStructuralEdit(mol);
        mol = structuralEdit.mol;
        if (!mol) return;
        _takeSnapshot(
          previousSnapshot
            ? {
                clearReactionPreview: false,
                snapshot: previousSnapshot
              }
            : undefined
        );
        const targetAtomId = reactionEdit.atomId;
        mol.changeAtomElement(targetAtomId, _drawBondElement);
        const affected = new Set([targetAtomId]);
        mol.clearStereoAnnotations(affected);
        kekulize(mol);
        refreshAromaticity(mol, { preserveKekule: true });
        mol.repairImplicitHydrogens(affected);
        _syncInputField(mol);
        updateFormula(mol);
        updateDescriptors(mol);
        _updateAnalysisPanels(mol);

        const preHNode = simulation.nodes().find(node => node.id === targetAtomId);
        let preHX = preHNode?.x;
        let preHY = preHNode?.y;
        let parentNode = null;
        if (preHNode) {
          const allLinks = simulation.force('link').links();
          for (const link of allLinks) {
            const src = link.source;
            const tgt = link.target;
            if (src?.id === targetAtomId && !_isHydrogenNode(tgt)) {
              parentNode = tgt;
              break;
            }
            if (tgt?.id === targetAtomId && !_isHydrogenNode(src)) {
              parentNode = src;
              break;
            }
          }
        }

        updateForce(mol, {
          preservePositions: true,
          preserveView: true
        });
        if (parentNode && preHX != null && preHY != null) {
          const angle = Math.atan2(preHY - parentNode.y, preHX - parentNode.x);
          const pos = {
            x: parentNode.x + Math.cos(angle) * FORCE_LAYOUT_BOND_LENGTH,
            y: parentNode.y + Math.sin(angle) * FORCE_LAYOUT_BOND_LENGTH
          };
          const patchPos = new Map([[targetAtomId, pos]]);
          _patchForceNodePositions(patchPos);
          _reseatHydrogensAroundPatched(patchPos);
        }
      }

      function _startDrawBond(atomId, gX, gY) {
        return drawBondPreviewActions.start(atomId, gX, gY);
      }

      function _updateDrawBondPreview([mx, my]) {
        return drawBondPreviewActions.update([mx, my]);
      }

      // During a bond drag, reset hover to only the source atom (clears any
      // transient highlights from atoms/bonds the cursor passed over).
      function _resetDrawBondHover() {
        return drawBondPreviewActions.resetHover();
      }

      function _cancelDrawBond() {
        return drawBondPreviewActions.cancel();
      }

      // Places a new bonded C at the best 30°-grid angle from the source atom.
      // Returns the active molecule, creating an empty one if none exists yet.
      function _ensureMol() {
        if (mode === 'force') {
          if (!currentMol) {
            currentMol = new Molecule();
          }
          return currentMol;
        } else {
          if (!_mol2d) {
            _mol2d = new Molecule();
            _hCounts2d = new Map();
            _stereoMap2d = new Map();
          }
          return _mol2d;
        }
      }

      // atomId may be null (blank-space click) — in that case a source C is created at (ox, oy).
      // ox, oy are always required (g-space origin of the draw-bond gesture).
      function _autoPlaceBond(atomId, ox, oy) {
        return drawBondCommitActions.autoPlaceBond(atomId, ox, oy);
      }

      function _commitDrawBond() {
        return drawBondCommitActions.commit();
      }

      function draw2d() {
        const mol = _mol2d;
        const hCounts = _hCounts2d;
        const toSVGPt = _toSVGPt2d;
        const { showLonePairs } = getRenderOptions();
        const valenceWarningMap = valenceWarningMapFor(mol);
        _activeValenceWarningMap = valenceWarningMap;

        const stereoMap = _stereoMap2d;
        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
        const bondInfos = [];
        for (const bond of mol.bonds.values()) {
          const [a1, a2] = bond.getAtomObjects(mol);
          if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
          const isHBond = a1.visible === false || a2.visible === false;
          if (isHBond && !(stereoMap && stereoMap.has(bond.id))) continue;
          bondInfos.push({ bond, a1, a2 });
        }

        g.selectAll('*').remove();
        _forceSelLines = null;
        _forceSelCircles = null;
        _forceValenceWarningCircles = null;
        _fgHlLines = null;
        _fgHlCircles = null;

        let bgLayer;
        let labelLayer;
        let lonePairLayer;
        const lonePairDotsByAtomId = new Map();

        function _get2dLonePairDots(atom, label) {
          if (!showLonePairs) {
            return [];
          }
          const cached = lonePairDotsByAtomId.get(atom.id);
          if (cached) {
            return cached;
          }
          const dots = computeLonePairDotPositions(atom, mol, {
            pointForAtom: toSVGPt,
            label,
            fontSize: FONT_SIZE,
            offsetFromBoundary: label ? 5 : 6,
            dotSpacing: 4.2
          });
          lonePairDotsByAtomId.set(atom.id, dots);
          return dots;
        }

        function _draw2dLonePairs() {
          if (!showLonePairs || !lonePairLayer) {
            return;
          }
          lonePairLayer.selectAll('*').remove();
          for (const atom of atoms) {
            const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
            const dots = _get2dLonePairDots(atom, label);
            if (dots.length === 0) {
              continue;
            }
            const atomGroup = lonePairLayer.append('g').attr('class', 'atom-lone-pairs').attr('data-atom-id', atom.id);
            renderLonePairDots(atomGroup, dots, { radius: 1.45, fill: '#111111' });
          }
        }

        function _redraw2dBondEnOverlay() {
          g.select('g.bond-en-overlay').remove();
          const overlayData = getBondEnOverlayData(mol);
          if (!overlayData) return;
          const enLayer = g.append('g').attr('class', 'bond-en-overlay').style('pointer-events', 'none');
          const bondInfoMap = new Map(bondInfos.map(bi => [bi.bond.id, bi]));
          const EN_FS = 12;
          const EN_CHW = EN_FS * 0.62;
          const EN_CHH = EN_FS * 1.2;
          const EN_PAD = 3;
          const EN_BASE = 15;
          const placed = [];
          function _enOverlaps(cx, cy, hw, hh) {
            for (const p of placed) {
              if (Math.abs(cx - p.cx) < hw + p.hw + EN_PAD && Math.abs(cy - p.cy) < hh + p.hh + EN_PAD) return true;
            }
            return false;
          }
          for (const { bondId, label, t } of overlayData) {
            const bi = bondInfoMap.get(bondId);
            if (!bi) continue;
            const p1 = toSVGPt(bi.a1),
              p2 = toSVGPt(bi.a2);
            const mx = (p1.x + p2.x) / 2,
              my = (p1.y + p2.y) / 2;
            const dx = p2.x - p1.x,
              dy = p2.y - p1.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const nx = -dy / len,
              ny = dx / len;
            const hw = (label.length * EN_CHW) / 2;
            const hh = EN_CHH / 2;
            // For multi-line bonds prefer the side opposite the secondary line.
            const order = renderBondOrder(bi.bond);
            let pref = 1;
            if (order >= 2 || order === 1.5) {
              pref = -secondaryDir(bi.a1, bi.a2, mol, toSVGPt);
            }
            const offsets = [EN_BASE * pref, EN_BASE * -pref, EN_BASE * 2 * pref, EN_BASE * 2 * -pref, EN_BASE * 3 * pref, EN_BASE * 3 * -pref];
            let cx = mx + nx * EN_BASE * pref,
              cy = my + ny * EN_BASE * pref;
            for (const off of offsets) {
              const tx = mx + nx * off,
                ty = my + ny * off;
              if (!_enOverlaps(tx, ty, hw, hh)) {
                cx = tx;
                cy = ty;
                break;
              }
            }
            placed.push({ cx, cy, hw, hh });
            enLayer
              .append('text')
              .attr('x', cx)
              .attr('y', cy)
              .attr('text-anchor', 'middle')
              .attr('dominant-baseline', 'central')
              .attr('font-size', `${EN_FS}px`)
              .attr('fill', _enLabelColor(t))
              .text(label);
          }
        }

        function _capture2dDragState(event, atomIds = [], bondIds = []) {
          const [pX, pY] = d3.pointer(event.sourceEvent, g.node());
          const selectedDragAtomIds = _getSelectedDragAtomIds(mol, atomIds, bondIds);
          const movedAtomIds = selectedDragAtomIds ? new Set(selectedDragAtomIds) : new Set(atomIds);
          if (!selectedDragAtomIds) {
            for (const bondId of bondIds) {
              const bond = mol.bonds.get(bondId);
              if (!bond) continue;
              movedAtomIds.add(bond.atoms[0]);
              movedAtomIds.add(bond.atoms[1]);
            }
          }

          const atomPositions = new Map();
          for (const atomId of movedAtomIds) {
            const movedAtom = mol.atoms.get(atomId);
            if (!movedAtom || movedAtom.x == null) continue;
            atomPositions.set(atomId, { x: movedAtom.x, y: movedAtom.y });
          }
          return {
            pX,
            pY,
            atomPositions,
            movedAtomIds: new Set(atomPositions.keys())
          };
        }

        function _redraw2dDragTargets(movedAtomIds) {
          lonePairDotsByAtomId.clear();
          for (const atomId of movedAtomIds) {
            const movedAtom = mol.atoms.get(atomId);
            if (!movedAtom || movedAtom.x == null) continue;
            const np = toSVGPt(movedAtom);
            labelLayer.select(`[data-atom-id="${atomId}"]`).attr('transform', `translate(${np.x},${np.y})`);
            const lbl = getAtomLabel(movedAtom, hCounts, toSVGPt, mol);
            const hw = labelHalfW(lbl, FONT_SIZE);
            const hh = labelHalfH(lbl, FONT_SIZE);
            const dxLabel = labelTextOffset(lbl, FONT_SIZE);
            bgLayer
              .select(`[data-atom-id="${atomId}"]`)
              .attr('x', np.x + dxLabel - hw)
              .attr('y', np.y - hh);
          }

          for (const bInfo of bondInfos) {
            if (!movedAtomIds.has(bInfo.a1.id) && !movedAtomIds.has(bInfo.a2.id)) continue;
            const bGroup = bondLayer.select(`[data-bond-id="${bInfo.bond.id}"]`);
            const hitLine = bGroup.select('.bond-hit');
            bGroup.selectAll(':not(.bond-hit)').remove();
            const st = stereoMap ? stereoMap.get(bInfo.bond.id) : null;
            let ssa1 = bInfo.a1,
              ssa2 = bInfo.a2;
            if (st) {
              const centerId = stereoBondCenterIdForRender(mol, bInfo.bond.id);
              if (centerId === ssa2.id) [ssa1, ssa2] = [ssa2, ssa1];
            }
            _drawBond(bGroup, bInfo.bond, ssa1, ssa2, mol, toSVGPt, st ?? null);
            const hp1 = toSVGPt(ssa1),
              hp2 = toSVGPt(ssa2);
            hitLine.attr('x1', hp1.x).attr('y1', hp1.y).attr('x2', hp2.x).attr('y2', hp2.y).raise();
          }

          _redraw2dHighlights();
          _redraw2dSelection();
          _redraw2dValenceWarnings();
          _draw2dLonePairs();
          _redraw2dBondEnOverlay();
        }

        function _redraw2dValenceWarnings() {
          g.select('g.valence-warning-layer').remove();
          const warningAtoms = atoms.filter(atom => valenceWarningMap.has(atom.id));
          if (warningAtoms.length === 0) return;
          const warningLayer = g.append('g').attr('class', 'valence-warning-layer').style('pointer-events', 'none');
          for (const atom of warningAtoms) {
            const { x, y } = toSVGPt(atom);
            const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 7;
            warningLayer.append('circle').attr('class', 'valence-warning').attr('cx', x).attr('cy', y).attr('r', r).attr('fill', VALENCE_WARNING_FILL).attr('stroke', 'none');
          }
        }

        // Layer 0 — functional-group highlights (behind bonds)
        _redraw2dHighlights();
        // Layer 0b — selection highlights (behind bonds, in front of fg highlights)
        _redraw2dSelection();
        // Layer 0c — valence warnings (behind bonds and labels)
        _redraw2dValenceWarnings();

        // Layer 1 — bonds (each wrapped in a <g data-bond-id> for incremental drag updates)
        const chiralCenterIds = new Set(mol.getChiralCenters());
        const bondLayer = g.append('g').attr('class', 'bonds');
        for (const bi of bondInfos) {
          const bg = bondLayer.append('g').attr('data-bond-id', bi.bond.id);
          const stereoType = stereoMap ? stereoMap.get(bi.bond.id) : null;
          // Orient so the chiral center is a1 (tip of wedge/dash).
          let sa1 = bi.a1,
            sa2 = bi.a2;
          if (stereoType) {
            const centerId = stereoBondCenterIdForRender(mol, bi.bond.id);
            if (centerId === sa2.id) [sa1, sa2] = [sa2, sa1];
          }
          _drawBond(bg, bi.bond, sa1, sa2, mol, toSVGPt, stereoType ?? null);

          // Invisible wide line for easy hover targeting
          const p1 = toSVGPt(sa1),
            p2 = toSVGPt(sa2);
          bg.append('line')
            .attr('class', 'bond-hit')
            .attr('x1', p1.x)
            .attr('y1', p1.y)
            .attr('x2', p2.x)
            .attr('y2', p2.y)
            .attr('stroke', '#000')
            .attr('stroke-opacity', 0)
            .attr(
              'stroke-width',
              (() => {
                const order = renderBondOrder(bi.bond);
                return order >= 3 ? 24 : order >= 1.5 ? 18 : 12;
              })()
            )
            .style('pointer-events', 'stroke')
            .on('mousedown', event => {
              if (!_drawBondMode) return;
              event.preventDefault();
              event.stopPropagation();
              _promoteBondOrder(bi.bond.id);
            })
            .on('click', event => {
              primitiveEventHandlers.handle2dBondClick(event, bi.bond.id);
            })
            .on('dblclick', event => {
              primitiveEventHandlers.handle2dBondDblClick(event, bi.bond.atoms);
            })
            .on('mouseover', event => {
              primitiveEventHandlers.handle2dBondMouseOver(event, bi.bond, sa1, sa2);
            })
            .on('mousemove', event => primitiveEventHandlers.handle2dBondMouseMove(event))
            .on('mouseout', () => {
              primitiveEventHandlers.handle2dBondMouseOut();
            })
            .style('cursor', 'grab')
            .call(
              dragGestureActions.create2dBondDrag(mol, bi.bond.id, {
                captureDragState: (event, _molecule, atomIds = [], bondIds = []) => _capture2dDragState(event, atomIds, bondIds),
                redrawDragTargets: (_molecule, movedAtomIds) => _redraw2dDragTargets(movedAtomIds),
                pointer: sourceEvent => d3.pointer(sourceEvent, g.node()),
                scale: SCALE,
                draw: () => draw2d()
              })
            );
        }

        _drawReactionPreviewArrow2d(toSVGPt, atoms);

        // Layer 2 — white clearance rects
        bgLayer = g.append('g').attr('class', 'atom-bgs');
        for (const atom of atoms) {
          const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
          const hw = labelHalfW(label, FONT_SIZE);
          if (hw === 0) continue;
          const hh = labelHalfH(label, FONT_SIZE);
          const dx = labelTextOffset(label, FONT_SIZE);
          const { x, y } = toSVGPt(atom);
          bgLayer
            .append('rect')
            .attr('class', 'atom-bg')
            .attr('data-atom-id', atom.id)
            .attr('x', x + dx - hw)
            .attr('y', y - hh)
            .attr('width', hw * 2)
            .attr('height', hh * 2)
            .attr('rx', 2);
        }

        // Layer 3 — labels + hit targets + drag
        labelLayer = g.append('g').attr('class', 'atom-labels');
        for (const atom of atoms) {
          const { x, y } = toSVGPt(atom);
          const symbol = atom.name;
          const charge = atom.getCharge();
          const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
          const labelDx = labelTextOffset(label, FONT_SIZE);

          const hitGroup = labelLayer.append('g').attr('data-atom-id', atom.id).attr('transform', `translate(${x},${y})`);

          hitGroup
            .append('circle')
            .attr('class', 'atom-hit')
            .attr('r', Math.max(labelHalfW(label || symbol, FONT_SIZE), 10))
            .style('cursor', 'grab')
            .on('mousedown.drawbond', function (event) {
              primitiveEventHandlers.handle2dAtomMouseDownDrawBond(event, atom.id);
            })
            .on('click', event => {
              primitiveEventHandlers.handle2dAtomClick(event, atom.id);
            })
            .on('dblclick', event => {
              primitiveEventHandlers.handle2dAtomDblClick(event, atom.id);
            })
            .on('mouseover', event => {
              primitiveEventHandlers.handle2dAtomMouseOver(event, atom, mol, valenceWarningMap.get(atom.id) ?? null);
            })
            .on('mousemove', event => primitiveEventHandlers.handle2dAtomMouseMove(event))
            .on('mouseout', () => {
              primitiveEventHandlers.handle2dAtomMouseOut(atom.id);
            });

          if (label) {
            renderAtomLabel(hitGroup, label, symbol === 'H' ? '#333333' : atomColor(symbol, '2d'), labelDx, FONT_SIZE);
            if (charge !== 0) {
              const sign = formatChargeLabel(charge);
              const lonePairDots = _get2dLonePairDots(atom, label);
              const placement = computeChargeBadgePlacement(atom, mol, {
                pointForAtom: toSVGPt,
                label,
                fontSize: FONT_SIZE,
                chargeLabel: sign,
                extraOccupiedAngles: lonePairDots.map(dot => Math.atan2(dot.y - y, dot.x - x)).filter(Number.isFinite)
              });
              if (placement) {
                hitGroup
                  .append('circle')
                  .attr('class', 'atom-charge-ring')
                  .attr('cx', placement.x - x)
                  .attr('cy', placement.y - y)
                  .attr('r', placement.radius)
                  .attr('pointer-events', 'none')
                  .attr('fill', 'white')
                  .attr('stroke', '#111')
                  .attr('stroke-width', 0.9);
                hitGroup
                  .append('text')
                  .attr('class', 'atom-charge-text')
                  .attr('x', placement.x - x)
                  .attr('y', placement.y - y)
                  .style('font-size', `${placement.fontSize}px`)
                  .attr('pointer-events', 'none')
                  .attr('fill', '#111')
                  .attr('text-anchor', 'middle')
                  .attr('dominant-baseline', 'central')
                  .text(sign);
              }
            }
          }

          // Drag: move this atom, or the whole selection when dragging a selected primitive.
          hitGroup.call(
            dragGestureActions.create2dAtomDrag(mol, atom.id, {
              captureDragState: (event, _molecule, atomIds = [], bondIds = []) => _capture2dDragState(event, atomIds, bondIds),
              redrawDragTargets: (_molecule, movedAtomIds) => _redraw2dDragTargets(movedAtomIds),
              pointer: sourceEvent => d3.pointer(sourceEvent, g.node()),
              scale: SCALE,
              draw: () => draw2d(),
              setDraggingCursor: () => {
                hitGroup.select('circle').style('cursor', 'grabbing');
              },
              resetCursor: () => {
                hitGroup.select('circle').style('cursor', 'grab');
              }
            })
          );
        }

        if (showLonePairs) {
          lonePairLayer = g.append('g').attr('class', 'lone-pairs').style('pointer-events', 'none');
          _draw2dLonePairs();
        }

        // Bond electronegativity overlay
        _redraw2dBondEnOverlay();
      }

      /**
       * Renders the provided molecule in 2D and refreshes the sidebar panels.
       *
       * @param {Molecule} mol
       * @param {object} [options={}]
       * @param {boolean} [options.recomputeResonance=true]
       * @param {boolean} [options.refreshResonancePanel=true]
       */
      function render2d(mol, options = {}) {
        const { recomputeResonance = true, refreshResonancePanel = true, preserveGeometry = false, preserveAnalysis = false } = options;
        // Count H neighbours before stripping
        const hCounts = new Map();
        for (const [, atom] of mol.atoms) {
          if (atom.name === 'H') continue;
          const count = atom.getNeighbors(mol).filter(n => n.name === 'H').length;
          if (count > 0) hCounts.set(atom.id, count);
        }
        mol.hideHydrogens();
        prepareAromaticBondRendering(mol);

        if (!preserveGeometry) {
          generateAndRefine2dCoords(mol, { suppressH: true, bondLength: 1.5 });
        }
        _alignReaction2dProductOrientation(mol);
        _spreadReaction2dProductComponents(mol, 1.5);
        _centerReaction2dPairCoords(mol, 1.5);

        // Place chiral H atoms at real positions so stereo bonds can be drawn.
        // All other hidden H stay at their parent's position (assigned by generateCoords)
        // and are excluded from rendering entirely.
        for (const [, atom] of mol.atoms) {
          if (atom.name !== 'H' || atom.visible !== false) continue;
          const nbrs = atom.getNeighbors(mol);
          if (nbrs.length !== 1) continue;
          const parent = nbrs[0];
          if (!parent.getChirality()) continue;
          const others = parent.getNeighbors(mol).filter(n => n.id !== atom.id);
          let sumX = 0,
            sumY = 0,
            cnt = 0;
          for (const nb of others) {
            if (nb.x != null) {
              sumX += nb.x - parent.x;
              sumY += nb.y - parent.y;
              cnt++;
            }
          }
          const angle = cnt > 0 ? Math.atan2(-sumY, -sumX) : 0;
          const hLen = 1.5 * 0.75;
          atom.x = parent.x + Math.cos(angle) * hLen;
          atom.y = parent.y + Math.sin(angle) * hLen;
        }

        // Apply rotation and/or flips (around centroid)
        if (rotationDeg !== 0 || flipH || flipV) {
          const allAtoms = [...mol.atoms.values()].filter(a => a.x != null);
          let mx = 0,
            my = 0;
          for (const a of allAtoms) {
            mx += a.x;
            my += a.y;
          }
          mx /= allAtoms.length;
          my /= allAtoms.length;
          if (rotationDeg !== 0) {
            const rad = (rotationDeg * Math.PI) / 180;
            const cosR = Math.cos(rad),
              sinR = Math.sin(rad);
            for (const a of allAtoms) {
              const dx = a.x - mx,
                dy = a.y - my;
              a.x = mx + dx * cosR - dy * sinR;
              a.y = my + dx * sinR + dy * cosR;
            }
          }
          if (flipH) for (const a of allAtoms) a.x = 2 * mx - a.x;
          if (flipV) for (const a of allAtoms) a.y = 2 * my - a.y;
        }

        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
        if (atoms.length === 0) return;

        const { minX, maxX, minY, maxY, cx, cy } = atomBBox(atoms);
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;

        const PAD = _hasReactionPreview() ? 12 : 18;
        const pads = _viewportFitPadding(PAD);
        const horizontalPad = Math.max(PAD, (pads.left + pads.right) / 2);
        const verticalPad = Math.max(PAD, (pads.top + pads.bottom) / 2);
        const molSVGW = (maxX - minX) * SCALE || 1;
        const molSVGH = (maxY - minY) * SCALE || 1;
        const fitCap = _hasReactionPreview() ? 1.28 : 1;
        const fitScale = Math.min(Math.max(1, W - horizontalPad * 2) / molSVGW, Math.max(1, H - verticalPad * 2) / molSVGH, fitCap);
        const fitTx = W / 2 - (W / 2) * fitScale;
        const fitTy = H / 2 - (H / 2) * fitScale;
        svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));

        // Decrement hCount for any H shown via a stereo bond so the atom label
        // for that heavy atom does not show a spurious H subscript.
        const stereoMap = syncDisplayStereo(mol);
        for (const [bondId] of stereoMap) {
          const bond = mol.bonds.get(bondId);
          if (!bond) continue;
          const [ba1, ba2] = bond.getAtomObjects(mol);
          const hAtom = ba1?.visible === false ? ba1 : ba2?.visible === false ? ba2 : null;
          const heavyAt = hAtom ? (hAtom === ba1 ? ba2 : ba1) : null;
          if (!heavyAt) continue;
          const n = (hCounts.get(heavyAt.id) ?? 0) - 1;
          if (n <= 0) hCounts.delete(heavyAt.id);
          else hCounts.set(heavyAt.id, n);
        }

        _mol2d = mol;
        _hCounts2d = hCounts;
        _cx2d = cx;
        _cy2d = cy;
        _stereoMap2d = stereoMap;
        if (_preserveSelectionOnNextRender) _syncSelectionToMolecule(mol);
        else {
          _selectedAtomIds.clear();
          _selectedBondIds.clear();
        }
        _preserveSelectionOnNextRender = false;

        draw2d();

        // Sidebar updates — only on new molecule, not on every highlight redraw
        if (!preserveAnalysis) {
          updateFormula(mol);
          updateDescriptors(mol);
          _updateAnalysisPanels(mol, { recomputeResonance, refreshResonancePanel });
        }
      }

      function fitCurrent2dView() {
        if (!_mol2d) return;
        const atoms = [..._mol2d.atoms.values()].filter(a => a.x != null && a.visible !== false);
        if (atoms.length === 0) return;

        const { minX, maxX, minY, maxY, cx: _cx, cy: _cy } = atomBBox(atoms);
        _cx2d = _cx;
        _cy2d = _cy;

        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;
        const PAD = _hasReactionPreview() ? 12 : 18;
        const pads = _viewportFitPadding(PAD);
        const horizontalPad = Math.max(PAD, (pads.left + pads.right) / 2);
        const verticalPad = Math.max(PAD, (pads.top + pads.bottom) / 2);
        const molSVGW = (maxX - minX) * SCALE || 1;
        const molSVGH = (maxY - minY) * SCALE || 1;
        const fitCap = _hasReactionPreview() ? 1.28 : 1;
        const fitScale = Math.min(Math.max(1, W - horizontalPad * 2) / molSVGW, Math.max(1, H - verticalPad * 2) / molSVGH, fitCap);
        const fitTx = W / 2 - (W / 2) * fitScale;
        const fitTy = H / 2 - (H / 2) * fitScale;
        svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));

      _updateAnalysisPanels(currentMol ?? _mol2d);

      // Physicochemical row tooltips — event delegation on the table
      {
        const pcTable = document.getElementById('pc-table');
        const PC_TOOLTIP_DELAY_MS = 2000;
        let _pcTipTimer = null;
        let _pcHighlightRow = null;
        let _pcLockedRow = null;
        let _pcTooltipRow = null;
        let _pcTooltipCell = null;
        let _pcTooltipPoint = null;
        const physchemRowSnapshotKey = tr =>
          tr
            ? {
                label: tr.cells?.[0]?.textContent ?? '',
                desc: tr.dataset.desc ?? '',
                highlight: tr.dataset.highlight ?? ''
              }
            : null;
        const findPhyschemRowFromSnapshot = key => {
          if (!key) return null;
          return (
            [...pcTable.querySelectorAll('tr[data-highlight]')].find(
              row => (row.cells?.[0]?.textContent ?? '') === key.label && (row.dataset.desc ?? '') === key.desc && (row.dataset.highlight ?? '') === key.highlight
            ) ?? null
          );
        };
        const setPcRowHighlight = tr => {
          pcTable.querySelectorAll('tr.pc-hover').forEach(row => row.classList.remove('pc-hover'));
          if (tr) tr.classList.add('pc-hover');
        };
        const syncPcLockedRow = () => {
          if (_pcLockedRow && !_pcLockedRow.isConnected) {
            _pcLockedRow = null;
          }
        };
        const hidePcTooltip = () => {
          clearTimeout(_pcTipTimer);
          _pcTipTimer = null;
          _pcTooltipRow = null;
          _pcTooltipCell = null;
          _pcTooltipPoint = null;
          tooltip.style('opacity', 0);
        };
        const showPcTooltip = () => {
          if (!_pcTooltipRow?.dataset.desc || !_pcTooltipPoint) return;
          tooltip
            .html(`<div style="max-width:220px;white-space:normal;line-height:1.4">${_pcTooltipRow.dataset.desc}</div>`)
            .style('left', _pcTooltipPoint.x + 14 + 'px')
            .style('top', _pcTooltipPoint.y - 10 + 'px')
            .style('opacity', 0.95);
        };
        const applyPcHighlight = tr => {
          if (!tr?.dataset.highlight) return false;
          try {
            const groups = JSON.parse(tr.dataset.highlight);
            if (!Array.isArray(groups)) return false;
            if (groups.length === 0) {
              _setHighlight(null);
              return true;
            }
            _setHighlight(
              groups.map(group => new Map(group.map(id => [id, id]))),
              { style: 'physchem' }
            );
            return true;
          } catch {
            return false;
          }
        };
        setPersistentHighlightFallback(
          () => {
            syncPcLockedRow();
            if (!_pcLockedRow) {
              return false;
            }
            setPcRowHighlight(_pcLockedRow);
            return applyPcHighlight(_pcLockedRow);
          },
          {
            key: 'physchem',
            isActive: () => {
              syncPcLockedRow();
              return !!_pcLockedRow;
            }
          }
        );
        _capturePhyschemHighlightSnapshot = () => ({
          lockedRow: physchemRowSnapshotKey(_pcLockedRow)
        });
        _restorePhyschemHighlightSnapshot = snapshot => {
          syncPcLockedRow();
          hidePcTooltip();
          _pcHighlightRow = null;
          _pcLockedRow = null;
          const row = findPhyschemRowFromSnapshot(snapshot?.lockedRow ?? null);
          if (!row) {
            setPcRowHighlight(null);
            return false;
          }
          _pcLockedRow = row;
          _pcHighlightRow = row;
          setPcRowHighlight(row);
          return applyPcHighlight(row);
        };
        pcTable.addEventListener('mousemove', event => {
          syncPcLockedRow();
          const tr = event.target.closest('tr[data-desc]');
          if (tr !== _pcHighlightRow) {
            _pcHighlightRow = tr ?? null;
            if (!_pcLockedRow) {
              setPcRowHighlight(_pcHighlightRow);
              if (!_pcHighlightRow || !applyPcHighlight(_pcHighlightRow)) {
                _restorePersistentHighlight();
              }
            }
          }
          if (_pcLockedRow) {
            setPcRowHighlight(_pcLockedRow);
            if (tr !== _pcLockedRow) {
              hidePcTooltip();
              return;
            }
          }
          const td = event.target.closest('td');
          const onTooltipCell = !!(tr && td && td === tr.cells[0]);
          if (!onTooltipCell) {
            hidePcTooltip();
            return;
          }
          _pcTooltipPoint = { x: event.clientX, y: event.clientY };
          const tooltipVisible = tooltip.style('opacity') !== '0';
          const tooltipTargetChanged = tr !== _pcTooltipRow || td !== _pcTooltipCell;
          if (tooltipTargetChanged) {
            clearTimeout(_pcTipTimer);
            _pcTooltipRow = tr;
            _pcTooltipCell = td;
          }
          if (tooltipVisible) {
            showPcTooltip();
            return;
          }
          if (tooltipTargetChanged) {
            _pcTipTimer = setTimeout(() => {
              _pcTipTimer = null;
              showPcTooltip();
            }, PC_TOOLTIP_DELAY_MS);
          }
        });
        pcTable.addEventListener('click', event => {
          syncPcLockedRow();
          const tr = event.target.closest('tr[data-highlight]');
          if (!tr) {
            return;
          }
          if (_pcLockedRow === tr) {
            _pcLockedRow = null;
            if (_pcHighlightRow?.isConnected) {
              setPcRowHighlight(_pcHighlightRow);
              if (!applyPcHighlight(_pcHighlightRow)) {
                _restorePersistentHighlight();
              }
            } else {
              setPcRowHighlight(null);
              _restorePersistentHighlight();
            }
            return;
          }
          _pcLockedRow = tr;
          _pcHighlightRow = tr;
          setPcRowHighlight(tr);
          if (!applyPcHighlight(tr)) {
            _restorePersistentHighlight();
          }
        });
        pcTable.addEventListener('mouseleave', () => {
          syncPcLockedRow();
          _pcHighlightRow = null;
          hidePcTooltip();
          if (_pcLockedRow) {
            setPcRowHighlight(_pcLockedRow);
            if (!applyPcHighlight(_pcLockedRow)) {
              _restorePersistentHighlight();
            }
            return;
          }
          setPcRowHighlight(null);
          _restorePersistentHighlight();
        });
      }

      // ---------------------------------------------------------------------------
      // Input handling
      // ---------------------------------------------------------------------------
      /**
       * Renders the provided molecule in the active layout mode.
       *
       * @param {Molecule} mol
       * @param {object} [options={}]
       * @param {boolean} [options.recomputeResonance=true]
       * @param {boolean} [options.refreshResonancePanel=true]
       * @param {boolean} [options.preserveHistory=false] When true the undo/redo
       *   stacks are NOT cleared.  Use this when loading a new molecule from the
       *   input bar so the previous state remains undoable.
       * @param {boolean} [options.preserveView=false] When true in force mode,
       *   keep the current zoom/viewport instead of refitting the graph.
       * @param {boolean} [options.preserveAnalysis=false] When true, keep the
       *   current formula/descriptor/sidebar summary instead of recomputing it
       *   from the rendered molecule. Used for overlays like reaction preview.
       */
      function _renderMol(mol, options = {}) {
        const {
          recomputeResonance = true,
          refreshResonancePanel = true,
          preserveHistory = false,
          preserveGeometry = false,
          preserveView = false,
          preserveAnalysis = false
        } = options;
        if (!preserveAnalysis) {
          clearHighlightState();
        }
        currentMol = mol;
        rotationDeg = 0;
        flipH = false;
        flipV = false;
        if (!preserveHistory) {
          _clearUndoHistory();
        }
        kekulize(mol);
        if (mode === 'force') {
          updateForce(mol, { preserveView });
          if (!preserveAnalysis) {
            updateFormula(mol);
            updateDescriptors(mol);
            _updateAnalysisPanels(mol, { recomputeResonance, refreshResonancePanel });
          }
        } else {
          simulation.stop();
          render2d(mol, { recomputeResonance, refreshResonancePanel, preserveGeometry, preserveAnalysis });
        }
      }

      function clearMolecule() {
        if (currentMol || _mol2d) {
          _takeSnapshot({ clearReactionPreview: false });
        }
        _clearReactionPreviewState();
        currentMol = null;
        currentSmiles = null;
        currentInchi = null;
        _mol2d = null;
        _hCounts2d = null;
        _stereoMap2d = null;
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
        _hoveredAtomIds.clear();
        _hoveredBondIds.clear();
        clearHighlightState();
        g.selectAll('*').remove();
        _forceSelLines = null;
        _forceSelCircles = null;
        _forceValenceWarningCircles = null;
        _fgHlLines = null;
        _fgHlCircles = null;
        _activeValenceWarningMap = new Map();
        _selectionValenceTooltipAtomId = null;
        if (mode === 'force') {
          simulation.nodes([]);
          simulation.force('link').links([]);
          simulation.stop();
        }
        document.getElementById('molecularFormula').innerHTML = '';
        document.getElementById('molecularWeight').textContent = '';
        document.getElementById('descriptor-body').innerHTML = '';
        _updateAnalysisPanels(null);
      }

      function parseAndRender(smiles) {
        if (typeof smiles !== 'string' || smiles.length === 0 || smiles.length > 1000) return;
        if (smiles === currentSmiles && mode === 'force' && !_hasReactionPreview()) {
          _updateAnalysisPanels(currentMol, { recomputeResonance: false });
          return;
        }

        let mol;
        try {
          mol = parseSMILES(smiles);
        } catch (e) {
          console.warn('SMILES parse error:', e.message);
          return;
        }

        if (!mol || mol.atoms.size === 0) return;
        const previousInputSmiles = currentSmiles ?? window._getMolSmiles?.() ?? '';
        const previousInputInchi = currentInchi ?? window._getMolInchi?.() ?? '';
        const previousDocumentState =
          currentMol || _mol2d
            ? {
                currentSmiles: previousInputSmiles || null,
                currentInchi: previousInputInchi || null,
                inputMode,
                inputValue: inputMode === 'inchi' ? previousInputInchi : previousInputSmiles
              }
            : null;
        const previousSnapshot = previousDocumentState ? _captureAppSnapshot({ documentState: previousDocumentState }) : null;
        _clearReactionPreviewState();
        if (currentMol || _mol2d) {
          _takeSnapshot({
            clearReactionPreview: false,
            snapshot: previousSnapshot
          });
        }
        currentSmiles = smiles;
        currentInchi = null;
        _renderMol(mol, { preserveHistory: true });
      }

      function parseAndRenderInchi(inchi) {
        if (typeof inchi !== 'string' || inchi.length === 0 || inchi.length > 2000) return;

        let mol;
        try {
          mol = parseINCHI(inchi);
        } catch (e) {
          console.warn('InChI parse error:', e.message);
          return;
        }

        if (!mol || mol.atoms.size === 0) return;
        const previousInputSmiles = currentSmiles ?? window._getMolSmiles?.() ?? '';
        const previousInputInchi = currentInchi ?? window._getMolInchi?.() ?? '';
        const previousDocumentState =
          currentMol || _mol2d
            ? {
                currentSmiles: previousInputSmiles || null,
                currentInchi: previousInputInchi || null,
                inputMode,
                inputValue: inputMode === 'inchi' ? previousInputInchi : previousInputSmiles
              }
            : null;
        const previousSnapshot = previousDocumentState ? _captureAppSnapshot({ documentState: previousDocumentState }) : null;
        _clearReactionPreviewState();
        if (currentMol || _mol2d) {
          _takeSnapshot({
            clearReactionPreview: false,
            snapshot: previousSnapshot
          });
        }
        currentSmiles = null;
        currentInchi = inchi;
        _renderMol(mol, { preserveHistory: true });
      }

      window._parseSmiles = parseAndRender;
      window._parseInchi = parseAndRenderInchi;

      const collectionEntries = moleculeCatalog.flatMap(collection =>
        collection.molecules.map(molecule => ({
          collectionId: collection.id,
          collectionName: collection.name,
          ...molecule
        }))
      );
      const collectionEntriesById = new Map(collectionEntries.map(entry => [entry.id, entry]));

      function selectedCollectionEntry() {
        return collectionEntriesById.get(collectionSelectEl.value) ?? null;
      }

      function collectionValueForMode(entry, fmt = inputMode) {
        if (!entry) {
          return '';
        }
        return fmt === 'inchi' ? entry.inchi : entry.smiles;
      }

      function populateCollectionPicker() {
        const options = ['<option value="">Molecule Catalog...</option>'];
        for (const collection of moleculeCatalog) {
          options.push(`<optgroup label="${collection.name}">`);
          for (const molecule of collection.molecules) {
            options.push(`<option value="${molecule.id}">${molecule.name}</option>`);
          }
          options.push('</optgroup>');
        }
        collectionSelectEl.innerHTML = options.join('');
      }

      function syncCollectionPickerForInputValue(value) {
        const entry = selectedCollectionEntry();
        if (!entry) {
          return;
        }
        if (String(value ?? '') !== collectionValueForMode(entry)) {
          collectionSelectEl.value = '';
        }
      }

      window._getCollectionInputValue = fmt => collectionValueForMode(selectedCollectionEntry(), fmt);
      window._syncCollectionPickerForInputValue = syncCollectionPickerForInputValue;

      function parseInputWithAutoFormat(rawValue) {
        const value = typeof rawValue === 'string' ? rawValue.trim() : '';
        if (value.length === 0) {
          clearMolecule();
          return;
        }

        const detectedFormat = detectChemicalStringFormat(value);
        const parseFormat = detectedFormat ?? inputMode;

        if (detectedFormat && detectedFormat !== inputMode) {
          setInputFormat(detectedFormat, {
            preserveInput: true,
            inputValue: value
          });
        }

        if (parseFormat === 'inchi') {
          parseAndRenderInchi(value);
        } else {
          parseAndRender(value);
        }
      }

      populateCollectionPicker();

      collectionSelectEl.addEventListener('change', () => {
        const entry = selectedCollectionEntry();
        if (!entry) {
          return;
        }
        const value = collectionValueForMode(entry);
        inputEl.value = value;
        parseInputWithAutoFormat(value);
      });
      window._getMolSmiles = () => {
        if (!currentMol) return null;
        try {
          return toSMILES(currentMol);
        } catch (e) {
          return null;
        }
      };
      window._getMolInchi = () => {
        if (!currentMol) return null;
        try {
          return toInChI(currentMol);
        } catch (e) {
          return null;
        }
      };
      window._takeInputFormatSnapshot = ({ prevInputMode, visibleInputValue } = {}) => {
        const currentMolSmiles = window._getMolSmiles?.() ?? '';
        const currentMolInchi = window._getMolInchi?.() ?? '';
        _takeSnapshot({
          clearReactionPreview: false,
          documentState: {
            currentSmiles: (prevInputMode === 'smiles' ? visibleInputValue : (currentSmiles ?? currentMolSmiles)) || null,
            currentInchi: (prevInputMode === 'inchi' ? visibleInputValue : (currentInchi ?? currentMolInchi)) || null,
            inputMode: prevInputMode ?? inputMode,
            inputValue: visibleInputValue ?? ''
          }
        });
      };
      window.deleteSelection = function deleteSelection() {
        return editingActions.deleteSelection();
      };

      inputEl.addEventListener('input', event => {
        syncCollectionPickerForInputValue(event.target.value);
      });

      inputEl.addEventListener('keyup', event => {
        if (event.key === 'Enter') {
          parseInputWithAutoFormat(event.target.value);
        }
      });

      inputEl.addEventListener('paste', event => {
        setTimeout(() => {
          parseInputWithAutoFormat(event.target.value);
        }, 0);
      });

      window.addEventListener('resize', () => {
        if (!currentSmiles && !currentInchi) return;
        if (mode === 'force') {
          simulation.alpha(0.3).restart();
        } else {
          rotationDeg = 0;
          flipH = false;
          flipV = false;
          const _mol = currentInchi ? parseINCHI(currentInchi) : parseSMILES(currentSmiles);
          render2d(_mol);
        }
      });

      // ---------------------------------------------------------------------------
      // Init
      // ---------------------------------------------------------------------------
      renderExamples();
      const initialSmiles = 'CC(=O)C(Cl)CC(C(C)C)C=C';
      document.getElementById('smiles-input').value = initialSmiles;
      syncCollectionPickerForInputValue(initialSmiles);
      parseAndRender(initialSmiles);
    </script>
  </body>
</html>
