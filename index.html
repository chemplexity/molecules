      function _renderMol(mol) {
        _setHighlight(null);
        currentMol = mol;
        rotationDeg = 0;
        flipH = false;
        flipV = false;
        _clearUndoHistory();
        kekulize(mol);
        if (mode === 'force') {
          updateForce(mol);
          updateFormula(mol);
          updateDescriptors(mol);
          updateFunctionalGroups(mol);
          updateReactionTemplatesPanel();
        } else {
          simulation.stop();
          render2d(mol);
        }
      }

      function clearMolecule() {
        _clearReactionPreviewState();
        _clearUndoHistory();
        currentMol = null;
        currentSmiles = null;
        currentInchi = null;
        _mol2d = null;
        _hCounts2d = null;
        _stereoMap2d = null;
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
        _hoveredAtomIds.clear();
        _hoveredBondIds.clear();
        clearHighlightState();
        g.selectAll('*').remove();
        _forceSelLines = null;
        _forceSelCircles = null;
        _forceValenceWarningCircles = null;
        _fgHlLines = null;
        _fgHlCircles = null;
        _activeValenceWarningMap = new Map();
        _selectionValenceTooltipAtomId = null;
        if (mode === 'force') {
          simulation.nodes([]);
          simulation.force('link').links([]);
          simulation.stop();
        }
        document.getElementById('molecularFormula').innerHTML = '';
        document.getElementById('molecularWeight').textContent = '';
        document.getElementById('descriptor-body').innerHTML = '';
        document.getElementById('fg-body').innerHTML = '';
        document.getElementById('reaction-body').innerHTML = '';
      }

      function parseAndRender(smiles) {
        if (typeof smiles !== 'string' || smiles.length === 0 || smiles.length > 1000) return;
        _clearReactionPreviewState();
        if (smiles === currentSmiles && mode === 'force') {
          updateReactionTemplatesPanel();
          return;
        }

        let mol;
        try {
          mol = parseSMILES(smiles);
        } catch (e) {
          console.warn('SMILES parse error:', e.message);
          return;
        }

        if (!mol || mol.atoms.size === 0) return;
        currentSmiles = smiles;
        currentInchi = null;
        _renderMol(mol);
      }

      function parseAndRenderInchi(inchi) {
        if (typeof inchi !== 'string' || inchi.length === 0 || inchi.length > 2000) return;
        _clearReactionPreviewState();

        let mol;
        try {
          mol = parseINCHI(inchi);
        } catch (e) {
          console.warn('InChI parse error:', e.message);
          return;
        }

        if (!mol || mol.atoms.size === 0) return;
        currentSmiles = null;
        currentInchi = inchi;
        _renderMol(mol);
      }

      window._parseSmiles = parseAndRender;
      window._parseInchi = parseAndRenderInchi;

      const collectionEntries = moleculeCatalog.flatMap(collection =>
        collection.molecules.map(molecule => ({
          collectionId: collection.id,
          collectionName: collection.name,
          ...molecule
        }))
      );
      const collectionEntriesById = new Map(collectionEntries.map(entry => [entry.id, entry]));

      function selectedCollectionEntry() {
        return collectionEntriesById.get(collectionSelectEl.value) ?? null;
      }

      function collectionValueForMode(entry, fmt = inputMode) {
        if (!entry) {
          return '';
        }
        return fmt === 'inchi' ? entry.inchi : entry.smiles;
      }

      function populateCollectionPicker() {
        const options = ['<option value="">Molecule Catalog...</option>'];
        for (const collection of moleculeCatalog) {
          options.push(`<optgroup label="${collection.name}">`);
          for (const molecule of collection.molecules) {
            options.push(`<option value="${molecule.id}">${molecule.name}</option>`);
          }
          options.push('</optgroup>');
        }
        collectionSelectEl.innerHTML = options.join('');
      }

      function syncCollectionPickerForInputValue(value) {
        const entry = selectedCollectionEntry();
        if (!entry) {
          return;
        }
        if (String(value ?? '') !== collectionValueForMode(entry)) {
          collectionSelectEl.value = '';
        }
      }

      window._getCollectionInputValue = fmt => collectionValueForMode(selectedCollectionEntry(), fmt);
      window._syncCollectionPickerForInputValue = syncCollectionPickerForInputValue;

      function parseInputWithAutoFormat(rawValue) {
        const value = typeof rawValue === 'string' ? rawValue.trim() : '';
        if (value.length === 0) {
          clearMolecule();
          return;
        }

        const detectedFormat = detectChemicalStringFormat(value);
        const parseFormat = detectedFormat ?? inputMode;

        if (detectedFormat && detectedFormat !== inputMode) {
          setInputFormat(detectedFormat, {
            preserveInput: true,
            inputValue: value
          });
        }

        if (parseFormat === 'inchi') {
          parseAndRenderInchi(value);
        } else {
          parseAndRender(value);
        }
      }

      populateCollectionPicker();

      collectionSelectEl.addEventListener('change', () => {
        const entry = selectedCollectionEntry();
        if (!entry) {
          return;

        const value = collectionValueForMode(entry);
        inputEl.value = value;
        parseInputWithAutoFormat(value);
      });
      window._getMolSmiles = () => {
        if (!currentMol) return null;
        try {
          return toSMILES(currentMol);
        } catch (e) {
          return null;
        }
      };
      window._getMolInchi = () => {
        if (!currentMol) return null;
        try {
          return toInChI(currentMol);
        } catch (e) {
          return null;
        }
      };

      window.deleteSelection = function deleteSelection() {
        if (_hasReactionPreview()) {
          const reactantSelectedAtomIds = new Set(
            [..._selectedAtomIds].filter(id => _reactionPreviewReactantAtomIds.has(id))
          );
          const reactantSelectedBondIds = new Set();
          const previewMol = mode === 'force' ? currentMol : _mol2d;
          if (previewMol) {
            for (const bondId of _selectedBondIds) {
              const bond = previewMol.bonds.get(bondId);
              if (!bond) continue;
              if (bond.atoms.every(atomId => _reactionPreviewReactantAtomIds.has(atomId))) {
                reactantSelectedBondIds.add(bondId);
              }
            }
          }
          if (_restoreReactionPreviewSource()) {
            _selectedAtomIds.clear();
            _selectedBondIds.clear();
            for (const atomId of reactantSelectedAtomIds) _selectedAtomIds.add(atomId);
            for (const bondId of reactantSelectedBondIds) _selectedBondIds.add(bondId);
          }
        }

        const mol = mode === 'force' ? currentMol : _mol2d;
        if (!mol) return;
        if (_selectedAtomIds.size === 0 && _selectedBondIds.size === 0) return;

        _takeSnapshot();

        const is2d = mode === '2d';
        const deletedAtomIds = new Set(_selectedAtomIds);
        const affectedHeavyIds = new Set();

        for (const id of _selectedAtomIds) {
          const atom = mol.atoms.get(id);
          if (!atom) continue;
          for (const neighbor of atom.getNeighbors(mol)) {
            if (neighbor.name === 'H' || deletedAtomIds.has(neighbor.id)) continue;
            affectedHeavyIds.add(neighbor.id);
          }
        }

        for (const id of _selectedBondIds) {
          const bond = mol.bonds.get(id);
          if (!bond) continue;
          for (const atomId of bond.atoms) {
            const atom = mol.atoms.get(atomId);
            if (!atom || atom.name === 'H' || deletedAtomIds.has(atomId)) continue;
            affectedHeavyIds.add(atomId);
          }
        }

        // Remove selected atoms (also removes their connected bonds).
        // Also remove attached hydrogens on each deleted atom so functional-group
        // deletions do not leave orphaned H atoms behind.
        for (const id of _selectedAtomIds) {
          const atom = mol.atoms.get(id);
          if (!atom) continue;
          const attachedHydrogenIds = atom
            .getNeighbors(mol)
            .filter(n => n.name === 'H')
            .map(n => n.id);
          mol.removeAtom(id);
          for (const hId of attachedHydrogenIds) {
            mol.removeAtom(hId);
          }
        }

        // Remove any explicitly selected bonds not already removed
        for (const id of _selectedBondIds) {
          if (mol.bonds.has(id)) mol.removeBond(id, { pruneIsolated: false });
        }

        mol.clearStereoAnnotations(affectedHeavyIds);
        kekulize(mol);
        refreshAromaticity(mol, { preserveKekule: true });
        mol.repairImplicitHydrogens(affectedHeavyIds);

        _selectedAtomIds.clear();
        _selectedBondIds.clear();

        if (is2d) {
          // Recompute hCounts for remaining atoms
          _hCounts2d = new Map();
          for (const [, atom] of mol.atoms) {
            if (atom.name === 'H') continue;
            const count = atom.getNeighbors(mol).filter(n => n.name === 'H').length;
            if (count > 0) _hCounts2d.set(atom.id, count);
          }
          _stereoMap2d = pickStereoWedges(mol);
        }

        _syncInputField(mol);

        updateFormula(mol);
        updateDescriptors(mol);
        updateFunctionalGroups(mol);
        updateReactionTemplatesPanel();

        if (mode === 'force') {
          // Capture current screen positions of affected heavy atoms *before*
          // updateForce rebuilds the simulation. repairImplicitHydrogens above
          // has already replaced all H atoms on these atoms with new IDs, so
          // those H atoms won't be in previousNodePositions and would otherwise
          // snap in from the anchor-layout origin. Patching after updateForce
          // pins the heavy atoms in place and reseats their new H atoms nearby.
          const patchPos = new Map();
          if (simulation) {
            for (const node of simulation.nodes()) {
              if (affectedHeavyIds.has(node.id) && Number.isFinite(node.x) && Number.isFinite(node.y)) {
                patchPos.set(node.id, { x: node.x, y: node.y });
              }
            }
          }
          currentMol = mol;
          updateForce(mol, { preservePositions: true, preserveView: true });
          if (patchPos.size) {
            _patchForceNodePositions(patchPos);
            _reseatHydrogensAroundPatched(patchPos);
          }
          if (mol.atoms.size > 0) _enableForceKeepInView();
        } else {
          fitCurrent2dView();
          draw2d();
        }

        const btn = document.getElementById('erase-btn');
        if (btn) {
          btn.textContent = '✓';
          setTimeout(() => {
            btn.textContent = '🗑️';
          }, 1500);
        }
      };

      document.addEventListener('keydown', event => {
        if (event.key === 'Meta' || event.key === 'Control') {
          const nextActive = !!(event.metaKey || event.ctrlKey);
          if (_selectionModifierActive !== nextActive) {
            _selectionModifierActive = nextActive;
            _refreshSelectionOverlay();
          }
        }

        const tag = document.activeElement?.tagName;
        const isTextInput = tag === 'INPUT' || tag === 'TEXTAREA';

        // Ctrl/Cmd+A: select all atoms when not in a text input; otherwise let the browser handle it.
        if ((event.metaKey || event.ctrlKey) && event.key === 'a') {
          if (isTextInput) return;
          const mol = mode === 'force' ? currentMol : _mol2d;
          if (mol) {
            if (!_selectMode) window.toggleSelectMode();
            for (const [id] of mol.atoms) _selectedAtomIds.add(id);
            for (const [id] of mol.bonds) _selectedBondIds.add(id);
            if (mode === 'force') applyForceSelection();
            else _redraw2dSelection();
          }
          event.preventDefault();
          return;
        }

        if (isTextInput) return;

        // Arrow-key panning
        const PAN_STEP = 40;
        if (
          event.key === 'ArrowUp' ||
          event.key === 'ArrowDown' ||
          event.key === 'ArrowLeft' ||
          event.key === 'ArrowRight'
        ) {
          const dx = event.key === 'ArrowLeft' ? PAN_STEP : event.key === 'ArrowRight' ? -PAN_STEP : 0;
          const dy = event.key === 'ArrowUp' ? PAN_STEP : event.key === 'ArrowDown' ? -PAN_STEP : 0;
          const t = d3.zoomTransform(svg.node());
          svg.call(zoom.transform, d3.zoomIdentity.translate(t.x + dx, t.y + dy).scale(t.k));
          event.preventDefault();
          return;
        }

        if (event.key === 'Escape') {
          if (_drawBondState) {
            _cancelDrawBond();
            event.preventDefault();
            return;
          }
          if (_drawBondMode) {
            window.toggleDrawBondMode();
            event.preventDefault();
            return;
          }
          return;
        }

        if ((event.metaKey || event.ctrlKey) && event.shiftKey && (event.key === 'z' || event.key === 'Z')) {
          redoAction();
          event.preventDefault();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && !event.shiftKey && event.key === 'z') {
          undoAction();
          event.preventDefault();
          return;
        }

        if ((event.metaKey || event.ctrlKey) && event.key === 'a') {
          const mol = mode === 'force' ? currentMol : _mol2d;
          if (mol) {
            if (!_selectMode) window.toggleSelectMode();
            for (const [id] of mol.atoms) _selectedAtomIds.add(id);
            for (const [id] of mol.bonds) _selectedBondIds.add(id);
            if (mode === 'force') applyForceSelection();
            else _redraw2dSelection();
          }
          event.preventDefault();
          return;
        }

        // Change hovered atom element: C / N / O / S keys in select or draw-bond mode.
        if (
          (_selectMode || (_drawBondMode && !_drawBondState)) &&
          _hoveredAtomIds.size > 0 &&
          !event.metaKey &&
          !event.ctrlKey &&
          !event.altKey
        ) {
          const _elemKeys = {
            c: 'C',
            C: 'C',
            n: 'N',
            N: 'N',
            o: 'O',
            O: 'O',
            s: 'S',
            S: 'S',
            p: 'P',
            P: 'P',
            f: 'F',
            F: 'F',
            i: 'I',
            I: 'I',
            b: 'B',
            B: 'B',
            k: 'K',
            K: 'K'
          };
          const newEl = _elemKeys[event.key];
          if (newEl) {
            const mol = mode === 'force' ? currentMol : _mol2d;
            if (mol) {
              const toChange = [..._hoveredAtomIds].filter(id => {
                const a = mol.atoms.get(id);
                return a && a.name !== newEl;
              });
              if (toChange.length > 0) {
                _takeSnapshot();
                for (const atomId of toChange) {
                  mol.changeAtomElement(atomId, newEl);
                }
                const affected = new Set(toChange);
                mol.clearStereoAnnotations(affected);
                kekulize(mol);
                refreshAromaticity(mol, { preserveKekule: true });
                mol.repairImplicitHydrogens(affected);
                _syncInputField(mol);
                updateFormula(mol);
                updateDescriptors(mol);
                updateFunctionalGroups(mol);
                updateReactionTemplatesPanel();
                if (mode === 'force') {
                  updateForce(mol, {
                    preservePositions: true,
                    preserveView: true
                  });
                } else {
                  _hCounts2d = new Map();
                  for (const [, a] of mol.atoms) {
                    if (a.name === 'H') continue;
                    const cnt = a.getNeighbors(mol).filter(n => n.name === 'H').length;
                    if (cnt > 0) _hCounts2d.set(a.id, cnt);
                  }
                  _stereoMap2d = pickStereoWedges(mol);
                  draw2d();
                }
              }
            }
            event.preventDefault();
            return;
          }
        }

        if (event.key !== 'Delete' && event.key !== 'Backspace') return;
        // In select or draw-bond mode: if nothing is selected but something is hovered, delete it.
        if (
          (_selectMode || (_drawBondMode && !_drawBondState)) &&
          _selectedAtomIds.size === 0 &&
          _selectedBondIds.size === 0 &&
          (_hoveredAtomIds.size > 0 || _hoveredBondIds.size > 0)
        ) {
          for (const id of _hoveredAtomIds) _selectedAtomIds.add(id);
          for (const id of _hoveredBondIds) _selectedBondIds.add(id);
          _clearPrimitiveHover();
        }
        deleteSelection();
        event.preventDefault();
      });

      document.addEventListener('keyup', event => {
        if (event.key !== 'Meta' && event.key !== 'Control') return;
        const nextActive = !!(event.metaKey || event.ctrlKey);
        if (_selectionModifierActive !== nextActive) {
          _selectionModifierActive = nextActive;
          _refreshSelectionOverlay();
        }
      });

      window.addEventListener('blur', () => {
        if (!_selectionModifierActive) return;
        _selectionModifierActive = false;
        _refreshSelectionOverlay();
      });

      inputEl.addEventListener('input', event => {
        syncCollectionPickerForInputValue(event.target.value);
      });

      inputEl.addEventListener('keyup', event => {
        if (event.key === 'Enter') {
          parseInputWithAutoFormat(event.target.value);
        }
      });

      inputEl.addEventListener('paste', event => {
        setTimeout(() => {
          parseInputWithAutoFormat(event.target.value);
        }, 0);
      });

      window.addEventListener('resize', () => {
        if (!currentSmiles && !currentInchi) return;
        if (mode === 'force') {
          simulation.alpha(0.3).restart();
        } else {
          rotationDeg = 0;
          flipH = false;
          flipV = false;
          const _mol = currentInchi ? parseINCHI(currentInchi) : parseSMILES(currentSmiles);
          render2d(_mol);
        }
      });

      // ---------------------------------------------------------------------------
      // Init
      // ---------------------------------------------------------------------------
      renderExamples();
      const initialSmiles = 'CC(=O)C(Cl)CC(C(C)C)C=C';
      document.getElementById('smiles-input').value = initialSmiles;
      syncCollectionPickerForInputValue(initialSmiles);
      parseAndRender(initialSmiles);
    </script>
  </body>
</html>
