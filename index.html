<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>molecules</title>

    <script type="importmap">
      {
        "imports": {
          "node:crypto": "data:text/javascript,export const randomUUID = () => globalThis.crypto.randomUUID();"
        }
      }
    </script>

    <link rel="stylesheet" href="src/app/styles.css" />
  </head>

  <body>
    <div id="erase-cursor"></div>
    <div id="wrapper">
      <div id="header">
        <div id="format-toggle">
          <button id="smiles-mode-btn" class="active" onclick="setInputFormat('smiles')">SMILES</button>
          <button id="inchi-mode-btn" onclick="setInputFormat('inchi')">InChI</button>
        </div>
        <div id="collection-picker">
          <select id="collection-select" aria-label="Molecule Catalog...">
            <option value="">Molecule Catalog...</option>
          </select>
        </div>
        <div id="user-input">
          <form onsubmit="return false;">
            <div class="group">
              <input type="text" id="smiles-input" autocomplete="off" spellcheck="false" />
              <span class="highlight"></span>
              <span class="bar"></span>
              <label for="smiles-input" id="input-label">Input SMILES notation...</label>
            </div>
          </form>
        </div>
        <div id="examples">
          <p class="examples" id="examples-list"></p>
        </div>
      </div>

      <div id="content-main">
        <div id="plot">
          <div id="toggle-controls">
            <button id="toggle-btn" onclick="toggleMode()">⚡ Force Layout</button>
          </div>
          <div id="atom-selector">
            <button id="elem-btn-C" title="Carbon" onclick="setDrawElement('C')">C</button>
            <button id="elem-btn-N" title="Nitrogen" onclick="setDrawElement('N')">N</button>
            <button id="elem-btn-O" title="Oxygen" onclick="setDrawElement('O')">O</button>
            <button id="elem-btn-S" title="Sulfur" onclick="setDrawElement('S')">S</button>
            <button id="elem-btn-P" title="Phosphorus" onclick="setDrawElement('P')">P</button>
            <button id="elem-btn-F" title="Fluorine" onclick="setDrawElement('F')">F</button>
            <button id="elem-btn-Cl" title="Chlorine" onclick="setDrawElement('Cl')">Cl</button>
            <button id="elem-btn-Br" title="Bromine" onclick="setDrawElement('Br')">Br</button>
            <button id="elem-btn-I" title="Iodine" onclick="setDrawElement('I')">I</button>
          </div>
          <div id="undo-controls">
            <button id="undo-btn" title="Undo (Ctrl+Z)" onclick="undoAction()" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M3 4.5H8a4 4 0 0 1 0 8H4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none" />
                <polyline points="5,2.5 3,4.5 5,6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <button id="redo-btn" title="Redo (Ctrl+Shift+Z)" onclick="redoAction()" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M12 4.5H7a4 4 0 0 0 0 8h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none" />
                <polyline points="10,2.5 12,4.5 10,6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
          <div id="force-controls">
            <button id="label-toggle" title="Toggle atom labels" onclick="toggleLabels()">Atom Labels</button>
            <button id="force-rotate-ccw" title="Rotate counter-clockwise">&#x21BA;</button>
            <button id="force-rotate-cw" title="Rotate clockwise">&#x21BB;</button>
            <button id="force-flip-h" title="Flip horizontal">&#x2194;</button>
            <button id="force-flip-v" title="Flip vertical">&#x2195;</button>
            <button id="copy-force-svg-btn" title="Copy as SVG" onclick="copyForceSvg()">SVG</button>
            <button id="copy-force-png-btn" title="Copy as PNG" onclick="copyForcePng()">PNG</button>
          </div>
          <div id="rotate-controls">
            <button id="rotate-ccw" title="Rotate counter-clockwise">&#x21BA;</button>
            <button id="rotate-cw" title="Rotate clockwise">&#x21BB;</button>
            <button id="flip-h" title="Flip horizontal">&#x2194;</button>
            <button id="flip-v" title="Flip vertical">&#x2195;</button>
            <button id="copy-svg-btn" title="Copy 2D structure as SVG to clipboard" onclick="copySvg2d()">SVG</button>
            <button id="save-png-btn" title="Copy 2D structure as PNG to clipboard" onclick="savePng2d()">PNG</button>
          </div>
          <div id="clean-controls">
            <button id="pan-mode-btn" class="active" title="Pan / zoom mode" onclick="togglePanMode()">🤚</button>
            <button id="select-mode-btn" title="Selection mode — drag to select atoms and bonds" onclick="toggleSelectMode()">⬚</button>
            <button id="erase-btn" title="Erase mode — click atoms or bonds to delete" onclick="toggleEraseMode()">🗑️</button>
            <button id="clean-2d-btn" title="Clean 2D layout" onclick="cleanLayout2d()">🧹</button>
            <button id="clean-force-btn" title="Clean force layout" onclick="cleanLayoutForce()" style="display: none">🧹</button>
          </div>
          <div id="draw-tools">
            <button id="draw-bond-btn" title="Draw bond" onclick="toggleDrawBondMode()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>
        <div id="sidebar">
          <div id="descriptor-panel">
            <div id="descriptor-tabs">
              <button class="desc-tab active" data-tab="topological">Topological</button>
              <button class="desc-tab" data-tab="physicochemical">Physicochemical</button>
            </div>
            <div id="tab-topological" class="desc-tab-panel">
              <table id="descriptor-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="descriptor-body"></tbody>
              </table>
            </div>
            <div id="tab-physicochemical" class="desc-tab-panel" style="display: none">
              <table id="pc-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="pc-body"></tbody>
              </table>
            </div>
          </div>
          <div id="smarts-panel">
            <div id="smarts-tabs">
              <button class="smarts-tab active" data-tab="functional-groups">Functional Groups</button>
              <button class="smarts-tab" data-tab="reactions">Reactions</button>
              <button class="smarts-tab" data-tab="other">Other</button>
            </div>
            <div id="tab-functional-groups" class="smarts-tab-panel">
              <table id="fg-table">
                <tbody id="fg-body"></tbody>
              </table>
            </div>
            <div id="tab-reactions" class="smarts-tab-panel" style="display: none">
              <table id="reaction-table">
                <tbody id="reaction-body"></tbody>
              </table>
            </div>
            <div id="tab-other" class="smarts-tab-panel" style="display: none">
              <table id="resonance-table">
                <tbody id="resonance-body"></tbody>
                <tbody id="bond-en-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="footer">
        <div id="content-info">
          <span id="molecularFormula"></span>
          <span id="molecularWeight"></span>
        </div>
        <div id="content-source">
          <a href="https://github.com/chemplexity/molecules" target="_blank">source</a>
          <button id="options-btn" type="button" title="Options" onclick="openOptionsModal()">⚙</button>
        </div>
      </div>
    </div>

    <div id="options-overlay" hidden>
      <div id="options-modal" role="dialog" aria-modal="true" aria-labelledby="options-title">
        <div class="options-header">
          <h2 id="options-title">Options</h2>
        </div>
        <div class="options-body">
          <section class="options-section">
            <h3>Global</h3>
            <label class="option-row option-toggle" for="options-show-atom-tooltips">
              <span>Atom Tooltips</span>
              <input id="options-show-atom-tooltips" type="checkbox" checked />
            </label>
            <label class="option-row option-toggle" for="options-show-valence-warnings">
              <span>Show Valence Warnings</span>
              <input id="options-show-valence-warnings" type="checkbox" checked />
            </label>
            <label class="option-row option-toggle" for="options-show-lone-pairs">
              <span>Show Lone Pairs</span>
              <input id="options-show-lone-pairs" type="checkbox" />
            </label>
          </section>
          <section class="options-section">
            <h3>2D Layout</h3>
            <label class="option-row option-toggle" for="options-2d-atom-coloring" title="Color atoms by element type (CPK colors). Uncheck for black and white rendering.">
              <span>Atom Coloring</span>
              <input id="options-2d-atom-coloring" type="checkbox" checked />
            </label>
            <label class="option-row" for="options-2d-atom-font-size">
              <span>Atom Font Size</span>
              <input id="options-2d-atom-font-size" type="number" min="10" max="24" step="1" />
            </label>
            <label class="option-row" for="options-2d-bond-thickness">
              <span>Bond Thickness</span>
              <input id="options-2d-bond-thickness" type="number" min="0.8" max="4" step="0.1" />
            </label>
          </section>
          <section class="options-section">
            <h3>Force Layout</h3>
            <label class="option-row" for="options-force-atom-size">
              <span>Atom Size</span>
              <input id="options-force-atom-size" type="number" min="0.5" max="2.5" step="0.1" />
            </label>
            <label class="option-row" for="options-force-bond-thickness">
              <span>Bond Thickness</span>
              <input id="options-force-bond-thickness" type="number" min="0.5" max="2.5" step="0.1" />
            </label>
          </section>
        </div>
        <div class="options-actions">
          <button id="options-reset-btn" type="button">Reset</button>
          <button id="options-cancel-btn" type="button">Cancel</button>
          <button id="options-apply-btn" type="button">Apply</button>
        </div>
      </div>
    </div>

    <div class="tooltip" id="atom-tooltip" style="opacity: 0"></div>

    <script>
      var inputMode = 'smiles';

      var exampleMolecules = [
        {
          name: 'ethanol',
          smiles: 'CCO',
          inchi: 'InChI=1S/C2H6O/c1-2-3/h3H,2H2,1H3'
        },
        {
          name: 'glucose',
          smiles: 'C([C@@H]1[C@H]([C@@H]([C@H](C(O1)O)O)O)O)O',
          inchi: 'InChI=1S/C6H12O6/c1(2-3(4(5(6(11)12-2)10)9)8)7/h2-11H,1H2/t2-,3-,4+,5-/m1/s1'
        },
        {
          name: 'GHK-Cu',
          smiles: 'C1=C(NC=N1)CC(C(=O)N[C@@H](CCCCN)C(=O)O)NC(=O)CN',
          inchi: 'InChI=1S/C14H24N6O4/c15-4-2-1-3-10(14(23)24)20-13(22)11(19-12(21)6-16)5-9-7-17-8-18-9/h7-8,10-11H,1-6,15-16H2,(H,17,18)(H,19,21)(H,20,22)(H,23,24)/t10-,11?/m0/s1'
        },
        {
          name: 'aspirin',
          smiles: 'CC(=O)Oc1ccccc1C(=O)O',
          inchi: 'InChI=1S/C9H8O4/c1-6(10)13-8-5-3-2-4-7(8)9(11)12/h2-5H,1H3,(H,11,12)'
        },
        {
          name: 'serotonin',
          smiles: 'C1=CC2=C(C=C1O)C(=CN2)CCN',
          inchi: 'InChI=1S/C10H12N2O/c11-4-3-7-6-12-10-2-1-8(13)5-9(7)10/h1-2,5-6,12-13H,3-4,11H2'
        },
        {
          name: 'dopamine',
          smiles: 'C1=CC(=C(C=C1CCN)O)O',
          inchi: 'InChI=1S/C8H11NO2/c9-4-3-6-1-2-7(10)8(11)5-6/h1-2,5,10-11H,3-4,9H2'
        },
        {
          name: 'anthracene',
          smiles: 'C1=CC2=CC3=CC=CC=C3C=C2C=C1',
          inchi: 'InChI=1S/C14H10/c1-2-6-12-10-14-8-4-3-7-13(14)9-11(12)5-1/h1-10H'
        },
        {
          name: 'LSD',
          smiles: 'CCN(CC)C(=O)C1CN(C2CC3=CNC4=CC=CC(=C34)C2=C1)C',
          inchi: 'InChI=1S/C20H25N3O/c1-4-23(5-2)20(24)14-9-16-15-7-6-8-17-19(15)13(11-21-17)10-18(16)22(3)12-14/h6-9,11,14,18H,4-5,10,12H2,1-3H3'
        }
      ];

      function setInputFormat(fmt, options = {}) {
        const { preserveInput = false, inputValue = null, recordHistory = !preserveInput } = options;
        const prev = inputMode;
        if (fmt !== prev && recordHistory) {
          window._takeInputFormatSnapshot?.({
            prevInputMode: prev,
            visibleInputValue: document.getElementById('smiles-input').value ?? ''
          });
        }
        inputMode = fmt;
        document.getElementById('smiles-mode-btn').classList.toggle('active', fmt === 'smiles');
        document.getElementById('inchi-mode-btn').classList.toggle('active', fmt === 'inchi');
        document.getElementById('input-label').textContent = fmt === 'inchi' ? 'Input InChI notation...' : 'Input SMILES notation...';

        let inputVal = preserveInput ? (inputValue ?? document.getElementById('smiles-input').value) : '';
        if (!preserveInput && fmt === 'smiles' && prev === 'inchi' && window._getMolSmiles) {
          inputVal = window._getMolSmiles() || '';
        }
        if (!preserveInput && fmt === 'inchi' && prev === 'smiles' && window._getMolInchi) {
          inputVal = window._getMolInchi() || '';
        }
        if (!preserveInput && window._getCollectionInputValue) {
          inputVal = window._getCollectionInputValue(fmt) || inputVal;
        }
        document.getElementById('smiles-input').value = inputVal;
        if (fmt === 'inchi') {
          currentInchi = inputVal || null;
        } else {
          currentSmiles = inputVal || null;
        }
        if (window._syncCollectionPickerForInputValue) {
          window._syncCollectionPickerForInputValue(inputVal);
        }
        renderExamples();
      }

      function renderExamples() {
        const isInchi = inputMode === 'inchi';
        const links = exampleMolecules
          .map(m => {
            const val = isInchi ? m.inchi : m.smiles;
            return '<a href="#" onclick="parseInput(\'' + val.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\'); return false">' + m.name + '</a>';
          })
          .join(', ');
        document.getElementById('examples-list').innerHTML = '<i>examples:&nbsp;</i>' + links + ', <a href="#" onclick="pickRandomMolecule(); return false">random</a>';
      }

      function pickRandomMolecule() {
        const pool = inputMode === 'inchi' ? randomMolecule.filter(m => m.inchi) : randomMolecule;
        const mol = pool[Math.floor(Math.random() * pool.length)];
        parseInput(inputMode === 'inchi' ? mol.inchi : mol.smiles);
      }

      function parseInput(val) {
        if (!val) {
          return;
        }
        document.getElementById('smiles-input').value = val;
        if (window._syncCollectionPickerForInputValue) {
          window._syncCollectionPickerForInputValue(val);
        }
        if (inputMode === 'inchi') {
          window._parseInchi && window._parseInchi(val);
        } else {
          window._parseSmiles && window._parseSmiles(val);
        }
      }
    </script>

    <!-- Load shared molecule list; sets window.randomMolecule for the picker below. -->
    <script type="module" src="examples/example-molecules.js"></script>

    <script type="module">
      import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';
      import { parseSMILES, toSMILES } from './src/io/smiles.js';
      import { Molecule } from './src/core/Molecule.js';
      import { parseINCHI, toInChI } from './src/io/inchi.js';
      import { detectChemicalStringFormat } from './src/io/detect.js';
      import { moleculeCatalog } from './src/data/molecule-catalog.js';
      import { validateValence } from './src/validation/index.js';
      import { refreshAromaticity } from './src/algorithms/aromaticity.js';
      import { generateCoords, refineExistingCoords, generateAndRefine2dCoords } from './src/layout/index.js';
      import * as mol2dHelpers from './src/layout/mol2d-helpers.js';
      import { updateDescriptors, updatePhysicochemical, updateFormula } from './src/app/ui/descriptors.js';
      import {
        initUndo,
        takeSnapshot as _takeSnapshot,
        discardLastSnapshot as _discardLastSnapshot,
        clearHistory as _clearUndoHistory,
        undoAction,
        redoAction
      } from './src/app/core/undo.js';
      import { createAppController } from './src/app/core/app-controller.js';
      import { ReactionPreviewPolicy, ResonancePolicy, SnapshotPolicy, ViewportPolicy } from './src/app/core/editor-actions.js';
      import { createSessionSnapshotManager } from './src/app/core/session-snapshot.js';
      import { createSessionUiStateBridge } from './src/app/core/session-ui-state.js';
      import { initExport, copyForcePng, copyForceSvg, copySvg2d, savePng2d } from './src/app/ui/export.js';
      import { createDrawBondCommitActions } from './src/app/interactions/draw-bond-commit.js';
      import { createEditingActions } from './src/app/interactions/editing.js';
      import { createDragGestureActions } from './src/app/interactions/drag-gestures.js';
      import {
        BOND_MULT,
        BOND_OFFSET,
        PI_STROKE,
        ARO_STROKE,
        AROMATIC_RENDER_MODE,
        STROKE_W,
        RENDER_OPTION_LIMITS,
        getDefaultRenderOptions,
        getRenderOptions,
        updateRenderOptions,
        atomColor,
        strokeColor,
        singleBondWidth,
        renderBondOrder,
        prepareAromaticBondRendering,
        atomRadius,
        xOffset,
        yOffset,
        bondTooltipHtml,
        atomTooltipHtml,
        renderAtomLabel,
        renderLonePairDots,
        addLine
      } from './src/app/render/helpers.js';
      import {
        HIGHLIGHT_STYLES,
        _setHighlight,
        _isBondHighlighted,
        _prepare2dExportHighlightState,
        _restoreRecentFunctionalGroupHighlight,
        _restorePersistentHighlight,
        updateFunctionalGroups,
        getHighlightedAtomIds,
        getHighlightedAtomSets,
        getHighlightStyle,
        captureHighlightSnapshot,
        restoreHighlightSnapshot,
        clearHighlightState,
        initHighlights,
        setPersistentHighlightFallback
      } from './src/app/render/highlights.js';
      import {
        initReaction2d,
        _plotOverlayFitPadding,
        _clearReactionPreviewState,
        _captureReactionPreviewSnapshot,
        _restoreReactionPreviewSnapshot,
        _restoreReactionPreviewSource,
        _prepareReactionPreviewEditTargets,
        _prepareReactionPreviewBondEditTarget,
        _prepareReactionPreviewEraseTargets,
        _hasReactionPreview,
        _isReactionPreviewEditableAtomId,
        _reaction2dSourceAtomId,
        _reaction2dProductGeometries,
        _reaction2dArrowEndpoints,
        _centerReaction2dPairCoords,
        _spreadReaction2dProductComponents,
        _alignReaction2dProductOrientation,
        _drawReactionPreviewArrow2d,
        _renderReactionPreviewArrowForce,
        _reapplyActiveReactionPreview,
        updateReactionTemplatesPanel,
        _viewportFitPadding
      } from './src/app/render/reaction-2d.js';
      import {
        initResonancePanel,
        updateResonancePanel,
        clearResonancePanelState,
        resetActiveResonanceView,
        prepareResonanceStateForStructuralEdit,
        prepareResonanceUndoSnapshot,
        restoreResonanceViewSnapshot
      } from './src/app/render/resonance.js';
      import { initBondEnPanel, updateBondEnPanel, clearBondEnPanel, getBondEnOverlayData } from './src/app/render/bond-en-polarity.js';
      import { createNavigationActions, initNavigationInteractions } from './src/app/interactions/navigation.js';
      import { createSelectionActions } from './src/app/interactions/selection.js';
      import { createDrawBondPreviewActions } from './src/app/interactions/draw-bond-preview.js';
      import { initGestureInteractions, isAdditiveSelectionEvent } from './src/app/interactions/gesture-layer.js';
      import { createPrimitiveSelectionActions } from './src/app/interactions/primitives.js';
      import { createPrimitiveEventHandlers } from './src/app/interactions/primitive-events.js';
      import { initKeyboardInteractions } from './src/app/interactions/keyboard.js';
      const {
        WEDGE_HALF_W,
        WEDGE_DASHES,
        perpUnit,
        shortenLine,
        secondaryDir,
        labelHalfW,
        labelHalfH,
        labelTextOffset,
        formatChargeLabel,
        chargeBadgeMetrics,
        computeChargeBadgePlacement,
        getAtomLabel,
        computeLonePairDotPositions,
        syncDisplayStereo,
        flipDisplayStereo,
        stereoBondCenterIdForRender,
        kekulize
      } = mol2dHelpers;

      const atomBBox =
        mol2dHelpers.atomBBox ??
        function atomBBoxFallback(atoms) {
          let minX = Infinity,
            maxX = -Infinity,
            minY = Infinity,
            maxY = -Infinity;
          for (const a of atoms) {
            if (a.x < minX) minX = a.x;
            if (a.x > maxX) maxX = a.x;
            if (a.y < minY) minY = a.y;
            if (a.y > maxY) maxY = a.y;
          }
          return {
            minX,
            maxX,
            minY,
            maxY,
            cx: (minX + maxX) / 2,
            cy: (minY + maxY) / 2
          };
        };

      // ---------------------------------------------------------------------------
      // Shared state
      // ---------------------------------------------------------------------------
      let mode = '2d'; // 'force' | '2d'
      let currentMol = null;
      let currentSmiles = null;
      let currentInchi = null;
      let rotationDeg = 0;
      let flipH = false; // mirror about vertical axis (x → -x)
      let flipV = false; // mirror about horizontal axis (y → -y)
      let appController = null;
      let sessionUiState = null;
      let sessionSnapshotManager = null;
      const VALENCE_WARNING_FILL = 'rgba(214, 48, 49, 0.3)';
      let _activeValenceWarningMap = new Map();
      let _selectionValenceTooltipAtomId = null;

      function valenceWarningMapFor(molecule) {
        if (!getRenderOptions().showValenceWarnings) {
          return new Map();
        }
        return new Map(validateValence(molecule).map(warning => [warning.atomId, warning]));
      }

      // ---------------------------------------------------------------------------
      // D3 SVG setup (shared by both modes)
      // ---------------------------------------------------------------------------
      const plotEl = document.getElementById('plot');
      const tooltip = d3.select('#atom-tooltip');

      // EN label color: black at t=0 (nonpolar) → vivid orange-red at t=1 (most polar)
      function _enLabelColor(t) {
        const f = Math.max(0, Math.min(1, t));
        return `rgb(${Math.round(50 + 180 * f)},${Math.round(50 - 30 * f)},${Math.round(50 - 40 * f)})`;
      }
      const inputEl = document.getElementById('smiles-input');
      const collectionSelectEl = document.getElementById('collection-select');

      plotEl.addEventListener('selectstart', event => {
        event.preventDefault();
      });

      const svg = d3.select('#plot').append('svg').attr('class', 'svg-plot labels-hidden');

      svg.append('rect').attr('fill', 'white').attr('width', '100%').attr('height', '100%');

      const g = svg.append('g');

      const zoom = d3
        .zoom()
        .scaleExtent([0.05, 30])
        .filter(event => {
          if (event.type === 'wheel') return true;
          // In selection mode: block drag-to-pan on background
          // so mousedown starts rubber-band selection instead.
          // Scroll-to-zoom and pinch-zoom are unaffected.
          if (
            (_selectMode || _drawBondMode || _eraseMode) &&
            (mode === '2d' || mode === 'force') &&
            (event.type === 'mousedown' || event.type === 'dblclick') &&
            event.button === 0
          ) {
            return false;
          }
          return !event.ctrlKey && !event.button;
        })
        .on('zoom', event => {
          if (mode === 'force' && event.sourceEvent) {
            _forceAutoFitEnabled = false;
            _disableForceKeepInView();
          }
          g.attr('transform', event.transform);
        });

      svg.call(zoom);

      // ---------------------------------------------------------------------------
      // ══ RUBBER-BAND SELECTION (2D mode) ═══════════════════════════════════════
      // ---------------------------------------------------------------------------

      function _isAdditiveSelectionEvent(event) {
        return isAdditiveSelectionEvent(event);
      }

      document.addEventListener('mousemove', event => {
        const warningHoverMode = _selectMode || (_drawBondMode && !_drawBondState) || _eraseMode;
        if (!warningHoverMode || (mode !== '2d' && mode !== 'force')) {
          if (_selectionValenceTooltipAtomId !== null) {
            _selectionValenceTooltipAtomId = null;
            tooltip.interrupt().style('opacity', 0);
          }
          return;
        }

        const mol = mode === 'force' ? currentMol : _mol2d;
        if (!getRenderOptions().showAtomTooltips || !mol || _activeValenceWarningMap.size === 0) {
          if (_selectionValenceTooltipAtomId !== null) {
            _selectionValenceTooltipAtomId = null;
            tooltip.interrupt().style('opacity', 0);
          }
          return;
        }

        let atomId = null;
        for (const el of document.elementsFromPoint(event.clientX, event.clientY)) {
          if (el.classList?.contains('node')) {
            const datum = d3.select(el).datum();
            atomId = datum?.id ?? null;
            if (atomId) break;
          }
          const atomHitGroup = el.classList?.contains('atom-hit') ? el.closest('[data-atom-id]') : el.closest?.('[data-atom-id]');
          atomId = atomHitGroup?.getAttribute?.('data-atom-id') ?? null;
          if (atomId) break;
        }

        const valenceWarning = atomId ? (_activeValenceWarningMap.get(atomId) ?? null) : null;
        const atom = atomId ? (mol.atoms.get(atomId) ?? null) : null;
        if (!atom || !valenceWarning) {
          if (_selectionValenceTooltipAtomId !== null) {
            _selectionValenceTooltipAtomId = null;
            tooltip.interrupt().style('opacity', 0);
          }
          return;
        }

        _selectionValenceTooltipAtomId = atomId;
        tooltip
          .interrupt()
          .style('opacity', 0.9)
          .html(atomTooltipHtml(atom, mol, valenceWarning, mode === 'force' ? 'force' : '2d'))
          .style('left', event.clientX + 13 + 'px')
          .style('top', event.clientY - 20 + 'px');
      });

      // ---------------------------------------------------------------------------
      // ══ FORCE LAYOUT ══════════════════════════════════════════════════════════
      // ---------------------------------------------------------------------------

      function convertMolecule(molecule) {
        const atomEntries = [...molecule.atoms.entries()];
        const idToIndex = new Map(atomEntries.map(([id], i) => [id, i]));

        const nodes = atomEntries.map(([id, atom]) => ({
          id,
          name: atom.name,
          protons: atom.properties.protons,
          charge: atom.getCharge(),
          aromatic: atom.isAromatic(),
          anchorX: null,
          anchorY: null
        }));

        const links = [...molecule.bonds.values()].map(bond => ({
          id: bond.id,
          source: idToIndex.get(bond.atoms[0]),
          target: idToIndex.get(bond.atoms[1]),
          order: renderBondOrder(bond),
          aromatic: bond.properties.aromatic ?? false
        }));

        return { nodes, links };
      }

      const FORCE_LAYOUT_BOND_LENGTH = 41;
      const FORCE_LAYOUT_H_BOND_LENGTH = 20;
      const FORCE_LAYOUT_MULTIPLE_BOND_FACTOR = 0.93;
      const FORCE_LAYOUT_AROMATIC_BOND_FACTOR = 0.96;
      const FORCE_LAYOUT_HEAVY_ANCHOR_RADIUS = 18;
      const FORCE_LAYOUT_HEAVY_ANCHOR_STRENGTH = 0.22;
      const FORCE_LAYOUT_HEAVY_REPULSION = -55;
      const FORCE_LAYOUT_H_REPULSION = -25;
      const FORCE_LAYOUT_HH_REPULSION_DISTANCE = 40;
      const FORCE_LAYOUT_HH_REPULSION_STRENGTH = 30.0;
      const FORCE_LAYOUT_FIT_PAD = 40;
      const FORCE_LAYOUT_INITIAL_FIT_PAD = 14;
      const FORCE_LAYOUT_INITIAL_H_RADIUS_SCALE = 0.4;
      const FORCE_LAYOUT_INITIAL_ZOOM_MULTIPLIER = 1.3;
      const FORCE_LAYOUT_KEEP_IN_VIEW_ALPHA_MIN = 0.08;
      const FORCE_LAYOUT_INITIAL_KEEP_IN_VIEW_TICKS = 8;
      const FORCE_LAYOUT_EDIT_KEEP_IN_VIEW_TICKS = 24;

      function _isHydrogenNode(node) {
        return node?.name === 'H';
      }

      function _forceLinkDistance(link) {
        const source = typeof link.source === 'object' ? link.source : null;
        const target = typeof link.target === 'object' ? link.target : null;
        let distance = _isHydrogenNode(source) || _isHydrogenNode(target) ? FORCE_LAYOUT_H_BOND_LENGTH : FORCE_LAYOUT_BOND_LENGTH;

        if (link.order === 3) distance *= FORCE_LAYOUT_MULTIPLE_BOND_FACTOR * 0.92;
        else if (link.order === 2) distance *= FORCE_LAYOUT_MULTIPLE_BOND_FACTOR;
        else if (link.order === 1.5) distance *= FORCE_LAYOUT_AROMATIC_BOND_FACTOR;

        return distance;
      }

      function _forceAnchorRadius(radius = FORCE_LAYOUT_HEAVY_ANCHOR_RADIUS, strength = FORCE_LAYOUT_HEAVY_ANCHOR_STRENGTH) {
        let nodes = [];
        function force(alpha) {
          for (const node of nodes) {
            if (_isHydrogenNode(node)) continue;
            if (!Number.isFinite(node.anchorX) || !Number.isFinite(node.anchorY)) continue;
            if (node.fx != null || node.fy != null) continue;
            const dx = node.x - node.anchorX;
            const dy = node.y - node.anchorY;
            const dist = Math.hypot(dx, dy);
            if (!(dist > radius)) continue;
            const excess = dist - radius;
            const inv = 1 / dist;
            const pull = excess * strength * alpha;
            node.vx -= dx * inv * pull;
            node.vy -= dy * inv * pull;
          }
        }
        force.initialize = _nodes => {
          nodes = _nodes;
        };
        return force;
      }

      function _forceHydrogenRepulsion(maxDistance = FORCE_LAYOUT_HH_REPULSION_DISTANCE, strength = FORCE_LAYOUT_HH_REPULSION_STRENGTH) {
        let nodes = [];
        const maxDistanceSq = maxDistance * maxDistance;
        function force(alpha) {
          const hydrogens = nodes.filter(node => _isHydrogenNode(node) && node.fx == null && node.fy == null);
          for (let i = 0; i < hydrogens.length; i++) {
            const a = hydrogens[i];
            if (!Number.isFinite(a.x) || !Number.isFinite(a.y)) continue;
            for (let j = i + 1; j < hydrogens.length; j++) {
              const b = hydrogens[j];
              if (!Number.isFinite(b.x) || !Number.isFinite(b.y)) continue;
              let dx = b.x - a.x;
              let dy = b.y - a.y;
              let distSq = dx * dx + dy * dy;
              if (distSq >= maxDistanceSq) continue;
              if (distSq < 1e-6) {
                dx = 1e-3;
                dy = 0;
                distSq = dx * dx;
              }
              const dist = Math.sqrt(distSq);
              const overlap = (maxDistance - dist) / maxDistance;
              const push = overlap * strength * alpha;
              const ux = dx / dist;
              const uy = dy / dist;
              a.vx -= ux * push;
              a.vy -= uy * push;
              b.vx += ux * push;
              b.vy += uy * push;
            }
          }
        }
        force.initialize = _nodes => {
          nodes = _nodes;
        };
        return force;
      }

      function _forceFitTransform(nodes, pad = FORCE_LAYOUT_FIT_PAD, { hydrogenRadiusScale = 1, scaleMultiplier = 1, maxScale = 30 } = {}) {
        if (!nodes?.length) return null;
        let minX = Infinity,
          maxX = -Infinity,
          minY = Infinity,
          maxY = -Infinity;
        for (const node of nodes) {
          const r = atomRadius(node.protons) * (_isHydrogenNode(node) ? hydrogenRadiusScale : 1);
          if (node.x - r < minX) minX = node.x - r;
          if (node.x + r > maxX) maxX = node.x + r;
          if (node.y - r < minY) minY = node.y - r;
          if (node.y + r > maxY) maxY = node.y + r;
        }
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;
        const pads = _viewportFitPadding(pad);
        const horizontalPad = Math.max(pad, (pads.left + pads.right) / 2);
        const verticalPad = Math.max(pad, (pads.top + pads.bottom) / 2);
        const fitWidth = Math.max(1, W - horizontalPad * 2);
        const fitHeight = Math.max(1, H - verticalPad * 2);
        const exactFitScale = Math.min(fitWidth / (maxX - minX || 1), fitHeight / (maxY - minY || 1), maxScale);
        const scale = exactFitScale < 1 ? exactFitScale : Math.min(scaleMultiplier, exactFitScale, maxScale);
        const centerX = W / 2;
        const centerY = H / 2;
        const tx = centerX - ((minX + maxX) / 2) * scale;
        const ty = centerY - ((minY + maxY) / 2) * scale;
        return d3.zoomIdentity.translate(tx, ty).scale(scale);
      }

      function _zoomTransformsDiffer(a, b, epsilon = 0.001) {
        if (!a || !b) {
          return true;
        }
        return Math.abs(a.k - b.k) > epsilon || Math.abs(a.x - b.x) > epsilon || Math.abs(a.y - b.y) > epsilon;
      }

      function _normalizeAngle(theta) {
        let angle = theta % (Math.PI * 2);
        if (angle < 0) angle += Math.PI * 2;
        return angle;
      }

      function _chooseOpenAngles(occupiedAngles, count) {
        if (count <= 0) return [];
        if (!occupiedAngles.length) {
          return Array.from({ length: count }, (_, index) => (Math.PI * 2 * index) / count);
        }

        const working = occupiedAngles.map(_normalizeAngle);
        const chosen = [];
        for (let i = 0; i < count; i++) {
          const sorted = [...working].sort((a, b) => a - b);
          let bestAngle = sorted[0];
          let bestGap = -1;
          for (let idx = 0; idx < sorted.length; idx++) {
            const start = sorted[idx];
            const end = idx === sorted.length - 1 ? sorted[0] + Math.PI * 2 : sorted[idx + 1];
            const gap = end - start;
            if (gap > bestGap) {
              bestGap = gap;
              bestAngle = _normalizeAngle(start + gap / 2);
            }
          }
          working.push(bestAngle);
          chosen.push(bestAngle);
        }
        return chosen;
      }

      function _placeHydrogensAroundParent(parentNode, hydrogens, links, { distance = FORCE_LAYOUT_H_BOND_LENGTH, excludeIds = null, nodes = null } = {}) {
        if (!parentNode || !Number.isFinite(parentNode.x) || !Number.isFinite(parentNode.y) || hydrogens.length === 0) return;
        const excluded = excludeIds ?? new Set();
        const occupiedAngles = [];
        for (const link of links) {
          const source = typeof link.source === 'object' ? link.source : Array.isArray(nodes) ? nodes[link.source] : null;
          const target = typeof link.target === 'object' ? link.target : Array.isArray(nodes) ? nodes[link.target] : null;
          if (source !== parentNode && target !== parentNode) continue;
          const other = source === parentNode ? target : source;
          if (!other || excluded.has(other.id)) continue;
          if (!Number.isFinite(other.x) || !Number.isFinite(other.y)) continue;
          occupiedAngles.push(Math.atan2(other.y - parentNode.y, other.x - parentNode.x));
        }
        const angles = _chooseOpenAngles(occupiedAngles, hydrogens.length);
        hydrogens.forEach((hydrogenNode, index) => {
          const angle = angles[index] ?? (Math.PI * 2 * index) / hydrogens.length;
          hydrogenNode.x = parentNode.x + Math.cos(angle) * distance;
          hydrogenNode.y = parentNode.y + Math.sin(angle) * distance;
          // Anchor the H at its placed position so orientationPointForForceAtom
          // uses a stable reference when computing lone-pair occupied angles on
          // the parent. Without this, H positions change every tick and cause
          // the parent's lone-pair directions to drift (visible as flickering).
          hydrogenNode.anchorX = hydrogenNode.x;
          hydrogenNode.anchorY = hydrogenNode.y;
        });
      }

      function _buildForceAnchorLayout(molecule) {
        const seedMol = molecule.clone();
        seedMol.hideHydrogens();
        generateAndRefine2dCoords(seedMol, {
          suppressH: true,
          bondLength: 1.5
        });
        _alignReaction2dProductOrientation(seedMol);
        _spreadReaction2dProductComponents(seedMol, 1.5);
        _centerReaction2dPairCoords(seedMol, 1.5);
        const anchors = new Map();
        for (const [id, atom] of seedMol.atoms) {
          if (atom.name === 'H' || atom.visible === false) continue;
          if (!Number.isFinite(atom.x) || !Number.isFinite(atom.y)) continue;
          anchors.set(id, { x: atom.x, y: atom.y });
        }
        return anchors;
      }

      function _seedForceNodePositions(graph, molecule, anchorLayout, { previousNodePositions = null } = {}) {
        const W0 = plotEl.clientWidth || 600;
        const H0 = plotEl.clientHeight || 400;
        const anchorEntries = [...anchorLayout.values()];
        const idToNode = new Map(graph.nodes.map(node => [node.id, node]));

        if (anchorEntries.length > 0) {
          let cx2d = 0;
          let cy2d = 0;
          for (const pos of anchorEntries) {
            cx2d += pos.x;
            cy2d += pos.y;
          }
          cx2d /= anchorEntries.length;
          cy2d /= anchorEntries.length;

          for (const [id, pos] of anchorLayout) {
            const node = idToNode.get(id);
            if (!node) continue;
            node.anchorX = W0 / 2 + (pos.x - cx2d) * (FORCE_LAYOUT_BOND_LENGTH / 1.5);
            node.anchorY = H0 / 2 - (pos.y - cy2d) * (FORCE_LAYOUT_BOND_LENGTH / 1.5);
            node.x = node.anchorX;
            node.y = node.anchorY;
          }
        }

        const hydrogenGroups = new Map();
        for (const bond of graph.links) {
          const source = graph.nodes[bond.source];
          const target = graph.nodes[bond.target];
          if (_isHydrogenNode(source) && !_isHydrogenNode(target)) {
            if (!hydrogenGroups.has(target.id)) hydrogenGroups.set(target.id, []);
            hydrogenGroups.get(target.id).push(source);
          } else if (_isHydrogenNode(target) && !_isHydrogenNode(source)) {
            if (!hydrogenGroups.has(source.id)) hydrogenGroups.set(source.id, []);
            hydrogenGroups.get(source.id).push(target);
          }
        }

        for (const [parentId, hydrogens] of hydrogenGroups) {
          const parentNode = idToNode.get(parentId);
          _placeHydrogensAroundParent(parentNode, hydrogens, graph.links, {
            distance: FORCE_LAYOUT_H_BOND_LENGTH,
            excludeIds: new Set(hydrogens.map(node => node.id)),
            nodes: graph.nodes
          });
        }

        if (previousNodePositions) {
          for (const node of graph.nodes) {
            const previous = previousNodePositions.get(node.id);
            if (!previous) continue;
            node.x = previous.x;
            node.y = previous.y;
            node.vx = previous.vx;
            node.vy = previous.vy;
            node.fx = previous.fx;
            node.fy = previous.fy;
            node.anchorX = Number.isFinite(previous.anchorX) ? previous.anchorX : node.anchorX;
            node.anchorY = Number.isFinite(previous.anchorY) ? previous.anchorY : node.anchorY;
            if (!_isHydrogenNode(node) && !Number.isFinite(node.anchorX) && Number.isFinite(previous.x) && Number.isFinite(previous.y)) {
              node.anchorX = previous.x;
              node.anchorY = previous.y;
            }
          }

          for (const link of graph.links) {
            const source = graph.nodes[link.source];
            const target = graph.nodes[link.target];
            const sourcePlaced = Number.isFinite(source?.x) && Number.isFinite(source?.y);
            const targetPlaced = Number.isFinite(target?.x) && Number.isFinite(target?.y);
            if (sourcePlaced && !targetPlaced) {
              target.x = source.x;
              target.y = source.y;
            } else if (targetPlaced && !sourcePlaced) {
              source.x = target.x;
              source.y = target.y;
            }
            if (sourcePlaced && !Number.isFinite(target?.anchorX) && !_isHydrogenNode(target)) {
              target.anchorX = source.x;
              target.anchorY = source.y;
            } else if (targetPlaced && !Number.isFinite(source?.anchorX) && !_isHydrogenNode(source)) {
              source.anchorX = target.x;
              source.anchorY = target.y;
            }
          }
        }
      }

      function _patchForceNodePositions(patchPos, { setAnchors = true, alpha = 0.18 } = {}) {
        if (!patchPos?.size) return;
        for (const node of simulation.nodes()) {
          const p = patchPos.get(node.id);
          if (!p) continue;
          if (Number.isFinite(p.x)) node.x = p.x;
          if (Number.isFinite(p.y)) node.y = p.y;
          node.vx = 0;
          node.vy = 0;
          if (setAnchors && !_isHydrogenNode(node) && Number.isFinite(node.x) && Number.isFinite(node.y)) {
            node.anchorX = node.x;
            node.anchorY = node.y;
          }
        }
        simulation.alpha(Math.max(simulation.alpha(), alpha)).restart();
      }

      // Re-seats hydrogen nodes around patched parent positions so they spawn near their
      // parent instead of at the stale anchor-layout position after _patchForceNodePositions.
      function _reseatHydrogensAroundPatched(patchPos) {
        if (!patchPos?.size) return;
        const allNodes = simulation.nodes();
        const allLinks = simulation.force('link').links();
        const nodeById = new Map(allNodes.map(n => [n.id, n]));
        for (const [parentId] of patchPos) {
          const parentNode = nodeById.get(parentId);
          if (!parentNode || !Number.isFinite(parentNode.x)) continue;
          const hChildren = allLinks
            .map(l => (l.source?.id === parentId && _isHydrogenNode(l.target) ? l.target : l.target?.id === parentId && _isHydrogenNode(l.source) ? l.source : null))
            .filter(Boolean);
          if (hChildren.length > 0) {
            _placeHydrogensAroundParent(parentNode, hChildren, allLinks, {
              distance: FORCE_LAYOUT_H_BOND_LENGTH,
              excludeIds: new Set(hChildren.map(n => n.id))
            });
          }
        }
      }

      function createDrag(sim) {
        return dragGestureActions.createForceAtomDrag(sim);
      }

      const simulation = d3
        .forceSimulation()
        .force(
          'charge',
          d3
            .forceManyBody()
            .strength(node => (_isHydrogenNode(node) ? FORCE_LAYOUT_H_REPULSION : FORCE_LAYOUT_HEAVY_REPULSION))
            .distanceMax(180)
        )
        .force(
          'link',
          d3
            .forceLink()
            .strength(link => (_isHydrogenNode(link.source) || _isHydrogenNode(link.target) ? 0.8 : 0.9))
            .distance(_forceLinkDistance)
        )
        .force('anchor', _forceAnchorRadius())
        .force('hRepel', _forceHydrogenRepulsion())
        .velocityDecay(0.35)
        .alphaDecay(0.02)
        .stop();

      function updateForce(molecule, { preservePositions = false, preserveView = preservePositions } = {}) {
        prepareAromaticBondRendering(molecule);
        const { showLonePairs } = getRenderOptions();
        const valenceWarningMap = valenceWarningMapFor(molecule);
        _activeValenceWarningMap = valenceWarningMap;
        _forceAutoFitEnabled = !preserveView;
        _disableForceKeepInView();

        const previousNodePositions = preservePositions
          ? new Map(
              simulation.nodes().map(node => [
                node.id,
                {
                  x: node.x,
                  y: node.y,
                  vx: node.vx,
                  vy: node.vy,
                  fx: node.fx,
                  fy: node.fy,
                  anchorX: node.anchorX,
                  anchorY: node.anchorY
                }
              ])
            )
          : null;
        const previousZoomTransform = preserveView ? d3.zoomTransform(svg.node()) : null;

        const anchorLayout = _buildForceAnchorLayout(molecule);
        if (_preserveSelectionOnNextRender) _syncSelectionToMolecule(molecule);
        else {
          _selectedAtomIds.clear();
          _selectedBondIds.clear();
        }
        _preserveSelectionOnNextRender = false;

        const graph = convertMolecule(molecule);
        g.selectAll('*').remove();
        _forceSelLines = null;
        _forceSelCircles = null;
        _forceValenceWarningCircles = null;
        _fgHlLines = null;
        _fgHlCircles = null;

        // Reset zoom to identity for force layout
        if (!preserveView) {
          svg.call(zoom.transform, d3.zoomIdentity);
        }

        const bondEnter = g
          .selectAll('line.link-base')
          .data(graph.links, d => d.id)
          .enter();

        const valenceWarningNodes = graph.nodes.filter(node => valenceWarningMap.has(node.id));
        _forceValenceWarningCircles = g
          .append('g')
          .attr('class', 'valence-warning-layer')
          .style('pointer-events', 'none')
          .selectAll('circle.valence-warning')
          .data(valenceWarningNodes, d => d.id)
          .enter()
          .append('circle')
          .attr('class', 'valence-warning')
          .attr('r', d => atomRadius(d.protons) + 6)
          .attr('fill', VALENCE_WARNING_FILL)
          .attr('stroke', 'none');

        const singleBond = bondEnter
          .append('line')
          .filter(d => d.order === 1 || d.order === 2 || d.order === 3)
          .attr('class', 'link')
          .attr('data-bond-id', d => d.id)
          .style('stroke-width', d => singleBondWidth(d.order));

        const doubleSep = bondEnter
          .append('line')
          .filter(d => d.order === 2)
          .attr('class', 'separator')
          .attr('data-bond-id', d => d.id)
          .style('stroke', PI_STROKE.stroke)
          .style('stroke-width', PI_STROKE.width);

        const aroBond1 = bondEnter
          .append('line')
          .filter(d => d.order === 1.5)
          .attr('class', 'link separator')
          .attr('data-bond-id', d => d.id)
          .style('stroke', ARO_STROKE.stroke)
          .style('stroke-width', ARO_STROKE.width);

        const aroBond2 = bondEnter
          .append('line')
          .filter(d => d.order === 1.5)
          .attr('class', 'link separator')
          .attr('data-bond-id', d => d.id)
          .style('stroke', ARO_STROKE.stroke)
          .style('stroke-width', ARO_STROKE.width)
          .style('stroke-dasharray', ARO_STROKE.dashArray);

        const tripleSep1 = bondEnter
          .append('line')
          .filter(d => d.order === 3)
          .attr('class', 'separator')
          .attr('data-bond-id', d => d.id)
          .style('stroke', PI_STROKE.stroke)
          .style('stroke-width', PI_STROKE.width);

        const tripleSep2 = bondEnter
          .append('line')
          .filter(d => d.order === 3)
          .attr('class', 'separator')
          .attr('data-bond-id', d => d.id)
          .style('stroke', PI_STROKE.stroke)
          .style('stroke-width', PI_STROKE.width);

        const bondHoverTarget = bondEnter
          .append('line')
          .attr('class', 'bond-hover-target')
          .style('stroke', 'transparent')
          .style('stroke-width', '14px')
          .style('pointer-events', 'stroke')
          .style('cursor', 'grab')
          .on('click', (event, d) => {
            primitiveEventHandlers.handleForceBondClick(event, d.id, molecule);
          })
          .on('dblclick', (event, d) => {
            const bond = molecule.bonds.get(d.id);
            if (!bond) return;
            primitiveEventHandlers.handleForceBondDblClick(event, bond.atoms);
          })
          .on('mouseover', (event, d) => {
            primitiveEventHandlers.handleForceBondMouseOver(event, d.id, molecule);
          })
          .on('mousemove', event => primitiveEventHandlers.handleForceBondMouseMove(event))
          .on('mouseout', () => {
            primitiveEventHandlers.handleForceBondMouseOut();
          })
          .call(dragGestureActions.createForceBondDrag(simulation, molecule));

        const atom = g
          .selectAll('circle.node')
          .data(graph.nodes, d => d.id)
          .enter()
          .append('circle')
          .attr('class', 'node')
          .attr('r', d => atomRadius(d.protons))
          .attr('fill', d => atomColor(d.name, 'force'))
          .attr('stroke', d => strokeColor(d.name))
          .attr('stroke-width', 1)
          .call(createDrag(simulation))
          .on('mousedown.drawbond', function (event, d) {
            primitiveEventHandlers.handleForceAtomMouseDownDrawBond(event, d);
          })
          .on('click', (event, d) => {
            primitiveEventHandlers.handleForceAtomClick(event, d, molecule);
          })
          .on('dblclick', (event, d) => {
            primitiveEventHandlers.handleForceAtomDblClick(event, d.id);
          })
          .on('mouseover', (event, d) => {
            primitiveEventHandlers.handleForceAtomMouseOver(event, d, molecule, valenceWarningMap.get(d.id) ?? null);
          })
          .on('mousemove', event => primitiveEventHandlers.handleForceAtomMouseMove(event))
          .on('mouseout', (event, d) => {
            primitiveEventHandlers.handleForceAtomMouseOut(d.id);
          });

        const atomSymbol = g
          .selectAll('text.atom-symbol')
          .data(graph.nodes, d => d.id)
          .enter()
          .append('text')
          .attr('class', 'atom-symbol')
          .attr('pointer-events', 'none')
          .attr('text-anchor', 'middle')
          .attr('dominant-baseline', 'central')
          .attr('font-family', 'Arial, Helvetica, sans-serif')
          .attr('font-weight', 'bold')
          .attr('font-size', d => (d.name.length > 1 ? '7px' : '9px'))
          .attr('fill', d => {
            if (d.name === 'H') {
              return '#111';
            }
            const hex = atomColor(d.name, 'force');
            // Use white text on dark atoms, dark text on light atoms
            const cr = parseInt(hex.slice(1, 3), 16),
              cg = parseInt(hex.slice(3, 5), 16),
              cb = parseInt(hex.slice(5, 7), 16);
            return cr * 0.299 + cg * 0.587 + cb * 0.114 > 140 ? '#333' : '#fff';
          })
          .text(d => d.name);

        const forceLonePairLayer = showLonePairs ? g.append('g').attr('class', 'force-lone-pairs').style('pointer-events', 'none') : null;

        const forceChargeFontSize = 11;
        const chargeLabel = g
          .selectAll('g.charge-label')
          .data(
            graph.nodes.filter(d => d.charge !== 0),
            d => d.id
          )
          .enter()
          .append('g')
          .attr('class', 'charge-label')
          .attr('pointer-events', 'none');
        chargeLabel
          .append('circle')
          .attr('class', 'charge-label-ring')
          .attr('r', d => chargeBadgeMetrics(formatChargeLabel(d.charge), forceChargeFontSize).radius)
          .attr('fill', 'white')
          .attr('stroke', '#111')
          .attr('stroke-width', 0.9);
        chargeLabel
          .append('text')
          .attr('class', 'charge-label-text')
          .attr('font-family', 'Arial, Helvetica, sans-serif')
          .attr('font-size', d => `${chargeBadgeMetrics(formatChargeLabel(d.charge), forceChargeFontSize).fontSize}px`)
          .attr('font-weight', '700')
          .attr('fill', '#111')
          .attr('text-anchor', 'middle')
          .attr('dominant-baseline', 'central')
          .text(d => formatChargeLabel(d.charge));

        const forceNodeById = new Map(graph.nodes.map(node => [node.id, node]));
        const forceLonePairDotsByAtomId = new Map();
        const forceChargeAngleByAtomId = new Map();
        const pointForForceAtom = atom => {
          const node = forceNodeById.get(atom?.id);
          if (!node || !Number.isFinite(node.x) || !Number.isFinite(node.y)) {
            return null;
          }
          return { x: node.x, y: node.y };
        };
        const orientationPointForForceAtom = atom => {
          const node = forceNodeById.get(atom?.id);
          if (!node) {
            return null;
          }
          if (Number.isFinite(node.anchorX) && Number.isFinite(node.anchorY)) {
            return { x: node.anchorX, y: node.anchorY };
          }
          if (Number.isFinite(node.x) && Number.isFinite(node.y)) {
            return { x: node.x, y: node.y };
          }
          return null;
        };

        function _forceLonePairDotsForAtom(atom) {
          if (!showLonePairs || atom.name === 'H') {
            return [];
          }
          const cached = forceLonePairDotsByAtomId.get(atom.id);
          if (cached) {
            return cached;
          }
          const node = forceNodeById.get(atom.id);
          if (!node) {
            return [];
          }
          const dots = computeLonePairDotPositions(atom, molecule, {
            pointForAtom: pointForForceAtom,
            orientationPointForAtom: orientationPointForForceAtom,
            baseRadius: atomRadius(node.protons, 'force'),
            offsetFromBoundary: 7,
            dotSpacing: 6
          });
          forceLonePairDotsByAtomId.set(atom.id, dots);
          return dots;
        }

        function _updateForceLonePairs() {
          if (!forceLonePairLayer) {
            return;
          }
          forceLonePairDotsByAtomId.clear();
          const dots = [];
          for (const atom of molecule.atoms.values()) {
            const atomDots = _forceLonePairDotsForAtom(atom);
            for (let i = 0; i < atomDots.length; i++) {
              dots.push({ id: `${atom.id}:${i}`, ...atomDots[i] });
            }
          }

          const lonePairDots = forceLonePairLayer.selectAll('circle.force-lone-pair').data(dots, d => d.id);
          lonePairDots
            .enter()
            .append('circle')
            .attr('class', 'force-lone-pair')
            .attr('r', 2.1)
            .attr('fill', '#f0d84d')
            .attr('stroke', '#111111')
            .attr('stroke-width', 0.7)
            .merge(lonePairDots)
            .attr('cx', d => d.x)
            .attr('cy', d => d.y);
          lonePairDots.exit().remove();
        }

        function _updateForceChargeLabels() {
          chargeLabel.attr('transform', d => {
            const atom = molecule.atoms.get(d.id);
            if (!atom) {
              return 'translate(-9999,-9999)';
            }
            const center = pointForForceAtom(atom);
            if (!center) {
              return 'translate(-9999,-9999)';
            }
            const placement = computeChargeBadgePlacement(atom, molecule, {
              pointForAtom: pointForForceAtom,
              orientationPointForAtom: orientationPointForForceAtom,
              baseRadius: atomRadius(d.protons, 'force'),
              fontSize: forceChargeFontSize,
              chargeLabel: formatChargeLabel(d.charge),
              stickyAngle: forceChargeAngleByAtomId.get(atom.id) ?? null,
              extraOccupiedAngles: _forceLonePairDotsForAtom(atom)
                .map(dot => Math.atan2(dot.y - center.y, dot.x - center.x))
                .filter(Number.isFinite)
            });
            if (placement) {
              forceChargeAngleByAtomId.set(atom.id, placement.angle);
            }
            return placement ? `translate(${placement.x},${placement.y})` : 'translate(-9999,-9999)';
          });
        }

        _seedForceNodePositions(graph, molecule, anchorLayout, {
          previousNodePositions
        });

        simulation.nodes(graph.nodes);
        simulation.force('link').links(graph.links);
        simulation
          .force('charge')
          .strength(node => (_isHydrogenNode(node) ? FORCE_LAYOUT_H_REPULSION : FORCE_LAYOUT_HEAVY_REPULSION))
          .distanceMax(180);
        simulation
          .force('link')
          .strength(link => (_isHydrogenNode(link.source) || _isHydrogenNode(link.target) ? 0.8 : 0.9))
          .distance(_forceLinkDistance);
        simulation.force('anchor', _forceAnchorRadius());
        simulation.force('hRepel', _forceHydrogenRepulsion());
        simulation.alpha(preservePositions ? 0.2 : 1).restart();
        _updateForceLonePairs();
        _updateForceChargeLabels();

        // Bond electronegativity overlay for force mode
        const _forceEnData = getBondEnOverlayData(molecule);
        const _forceLinkById = new Map(graph.links.map(l => [l.id, l]));
        let _forceBondEnLabels = null;
        if (_forceEnData) {
          const fEnLayer = g.append('g').attr('class', 'force-bond-en').style('pointer-events', 'none');
          const labelData = _forceEnData.map(({ bondId, label, t }) => ({ link: _forceLinkById.get(bondId), label, t })).filter(d => d.link);
          _forceBondEnLabels = fEnLayer
            .selectAll('text.force-bond-en-label')
            .data(labelData)
            .enter()
            .append('text')
            .attr('class', 'force-bond-en-label')
            .attr('text-anchor', 'middle')
            .attr('dominant-baseline', 'central')
            .attr('font-size', '10px')
            .attr('pointer-events', 'none')
            .attr('fill', d => _enLabelColor(d.t))
            .text(d => d.label);
        }

        function _updateForceBondEnLabels() {
          if (!_forceBondEnLabels) return;
          _forceBondEnLabels.attr('transform', d => {
            const dx = d.link.target.x - d.link.source.x;
            const dy = d.link.target.y - d.link.source.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const x = (d.link.source.x + d.link.target.x) / 2 + (-dy / len) * 13;
            const y = (d.link.source.y + d.link.target.y) / 2 + (dx / len) * 13;
            return `translate(${x},${y})`;
          });
        }
        _updateForceBondEnLabels();

        simulation.on('tick', () => {
          _renderReactionPreviewArrowForce(graph.nodes);

          singleBond
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

          doubleSep
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

          aroBond1
            .attr('x1', d => d.source.x - xOffset(BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(BOND_OFFSET, d.source, d.target));

          aroBond2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

          tripleSep1
            .attr('x1', d => d.source.x - xOffset(BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(BOND_OFFSET, d.source, d.target));

          tripleSep2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

          bondHoverTarget
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

          atom.attr('cx', d => d.x).attr('cy', d => d.y);
          atomSymbol.attr('x', d => d.x).attr('y', d => d.y);
          if (_forceValenceWarningCircles) {
            _forceValenceWarningCircles.attr('cx', d => d.x).attr('cy', d => d.y);
          }

          _updateForceLonePairs();
          _updateForceChargeLabels();
          _updateForceBondEnLabels();

          // Functional-group highlight layer (cached — avoids DOM query every tick)
          if (_fgHlLines) {
            _fgHlLines
              .attr('x1', d => d.source.x)
              .attr('y1', d => d.source.y)
              .attr('x2', d => d.target.x)
              .attr('y2', d => d.target.y);
            _fgHlCircles.attr('cx', d => d.x).attr('cy', d => d.y);
          }
          if (_forceSelLines) {
            _forceSelLines
              .attr('x1', d => d.source.x)
              .attr('y1', d => d.source.y)
              .attr('x2', d => d.target.x)
              .attr('y2', d => d.target.y);
            _forceSelCircles.attr('cx', d => d.x).attr('cy', d => d.y);
          }

          if (_forceAutoFitEnabled) {
            const fitTransform = _forceFitTransform(graph.nodes, FORCE_LAYOUT_INITIAL_FIT_PAD, {
              hydrogenRadiusScale: FORCE_LAYOUT_INITIAL_H_RADIUS_SCALE,
              scaleMultiplier: FORCE_LAYOUT_INITIAL_ZOOM_MULTIPLIER
            });
            if (fitTransform) {
              svg.call(zoom.transform, fitTransform);
              _forceAutoFitEnabled = false;
              _enableForceKeepInView(FORCE_LAYOUT_INITIAL_KEEP_IN_VIEW_TICKS);
            }
          } else if (_forceKeepInView) {
            if (_forceKeepInViewTicks > 0) {
              _forceKeepInViewTicks -= 1;
              if (_forceKeepInViewTicks <= 0) {
                _disableForceKeepInView();
                return;
              }
            }
            if (simulation.alpha() < FORCE_LAYOUT_KEEP_IN_VIEW_ALPHA_MIN) {
              _disableForceKeepInView();
              return;
            }
            const W = plotEl.clientWidth,
              H = plotEl.clientHeight;
            const PAD = FORCE_LAYOUT_FIT_PAD;
            const t = d3.zoomTransform(svg.node());
            let anyOut = false;
            for (const n of graph.nodes) {
              const r = atomRadius(n.protons);
              const sx1 = t.x + (n.x - r) * t.k,
                sy1 = t.y + (n.y - r) * t.k;
              const sx2 = t.x + (n.x + r) * t.k,
                sy2 = t.y + (n.y + r) * t.k;
              if (sx1 < PAD || sx2 > W - PAD || sy1 < PAD || sy2 > H - PAD) anyOut = true;
            }
            if (anyOut) {
              const fitTransform = _forceFitTransform(graph.nodes, FORCE_LAYOUT_FIT_PAD);
              if (fitTransform) svg.call(zoom.transform, fitTransform);
              _disableForceKeepInView();
            }
          }
        });

        if (preserveView && previousZoomTransform) {
          svg.call(zoom.transform, previousZoomTransform);
        }

        if (getHighlightedAtomIds().size > 0) applyForceHighlights();
        if (_selectedAtomIds.size > 0 || _selectedBondIds.size > 0) applyForceSelection();
      }

      function applyForceHighlights() {
        g.selectAll('g.fg-highlight-layer').remove();
        _fgHlLines = null;
        _fgHlCircles = null;
        if (getHighlightedAtomIds().size === 0) return;

        const highlightStyle = HIGHLIGHT_STYLES[getHighlightStyle()] ?? HIGHLIGHT_STYLES.default;
        const HL_R = 8;
        const OL = 2;
        const hlLayer = g.insert('g', ':first-child').attr('class', 'fg-highlight-layer').attr('opacity', 0.45);

        const nodeMap = new Map(simulation.nodes().map(n => [n.id, n]));
        const allLinks = simulation.force('link').links();

        // Draw each match instance as its own unit so fills cover their own outlines.
        for (const atomSet of getHighlightedAtomSets()) {
          const mLinks = allLinks.filter(l => atomSet.has(l.source.id) && atomSet.has(l.target.id));
          const mNodes = [...atomSet].map(id => nodeMap.get(id)).filter(Boolean);

          const addLines = (stroke, extra) => {
            hlLayer
              .selectAll(null)
              .data(mLinks)
              .enter()
              .append('line')
              .datum(d => d)
              .attr('stroke', stroke)
              .attr('stroke-width', d => Math.min(atomRadius(d.source.protons), atomRadius(d.target.protons)) * 2 + HL_R * 2 + extra * 2)
              .attr('stroke-linecap', 'round')
              .attr('x1', d => d.source.x)
              .attr('y1', d => d.source.y)
              .attr('x2', d => d.target.x)
              .attr('y2', d => d.target.y);
          };
          const addCircles = (fill, extra) => {
            hlLayer
              .selectAll(null)
              .data(mNodes)
              .enter()
              .append('circle')
              .datum(d => d)
              .attr('r', d => atomRadius(d.protons) + HL_R + extra)
              .attr('fill', fill)
              .attr('stroke', 'none')
              .attr('cx', d => d.x)
              .attr('cy', d => d.y);
          };

          addLines(highlightStyle.outline, OL);
          addCircles(highlightStyle.outline, OL); // outline
          addLines(highlightStyle.fill, 0);
          addCircles(highlightStyle.fill, 0); // fill
        }
        _fgHlLines = hlLayer.selectAll('line');
        _fgHlCircles = hlLayer.selectAll('circle');
      }

      function applyForceSelection() {
        g.selectAll('g.force-selection-layer').remove();
        _forceSelLines = null;
        _forceSelCircles = null;
        const { atomIds: activeAtomIds, bondIds: activeBondIds } = _getRenderableSelectionIds();
        if (activeAtomIds.size === 0 && activeBondIds.size === 0) return;

        const SEL_COLOR = 'rgb(150, 200, 255)';
        const SEL_OL = 'rgb(40, 100, 210)';
        const BOND_SEL_R = 6; // extra radius for bond highlight caps
        const ATOM_SEL_R = 13; // larger extra radius so atom circles exceed bond caps
        const OL = 2;
        const selLayer = g.insert('g', ':first-child').attr('class', 'force-selection-layer').attr('opacity', 0.45).style('pointer-events', 'none');

        const selectedNodes = simulation.nodes().filter(node => activeAtomIds.has(node.id));
        const selectedLinks = simulation
          .force('link')
          .links()
          .filter(link => activeBondIds.has(link.id));

        const addLines = (stroke, extra) => {
          selLayer
            .selectAll(null)
            .data(selectedLinks)
            .enter()
            .append('line')
            .datum(d => d)
            .attr('stroke', stroke)
            .attr('stroke-width', d => Math.min(atomRadius(d.source.protons), atomRadius(d.target.protons)) * 2 + BOND_SEL_R * 2 + extra * 2)
            .attr('stroke-linecap', 'round')
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        };
        const addCircles = (fill, extra) => {
          selLayer
            .selectAll(null)
            .data(selectedNodes)
            .enter()
            .append('circle')
            .datum(d => d)
            .attr('r', d => atomRadius(d.protons) + ATOM_SEL_R + extra)
            .attr('fill', fill)
            .attr('stroke', 'none')
            .attr('cx', d => d.x)
            .attr('cy', d => d.y);
        };

        addLines(SEL_OL, OL);
        addCircles(SEL_OL, OL);
        addLines(SEL_COLOR, 0);
        addCircles(SEL_COLOR, 0);
        _forceSelLines = selLayer.selectAll('line');
        _forceSelCircles = selLayer.selectAll('circle');
      }

      function _syncSelectionToMolecule(mol) {
        _selectedAtomIds = new Set([..._selectedAtomIds].filter(id => mol.atoms.has(id)));
        _selectedBondIds = new Set([..._selectedBondIds].filter(id => mol.bonds.has(id)));
      }

      function _redraw2dSelection() {
        g.select('g.atom-selection').remove();
        const { atomIds: activeAtomIds, bondIds: activeBondIds } = _getRenderableSelectionIds();
        if ((activeAtomIds.size === 0 && activeBondIds.size === 0) || !_mol2d) return;

        const mol = _mol2d;
        const hCounts = _hCounts2d;
        const toSVGPt = _toSVGPt2d;
        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);

        const SEL_COLOR = 'rgb(150, 200, 255)';
        const SEL_OL = 'rgb(40,  100, 210)';
        const OL = 2;

        // Insert behind the bond layer (same stacking as fg highlights).
        const selLayer = g.insert('g', 'g.bonds').attr('class', 'atom-selection').attr('opacity', 0.45).style('pointer-events', 'none');

        const BOND_SEL_PAD = 5; // extra px beyond label half-width for bond highlight
        const ATOM_SEL_PAD = 12; // larger pad so atom circles clearly exceed bond caps

        const mBonds = [];
        for (const bond of mol.bonds.values()) {
          if (!activeBondIds.has(bond.id)) continue;
          const [ba1, ba2] = bond.getAtomObjects(mol);
          if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
          if (ba1.visible === false || ba2.visible === false) continue;
          const p1 = toSVGPt(ba1),
            p2 = toSVGPt(ba2);
          const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + BOND_SEL_PAD;
          const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + BOND_SEL_PAD;
          mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
        }
        const mAtoms = [];
        for (const atom of atoms) {
          if (!activeAtomIds.has(atom.id)) continue;
          const { x, y } = toSVGPt(atom);
          const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + ATOM_SEL_PAD;
          mAtoms.push({ x, y, r });
        }

        const addL = (stroke, extra) => {
          for (const { p1, p2, w } of mBonds)
            selLayer
              .append('line')
              .attr('x1', p1.x)
              .attr('y1', p1.y)
              .attr('x2', p2.x)
              .attr('y2', p2.y)
              .attr('stroke', stroke)
              .attr('stroke-width', w + extra * 2)
              .attr('stroke-linecap', 'round');
        };
        const addC = (fill, extra) => {
          for (const { x, y, r } of mAtoms)
            selLayer
              .append('circle')
              .attr('cx', x)
              .attr('cy', y)
              .attr('r', r + extra)
              .attr('fill', fill)
              .attr('stroke', 'none');
        };
        addL(SEL_OL, OL);
        addC(SEL_OL, OL);
        addL(SEL_COLOR, 0);
        addC(SEL_COLOR, 0);
      }

      // ---------------------------------------------------------------------------
      // ══ 2D STRUCTURE ══════════════════════════════════════════════════════════
      // ---------------------------------------------------------------------------

      const SCALE = 60; // SVG pixels per Angstrom
      const BOND_OFF_2D = 7; // px gap between parallel bond lines
      let FONT_SIZE = getRenderOptions().twoDAtomFontSize; // px

      // ── 2D persistent state (shared between render2d and draw2d) ──────────────
      let _mol2d = null;
      let _hCounts2d = null;
      let _cx2d = 0;
      let _cy2d = 0;
      let _stereoMap2d = null; // Map<bondId, 'wedge'|'dash'>

      let _selectedAtomIds = new Set();
      let _selectedBondIds = new Set();
      let _hoveredAtomIds = new Set();
      let _hoveredBondIds = new Set();
      let _selectionModifierActive = false;
      let _selectMode = false;
      let _drawBondMode = false;
      let _eraseMode = false;
      let _erasePainting = false;
      let _overlayRafId = null; // pending rAF for throttled overlay redraw
      let _forceSelLines = null; // cached D3 selection of force-selection-layer lines
      let _forceSelCircles = null; // cached D3 selection of force-selection-layer circles
      let _forceValenceWarningCircles = null; // cached D3 selection of force valence-warning circles
      let _fgHlLines = null; // cached D3 selection of fg-highlight-layer lines
      let _fgHlCircles = null; // cached D3 selection of fg-highlight-layer circles
      let _drawBondElement = 'C'; // atom type placed by the draw-bond tool
      let _drawBondState = null; // { atomId, ox, oy, ex, ey } during draw-bond drag
      let _drawBondHoverSuppressed = false; // true briefly after commit to block re-hover

        const mol = mode === 'force' ? currentMol : _mol2d;

        // atoms/bonds never bleed into a subsequent render.
        const liveHoveredAtomIds = mol ? new Set([..._hoveredAtomIds].filter(id => mol.atoms.has(id))) : new Set();
        const liveHoveredBondIds = mol ? new Set([..._hoveredBondIds].filter(id => mol.bonds.has(id))) : new Set();

            bondIds: _selectMode || _drawBondMode || _eraseMode ? liveHoveredBondIds : new Set()

          return {
            atomIds: _selectedAtomIds,
            bondIds: _selectedBondIds

          for (const bondId of bondIds) {

            if (!bond) continue;
            const [a1, a2] = bond.getAtomObjects(_mol2d);
            if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
            const isHiddenBond = a1.visible === false || a2.visible === false;
            if (isHiddenBond && !(_stereoMap2d && _stereoMap2d.has(bond.id))) continue;
            _hoveredBondIds.add(bondId);

          _refreshSelectionOverlay();
          return;
        }

        if (mode === 'force' && currentMol) {
          for (const atomId of atomIds) {
            if (currentMol.atoms.has(atomId)) _hoveredAtomIds.add(atomId);
          }
          for (const bondId of bondIds) {

      function _getSelectedDragAtomIds(mol, atomIds = [], bondIds = []) {
        if (!mol) return null;
        if (_selectedAtomIds.size === 0 && _selectedBondIds.size === 0) return null;

        let dragStartsOnSelection = false;
        for (const atomId of atomIds) {
          if (_selectedAtomIds.has(atomId)) {
            dragStartsOnSelection = true;
            break;
          }
        }
        if (!dragStartsOnSelection) {
          for (const bondId of bondIds) {
            if (_selectedBondIds.has(bondId)) {
              dragStartsOnSelection = true;
              break;
            }
          }
        }
        if (!dragStartsOnSelection) return null;

        const selectedDragAtomIds = new Set();
        for (const atomId of _selectedAtomIds) {
          if (mol.atoms.has(atomId)) selectedDragAtomIds.add(atomId);
        }
        for (const bondId of _selectedBondIds) {
          const bond = mol.bonds.get(bondId);
          if (!bond) continue;
          for (const atomId of bond.atoms) {
            if (mol.atoms.has(atomId)) selectedDragAtomIds.add(atomId);
          }
        }
        return selectedDragAtomIds.size > 0 ? selectedDragAtomIds : null;

      function _toSVGPt2d(a) {
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;
        // Negate y so that molecule coords (y-up math convention) map correctly
        // to SVG/canvas coords (y-down). Without this the display is a mirror image.
        return {
          x: W / 2 + (a.x - _cx2d) * SCALE,
          y: H / 2 - (a.y - _cy2d) * SCALE
        };
      }

      /** Zoom to fit all 2D atoms in the viewport, but only if any atom is currently off-screen. */
      function _zoomToFitIf2d() {
        if (!_mol2d) return;
        const atoms = [..._mol2d.atoms.values()].filter(a => a.x != null && a.visible !== false);
        if (atoms.length === 0) return;
        const W = plotEl.clientWidth || 600,
          H = plotEl.clientHeight || 400;
        const PAD = 40;
        const t = d3.zoomTransform(svg.node());
        let anyOut = false;
        let minGX = Infinity,
          maxGX = -Infinity,
          minGY = Infinity,
          maxGY = -Infinity;
        for (const a of atoms) {
          const { x: gX, y: gY } = _toSVGPt2d(a);
          const sx = t.applyX(gX),
            sy = t.applyY(gY);
          if (sx < PAD || sx > W - PAD || sy < PAD || sy > H - PAD) anyOut = true;
          if (gX < minGX) minGX = gX;
          if (gX > maxGX) maxGX = gX;
          if (gY < minGY) minGY = gY;
          if (gY > maxGY) maxGY = gY;
        }
        if (!anyOut) return;
        const gW = maxGX - minGX || 1,
          gH = maxGY - minGY || 1;
        const scale = Math.min((W - PAD * 2) / gW, (H - PAD * 2) / gH, 1);
        const tx = W / 2 - ((minGX + maxGX) / 2) * scale;
        const ty = H / 2 - ((minGY + maxGY) / 2) * scale;
        svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
      }
