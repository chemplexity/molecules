// ---------------------------------------------------------------------------

const BOND_MULT   = 3;
const BOND_OFFSET = 2;
const PI_STROKE   = { stroke: '#FFFFFF', width: '2px' };
const ARO_STROKE  = { stroke: '#696969', width: '3px', dashArray: '3,3' };
const AROMATIC_RENDER_MODE = 'localized'; // 'localized' | 'delocalized'

function singleBondWidth(order) {
    return `${(order * BOND_MULT - 1) * (BOND_MULT / 2)}px`;
}

function renderBondOrder(bond) {
    if (AROMATIC_RENDER_MODE === 'localized' && (bond.properties.aromatic ?? false)) {
        return bond.properties.localizedOrder ?? (bond.properties.order ?? 1.5);
    }
    return bond.properties.aromatic ? 1.5 : (bond.properties.order ?? 1);
}

function prepareAromaticBondRendering(molecule) {
    if (AROMATIC_RENDER_MODE === 'localized') {
        kekulize(molecule);
    }
}

function atomRadius(protons) {
    if (protons == null || protons >= 11) return 10;
    return Math.sqrt(protons + 2.7) * 2.8;
}

function xOffset(offset, src, tgt) {
    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    if (dy === 0 || Math.abs(dx / dy) > 1) return offset * (dy / dx);
    return offset;
}

function yOffset(offset, src, tgt) {
    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    if (dy === 0 || Math.abs(dx / dy) > 1) return -offset;
    return offset * -(dx / dy);
}

// ---------------------------------------------------------------------------
// ══ ATOM TOOLTIP ══════════════════════════════════════════════════════════
// ---------------------------------------------------------------------------

function bondTooltipHtml(bond, a1, a2) {
    const order = bond.properties.aromatic ? 1.5 : (bond.properties.order ?? 1);
    const typeLabel = order === 1.5 ? 'Aromatic'
                    : order === 1   ? 'Single'
                    : order === 2   ? 'Double'
                    : order === 3   ? 'Triple'
                    : `Order ${order}`;
    const bondSymbol = order === 2 ? '=' : order === 3 ? '≡' : '–';

    const row = (label, val) => `<tr><td>${label}</td><td><b>${val}</b></td></tr>`;
    let rows = row('Type', typeLabel);
    rows += row('Order', order);
    if (bond.properties.stereo) {
        rows += row('Stereo', bond.properties.stereo);
    }

    return `<div class="tt-head" style="color:#555">${a1.name}${bondSymbol}${a2.name}
        <span style="font-size:11px;font-weight:normal;color:#aaa;margin-left:4px">${bond.id}</span>
    </div><table>${rows}</table>`;
}

function atomTooltipHtml(atom, mol) {
    const p = atom.properties;
    const charge = p.charge ?? 0;

    // Formatted charge string for the header  (e.g.  +  2+  −  2−)
    let chargeSup = '';
    if (charge !== 0) {
        const abs = Math.abs(charge);
        const sign = charge > 0 ? '+' : '−';
        chargeSup = `<sup style="font-size:11px">${abs > 1 ? abs : ''}${sign}</sup>`;
    }

    // Isotope: standard mass = protons + round(neutrons from elements table).
    // If the stored neutrons differ noticeably, it's a non-standard isotope.
    let isotopePrefix = '';
    if (p.protons != null && p.neutrons != null) {
        const massNo = p.protons + Math.round(p.neutrons);
        // Detect non-standard by comparing to neutral-atom rounding
        const stdNeutrons = { H:0, C:6, N:7, O:8, S:16, P:16, F:10, Cl:18, Br:45, I:74 };
        const std = stdNeutrons[atom.name];
        if (std !== undefined && Math.round(p.neutrons) !== std) {
            isotopePrefix = `<sup style="font-size:11px">${massNo}</sup>`;
        }
    }

    const degree = atom.bonds.length;

    const row = (label, val) =>
        `<tr><td>${label}</td><td><b>${val}</b></td></tr>`;

    let rows = '';
    if (p.protons  != null) { rows += row('Atomic #',  p.protons); }
    if (p.electrons != null) { rows += row('Electrons', p.electrons); }
    rows += row('Bonds', degree);
    if (charge !== 0) {
        const sign = charge > 0 ? `+${charge}` : `${charge}`;
        rows += row('Charge', sign);
    }
    if (p.aromatic) { rows += row('Aromatic', 'yes'); }
    if (p.chirality) { rows += row('Chirality', p.chirality); }

    const color = atomColor(atom.name);
    return `<div class="tt-head" style="color:${color}">${isotopePrefix}${atom.name}${chargeSup}
        <span style="font-size:11px;font-weight:normal;color:#aaa;margin-left:4px">${atom.id}</span>
    </div><table>${rows}</table>`;
}

function convertMolecule(molecule) {
    const atomEntries = [...molecule.atoms.entries()];
    const idToIndex   = new Map(atomEntries.map(([id], i) => [id, i]));

    const nodes = atomEntries.map(([id, atom]) => ({
        id,
        name:      atom.name,
        protons:   atom.properties.protons,
        charge:    atom.getCharge(),
        aromatic:  atom.isAromatic(),
        anchorX:   null,
        anchorY:   null,
    }));

    const links = [...molecule.bonds.values()].map(bond => ({
        id:      bond.id,
        source:  idToIndex.get(bond.atoms[0]),
        target:  idToIndex.get(bond.atoms[1]),
        order:   renderBondOrder(bond),
        aromatic: bond.properties.aromatic ?? false,
    }));

    return { nodes, links };
}

const FORCE_LAYOUT_BOND_LENGTH = 41;
const FORCE_LAYOUT_H_BOND_LENGTH = 20;
const FORCE_LAYOUT_MULTIPLE_BOND_FACTOR = 0.93;
const FORCE_LAYOUT_AROMATIC_BOND_FACTOR = 0.96;
const FORCE_LAYOUT_HEAVY_ANCHOR_RADIUS = 18;
const FORCE_LAYOUT_HEAVY_ANCHOR_STRENGTH = 0.22;
const FORCE_LAYOUT_HEAVY_REPULSION = -55;
const FORCE_LAYOUT_H_REPULSION = -25;
const FORCE_LAYOUT_HH_REPULSION_DISTANCE = 40;
const FORCE_LAYOUT_HH_REPULSION_STRENGTH = 30.0;
const FORCE_LAYOUT_FIT_PAD = 40;
const FORCE_LAYOUT_INITIAL_FIT_PAD = 14;
const FORCE_LAYOUT_INITIAL_H_RADIUS_SCALE = 0.4;
const FORCE_LAYOUT_INITIAL_ZOOM_MULTIPLIER = 1.3;
const FORCE_LAYOUT_KEEP_IN_VIEW_ALPHA_MIN = 0.08;
const FORCE_LAYOUT_INITIAL_KEEP_IN_VIEW_TICKS = 8;
const FORCE_LAYOUT_EDIT_KEEP_IN_VIEW_TICKS = 24;

function _isHydrogenNode(node) {
    return node?.name === 'H';
}

function _forceLinkDistance(link) {
    const source = typeof link.source === 'object' ? link.source : null;
    const target = typeof link.target === 'object' ? link.target : null;
    let distance = (_isHydrogenNode(source) || _isHydrogenNode(target))
        ? FORCE_LAYOUT_H_BOND_LENGTH
        : FORCE_LAYOUT_BOND_LENGTH;

    if (link.order === 3) distance *= FORCE_LAYOUT_MULTIPLE_BOND_FACTOR * 0.92;
    else if (link.order === 2) distance *= FORCE_LAYOUT_MULTIPLE_BOND_FACTOR;
    else if (link.order === 1.5) distance *= FORCE_LAYOUT_AROMATIC_BOND_FACTOR;

    return distance;
}

function _forceAnchorRadius(radius = FORCE_LAYOUT_HEAVY_ANCHOR_RADIUS, strength = FORCE_LAYOUT_HEAVY_ANCHOR_STRENGTH) {
    let nodes = [];
    function force(alpha) {
        for (const node of nodes) {
            if (_isHydrogenNode(node)) continue;
            if (!Number.isFinite(node.anchorX) || !Number.isFinite(node.anchorY)) continue;
            if (node.fx != null || node.fy != null) continue;
            const dx = node.x - node.anchorX;
            const dy = node.y - node.anchorY;
            const dist = Math.hypot(dx, dy);
            if (!(dist > radius)) continue;
            const excess = dist - radius;
            const inv = 1 / dist;
            const pull = excess * strength * alpha;
            node.vx -= dx * inv * pull;
            node.vy -= dy * inv * pull;
        }
    }
    force.initialize = _nodes => { nodes = _nodes; };
    return force;
}

function _forceHydrogenRepulsion(maxDistance = FORCE_LAYOUT_HH_REPULSION_DISTANCE, strength = FORCE_LAYOUT_HH_REPULSION_STRENGTH) {
    let nodes = [];
    const maxDistanceSq = maxDistance * maxDistance;
    function force(alpha) {
        const hydrogens = nodes.filter(node => _isHydrogenNode(node) && node.fx == null && node.fy == null);
        for (let i = 0; i < hydrogens.length; i++) {
            const a = hydrogens[i];
            if (!Number.isFinite(a.x) || !Number.isFinite(a.y)) continue;
            for (let j = i + 1; j < hydrogens.length; j++) {
                const b = hydrogens[j];
                if (!Number.isFinite(b.x) || !Number.isFinite(b.y)) continue;
                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let distSq = dx * dx + dy * dy;
                if (distSq >= maxDistanceSq) continue;
                if (distSq < 1e-6) {
                    dx = 1e-3;
                    dy = 0;
                    distSq = dx * dx;
                }
                const dist = Math.sqrt(distSq);
                const overlap = (maxDistance - dist) / maxDistance;
                const push = overlap * strength * alpha;
                const ux = dx / dist;
                const uy = dy / dist;
                a.vx -= ux * push;
                a.vy -= uy * push;
                b.vx += ux * push;
                b.vy += uy * push;
            }
        }
    }
    force.initialize = _nodes => { nodes = _nodes; };
    return force;
}

function _forceFitTransform(nodes, pad = FORCE_LAYOUT_FIT_PAD, {
    hydrogenRadiusScale = 1,
    scaleMultiplier = 1,
    maxScale = 30,
} = {}) {
    if (!nodes?.length) return null;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const node of nodes) {
        const r = atomRadius(node.protons) * (_isHydrogenNode(node) ? hydrogenRadiusScale : 1);
        if (node.x - r < minX) minX = node.x - r;
        if (node.x + r > maxX) maxX = node.x + r;
        if (node.y - r < minY) minY = node.y - r;
        if (node.y + r > maxY) maxY = node.y + r;
    }
    const W = plotEl.clientWidth || 600;
    const H = plotEl.clientHeight || 400;
    const pads = _viewportFitPadding(pad);
    const fitWidth = Math.max(1, W - pads.left - pads.right);
    const fitHeight = Math.max(1, H - pads.top - pads.bottom);
    const fitScale = Math.min(
        fitWidth / (maxX - minX || 1),
        fitHeight / (maxY - minY || 1),
        1
    );
    const scale = Math.min(fitScale * scaleMultiplier, maxScale);
    const centerX = pads.left + fitWidth / 2;
    const centerY = pads.top + fitHeight / 2;
    const tx = centerX - ((minX + maxX) / 2) * scale;
    const ty = centerY - ((minY + maxY) / 2) * scale;
    return d3.zoomIdentity.translate(tx, ty).scale(scale);
}

function _normalizeAngle(theta) {
    let angle = theta % (Math.PI * 2);
    if (angle < 0) angle += Math.PI * 2;
    return angle;
}

function _chooseOpenAngles(occupiedAngles, count) {
    if (count <= 0) return [];
    if (!occupiedAngles.length) {
        return Array.from({ length: count }, (_, index) => (Math.PI * 2 * index) / count);
    }

    const working = occupiedAngles.map(_normalizeAngle);
    const chosen = [];
    for (let i = 0; i < count; i++) {
        const sorted = [...working].sort((a, b) => a - b);
        let bestAngle = sorted[0];
        let bestGap = -1;
        for (let idx = 0; idx < sorted.length; idx++) {
            const start = sorted[idx];
            const end = idx === sorted.length - 1 ? sorted[0] + Math.PI * 2 : sorted[idx + 1];
            const gap = end - start;
            if (gap > bestGap) {
                bestGap = gap;
                bestAngle = _normalizeAngle(start + gap / 2);
            }
        }
        working.push(bestAngle);
        chosen.push(bestAngle);
    }
    return chosen;
}

function _placeHydrogensAroundParent(parentNode, hydrogens, links, {
    distance = FORCE_LAYOUT_H_BOND_LENGTH,
    excludeIds = null,
    nodes = null,
} = {}) {
    if (!parentNode || !Number.isFinite(parentNode.x) || !Number.isFinite(parentNode.y) || hydrogens.length === 0) return;
    const excluded = excludeIds ?? new Set();
    const occupiedAngles = [];
    for (const link of links) {
        const source = typeof link.source === 'object'
            ? link.source
            : (Array.isArray(nodes) ? nodes[link.source] : null);
        const target = typeof link.target === 'object'
            ? link.target
            : (Array.isArray(nodes) ? nodes[link.target] : null);
        if (source !== parentNode && target !== parentNode) continue;
        const other = source === parentNode ? target : source;
        if (!other || excluded.has(other.id)) continue;
        if (!Number.isFinite(other.x) || !Number.isFinite(other.y)) continue;
        occupiedAngles.push(Math.atan2(other.y - parentNode.y, other.x - parentNode.x));
    }
    const angles = _chooseOpenAngles(occupiedAngles, hydrogens.length);
    hydrogens.forEach((hydrogenNode, index) => {
        const angle = angles[index] ?? ((Math.PI * 2 * index) / hydrogens.length);
        hydrogenNode.x = parentNode.x + Math.cos(angle) * distance;
        hydrogenNode.y = parentNode.y + Math.sin(angle) * distance;
    });
}

function _buildForceAnchorLayout(molecule) {
    const seedMol = molecule.clone();
    seedMol.hideHydrogens();
    generateAndRefine2dCoords(seedMol, { suppressH: true, bondLength: 1.5 });
    _alignReaction2dProductOrientation(seedMol);
    _spreadReaction2dProductComponents(seedMol, 1.5);
    _centerReaction2dPairCoords(seedMol, 1.5);
    const anchors = new Map();
    for (const [id, atom] of seedMol.atoms) {
        if (atom.name === 'H' || atom.visible === false) continue;
        if (!Number.isFinite(atom.x) || !Number.isFinite(atom.y)) continue;
        anchors.set(id, { x: atom.x, y: atom.y });
    }
    return anchors;
}

function _seedForceNodePositions(graph, molecule, anchorLayout, {
    previousNodePositions = null,
} = {}) {
    const W0 = plotEl.clientWidth || 600;
    const H0 = plotEl.clientHeight || 400;
    const anchorEntries = [...anchorLayout.values()];
    const idToNode = new Map(graph.nodes.map(node => [node.id, node]));

    if (anchorEntries.length > 0) {
        let cx2d = 0;
        let cy2d = 0;
        for (const pos of anchorEntries) {
            cx2d += pos.x;
            cy2d += pos.y;
        }
        cx2d /= anchorEntries.length;
        cy2d /= anchorEntries.length;

        for (const [id, pos] of anchorLayout) {
            const node = idToNode.get(id);
            if (!node) continue;
            node.anchorX = W0 / 2 + (pos.x - cx2d) * (FORCE_LAYOUT_BOND_LENGTH / 1.5);
            node.anchorY = H0 / 2 - (pos.y - cy2d) * (FORCE_LAYOUT_BOND_LENGTH / 1.5);
            node.x = node.anchorX;
            node.y = node.anchorY;
        }
    }

    const hydrogenGroups = new Map();
    for (const bond of graph.links) {
        const source = graph.nodes[bond.source];
        const target = graph.nodes[bond.target];
        if (_isHydrogenNode(source) && !_isHydrogenNode(target)) {
            if (!hydrogenGroups.has(target.id)) hydrogenGroups.set(target.id, []);
            hydrogenGroups.get(target.id).push(source);
        } else if (_isHydrogenNode(target) && !_isHydrogenNode(source)) {
            if (!hydrogenGroups.has(source.id)) hydrogenGroups.set(source.id, []);
            hydrogenGroups.get(source.id).push(target);
        }
    }

    for (const [parentId, hydrogens] of hydrogenGroups) {
        const parentNode = idToNode.get(parentId);
        _placeHydrogensAroundParent(parentNode, hydrogens, graph.links, {
            distance: FORCE_LAYOUT_H_BOND_LENGTH,
            excludeIds: new Set(hydrogens.map(node => node.id)),
            nodes: graph.nodes,
        });
    }

    if (previousNodePositions) {
        for (const node of graph.nodes) {
            const previous = previousNodePositions.get(node.id);
            if (!previous) continue;
            node.x = previous.x;
            node.y = previous.y;
            node.vx = previous.vx;
            node.vy = previous.vy;
            node.fx = previous.fx;
            node.fy = previous.fy;
            node.anchorX = Number.isFinite(previous.anchorX) ? previous.anchorX : node.anchorX;
            node.anchorY = Number.isFinite(previous.anchorY) ? previous.anchorY : node.anchorY;
            if (!_isHydrogenNode(node) &&
                    !Number.isFinite(node.anchorX) &&
                    Number.isFinite(previous.x) &&
                    Number.isFinite(previous.y)) {
                node.anchorX = previous.x;
                node.anchorY = previous.y;
            }
        }

        for (const link of graph.links) {
            const source = graph.nodes[link.source];
            const target = graph.nodes[link.target];
            const sourcePlaced = Number.isFinite(source?.x) && Number.isFinite(source?.y);
            const targetPlaced = Number.isFinite(target?.x) && Number.isFinite(target?.y);
            if (sourcePlaced && !targetPlaced) {
                target.x = source.x;
                target.y = source.y;
            } else if (targetPlaced && !sourcePlaced) {
                source.x = target.x;
                source.y = target.y;
            }
            if (sourcePlaced && !Number.isFinite(target?.anchorX) && !_isHydrogenNode(target)) {
                target.anchorX = source.x;
                target.anchorY = source.y;
            } else if (targetPlaced && !Number.isFinite(source?.anchorX) && !_isHydrogenNode(source)) {
                source.anchorX = target.x;
                source.anchorY = target.y;
            }
        }
    }
}

function _patchForceNodePositions(patchPos, {
    setAnchors = true,
    alpha = 0.18,
} = {}) {
    if (!patchPos?.size) return;
    for (const node of simulation.nodes()) {
        const p = patchPos.get(node.id);
        if (!p) continue;
        if (Number.isFinite(p.x)) node.x = p.x;
        if (Number.isFinite(p.y)) node.y = p.y;
        node.vx = 0;
        node.vy = 0;
        if (setAnchors && !_isHydrogenNode(node) && Number.isFinite(node.x) && Number.isFinite(node.y)) {
            node.anchorX = node.x;
            node.anchorY = node.y;
        }
    }
    simulation.alpha(Math.max(simulation.alpha(), alpha)).restart();
}

// Re-seats hydrogen nodes around patched parent positions so they spawn near their
// parent instead of at the stale anchor-layout position after _patchForceNodePositions.
function _reseatHydrogensAroundPatched(patchPos) {
    if (!patchPos?.size) return;
    const allNodes = simulation.nodes();
    const allLinks = simulation.force('link').links();
    const nodeById  = new Map(allNodes.map(n => [n.id, n]));
    for (const [parentId] of patchPos) {
        const parentNode = nodeById.get(parentId);
        if (!parentNode || !Number.isFinite(parentNode.x)) continue;
        const hChildren = allLinks
            .map(l => (l.source?.id === parentId && _isHydrogenNode(l.target)) ? l.target
                     : (l.target?.id === parentId && _isHydrogenNode(l.source)) ? l.source : null)
            .filter(Boolean);
        if (hChildren.length > 0) {
            _placeHydrogensAroundParent(parentNode, hChildren, allLinks, {
                distance: FORCE_LAYOUT_H_BOND_LENGTH,
                excludeIds: new Set(hChildren.map(n => n.id)),
            });
        }
    }
}

function createDrag(sim) {
    return d3.drag()
        .filter(event => !_drawBondMode && !_eraseMode)
        .on('start', (event, d) => {
            if (_drawBondMode) return;
            if (!event.active) sim.alphaTarget(0.3).restart();
            _forceAutoFitEnabled = false;
            _disableForceKeepInView();
            const selectedDragAtomIds = _getSelectedDragAtomIds(currentMol, [d.id], []);
            const dragNodes = selectedDragAtomIds
                ? sim.nodes().filter(node => selectedDragAtomIds.has(node.id))
                : [d];
            const positions = new Map();
            for (const node of dragNodes) {
                positions.set(node.id, { x: node.x, y: node.y });
                node.fx = node.x;
                node.fy = node.y;
            }
            d._dragState = {
                startX: event.x,
                startY: event.y,
                nodeIds: new Set(dragNodes.map(node => node.id)),
                positions,
                _snapped: false,
            };
        })
        .on('drag',  (event, d) => {
            const state = d._dragState;
            if (!state) return;
            if (!state._snapped) { _takeSnapshot({ clearReactionPreview: false }); state._snapped = true; }
            const dx = event.x - state.startX;
            const dy = event.y - state.startY;
            for (const node of sim.nodes()) {
                if (!state.nodeIds.has(node.id)) continue;
                const pos = state.positions.get(node.id);
                if (!pos) continue;
                node.fx = pos.x + dx;
                node.fy = pos.y + dy;
                node.x = node.fx;
                node.y = node.fy;
            }
        })
        .on('end',   (event, d) => {
            if (!event.active) sim.alphaTarget(0);
            const state = d._dragState;
            if (state) {
                for (const node of sim.nodes()) {
                    if (!state.nodeIds.has(node.id)) continue;
                    if (Number.isFinite(node.x) && Number.isFinite(node.y)) {
                        node.anchorX = node.x;
                        node.anchorY = node.y;
                    }
                    node.fx = null;
                    node.fy = null;
                }
            }
            d._dragState = null;
        });
}

const simulation = d3.forceSimulation()
    .force('charge', d3.forceManyBody()
        .strength(node => _isHydrogenNode(node) ? FORCE_LAYOUT_H_REPULSION : FORCE_LAYOUT_HEAVY_REPULSION)
        .distanceMax(180))
    .force('link',   d3.forceLink()
        .strength(link => (_isHydrogenNode(link.source) || _isHydrogenNode(link.target)) ? 0.8 : 0.9)
        .distance(_forceLinkDistance))
    .force('anchor', _forceAnchorRadius())
    .force('hRepel', _forceHydrogenRepulsion())
    .velocityDecay(0.35)
    .alphaDecay(0.02)
    .stop();

function updateForce(molecule, {
    preservePositions = false,
    preserveView = preservePositions,
} = {}) {
    prepareAromaticBondRendering(molecule);
    _forceAutoFitEnabled = !preserveView;
    _disableForceKeepInView();

    const previousNodePositions = preservePositions
        ? new Map(simulation.nodes().map(node => [node.id, {
            x: node.x,
            y: node.y,
            vx: node.vx,
            vy: node.vy,
            fx: node.fx,
            fy: node.fy,
            anchorX: node.anchorX,
            anchorY: node.anchorY,
        }]))
        : null;
    const previousZoomTransform = preserveView ? d3.zoomTransform(svg.node()) : null;

    const anchorLayout = _buildForceAnchorLayout(molecule);
    if (_preserveSelectionOnNextRender) _syncSelectionToMolecule(molecule);
    else {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }
    _preserveSelectionOnNextRender = false;

    const graph = convertMolecule(molecule);
    g.selectAll('*').remove();
    _forceSelLines = null; _forceSelCircles = null; _fgHlLines = null; _fgHlCircles = null;

    // Reset zoom to identity for force layout
    if (!preserveView) {
        svg.call(zoom.transform, d3.zoomIdentity);
    }

    const bondEnter = g.selectAll('line.link-base')

        .enter();

    const singleBond = bondEnter.append('line')
        .filter(d => d.order === 1 || d.order === 2 || d.order === 3)
        .attr('class', 'link')
        .style('stroke-width', d => singleBondWidth(d.order));

    const doubleSep = bondEnter.append('line')
        .filter(d => d.order === 2)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const aroBond1 = bondEnter.append('line')
        .filter(d => d.order === 1.5)
        .attr('class', 'link separator')
        .style('stroke', ARO_STROKE.stroke)
        .style('stroke-width', ARO_STROKE.width);

    const aroBond2 = bondEnter.append('line')
        .filter(d => d.order === 1.5)
        .attr('class', 'link separator')
        .style('stroke', ARO_STROKE.stroke)
        .style('stroke-width', ARO_STROKE.width)
        .style('stroke-dasharray', ARO_STROKE.dashArray);

    const tripleSep1 = bondEnter.append('line')
        .filter(d => d.order === 3)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const tripleSep2 = bondEnter.append('line')
        .filter(d => d.order === 3)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const bondHoverTarget = bondEnter.append('line')
        .attr('class', 'bond-hover-target')
        .style('stroke', 'transparent')
        .style('stroke-width', '14px')
        .style('pointer-events', 'stroke')
        .style('cursor', 'grab')
        .on('click', (event, d) => {
            if (_drawBondMode) { _promoteBondOrder(d.id); return; }
            if (_eraseMode) {
                const b = molecule.bonds.get(d.id);
                if (b?.atoms.some(id => molecule.atoms.get(id)?.name === 'H')) return;
                _eraseItem([], [d.id]);
                return;
            }
            _handleForcePrimitiveClick(event, [], [d.id]);
        })
        .on('dblclick', (event, d) => {
            const bond = molecule.bonds.get(d.id);
            if (!bond) return;
            _handleForceComponentDblClick(event, bond.atoms);
        })
        .on('mouseover', (event, d) => {
            if (_eraseMode && _erasePainting) {
                const b = molecule.bonds.get(d.id);
                if (b?.atoms.some(id => molecule.atoms.get(id)?.name === 'H')) return;
                _showPrimitiveHover([], [d.id]);
                const bondId = d.id;
                requestAnimationFrame(() => { if (_eraseMode && _erasePainting) _eraseItem([], [bondId]); });
                return;
            }
            _showPrimitiveHover([], [d.id]);
            if (_drawBondMode && !_drawBondHoverSuppressed) {
                _hoveredBondIds.add(d.id);
                _refreshSelectionOverlay();
            }
            if (_selectMode || _drawBondMode || _eraseMode) { return; }
            const bond = molecule.bonds.get(d.id);
            if (!bond) { return; }
            const atom1 = molecule.atoms.get(bond.atoms[0]);
            const atom2 = molecule.atoms.get(bond.atoms[1]);
            if (!atom1 || !atom2) { return; }
            tooltip.transition().delay(150).style('opacity', 0.9);
            tooltip.html(bondTooltipHtml(bond, atom1, atom2))
                .style('left', (event.clientX + 13) + 'px')
                .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mousemove', event => {
            tooltip.style('left', (event.clientX + 13) + 'px')
                   .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mouseout', () => {
            if (_drawBondState) _resetDrawBondHover();
            else { _clearPrimitiveHover(); _refreshSelectionOverlay(); }
            tooltip.transition().duration(50).style('opacity', 0);
        })
        .call(d3.drag()
            .filter(event => !_drawBondMode)
            .on('start', function(event, d) {
                if (_drawBondMode) return;
                const selectedDragAtomIds = _getSelectedDragAtomIds(molecule, [], [d.id]);
                if (!selectedDragAtomIds) {
                    this._dragState = null;
                    return;
                }
                _forceAutoFitEnabled = false;
                _disableForceKeepInView();
                event.sourceEvent.stopPropagation();
                tooltip.style('opacity', 0);
                d3.select(this).style('cursor', 'grabbing');
                if (!event.active) simulation.alphaTarget(0.3).restart();
                const positions = new Map();
                const nodeIds = new Set();
                for (const node of simulation.nodes()) {
                    if (!selectedDragAtomIds.has(node.id)) continue;
                    positions.set(node.id, { x: node.x, y: node.y });
                    nodeIds.add(node.id);
                    node.fx = node.x;
                    node.fy = node.y;
                }
                this._dragState = {
                    startX: event.x,
                    startY: event.y,
                    nodeIds,
                    positions,
                    _snapped: false,
                };
            })
            .on('drag', function(event) {
                const state = this._dragState;
                if (!state) return;
                if (!state._snapped) { _takeSnapshot({ clearReactionPreview: false }); state._snapped = true; }
                const dx = event.x - state.startX;
                const dy = event.y - state.startY;
                for (const node of simulation.nodes()) {
                    if (!state.nodeIds.has(node.id)) continue;
                    const pos = state.positions.get(node.id);
                    if (!pos) continue;
                    node.fx = pos.x + dx;
                    node.fy = pos.y + dy;
                    node.x = node.fx;
                    node.y = node.fy;
                }
            })
            .on('end', function(event) {
                const state = this._dragState;
                if (state) {
                    for (const node of simulation.nodes()) {
                        if (!state.nodeIds.has(node.id)) continue;
                        if (Number.isFinite(node.x) && Number.isFinite(node.y)) {
                            node.anchorX = node.x;
                            node.anchorY = node.y;
                        }
                        node.fx = null;
                        node.fy = null;
                    }
                }
                if (!event.active) simulation.alphaTarget(0);
                this._dragState = null;
                d3.select(this).style('cursor', 'grab');
            })
        );

    const atom = g.selectAll('circle.node')
        .data(graph.nodes, d => d.id)
        .enter()
        .append('circle')
        .attr('class', 'node')
        .attr('r',           d => atomRadius(d.protons))
        .attr('fill',        d => atomColor(d.name))
        .attr('stroke',      d => strokeColor(d.name))
        .attr('stroke-width', 1)
        .call(createDrag(simulation))
        .on('mousedown.drawbond', function(event, d) {
            if (!_drawBondMode || mode !== 'force' || !currentMol) return;
            if (d.name === 'H') return; // H can't be a bond source; click handler handles replacement
            event.stopPropagation();
            const [gX, gY] = d3.pointer(event, g.node());
            _startDrawBond(d.id, gX, gY);
        })
        .on('click', (event, d) => {
            if (_drawBondMode) {
                if (d.name === 'H' && d.name !== _drawBondElement) {
                    event.stopPropagation();
                    const mol = currentMol;
                    if (!mol) return;
                    _takeSnapshot();
                    mol.changeAtomElement(d.id, _drawBondElement);
                    const affected = new Set([d.id]);
                    mol.clearStereoAnnotations(affected);
                    kekulize(mol); refreshAromaticity(mol, { preserveKekule: true });
                    mol.repairImplicitHydrogens(affected);
                    _syncInputField(mol); updateFormula(mol); updateDescriptors(mol); updateFunctionalGroups(mol); updateReactionTemplatesPanel();
                    // Capture old H position before updateForce recreates nodes.
                    const preHNode = simulation.nodes().find(n => n.id === d.id);
                    let preHX = preHNode?.x, preHY = preHNode?.y;
                    // Find parent heavy atom via current links before they are rebuilt.
                    let parentNode = null;
                    if (preHNode) {
                        const allLinks = simulation.force('link').links();
                        for (const l of allLinks) {
                            const src = l.source, tgt = l.target;
                            if (src?.id === d.id && !_isHydrogenNode(tgt)) { parentNode = tgt; break; }
                            if (tgt?.id === d.id && !_isHydrogenNode(src)) { parentNode = src; break; }
                        }
                    }
                    updateForce(mol, { preservePositions: true, preserveView: true });
                    if (parentNode && preHX != null && preHY != null) {
                        const angle = Math.atan2(preHY - parentNode.y, preHX - parentNode.x);
                        const pos = {
                            x: parentNode.x + Math.cos(angle) * FORCE_LAYOUT_BOND_LENGTH,
                            y: parentNode.y + Math.sin(angle) * FORCE_LAYOUT_BOND_LENGTH,
                        };
                        const patchPos = new Map([[d.id, pos]]);
                        _patchForceNodePositions(patchPos);
                        _reseatHydrogensAroundPatched(patchPos);
                    }
                }
                return;
            }
            if (_eraseMode) {
                if (d.name === 'H') return;
                _eraseItem([d.id], []);
                return;
            }
            _handleForcePrimitiveClick(event, [d.id], []);
        })
        .on('dblclick', (event, d) => {
            _handleForceComponentDblClick(event, [d.id]);
        })
        .on('mouseover', (event, d) => {
            if (_eraseMode && _erasePainting) {
                if (d.name === 'H') return;
                _showPrimitiveHover([d.id], []);
                const atomId = d.id;
                requestAnimationFrame(() => { if (_eraseMode && _erasePainting) _eraseItem([atomId], []); });
                return;
            }
            _showPrimitiveHover([d.id], []);
            if (_drawBondMode && mode === 'force' && !_drawBondHoverSuppressed) {
                _hoveredAtomIds.add(d.id);
                _refreshSelectionOverlay();
            }
            if (_selectMode || _drawBondMode || _eraseMode) { return; }
            const atom = molecule.atoms.get(d.id);
            if (!atom) { return; }
            tooltip.transition().delay(200).style('opacity', 0.9);
            tooltip.html(atomTooltipHtml(atom, molecule))
                .style('left', (event.clientX + 13) + 'px')
                .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mousemove', event => {
            tooltip.style('left', (event.clientX + 13) + 'px')
                   .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mouseout', () => {
            if (_drawBondState) _resetDrawBondHover();
            else { _clearPrimitiveHover(); _refreshSelectionOverlay(); }
            tooltip.transition().duration(50).style('opacity', 0);
        });

    const atomSymbol = g.selectAll('text.atom-symbol')
        .data(graph.nodes, d => d.id)
        .enter()
        .append('text')
        .attr('class', 'atom-symbol')
        .attr('pointer-events', 'none')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('font-family', 'Arial, Helvetica, sans-serif')
        .attr('font-weight', 'bold')
        .attr('font-size', d => d.name.length > 1 ? '7px' : '9px')
        .attr('fill', d => {
            if (d.name === 'H') {
                return '#111';
            }
            const hex = atomColor(d.name);
            // Use white text on dark atoms, dark text on light atoms
            const cr = parseInt(hex.slice(1,3),16), cg = parseInt(hex.slice(3,5),16), cb = parseInt(hex.slice(5,7),16);
            return (cr*0.299 + cg*0.587 + cb*0.114) > 140 ? '#333' : '#fff';
        })
        .text(d => d.name);

    const chargeLabel = g.selectAll('text.charge-label')
        .data(graph.nodes.filter(d => d.charge !== 0), d => d.id)
        .enter()
        .append('text')
        .attr('class', 'charge-label')
        .attr('pointer-events', 'none')
        .attr('font-family', 'Arial, Helvetica, sans-serif')
        .attr('font-size', '11px')
        .attr('font-weight', 'bold')
        .attr('fill', '#333')
        .text(d => {
            const c = d.charge;
            return c === 1 ? '+' : c > 1 ? `${c}+` : c === -1 ? '−' : `${Math.abs(c)}−`;
        });

    _seedForceNodePositions(graph, molecule, anchorLayout, { previousNodePositions });

    simulation.nodes(graph.nodes);
    simulation.force('link').links(graph.links);
    simulation.force('charge')
        .strength(node => _isHydrogenNode(node) ? FORCE_LAYOUT_H_REPULSION : FORCE_LAYOUT_HEAVY_REPULSION)
        .distanceMax(180);
    simulation.force('link')
        .strength(link => (_isHydrogenNode(link.source) || _isHydrogenNode(link.target)) ? 0.8 : 0.9)
        .distance(_forceLinkDistance);
    simulation.force('anchor', _forceAnchorRadius());
    simulation.force('hRepel', _forceHydrogenRepulsion());
    simulation.alpha(preservePositions ? 0.2 : 1).restart();

    simulation.on('tick', () => {
        _renderReactionPreviewArrowForce(graph.nodes);

        singleBond
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        doubleSep
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        aroBond1
            .attr('x1', d => d.source.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset( BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset( BOND_OFFSET, d.source, d.target));

        aroBond2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

        tripleSep1
            .attr('x1', d => d.source.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset( BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset( BOND_OFFSET, d.source, d.target));

        tripleSep2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

        bondHoverTarget
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        atom.attr('cx', d => d.x).attr('cy', d => d.y);
        atomSymbol.attr('x', d => d.x).attr('y', d => d.y);

        const OFF = 0.707; // cos/sin 45°
        chargeLabel
            .attr('x', d => d.x + atomRadius(d.protons) * OFF + 4)
            .attr('y', d => d.y - atomRadius(d.protons) * OFF);

        // Functional-group highlight layer (cached — avoids DOM query every tick)
        if (_fgHlLines) {
            _fgHlLines.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            _fgHlCircles.attr('cx', d => d.x).attr('cy', d => d.y);
        }
        if (_forceSelLines) {
            _forceSelLines.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            _forceSelCircles.attr('cx', d => d.x).attr('cy', d => d.y);
        }

        if (_forceAutoFitEnabled) {
            const fitTransform = _forceFitTransform(graph.nodes, FORCE_LAYOUT_INITIAL_FIT_PAD, {
                hydrogenRadiusScale: FORCE_LAYOUT_INITIAL_H_RADIUS_SCALE,
                scaleMultiplier: FORCE_LAYOUT_INITIAL_ZOOM_MULTIPLIER,
            });
            if (fitTransform) {
                svg.call(zoom.transform, fitTransform);
                _forceAutoFitEnabled = false;
                _enableForceKeepInView(FORCE_LAYOUT_INITIAL_KEEP_IN_VIEW_TICKS);
            }
        } else if (_forceKeepInView) {
            if (_forceKeepInViewTicks > 0) {
                _forceKeepInViewTicks -= 1;
                if (_forceKeepInViewTicks <= 0) {
                    _disableForceKeepInView();
                    return;
                }
            }
            if (simulation.alpha() < FORCE_LAYOUT_KEEP_IN_VIEW_ALPHA_MIN) {
                _disableForceKeepInView();
                return;
            }
            const W = plotEl.clientWidth, H = plotEl.clientHeight;
            const PAD = FORCE_LAYOUT_FIT_PAD;
            const t = d3.zoomTransform(svg.node());
            let anyOut = false;
            for (const n of graph.nodes) {
                const r = atomRadius(n.protons);
                const sx1 = t.x + (n.x - r) * t.k, sy1 = t.y + (n.y - r) * t.k;
                const sx2 = t.x + (n.x + r) * t.k, sy2 = t.y + (n.y + r) * t.k;
                if (sx1 < PAD || sx2 > W - PAD || sy1 < PAD || sy2 > H - PAD) anyOut = true;
            }
            if (anyOut) {
                const fitTransform = _forceFitTransform(graph.nodes, FORCE_LAYOUT_FIT_PAD);
                if (fitTransform) svg.call(zoom.transform, fitTransform);
                _disableForceKeepInView();
            }
        }
    });

    if (preserveView && previousZoomTransform) {
        svg.call(zoom.transform, previousZoomTransform);
    }

    if (_highlightedAtomIds.size > 0) applyForceHighlights();
    if (_selectedAtomIds.size > 0 || _selectedBondIds.size > 0) applyForceSelection();
}

function applyForceHighlights() {
    g.selectAll('g.fg-highlight-layer').remove();
    _fgHlLines = null; _fgHlCircles = null;
    if (_highlightedAtomIds.size === 0) return;

    const HL_COLOR = 'rgb(130, 210, 80)';
    const OL_COLOR = 'rgb(70, 140, 40)';
    const HL_R = 8;
    const OL = 2;
    const hlLayer = g.insert('g', ':first-child').attr('class', 'fg-highlight-layer').attr('opacity', 0.45);

    const nodeMap = new Map(simulation.nodes().map(n => [n.id, n]));
    const allLinks = simulation.force('link').links();

    // Draw each match instance as its own unit so fills cover their own outlines.
    for (const atomSet of _highlightedAtomSets) {
        const mLinks = allLinks.filter(l => atomSet.has(l.source.id) && atomSet.has(l.target.id));
        const mNodes = [...atomSet].map(id => nodeMap.get(id)).filter(Boolean);

        const addLines = (stroke, extra) => {
            hlLayer.selectAll(null).data(mLinks).enter().append('line')
                .datum(d => d)
                .attr('stroke', stroke)
                .attr('stroke-width', d => Math.min(atomRadius(d.source.protons), atomRadius(d.target.protons)) * 2 + HL_R * 2 + extra * 2)
                .attr('stroke-linecap', 'round')
                .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        };
        const addCircles = (fill, extra) => {
            hlLayer.selectAll(null).data(mNodes).enter().append('circle')
                .datum(d => d)
                .attr('r', d => atomRadius(d.protons) + HL_R + extra)
                .attr('fill', fill).attr('stroke', 'none')
                .attr('cx', d => d.x).attr('cy', d => d.y);
        };

        addLines(OL_COLOR, OL); addCircles(OL_COLOR, OL); // outline
        addLines(HL_COLOR,  0); addCircles(HL_COLOR,  0); // fill
    }
    _fgHlLines   = hlLayer.selectAll('line');
    _fgHlCircles = hlLayer.selectAll('circle');
}

function applyForceSelection() {
    g.selectAll('g.force-selection-layer').remove();
    _forceSelLines = null; _forceSelCircles = null;
    const { atomIds: activeAtomIds, bondIds: activeBondIds } = _getRenderableSelectionIds();
    if (activeAtomIds.size === 0 && activeBondIds.size === 0) return;

    const SEL_COLOR  = 'rgb(150, 200, 255)';
    const SEL_OL     = 'rgb(40, 100, 210)';
    const BOND_SEL_R = 6;  // extra radius for bond highlight caps
    const ATOM_SEL_R = 13; // larger extra radius so atom circles exceed bond caps
    const OL = 2;
    const selLayer = g.insert('g', ':first-child').attr('class', 'force-selection-layer').attr('opacity', 0.45);

    const selectedNodes = simulation.nodes().filter(node => activeAtomIds.has(node.id));
    const selectedLinks = simulation.force('link').links().filter(link => activeBondIds.has(link.id));

    const addLines = (stroke, extra) => {
        selLayer.selectAll(null).data(selectedLinks).enter().append('line')
            .datum(d => d)
            .attr('stroke', stroke)
            .attr('stroke-width', d => Math.min(atomRadius(d.source.protons), atomRadius(d.target.protons)) * 2 + BOND_SEL_R * 2 + extra * 2)
            .attr('stroke-linecap', 'round')
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    };
    const addCircles = (fill, extra) => {
        selLayer.selectAll(null).data(selectedNodes).enter().append('circle')
            .datum(d => d)
            .attr('r', d => atomRadius(d.protons) + ATOM_SEL_R + extra)
            .attr('fill', fill).attr('stroke', 'none')
            .attr('cx', d => d.x).attr('cy', d => d.y);
    };

    addLines(SEL_OL, OL); addCircles(SEL_OL, OL);
    addLines(SEL_COLOR, 0); addCircles(SEL_COLOR, 0);
    _forceSelLines   = selLayer.selectAll('line');
    _forceSelCircles = selLayer.selectAll('circle');
}

function _syncSelectionToMolecule(mol) {
    _selectedAtomIds = new Set([..._selectedAtomIds].filter(id => mol.atoms.has(id)));
    _selectedBondIds = new Set([..._selectedBondIds].filter(id => mol.bonds.has(id)));
}

function _redraw2dSelection() {
    g.select('g.atom-selection').remove();
    const { atomIds: activeAtomIds, bondIds: activeBondIds } = _getRenderableSelectionIds();
    if ((activeAtomIds.size === 0 && activeBondIds.size === 0) || !_mol2d) return;

    const mol      = _mol2d;
    const hCounts  = _hCounts2d;
    const toSVGPt  = _toSVGPt2d;
    const atoms    = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);

    const SEL_COLOR = 'rgb(150, 200, 255)';
    const SEL_OL    = 'rgb(40,  100, 210)';
    const OL = 2;

    // Insert behind the bond layer (same stacking as fg highlights).
    const selLayer = g.insert('g', 'g.bonds').attr('class', 'atom-selection').attr('opacity', 0.45);

    const BOND_SEL_PAD = 5;  // extra px beyond label half-width for bond highlight
    const ATOM_SEL_PAD = 12; // larger pad so atom circles clearly exceed bond caps

    const mBonds = [];
    for (const bond of mol.bonds.values()) {
        if (!activeBondIds.has(bond.id)) continue;
        const [ba1, ba2] = bond.getAtomObjects(mol);
        if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
        if (ba1.visible === false || ba2.visible === false) continue;
        const p1 = toSVGPt(ba1), p2 = toSVGPt(ba2);
        const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + BOND_SEL_PAD;
        const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + BOND_SEL_PAD;
        mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
    }
    const mAtoms = [];
    for (const atom of atoms) {
        if (!activeAtomIds.has(atom.id)) continue;
        const { x, y } = toSVGPt(atom);
        const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + ATOM_SEL_PAD;
        mAtoms.push({ x, y, r });
    }

    const addL = (stroke, extra) => {
        for (const { p1, p2, w } of mBonds)
            selLayer.append('line')
                .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
                .attr('stroke', stroke).attr('stroke-width', w + extra * 2)
                .attr('stroke-linecap', 'round');
    };
    const addC = (fill, extra) => {
        for (const { x, y, r } of mAtoms)
            selLayer.append('circle')
                .attr('cx', x).attr('cy', y).attr('r', r + extra)
                .attr('fill', fill).attr('stroke', 'none');
    };
    addL(SEL_OL, OL); addC(SEL_OL, OL);
    addL(SEL_COLOR, 0); addC(SEL_COLOR, 0);
}

// ══ 2D STRUCTURE ══════════════════════════════════════════════════════════
// ---------------------------------------------------------------------------

const SCALE       = 60;   // SVG pixels per Angstrom
const BOND_OFF_2D = 7;    // px gap between parallel bond lines
const STROKE_W    = 1.6;  // px
const FONT_SIZE   = 14;   // px
function renderAtomLabel(group, label, color, xOffset = 0) {
    const textEl = group.append('text')
        .attr('class', 'atom-label')
        .attr('fill', color)
        .attr('x', xOffset)
        .attr('text-anchor', 'middle');
    let i = 0;
    let first = true;
    while (i < label.length) {
        const ch = label[i];
        if (ch >= '0' && ch <= '9') {
            let num = '';
            while (i < label.length && label[i] >= '0' && label[i] <= '9') num += label[i++];
            textEl.append('tspan').attr('baseline-shift', 'sub').attr('font-size', '0.72em').text(num);
        } else {
            let word = '';
            while (i < label.length && !(label[i] >= '0' && label[i] <= '9')) word += label[i++];
            const ts = textEl.append('tspan').text(word);
            if (first) { ts.attr('dy', '0.35em'); first = false; }
        }
    }
}

function addLine(group, x1, y1, x2, y2, extraClass) {
    return group.append('line')
        .attr('class', extraClass ? `bond ${extraClass}` : 'bond')
        .attr('x1', x1).attr('y1', y1)
        .attr('x2', x2).attr('y2', y2)
        .style('stroke-width', `${STROKE_W}px`);
}

// ── 2D persistent state (shared between render2d and draw2d) ──────────────
let _mol2d      = null;
let _hCounts2d  = null;
let _cx2d       = 0;
let _cy2d       = 0;
let _stereoMap2d = null;  // Map<bondId, 'wedge'|'dash'>
let _highlightedAtomIds  = new Set();
let _highlightedAtomSets = []; // one Set<atomId> per SMARTS match instance
let _highlightMol        = null; // molecule used for last updateFunctionalGroups call

let _selectedAtomIds = new Set();
let _selectedBondIds = new Set();
let _hoveredAtomIds = new Set();
let _hoveredBondIds = new Set();
let _selectionModifierActive = false;
let _selectMode      = false;
let _drawBondMode    = false;
let _eraseMode       = false;
let _erasePainting   = false;
let _lastEraseHitEl  = null;
let _overlayRafId    = null;  // pending rAF for throttled overlay redraw
let _forceSelLines   = null;  // cached D3 selection of force-selection-layer lines
let _forceSelCircles = null;  // cached D3 selection of force-selection-layer circles
let _fgHlLines       = null;  // cached D3 selection of fg-highlight-layer lines
let _fgHlCircles     = null;  // cached D3 selection of fg-highlight-layer circles
let _drawBondElement = 'C';  // atom type placed by the draw-bond tool
let _drawBondState   = null; // { atomId, ox, oy, ex, ey } during draw-bond drag
let _drawBondHoverSuppressed = false; // true briefly after commit to block re-hover
let _preserveSelectionOnNextRender = false;
let _forceAutoFitEnabled = true;
let _forceKeepInView = false; // true after draw-bond commits: zoom to fit if any node escapes viewport
let _forceKeepInViewTicks = 0;

function _enableForceKeepInView(ticks = FORCE_LAYOUT_EDIT_KEEP_IN_VIEW_TICKS) {
    _forceKeepInView = true;
    _forceKeepInViewTicks = Math.max(0, ticks | 0);
}

function _disableForceKeepInView() {
    _forceKeepInView = false;
    _forceKeepInViewTicks = 0;
}

function _clearPrimitiveHover() {
    _hoveredAtomIds.clear();
    _hoveredBondIds.clear();
}

function _refreshSelectionOverlay() {
    if (_overlayRafId !== null) return;
    _overlayRafId = requestAnimationFrame(() => {
        _overlayRafId = null;
        if (mode === 'force') applyForceSelection();
        else if (_mol2d) _redraw2dSelection();
    });
}

function _getRenderableSelectionIds() {
    const mol = mode === 'force' ? currentMol : _mol2d;
    // Filter hover sets against the live molecule so stale IDs from deleted
    // atoms/bonds never bleed into a subsequent render.
    const liveHoveredAtomIds = mol
        ? new Set([..._hoveredAtomIds].filter(id => mol.atoms.has(id)))
        : new Set();
    const liveHoveredBondIds = mol
        ? new Set([..._hoveredBondIds].filter(id => mol.bonds.has(id)))
        : new Set();
    if (_selectedAtomIds.size === 0 && _selectedBondIds.size === 0) {
        return {
            atomIds: (_selectMode || _drawBondMode || _eraseMode) ? liveHoveredAtomIds : new Set(),
            bondIds: (_selectMode || _drawBondMode || _eraseMode) ? liveHoveredBondIds : new Set(),
        };
    }
    if (!_selectionModifierActive) {
        return {
            atomIds: _selectedAtomIds,
            bondIds: _selectedBondIds,
        };
    }
    return {
        atomIds: new Set([..._selectedAtomIds, ...liveHoveredAtomIds]),
        bondIds: new Set([..._selectedBondIds, ...liveHoveredBondIds]),
    };
}

function _showPrimitiveHover(atomIds = [], bondIds = []) {
    if (!_selectMode && !_eraseMode) return;

    _hoveredAtomIds.clear();
    _hoveredBondIds.clear();

    if (mode === '2d' && _mol2d) {
        for (const atomId of atomIds) {
            const atom = _mol2d.atoms.get(atomId);
            if (!atom || atom.x == null || atom.visible === false) continue;
            _hoveredAtomIds.add(atomId);
        }
        for (const bondId of bondIds) {
            const bond = _mol2d.bonds.get(bondId);
            if (!bond) continue;
            const [a1, a2] = bond.getAtomObjects(_mol2d);
            if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
            const isHiddenBond = a1.visible === false || a2.visible === false;
            if (isHiddenBond && !(_stereoMap2d && _stereoMap2d.has(bond.id))) continue;
            _hoveredBondIds.add(bondId);
        }
        _refreshSelectionOverlay();
        return;
    }

    if (mode === 'force' && currentMol) {
        for (const atomId of atomIds) {
            if (currentMol.atoms.has(atomId)) _hoveredAtomIds.add(atomId);
        }
        for (const bondId of bondIds) {
            if (currentMol.bonds.has(bondId)) _hoveredBondIds.add(bondId);
        }
        _refreshSelectionOverlay();
    }
}

function _getSelectedDragAtomIds(mol, atomIds = [], bondIds = []) {
    if (!mol) return null;
    if (_selectedAtomIds.size === 0 && _selectedBondIds.size === 0) return null;

    let dragStartsOnSelection = false;
    for (const atomId of atomIds) {
        if (_selectedAtomIds.has(atomId)) {
            dragStartsOnSelection = true;
            break;
        }
    }
    if (!dragStartsOnSelection) {
        for (const bondId of bondIds) {
            if (_selectedBondIds.has(bondId)) {
                dragStartsOnSelection = true;
                break;
            }
        }
    }
    if (!dragStartsOnSelection) return null;

    const selectedDragAtomIds = new Set();
    for (const atomId of _selectedAtomIds) {
        if (mol.atoms.has(atomId)) selectedDragAtomIds.add(atomId);
    }
    for (const bondId of _selectedBondIds) {
        const bond = mol.bonds.get(bondId);
        if (!bond) continue;
        for (const atomId of bond.atoms) {
            if (mol.atoms.has(atomId)) selectedDragAtomIds.add(atomId);
        }
    }
    return selectedDragAtomIds.size > 0 ? selectedDragAtomIds : null;
}

function _toSVGPt2d(a) {
    const W = plotEl.clientWidth  || 600;
    const H = plotEl.clientHeight || 400;
    // Negate y so that molecule coords (y-up math convention) map correctly
    // to SVG/canvas coords (y-down). Without this the display is a mirror image.
    return { x: W / 2 + (a.x - _cx2d) * SCALE, y: H / 2 - (a.y - _cy2d) * SCALE };
}

/** Zoom to fit all force-layout nodes within the viewport (unconditional). */
function _zoomToFitForce() {
    const nodes = simulation.nodes();
    if (!nodes.length) return;
    const fitTransform = _forceFitTransform(nodes, FORCE_LAYOUT_FIT_PAD);
    if (fitTransform) svg.call(zoom.transform, fitTransform);
}

/** Zoom to fit all 2D atoms in the viewport, but only if any atom is currently off-screen. */
function _zoomToFitIf2d() {
    if (!_mol2d) return;
    const atoms = [..._mol2d.atoms.values()].filter(a => a.x != null && a.visible !== false);
    if (atoms.length === 0) return;
    const W = plotEl.clientWidth || 600, H = plotEl.clientHeight || 400;
    const PAD = 40;
    const t = d3.zoomTransform(svg.node());
    let anyOut = false;
    let minGX = Infinity, maxGX = -Infinity, minGY = Infinity, maxGY = -Infinity;
    for (const a of atoms) {
        const { x: gX, y: gY } = _toSVGPt2d(a);
        const sx = t.applyX(gX), sy = t.applyY(gY);
        if (sx < PAD || sx > W - PAD || sy < PAD || sy > H - PAD) anyOut = true;
        if (gX < minGX) minGX = gX; if (gX > maxGX) maxGX = gX;
        if (gY < minGY) minGY = gY; if (gY > maxGY) maxGY = gY;
    }
    if (!anyOut) return;
    const gW = maxGX - minGX || 1, gH = maxGY - minGY || 1;
    const scale = Math.min((W - PAD * 2) / gW, (H - PAD * 2) / gH, 1);
    const tx = W / 2 - (minGX + maxGX) / 2 * scale;
    const ty = H / 2 - (minGY + maxGY) / 2 * scale;
    svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

/** Update the SMILES/InChI input field to reflect the current molecule state. */
function _syncInputField(mol) {
    try {
        const s = toSMILES(mol);
        currentSmiles = s;
        if (inputMode !== 'inchi') {
            currentInchi = null;
            document.getElementById('smiles-input').value = s;
        }
    } catch (e) {}
    if (inputMode === 'inchi') {
        try {
            const inchi = toInChI(mol);
            currentInchi = inchi;
            document.getElementById('smiles-input').value = inchi;
        } catch (e) { /* leave as-is */ }
    }
}

// ---------------------------------------------------------------------------
// Undo / Redo history
// ---------------------------------------------------------------------------
let _undoStack = [];
let _redoStack = [];
const _UNDO_MAX = 50;

function _makeSnapshot() {
    const mol = mode === 'force' ? currentMol : _mol2d;
    let snap;
    if (!mol) {
        snap = { empty: true, mode };
    } else {
        const atoms = [];
        for (const [id, atom] of mol.atoms) {
            atoms.push({
                id,
                name: atom.name,
                x: atom.x,
                y: atom.y,
                visible: atom.visible,
                properties: JSON.parse(JSON.stringify(atom.properties))
            });
        }
        const bonds = [];
        for (const [id, bond] of mol.bonds) {
            bonds.push({
                id,
                atoms: [...bond.atoms],
                properties: JSON.parse(JSON.stringify(bond.properties))
            });
        }
        snap = { mode, atoms, bonds };
        if (mode === '2d') {
            snap.cx2d = _cx2d;
            snap.cy2d = _cy2d;
            snap.hCounts2d = _hCounts2d ? [..._hCounts2d] : [];
            snap.stereoMap2d = _stereoMap2d ? [..._stereoMap2d] : null;
        } else {
            snap.nodePositions = simulation.nodes().map(n => ({
                id: n.id,
                x: n.x,
                y: n.y,
                vx: n.vx,
                vy: n.vy,
                anchorX: n.anchorX,
                anchorY: n.anchorY,
            }));
        }
    }
    return snap;
}

function _takeSnapshot({ clearReactionPreview = true } = {}) {
    if (clearReactionPreview) _clearReactionPreviewState();
    const snap = _makeSnapshot();
    if (_undoStack.length >= _UNDO_MAX) _undoStack.shift();
    _undoStack.push(snap);
    _redoStack = [];
    _updateUndoBtn();
    _updateRedoBtn();
}

function _updateUndoBtn() {
    const btn = document.getElementById('undo-btn');
    if (btn) btn.disabled = _undoStack.length === 0;
}

function _updateRedoBtn() {
    const btn = document.getElementById('redo-btn');
    if (btn) btn.disabled = _redoStack.length === 0;
}

function _restoreSnapshot(snap) {
    _clearReactionPreviewState();
    if (snap.empty) {
        if (snap.mode === 'force') {
            currentMol = null;
            if (mode === 'force') {
                simulation.nodes([]); simulation.force('link').links([]); simulation.stop();
                g.selectAll('*').remove();
                _forceSelLines = null; _forceSelCircles = null; _fgHlLines = null; _fgHlCircles = null;
            }
        } else {
            _mol2d = null; _hCounts2d = null; _stereoMap2d = null;
            if (mode === '2d') g.selectAll('*').remove();
        }
        document.getElementById('molecularFormula').innerHTML = '';
        document.getElementById('molecularWeight').textContent = '';
        document.getElementById('descriptor-body').innerHTML = '';
        document.getElementById('fg-body').innerHTML = '';
        return;
    }

    // Rebuild molecule from snapshot.
    const mol = new Molecule();
    for (const ad of snap.atoms) {
        const atom = mol.addAtom(ad.id, ad.name, { ...ad.properties });
        atom.x = ad.x;
        atom.y = ad.y;
        if (ad.visible !== undefined) atom.visible = ad.visible;
        Object.assign(atom.properties, ad.properties);
    }
    for (const bd of snap.bonds) {
        mol.addBond(bd.id, bd.atoms[0], bd.atoms[1], { ...bd.properties }, false);
        Object.assign(mol.bonds.get(bd.id).properties, bd.properties);
    }

    _selectedAtomIds.clear();
    _selectedBondIds.clear();

    if (snap.mode === '2d') {
        _mol2d = mol;
        _cx2d = snap.cx2d ?? 0;
        _cy2d = snap.cy2d ?? 0;
        _hCounts2d = snap.hCounts2d ? new Map(snap.hCounts2d) : new Map();
        _stereoMap2d = snap.stereoMap2d ? new Map(snap.stereoMap2d) : new Map();
        if (mode === '2d') draw2d();
    } else {
        currentMol = mol;
        if (mode === 'force') {
            updateForce(mol, { preservePositions: true, preserveView: true });
            if (snap.nodePositions) {
                const posMap = new Map(snap.nodePositions.map(p => [p.id, p]));
                for (const node of simulation.nodes()) {
                    const p = posMap.get(node.id);
                    if (p) {
                        node.x = p.x;
                        node.y = p.y;
                        node.vx = Number.isFinite(p.vx) ? p.vx : 0;
                        node.vy = Number.isFinite(p.vy) ? p.vy : 0;
                        node.anchorX = Number.isFinite(p.anchorX) ? p.anchorX : node.anchorX;
                        node.anchorY = Number.isFinite(p.anchorY) ? p.anchorY : node.anchorY;
                    }
                }
                simulation.alpha(0.18).restart();
            }
        }
    }

    updateFormula(mol);
    updateDescriptors(mol);
    updateFunctionalGroups(mol);
    updateReactionTemplatesPanel();
    _syncInputField(mol);
}

window.undoAction = function undoAction() {
    if (_undoStack.length === 0) return;
    const redoSnap = _makeSnapshot();
    if (_redoStack.length >= _UNDO_MAX) _redoStack.shift();
    _redoStack.push(redoSnap);
    _updateRedoBtn();
    const snap = _undoStack.pop();
    _updateUndoBtn();
    _restoreSnapshot(snap);
};

window.redoAction = function redoAction() {
    if (_redoStack.length === 0) return;
    const undoSnap = _makeSnapshot();
    if (_undoStack.length >= _UNDO_MAX) _undoStack.shift();
    _undoStack.push(undoSnap);
    _updateUndoBtn();
    const snap = _redoStack.pop();
    _updateRedoBtn();
    _restoreSnapshot(snap);
};

function _getConnectedComponentAtomIds(mol, seedAtomIds) {
    const componentAtomIds = new Set();
    const queue = [...seedAtomIds];

    while (queue.length > 0) {
        const atomId = queue.shift();
        if (componentAtomIds.has(atomId)) continue;
        const atom = mol.atoms.get(atomId);
        if (!atom) continue;
        componentAtomIds.add(atomId);
        for (const bondId of atom.bonds) {
            const bond = mol.bonds.get(bondId);
            if (!bond) continue;
            const nextAtomId = bond.getOtherAtom(atomId);
            if (!componentAtomIds.has(nextAtomId)) queue.push(nextAtomId);
        }
    }

    return componentAtomIds;
}

function _select2dComponent(seedAtomIds, additive = false) {
    if (!_mol2d) return;
    const componentAtomIds = _getConnectedComponentAtomIds(_mol2d, seedAtomIds);

    _clearPrimitiveHover();
    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }

    for (const atomId of componentAtomIds) {
        const atom = _mol2d.atoms.get(atomId);
        if (!atom || atom.x == null || atom.visible === false) continue;
        _selectedAtomIds.add(atomId);
    }

    for (const bond of _mol2d.bonds.values()) {
        const [a1, a2] = bond.atoms;
        if (!componentAtomIds.has(a1) || !componentAtomIds.has(a2)) continue;
        _selectedBondIds.add(bond.id);
    }

    draw2d();
}

function _select2dPrimitive(atomIds = [], bondIds = [], additive = false) {
    if (!_mol2d) return;

    _clearPrimitiveHover();
    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }

    for (const atomId of atomIds) {
        const atom = _mol2d.atoms.get(atomId);
        if (!atom || atom.x == null || atom.visible === false) continue;
        if (additive && _selectedAtomIds.has(atomId)) {
            _selectedAtomIds.delete(atomId);
        } else {
            _selectedAtomIds.add(atomId);
        }
    }

    for (const bondId of bondIds) {
        const bond = _mol2d.bonds.get(bondId);
        if (!bond) continue;
        const [a1, a2] = bond.getAtomObjects(_mol2d);
        if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
        const isHiddenBond = a1.visible === false || a2.visible === false;
        if (isHiddenBond && !(_stereoMap2d && _stereoMap2d.has(bond.id))) continue;
        if (additive && _selectedBondIds.has(bondId)) {
            _selectedBondIds.delete(bondId);
        } else {
            _selectedBondIds.add(bondId);
        }
    }

    draw2d();
}

/**
 * Distance (px) to shorten the bond from `atom`'s end so it stops at the
 * edge of the atom's label bounding box.  Returns 0 for unlabelled atoms.
 */
function _labelClearance(atom, otherSVGPt, toSVGPt) {
    const label = getAtomLabel(atom, _hCounts2d, toSVGPt, _mol2d);
    if (!label) return 0;
    const { x, y } = toSVGPt(atom);
    const dx = otherSVGPt.x - x, dy = otherSVGPt.y - y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const prefixHydrogenMatch = label.match(/^(H\d*)([A-Z][a-z]?)$/);
    const suffixHydrogenMatch = label.match(/^([A-Z][a-z]?)(H\d*)$/);
    const elementLabel = prefixHydrogenMatch?.[2] ?? suffixHydrogenMatch?.[1] ?? null;
    const heavyNeighbors = atom.getNeighbors(_mol2d).filter(n => n?.name !== 'H');
    const isCarbonylAdjacentHydroxyl =
        atom.name === 'O' &&
        !!elementLabel &&
        heavyNeighbors.length === 1 &&
        heavyNeighbors[0].name === 'C' &&
        heavyNeighbors[0].getNeighbors(_mol2d).some(nb => {
            if (!nb || nb.id === atom.id || nb.name !== 'O') return false;
            const bond = _mol2d.getBond(heavyNeighbors[0].id, nb.id);
            return (bond?.properties.order ?? 1) >= 2;
        });
    const useElementAnchorBox = isCarbonylAdjacentHydroxyl;
    const cx = useElementAnchorBox ? 0 : labelTextOffset(label, FONT_SIZE);
    const hw = useElementAnchorBox
        ? (FONT_SIZE * 0.38 * elementLabel.length + 4) / 2 + 7
        : labelHalfW(label, FONT_SIZE) + 1;
    const hh = labelHalfH(label, FONT_SIZE) + 1;
    const dirX = dx / len;
    const dirY = dy / len;

    const txCandidates = [];
    if (Math.abs(dirX) > 1e-9) {
        txCandidates.push((cx + hw) / dirX);
        txCandidates.push((cx - hw) / dirX);
    }
    const tyCandidates = [];
    if (Math.abs(dirY) > 1e-9) {
        tyCandidates.push(hh / dirY);
        tyCandidates.push(-hh / dirY);
    }

    let best = Infinity;
    for (const t of [...txCandidates, ...tyCandidates]) {
        if (!(t > 0)) continue;
        const px = dirX * t;
        const py = dirY * t;
        if (px < cx - hw - 1e-6 || px > cx + hw + 1e-6) continue;
        if (py < -hh - 1e-6 || py > hh + 1e-6) continue;
        best = Math.min(best, t);
    }
    return Number.isFinite(best) ? best : Math.max(hw, hh);
}

function _drawBond(container, bond, a1, a2, mol, toSVGPt, stereoType = null) {
    // a1 is the chiral center (wedge/dash tip) when stereoType is set.
    if (stereoType === 'wedge' || stereoType === 'dash') {
        const s1 = toSVGPt(a1);
        const s2orig = toSVGPt(a2);
        const { nx, ny } = perpUnit(s2orig.x - s1.x, s2orig.y - s1.y);
        // Shorten the far end (a2) if it carries a label (e.g. F, Cl, N…)
        const c2 = _labelClearance(a2, s1, toSVGPt);
        const blen = Math.sqrt((s2orig.x - s1.x) ** 2 + (s2orig.y - s1.y) ** 2) || 1;
        const s2 = {
            x: s2orig.x - (s2orig.x - s1.x) / blen * c2,
            y: s2orig.y - (s2orig.y - s1.y) / blen * c2,
        };
        if (stereoType === 'wedge') {
            container.append('polygon')
                .attr('class', 'bond bond-wedge')
                .attr('points',
                    `${s1.x},${s1.y} ` +
                    `${s2.x - nx * WEDGE_HALF_W},${s2.y - ny * WEDGE_HALF_W} ` +
                    `${s2.x + nx * WEDGE_HALF_W},${s2.y + ny * WEDGE_HALF_W}`)
                .style('fill', '#111')
                .style('stroke', 'none');
        } else {
            for (let i = 1; i <= WEDGE_DASHES; i++) {
                const t = i / (WEDGE_DASHES + 1);
                const px = s1.x + t * (s2.x - s1.x);
                const py = s1.y + t * (s2.y - s1.y);
                const hw = WEDGE_HALF_W * t;
                container.append('line')
                    .attr('class', 'bond bond-hash')
                    .attr('x1', px - nx * hw).attr('y1', py - ny * hw)
                    .attr('x2', px + nx * hw).attr('y2', py + ny * hw)
                    .style('stroke', '#111')
                    .style('stroke-width', '1.2px')
                    .style('stroke-linecap', 'round');
            }
        }
        return;
    }

    const order = renderBondOrder(bond);
    const s1 = toSVGPt(a1), s2 = toSVGPt(a2);
    const c1 = _labelClearance(a1, s2, toSVGPt);
    const c2 = _labelClearance(a2, s1, toSVGPt);
    const dx = s2.x - s1.x, dy = s2.y - s1.y;
    const { nx, ny } = perpUnit(dx, dy);
    if (order === 1) {
        const l = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
        addLine(container, l.x1, l.y1, l.x2, l.y2);
    } else if (order === 2) {
        const dir = secondaryDir(a1, a2, mol, toSVGPt);
        const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
        addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
        const ox = nx * BOND_OFF_2D * dir, oy = ny * BOND_OFF_2D * dir;
        const lsec = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
            Math.max(c1, 4), Math.max(c2, 4));
        addLine(container, lsec.x1, lsec.y1, lsec.x2, lsec.y2);
    } else if (order === 3) {
        for (const d of [-BOND_OFF_2D, 0, BOND_OFF_2D]) {
            const ox = nx * d, oy = ny * d;
            const lt = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
                d !== 0 ? Math.max(c1, 4) : c1, d !== 0 ? Math.max(c2, 4) : c2);
            addLine(container, lt.x1, lt.y1, lt.x2, lt.y2);
        }
    } else if (order === 1.5) {
        const dir = secondaryDir(a1, a2, mol, toSVGPt);
        const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
        addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
        const ox = nx * BOND_OFF_2D * dir, oy = ny * BOND_OFF_2D * dir;
        const ldash = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
            Math.max(c1, 5), Math.max(c2, 5));
        addLine(container, ldash.x1, ldash.y1, ldash.x2, ldash.y2, 'bond-dashed');
    }
}

function _redraw2dHighlights() {
    g.select('g.atom-highlights').remove();
    if (_highlightedAtomIds.size === 0 || !_mol2d) return;
    const mol     = _mol2d;
    const hCounts = _hCounts2d;
    const toSVGPt = _toSVGPt2d;
    const atoms   = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
    const HL_COLOR = 'rgb(130, 210, 80)';
    const OL_COLOR = 'rgb(70, 140, 40)';
    const OL = 2;
    const hlLayer = g.insert('g', ':first-child').attr('class', 'atom-highlights').attr('opacity', 0.45);
    for (const atomSet of _highlightedAtomSets) {
        const mBonds = [];
        for (const bond of mol.bonds.values()) {
            const [ba1, ba2] = bond.getAtomObjects(mol);
            if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
            if (ba1.visible === false || ba2.visible === false) continue;
            if (!atomSet.has(ba1.id) || !atomSet.has(ba2.id)) continue;
            const p1 = toSVGPt(ba1), p2 = toSVGPt(ba2);
            const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + 5;
            const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + 5;
            mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
        }
        const mAtoms = [];
        for (const atom of atoms) {
            if (!atomSet.has(atom.id)) continue;
            const { x, y } = toSVGPt(atom);
            const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 5;
            mAtoms.push({ x, y, r });
        }
        const addL = (stroke, extra) => {
            for (const { p1, p2, w } of mBonds)
                hlLayer.append('line')
                    .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
                    .attr('stroke', stroke).attr('stroke-width', w + extra * 2)
                    .attr('stroke-linecap', 'round');
        };
        const addC = (fill, extra) => {
            for (const { x, y, r } of mAtoms)
                hlLayer.append('circle')
                    .attr('cx', x).attr('cy', y).attr('r', r + extra)
                    .attr('fill', fill).attr('stroke', 'none');
        };
        addL(OL_COLOR, OL); addC(OL_COLOR, OL);
        addL(HL_COLOR,  0); addC(HL_COLOR,  0);
    }
}
