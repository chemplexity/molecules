<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>molecules</title>

    <script type="importmap">
      {
        "imports": {
          "node:crypto": "data:text/javascript,export const randomUUID = () => globalThis.crypto.randomUUID();"
        }
      }
    </script>

    <link rel="stylesheet" href="src/app/styles.css" />
  </head>

  <body>
    <div id="erase-cursor"></div>
    <div id="wrapper">
      <div id="header">
        <div id="format-toggle">
          <button id="smiles-mode-btn" class="active" onclick="setInputFormat('smiles')">SMILES</button>
          <button id="inchi-mode-btn" onclick="setInputFormat('inchi')">InChI</button>
        </div>
        <div id="collection-picker">
          <select id="collection-select" aria-label="Molecule Catalog...">
            <option value="">Molecule Catalog...</option>
          </select>
        </div>
        <div id="user-input">
          <form onsubmit="return false;">
            <div class="group">
              <input type="text" id="smiles-input" autocomplete="off" spellcheck="false" />
              <span class="highlight"></span>
              <span class="bar"></span>
              <label for="smiles-input" id="input-label">Input SMILES notation...</label>
            </div>
          </form>
        </div>
        <div id="examples">
          <p class="examples" id="examples-list"></p>
        </div>
      </div>

      <div id="content-main">
        <div id="plot">
          <div id="toggle-controls">
            <button id="toggle-btn" onclick="toggleMode()">⚡ Force Layout</button>
          </div>
          <div id="atom-selector">
            <button id="elem-btn-C" title="Carbon" onclick="setDrawElement('C')">C</button>
            <button id="elem-btn-N" title="Nitrogen" onclick="setDrawElement('N')">N</button>
            <button id="elem-btn-O" title="Oxygen" onclick="setDrawElement('O')">O</button>
            <button id="elem-btn-S" title="Sulfur" onclick="setDrawElement('S')">S</button>
            <button id="elem-btn-P" title="Phosphorus" onclick="setDrawElement('P')">P</button>
            <button id="elem-btn-F" title="Fluorine" onclick="setDrawElement('F')">F</button>
            <button id="elem-btn-Cl" title="Chlorine" onclick="setDrawElement('Cl')">Cl</button>
            <button id="elem-btn-Br" title="Bromine" onclick="setDrawElement('Br')">Br</button>
            <button id="elem-btn-I" title="Iodine" onclick="setDrawElement('I')">I</button>
          </div>
          <div id="undo-controls">
            <button id="undo-btn" title="Undo (Ctrl+Z)" onclick="undoAction()" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M3 4.5H8a4 4 0 0 1 0 8H4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none" />
                <polyline points="5,2.5 3,4.5 5,6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <button id="redo-btn" title="Redo (Ctrl+Shift+Z)" onclick="redoAction()" disabled>
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M12 4.5H7a4 4 0 0 0 0 8h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none" />
                <polyline points="10,2.5 12,4.5 10,6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
          <div id="force-controls">
            <button id="label-toggle" title="Toggle atom labels" onclick="toggleLabels()">Atom Labels</button>
            <button id="force-rotate-ccw" title="Rotate counter-clockwise">&#x21BA;</button>
            <button id="force-rotate-cw" title="Rotate clockwise">&#x21BB;</button>
            <button id="force-flip-h" title="Flip horizontal">&#x2194;</button>
            <button id="force-flip-v" title="Flip vertical">&#x2195;</button>
            <button id="copy-force-svg-btn" title="Copy as SVG" onclick="copyForceSvg()">SVG</button>
            <button id="copy-force-png-btn" title="Copy as PNG" onclick="copyForcePng()">PNG</button>
          </div>
          <div id="rotate-controls">
            <button id="rotate-ccw" title="Rotate counter-clockwise">&#x21BA;</button>
            <button id="rotate-cw" title="Rotate clockwise">&#x21BB;</button>
            <button id="flip-h" title="Flip horizontal">&#x2194;</button>
            <button id="flip-v" title="Flip vertical">&#x2195;</button>
            <button id="copy-svg-btn" title="Copy 2D structure as SVG to clipboard" onclick="copySvg2d()">SVG</button>
            <button id="save-png-btn" title="Copy 2D structure as PNG to clipboard" onclick="savePng2d()">PNG</button>
          </div>
          <div id="clean-controls">
            <button id="pan-mode-btn" class="active" title="Pan / zoom mode" onclick="togglePanMode()">🤚</button>
            <button id="select-mode-btn" title="Selection mode — drag to select atoms and bonds" onclick="toggleSelectMode()">⬚</button>
            <button id="erase-btn" title="Erase mode — click atoms or bonds to delete" onclick="toggleEraseMode()">🗑️</button>
            <button id="clean-2d-btn" title="Clean 2D layout" onclick="cleanLayout2d()">🧹</button>
            <button id="clean-force-btn" title="Clean force layout" onclick="cleanLayoutForce()" style="display: none">🧹</button>
          </div>
          <div id="draw-tools">
            <button id="draw-bond-btn" title="Draw bond" onclick="toggleDrawBondMode()">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>
        <div id="sidebar">
          <div id="descriptor-panel">
            <div id="descriptor-tabs">
              <button class="desc-tab active" data-tab="topological">Topological</button>
              <button class="desc-tab" data-tab="physicochemical">Physicochemical</button>
            </div>
            <div id="tab-topological" class="desc-tab-panel">
              <table id="descriptor-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="descriptor-body"></tbody>
              </table>
            </div>
            <div id="tab-physicochemical" class="desc-tab-panel" style="display: none">
              <table id="pc-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="pc-body"></tbody>
              </table>
            </div>
          </div>
          <div id="smarts-panel">
            <div id="smarts-tabs">
              <button class="smarts-tab active" data-tab="functional-groups">Functional Groups</button>
              <button class="smarts-tab" data-tab="reactions">Reactions</button>
              <button class="smarts-tab" data-tab="other">Other</button>
            </div>
            <div id="tab-functional-groups" class="smarts-tab-panel">
              <table id="fg-table">
                <tbody id="fg-body"></tbody>
              </table>
            </div>
            <div id="tab-reactions" class="smarts-tab-panel" style="display: none">
              <table id="reaction-table">
                <tbody id="reaction-body"></tbody>
              </table>
            </div>
            <div id="tab-other" class="smarts-tab-panel" style="display: none">
              <table id="resonance-table">
                <tbody id="resonance-body"></tbody>
                <tbody id="bond-en-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="footer">
        <div id="content-info">
          <span id="molecularFormula"></span>
          <span id="molecularWeight"></span>
        </div>
        <div id="content-source">
          <a href="https://github.com/chemplexity/molecules" target="_blank">source</a>
          <button id="options-btn" type="button" title="Options" onclick="openOptionsModal()">⚙</button>
        </div>
      </div>
    </div>

    <div id="options-overlay" hidden>
      <div id="options-modal" role="dialog" aria-modal="true" aria-labelledby="options-title">
        <div class="options-header">
          <h2 id="options-title">Options</h2>
        </div>
        <div class="options-body">
          <section class="options-section">
            <h3>Global</h3>
            <label class="option-row option-toggle" for="options-show-atom-tooltips">
              <span>Atom Tooltips</span>
              <input id="options-show-atom-tooltips" type="checkbox" checked />
            </label>
            <label class="option-row option-toggle" for="options-show-valence-warnings">
              <span>Show Valence Warnings</span>
              <input id="options-show-valence-warnings" type="checkbox" checked />
            </label>
            <label class="option-row option-toggle" for="options-show-lone-pairs">
              <span>Show Lone Pairs</span>
              <input id="options-show-lone-pairs" type="checkbox" />
            </label>
          </section>
          <section class="options-section">
            <h3>2D Layout</h3>
            <label class="option-row option-toggle" for="options-2d-atom-coloring" title="Color atoms by element type (CPK colors). Uncheck for black and white rendering.">

            </label>

            </label>
            <label class="option-row" for="options-2d-bond-thickness">
              <span>Bond Thickness</span>
              <input id="options-2d-bond-thickness" type="number" min="0.8" max="4" step="0.1" />
            </label>
          </section>
          <section class="options-section">
            <h3>Force Layout</h3>
            <label class="option-row" for="options-force-atom-size">

            </label>
            <label class="option-row" for="options-force-bond-thickness">
              <span>Bond Thickness</span>
              <input id="options-force-bond-thickness" type="number" min="0.5" max="2.5" step="0.1" />
            </label>
          </section>
        </div>
        <div class="options-actions">
          <button id="options-reset-btn" type="button">Reset</button>
          <button id="options-cancel-btn" type="button">Cancel</button>
          <button id="options-apply-btn" type="button">Apply</button>
        </div>
      </div>
    </div>

    <div class="tooltip" id="atom-tooltip" style="opacity: 0"></div>

      const atomBBox =
        mol2dHelpers.atomBBox ??
        function atomBBoxFallback(atoms) {
          let minX = Infinity,
            maxX = -Infinity,
            minY = Infinity,
            maxY = -Infinity;
          for (const a of atoms) {
            if (a.x < minX) minX = a.x;
            if (a.x > maxX) maxX = a.x;
            if (a.y < minY) minY = a.y;
            if (a.y > maxY) maxY = a.y;
          }
          return {
            minX,
            maxX,
            minY,
            maxY,
            cx: (minX + maxX) / 2,
            cy: (minY + maxY) / 2
          };
        };

        if (!getRenderOptions().showValenceWarnings) {
          return new Map();

        return new Map(validateValence(molecule).map(warning => [warning.atomId, warning]));

            getCurrentSmiles: () => currentSmiles,
            setCurrentSmiles: value => {
              currentSmiles = value;
            },
            getCurrentInchi: () => currentInchi,
            setCurrentInchi: value => {
              currentInchi = value;
            },
            getCurrentMol: () => currentMol,
            setCurrentMol: value => {
              currentMol = value;
            },
            getMol2d: () => _mol2d,
            setMol2d: value => {
              _mol2d = value;
            },
            getMode: () => mode,
            clear2dDerivedState: () => {
              _hCounts2d = null;
              _stereoMap2d = null;
            },
            clearSelection: () => {
              _selectedAtomIds.clear();
              _selectedBondIds.clear();
            },
            clearHovered: () => {
              _hoveredAtomIds.clear();
              _hoveredBondIds.clear();
            },
            clearForceRenderCaches: () => {
              _forceSelLines = null;
              _forceSelCircles = null;
              _forceValenceWarningCircles = null;
              _fgHlLines = null;
              _fgHlCircles = null;
            },
            resetValenceWarnings: () => {
              _activeValenceWarningMap = new Map();
              _selectionValenceTooltipAtomId = null;
            }
          },
          dom: {
            getInputElement: () => inputEl,
            setInputFormatButtons: fmt => {
              document.getElementById('smiles-mode-btn').classList.toggle('active', fmt === 'smiles');
              document.getElementById('inchi-mode-btn').classList.toggle('active', fmt === 'inchi');
            },
            setInputLabel: text => {
              document.getElementById('input-label').textContent = text;
            }
          },
          history: {
            takeSnapshot: options => _takeSnapshot(options)
          },
          snapshot: {
            capture: options => _captureAppSnapshot(options)
          },
          molecule: {
            getMolSmiles: () => window._getMolSmiles?.() ?? null,
            getMolInchi: () => window._getMolInchi?.() ?? null
          },
          collection: {
            getInputValue: fmt => inputControls?.getCollectionInputValue(fmt) ?? '',
            syncPickerForInputValue: value => inputControls?.syncCollectionPickerForInputValue(value)
          },
          examples: {
            render: () => inputControls?.renderExamples()
          },
          parsers: {
            parseSMILES,
            parseINCHI,
            detectChemicalStringFormat
          },
          overlays: {
            hasReactionPreview: () => _hasReactionPreview(),
            clearReactionPreviewState: () => _clearReactionPreviewState()
          },
          renderers: inputFlowRenderers,
          highlights: {
            clear: () => clearHighlightState()
          },
          force: {
            clearIfActive: () => {
              if (mode === 'force') {
                simulation.nodes([]);
                simulation.force('link').links([]);
                simulation.stop();
              }
            }
          },
          analysis: {
            updatePanels: (mol, options = {}) => _updateAnalysisPanels(mol, options),
            clearSummary: () => {
              document.getElementById('molecularFormula').innerHTML = '';
              document.getElementById('molecularWeight').textContent = '';
              document.getElementById('descriptor-body').innerHTML = '';
            }
          }
        })
      );

      inputControls = createInputControls(
        createInputControlsDeps({
          data: {
            exampleMolecules: window._getExampleMolecules?.() ?? [],
            randomMolecule: window.randomMolecule ?? [],
            moleculeCatalog
          },
          state: {
            getInputMode: () => inputMode
          },
          dom: {
            getInputElement: () => inputEl,
            getCollectionSelectElement: () => collectionSelectEl,
            getExamplesElement: () => document.getElementById('examples-list')
          },
          actions: {
            parseInput: value => inputFlowManager.parseInput(value),
            parseInputWithAutoFormat: value => inputFlowManager.parseInputWithAutoFormat(value)
          }
        })
      );

      appController = createAppController(
        createAppControllerDeps({
          state: appState,
          renderers: renderRuntime,
          history: {
            takeSnapshot: options => _takeSnapshot(options),
            captureSnapshot: options => _captureAppSnapshot(options)
          },
          panels: {},
          analysis: {
            syncInputField: mol => _syncInputField(mol),
            updateFormula: mol => updateFormula(mol),
            updateDescriptors: mol => updateDescriptors(mol),
            updatePanels: mol => _updateAnalysisPanels(mol)
          },
          dom: {
            plotEl
          },
          overlays: {
            hasReactionPreview: () => _hasReactionPreview(),
            prepareReactionPreviewBondEditTarget: bondId => _prepareReactionPreviewBondEditTarget(bondId),
            prepareReactionPreviewEditTargets: payload => _prepareReactionPreviewEditTargets(payload),
            prepareResonanceStructuralEdit: mol => _prepareResonanceStructuralEdit(mol)
          },
          snapshot: {
            capture: options => _captureAppSnapshot(options),
            restore: snap => _restoreSnapshot(snap)
          },
          navigation: navigationActions
        })
      );

      structuralEditActions = createStructuralEditActions({
        controller: {
          performStructuralEdit: (...args) => appController.performStructuralEdit(...args)
        },
        getMode: () => mode,
        getDrawBondElement: () => _drawBondElement,
        molecule: {
          getActive: () => (mode === 'force' ? currentMol : _mol2d),
          getCurrentForceMol: () => currentMol
        },
        view: {
          captureZoomTransformSnapshot: () => _captureZoomTransformSnapshot(),
          restoreZoomTransformSnapshot: snapshot => _restoreZoomTransformSnapshot(snapshot),
          zoomToFitIf2d: () => _zoomToFitIf2d()
        },
        resonance: {
          prepareResonanceStateForStructuralEdit: mol => prepareResonanceStateForStructuralEdit(mol)
        },
        chemistry: {
          kekulize,
          refreshAromaticity
        },
        force: {
          getSimulation: () => simulation,
          isHydrogenNode,
          placeHydrogensAroundParent: (parent, hydrogens, links, options = {}) => forceHelpers.placeHydrogensAroundParent(parent, hydrogens, links, options),
          patchNodePositions: patchPos => forceHelpers.patchForceNodePositions(patchPos),
          reseatHydrogensAroundPatched: patchPos => forceHelpers.reseatHydrogensAroundPatched(patchPos)
        },
        constants: {
          forceBondLength: FORCE_LAYOUT_BOND_LENGTH
        }
      });

      // Undo/redo — logic lives in src/app/core/undo.js
      initUndo(
        createUndoDeps({
          captureAppSnapshot: options => appController.captureAppSnapshot(options),
          clearReactionPreviewState: () => _clearReactionPreviewState(),
          restoreReactionPreviewSource: () => _restoreReactionPreviewSource(),
          restoreAppSnapshot: snap => appController.restoreAppSnapshot(snap)
        })
      );

      initHighlights({
        get mode() {
          return mode;
        },
        get _mol2d() {
          return _mol2d;
        },
        draw2d: () => draw2d(),
        applyForceHighlights: () => applyForceHighlights()
      });

      // Export — logic lives in src/app/ui/export.js
      initExport({
        g,
        simulation,
        get _mol2d() {
          return _mol2d;
        },
        prepare2dExport: () => _prepare2dExportHighlightState()
      });

      // Reaction preview — logic lives in src/app/render/reaction-2d.js
      initReaction2d(
        createReaction2dDeps({
          g,
          plotEl,
          state: {
            getMode: () => mode,
            getCurrentMol: () => currentMol,
            getMol2d: () => _mol2d
          },
          renderers: {
            draw2d: renderRuntime.draw2d,
            applyForceHighlights: () => applyForceHighlights(),
            renderMol: renderRuntime.renderMol
          },
          view: {
            captureZoomTransform: () => _captureZoomTransformSnapshot(),
            restoreZoomTransform: snapshot => _restoreZoomTransformSnapshot(snapshot)
          },
          history: {
            captureAppSnapshot: options => appController.captureAppSnapshot(options),
            takeSnapshot: options => _takeSnapshot(options)
          }
        })
      );

      initResonancePanel(
        createResonancePanelDeps({
          state: {
            getMode: () => mode,
            getCurrentMol: () => currentMol,
            getMol2d: () => _mol2d
          },
          renderers: {
            draw2d: renderRuntime.draw2d,
            updateForce: renderRuntime.updateForce
          },
          overlays: {
            hasReactionPreview: () => _hasReactionPreview(),
            restoreReactionPreviewSource: options => _restoreReactionPreviewSource(options)
          },
          history: {
            takeSnapshot: options => _takeSnapshot(options)
          }
        })
      );

      initBondEnPanel(
        createBondEnPanelDeps({
          state: {
            getMode: () => mode,
            getCurrentMol: () => currentMol,
            getMol2d: () => _mol2d
          },
          renderers: {
            draw2d: renderRuntime.draw2d,
            updateForce: renderRuntime.updateForce
          }
        })
      );

      initNavigationInteractions({
        controller: appController
      });

      initKeyboardInteractions({
        state: appState,
        selection: selectionActions,
        drawBond: {
          hasDrawBondState: () => !!_drawBondState,
          cancelDrawBond: () => drawBondPreviewActions.cancel()
        },
        overlays: {
          isReactionPreviewEditableAtomId: id => _isReactionPreviewEditableAtomId(id)
        },
        actions: {
          deleteSelection: () => editingActions.deleteSelection(),
          deleteTargets: (atomIds, bondIds, options = {}) => editingActions.deleteTargets(atomIds, bondIds, options),
          changeAtomElements: (atomIds, newEl) => _changeAtomElements(atomIds, newEl)
        },
        history: {
          undo: () => undoAction(),
          redo: () => redoAction()
        },
        view: {
          getZoomTransform: () => d3.zoomTransform(svg.node()),
          setZoomTransform: transform => svg.call(zoom.transform, transform),
          makeZoomIdentity: (x, y, k) => d3.zoomIdentity.translate(x, y).scale(k),
          applySelectionOverlay: () => (mode === 'force' ? applyForceSelection() : selectionOverlayManager.redraw2dSelection()),
          refreshSelectionOverlay: () => _refreshSelectionOverlay(),
          clearPrimitiveHover: () => _clearPrimitiveHover()
        }
      });

      initGestureInteractions({
        state: appState,
        selection: selectionActions,
        renderers: {
          applySelectionOverlay: () => (mode === 'force' ? applyForceSelection() : selectionOverlayManager.redraw2dSelection())
        },
        overlays: {
          hasReactionPreview: () => _hasReactionPreview()
        },
        drawBond: {
          hasDrawBondState: () => !!_drawBondState,
          start: (atomId, gX, gY) => drawBondPreviewActions.start(atomId, gX, gY),
          markDragged: () => drawBondPreviewActions.markDragged(),
          updatePreview: point => drawBondPreviewActions.update(point),
          commit: () => _commitDrawBond()
        },
        actions: {
          eraseItem: (atomIds, bondIds) => editingActions.eraseItem(atomIds, bondIds)
        },
        view: {
          getZoomTransform: () => d3.zoomTransform(svg.node()),
          clearPrimitiveHover: () => _clearPrimitiveHover(),
          showPrimitiveHover: (atomIds = [], bondIds = []) => _showPrimitiveHover(atomIds, bondIds),
          setDrawBondHoverSuppressed: value => {
            _drawBondHoverSuppressed = value;
          }
        },
        helpers: {
          toSVGPt2d: atom => render2DHelpers.toSVGPt2d(atom),
          getDatum: element => d3.select(element).datum()
        },
        simulation,
        svg,
        g,
        d3,
        pointer: (event, node) => d3.pointer(event, node),
        schedule: callback => requestAnimationFrame(callback),
        dom: {
          plotEl,
          getEraseCursorElement: () => document.getElementById('erase-cursor')
        }
      });

      const appDelegates = createAppDelegates({
        state: {
          getMode: () => mode,
          getCurrentMol: () => currentMol,
          setCurrentMol: value => {
            currentMol = value;
          },
          getMol2d: () => _mol2d,
          setMol2d: value => {
            _mol2d = value;
          },
          clear2dDerivedState: () => {
            _hCounts2d = new Map();
            _stereoMap2d = new Map();
          },
          getStereoMap2d: () => _stereoMap2d
        },
        primitiveSelection: primitiveSelectionActions,
        render2DHelpers,
        highlight2DRenderer,
        structuralEditActions,
        drawBondPreviewActions,
        drawBondCommitActions,
        scene2DRenderer,
        editingActions,
        zoomTransformHelpers,
        stereo: {
          syncDisplayStereo
        },
        renderRuntime,
        inputFlowManager
      });

      const {
        handle2dPrimitiveClick: _handle2dPrimitiveClick,
        handle2dComponentDblClick: _handle2dComponentDblClick,
        handleForcePrimitiveClick: _handleForcePrimitiveClick,
        handleForceComponentDblClick: _handleForceComponentDblClick,
        drawBond: _drawBond,
        redraw2dHighlights: _redraw2dHighlights,
        restore2dEditViewport: _restore2dEditViewport,
        prepareResonanceStructuralEdit: _prepareResonanceStructuralEdit,
        promoteBondOrder: _promoteBondOrder,
        changeAtomElements: _changeAtomElements,
        replaceForceHydrogenWithDrawElement: _replaceForceHydrogenWithDrawElement,
        startDrawBond: _startDrawBond,
        updateDrawBondPreview: _updateDrawBondPreview,
        resetDrawBondHover: _resetDrawBondHover,
        cancelDrawBond: _cancelDrawBond,
        ensureMol: _ensureMol,
        autoPlaceBond: _autoPlaceBond,
        commitDrawBond: _commitDrawBond,
        draw2d,
        render2d,
        fitCurrent2dView,
        eraseItem: _eraseItem,
        captureZoomTransformSnapshot: _captureZoomTransformSnapshot,
        restoreZoomTransformSnapshot: _restoreZoomTransformSnapshot,
        pickStereoWedgesPreserving2dChoice: _pickStereoWedgesPreserving2dChoice,
        renderMol: _renderMol,
        clearMolecule,
        parseAndRender,
        parseAndRenderInchi
      } = appDelegates;

      const optionsModal = initOptionsModal(
        createOptionsModalDeps({
        doc: document,
        dom: {
          getOverlayElement: () => document.getElementById('options-overlay'),
          getShowValenceWarningsElement: () => document.getElementById('options-show-valence-warnings'),
          getShowAtomTooltipsElement: () => document.getElementById('options-show-atom-tooltips'),
          getShowLonePairsElement: () => document.getElementById('options-show-lone-pairs'),
          get2DAtomColoringElement: () => document.getElementById('options-2d-atom-coloring'),
          get2DAtomFontSizeElement: () => document.getElementById('options-2d-atom-font-size'),
          get2DBondThicknessElement: () => document.getElementById('options-2d-bond-thickness'),
          getForceAtomSizeElement: () => document.getElementById('options-force-atom-size'),
          getForceBondThicknessElement: () => document.getElementById('options-force-bond-thickness'),
          getResetButtonElement: () => document.getElementById('options-reset-btn'),
          getCancelButtonElement: () => document.getElementById('options-cancel-btn'),
          getApplyButtonElement: () => document.getElementById('options-apply-btn')
        },
        options: {
          limits: RENDER_OPTION_LIMITS,
          getRenderOptions: () => getRenderOptions(),
          getDefaultRenderOptions: () => getDefaultRenderOptions(),
          updateRenderOptions: nextOptions => updateRenderOptions(nextOptions)
        },
        state: {
          getMode: () => mode,
          getCurrentMol: () => currentMol,
          getMol2d: () => _mol2d
        },
        view: {
          setFontSize: value => {
            FONT_SIZE = value;
          },
          hideTooltip: () => {
            _selectionValenceTooltipAtomId = null;
            tooltip.interrupt().style('opacity', 0);
          }
        },
        renderers: {
          draw2d: () => draw2d(),
          updateForce: (mol, options = {}) => forceSceneRenderer.updateForce(mol, options)
        }
        })
      );

      // ---------------------------------------------------------------------------
      // Draw-bond tool helpers
      // ---------------------------------------------------------------------------

      // Mode toggle
      // ---------------------------------------------------------------------------

      const _DRAW_ELEM_PROTONS = {
        H: 1,
        B: 5,
        C: 6,
        N: 7,
        O: 8,
        F: 9,
        P: 15,
        S: 16,
        Cl: 17,
        Br: 35,
        I: 53,
        K: 19
      };

      // ---------------------------------------------------------------------------

      initPlotInteractions({
        plotEl,
        document,
        state: {
          getSelectMode: () => _selectMode,
          getDrawBondMode: () => _drawBondMode,
          hasDrawBondState: () => !!_drawBondState,
          getEraseMode: () => _eraseMode,
          isRenderableMode: () => mode === '2d' || mode === 'force',
          getActiveMolecule: () => (mode === 'force' ? currentMol : _mol2d),
          getTooltipMode: () => (mode === 'force' ? 'force' : '2d')
        },
        options: {
          getShowAtomTooltips: () => getRenderOptions().showAtomTooltips
        },
        analysis: {
          getActiveValenceWarningMap: () => _activeValenceWarningMap
        },
        tooltipState: {
          getSelectionValenceTooltipAtomId: () => _selectionValenceTooltipAtomId,
          setSelectionValenceTooltipAtomId: value => {
            _selectionValenceTooltipAtomId = value;
          }
        },
        tooltip: {
          hide: () => {
            tooltip.interrupt().style('opacity', 0);
          },
          show: (html, event) => {
            tooltip.interrupt().style('opacity', 0.9).html(html).style('left', event.clientX + 13 + 'px').style('top', event.clientY - 20 + 'px');
          }
        },
        helpers: {
          getNodeDatum: element => d3.select(element).datum()
        },
        molecule: {
          getAtomById: (atomId, mol) => mol.atoms.get(atomId) ?? null
        },
        formatters: {
          atomTooltipHtml
        }
      });

      // ---------------------------------------------------------------------------

      // Tab switching for descriptor panel
      initTabPanels({ doc: document });

      _updateAnalysisPanels(currentMol ?? _mol2d);

      // Physicochemical row tooltips — event delegation on the table
      {
        const physchemPanel = initPhyschemPanel(
          createPhyschemPanelDeps({
          dom: {
            getTableElement: () => document.getElementById('pc-table')
          },
          tooltip,
          highlights: {
            setHighlight: (mappings, options = {}) => _setHighlight(mappings, options),
            restorePersistentHighlight: () => _restorePersistentHighlight(),
            setPersistentHighlightFallback: (fn, options) => setPersistentHighlightFallback(fn, options)
          }
          })
        );
        _capturePhyschemHighlightSnapshot = () => physchemPanel.captureSnapshot();
        _restorePhyschemHighlightSnapshot = snapshot => physchemPanel.restoreSnapshot(snapshot);
      }

      // ---------------------------------------------------------------------------
      // Input handling
      // ---------------------------------------------------------------------------
      inputControls.bind();
      const appShell = initAppShell(
        createAppShellDeps({
        win: window,
        dom: {
          getPlotElement: () => document.querySelector('.svg-plot'),
          getLabelToggleElement: () => document.getElementById('label-toggle')
        },
        history: {
          undo: () => undoAction(),
          redo: () => redoAction()
        },
        exportActions: {
          copyForcePng: () => copyForcePng(),
          copyForceSvg: () => copyForceSvg(),
          copySvg2d: () => copySvg2d(),
          savePng2d: () => savePng2d()
        },
        options: {
          open: () => optionsModal.open()
        },
        navigation: {
          cleanLayout2d: () => appController.performViewAction('clean-layout-2d'),
          cleanLayoutForce: () => appController.performViewAction('clean-layout-force'),
          toggleMode: () => appController.performViewAction('toggle-mode')
        },
        selection: {
          togglePanMode: () => selectionActions.togglePanMode(),
          toggleSelectMode: () => selectionActions.toggleSelectMode(),
          toggleDrawBondMode: () => selectionActions.toggleDrawBondMode(),
          toggleEraseMode: () => selectionActions.toggleEraseMode(),
          setDrawElement: el => selectionActions.setDrawElement(el)
        },
        editing: {
          deleteSelection: () => editingActions.deleteSelection()
        },
        state: {
          hasLoadedInput: () => !!(currentSmiles || currentInchi),
          getMode: () => mode
        },
        view: {
          handleForceResize: () => simulation.alpha(0.3).restart(),
          handle2DResize: () => {
            rotationDeg = 0;
            flipH = false;
            flipV = false;
            const _mol = currentInchi ? parseINCHI(currentInchi) : parseSMILES(currentSmiles);
            render2d(_mol);
          }
        },
        input: {
          parseSmiles: smiles => inputFlowManager.parseAndRenderSmiles(smiles),
          parseInchi: inchi => inputFlowManager.parseAndRenderInchi(inchi),
          parseInput: value => inputFlowManager.parseInput(value),
          setInputFormat: (fmt, options = {}) => inputFlowManager.setInputFormat(fmt, options),
          renderExamples: () => inputControls.renderExamples(),
          pickRandomMolecule: () => inputControls.pickRandomMolecule(),
          getCanonicalMol: () => _getReactionPreviewSourceMol() ?? currentMol,
          toSmiles: mol => toSMILES(mol),
          toInchi: mol => toInChI(mol),
          takeInputFormatSnapshot: payload => inputFlowManager.takeInputFormatSnapshot(payload)
        },
        initialState: {
          getInitialSmiles: () => 'CC(=O)C(Cl)CC(C(C)C)C=C',
          setInputValue: value => {
            document.getElementById('smiles-input').value = value;
          },
          syncCollectionPicker: value => inputControls.syncCollectionPickerForInputValue(value)
        }
        })
      );

      // ---------------------------------------------------------------------------
      // Init
      // ---------------------------------------------------------------------------
      appShell.bootstrap();
    </script>
  </body>
</html>
