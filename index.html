<style>

* { box-sizing: border-box; }

html { height: 100%; }

body {

#plot {
    position: absolute;

    overflow: hidden;

#content-source a {

    font-weight: normal;
    color: #53B2C8;
    text-decoration: none;
}

.group {
    position: relative;
    margin-bottom: 5px;
}

.examples {
    color: #999;
    margin: 0;
    padding-left: 15px;
    font-size: 12px;
    font-weight: normal;
    font-family: 'Lucida Sans Unicode', sans-serif;
}

.examples a {
    color: #53B2C8;
    font-weight: bold;
    text-decoration: none;
    cursor: pointer;
}

.examples a:hover { text-decoration: underline; }

input {
    width: 100%;
    font-size: 16px;
    padding: 10px 10px 10px 5px;
    display: block;
    border: none;
    border-bottom: 1px solid #757575;
    background: transparent;
}

input:focus { outline: none; }

input:focus ~ label, input:valid ~ label {
    top: -15px;
    font-size: 13px;
    color: #5264AE;
}

label {
    color: #999;
    font-size: 16px;
    font-weight: normal;
    position: absolute;
    pointer-events: none;
    left: 5px;
    top: 10px;
    transition: 0.2s ease all;
}

.bar {
    position: relative;
    display: block;
    width: 100%;
}

.bar::before, .bar::after {
    content: '';
    height: 2px;
    width: 0;
    bottom: 0;
    position: absolute;
    background: #5264AE;
    transition: 0.2s ease all;
}

.bar::before { left: 50%; }
.bar::after  { right: 50%; }

input:focus ~ .bar::before,
input:focus ~ .bar::after { width: 50%; }

.highlight {
    position: absolute;
    height: 60%;
    width: 100px;
    top: 25%;
    left: 0;
    pointer-events: none;
    opacity: 0.5;
}

input:focus ~ .highlight {
    animation: inputHighlighter 0.3s ease;
}

@keyframes inputHighlighter {
    from { background: #5264AE; }
    to   { width: 0; background: transparent; }
}

.svg-plot {
    width: 100%;
    height: 100%;
    display: block;
}

#plot,
#plot * {
    -webkit-user-select: none;
    user-select: none;
}

/* ── Tooltip ─────────────────────────────────────────────────────────── */

div.tooltip {
    position: fixed;
    text-align: left;
    width: auto;
    min-width: 120px;
    height: auto;
    padding: 6px 10px 8px;
    font-size: 12px;
    font-family: 'Lucida Sans Unicode', sans-serif;
    background: white;
    border: 1px solid #bbb;
    border-radius: 6px;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
    pointer-events: none;
    z-index: 100;
}
div.tooltip .tt-head {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 5px;
    border-bottom: 1px solid #eee;
    padding-bottom: 3px;
}
div.tooltip table {
    border-collapse: collapse;
    width: 100%;
}
div.tooltip td {
    padding: 1px 0;
    vertical-align: top;
}
div.tooltip td:first-child {
    color: #888;
    padding-right: 10px;
    white-space: nowrap;
}

/* ── Force-layout bond lines ─────────────────────────────────────────── */

.link {
    stroke: #696969;
    stroke-linecap: round;
}

/* ── 2D-structure bond lines ─────────────────────────────────────────── */

.bond {
    stroke: #111;
    stroke-linecap: round;
    fill: none;
}

.bond-dashed { stroke-dasharray: 5, 3; }

.atom-bg   { fill: none; stroke: none; }

.atom-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    font-weight: bold;
    text-anchor: middle;
    pointer-events: none;
    user-select: none;
}

.atom-charge {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 9px;
    font-weight: bold;
    pointer-events: none;
    user-select: none;
    dominant-baseline: auto;
}

.atom-hit {
    fill: transparent;
    stroke: none;
    cursor: default;
}

}

#descriptor-table td {

}

#descriptor-table td:last-child {

}

#descriptor-section-title {
    font-size: 13px;

#smarts-panel {

}

#smarts-section-title {

#fg-table tr {

#molecularFormula {

/* ── Plot overlay controls ───────────────────────────────────────────── */

#toggle-controls {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 10;
}

#toggle-btn {
    height: 30px;
    padding: 0 12px;
    border: 1px solid #ccc;
    border-radius: 15px;
    background: #fff;
    cursor: pointer;
    font-size: 12px;
    font-family: arial, helvetica, sans-serif;
    color: #555;

#toggle-btn:hover {

#rotate-controls {

#force-controls button:hover { background: #f0f0f0; }

    border: 1px solid #ccc;

/* ── Format toggle (SMILES / InChI) ─────────────────────────────────── */

#format-toggle {
    position: absolute;

}

#format-toggle button {

</style>

<body>

<div id="wrapper">

    <div id="header">
        <div id="format-toggle">
            <button id="smiles-mode-btn" class="active" onclick="setInputFormat('smiles')">SMILES</button>
            <button id="inchi-mode-btn" onclick="setInputFormat('inchi')">InChI</button>
        </div>
        <div id="user-input">
            <form onsubmit="return false">
                <div class="group">
                    <input type="text" id="smiles-input" required autocomplete="off" spellcheck="false">
                    <span class="highlight"></span>
                    <span class="bar"></span>
                    <label for="smiles-input" id="input-label">Input SMILES notation...</label>
                </div>
            </form>
        </div>
        <div id="examples">
            <p class="examples" id="examples-list"></p>
        </div>
    </div>

    <div id="content-main">
        <div id="plot">
            <div id="toggle-controls">
                <button id="toggle-btn" onclick="toggleMode()">⚡ Force Layout</button>
            </div>
            <div id="force-controls">
                <button id="label-toggle" title="Toggle atom labels" onclick="toggleLabels()">Atom Labels</button>

            </div>
            <div id="clean-controls">
                <button id="pan-mode-btn" class="active" title="Pan / zoom mode" onclick="togglePanMode()">🤚</button>
                <button id="select-mode-btn" title="Selection mode — drag to select atoms and bonds" onclick="toggleSelectMode()">⬚</button>
                <button id="erase-btn" title="Delete selected atoms and bonds" onclick="deleteSelection()">🗑️</button>

            </div>
        </div>
        <div id="sidebar">
            <div id="descriptor-section-title">Descriptors</div>
            <table id="descriptor-table">
                <thead><tr><th>Property</th><th>Value</th></tr></thead>

            <div id="smarts-panel">

        </div>
    </div>

</div>

<div class="tooltip" id="atom-tooltip" style="opacity:0"></div>

<script>
var inputMode = 'smiles';

var exampleMolecules = [
    { name: 'ethanol',     smiles: 'CCO',                                               inchi: 'InChI=1S/C2H6O/c1-2-3/h3H,2H2,1H3' },
    { name: 'glucose',     smiles: 'C([C@@H]1[C@H]([C@@H]([C@H](C(O1)O)O)O)O)O',        inchi: 'InChI=1S/C6H12O6/c7-1-2-3(8)4(9)5(10)6(11)12-2/h2-11H,1H2' },
    { name: 'GHK-Cu',      smiles: 'C1=C(NC=N1)CC(C(=O)N[C@@H](CCCCN)C(=O)O)NC(=O)CN',  inchi: 'InChI=1S/C14H24N6O4/c15-4-2-1-3-10(14(23)24)20-13(22)11(19-12(21)6-16)5-9-7-17-8-18-9/h7-8,10-11H,1-6,15-16H2,(H,17,18)(H,19,21)(H,20,22)(H,23,24)/t10-,11?/m0/s1' },
    { name: 'aspirin',     smiles: 'CC(=O)Oc1ccccc1C(=O)O',                             inchi: 'InChI=1S/C9H8O4/c1-6(10)13-8-5-3-2-4-7(8)9(11)12/h2-5H,1H3,(H,11,12)' },
    { name: 'serotonin',   smiles: 'C1=CC2=C(C=C1O)C(=CN2)CCN',                         inchi: 'InChI=1S/C10H12N2O/c11-4-3-7-6-12-10-2-1-8(13)5-9(7)10/h1-2,5-6,12-13H,3-4,11H2' },
    { name: 'anthracene',  smiles: 'C1=CC2=CC3=CC=CC=C3C=C2C=C1',                       inchi: 'InChI=1S/C14H10/c1-2-6-12-10-14-8-4-3-7-13(14)9-11(12)5-1/h1-10H' },
    { name: 'LSD',         smiles: 'CCN(CC)C(=O)C1CN(C2CC3=CNC4=CC=CC(=C34)C2=C1)C',    inchi: 'InChI=1S/C20H25N3O/c1-4-23(5-2)20(24)14-9-16-15-7-6-8-17-19(15)13(11-21-17)10-18(16)22(3)12-14/h6-9,11,14,18H,4-5,10,12H2,1-3H3' },
];

function setInputFormat(fmt) {
    const prev = inputMode;
    inputMode = fmt;
    document.getElementById('smiles-mode-btn').classList.toggle('active', fmt === 'smiles');
    document.getElementById('inchi-mode-btn').classList.toggle('active', fmt === 'inchi');
    document.getElementById('input-label').textContent =
        fmt === 'inchi' ? 'Input InChI notation...' : 'Input SMILES notation...';

    let inputVal = '';
    if (fmt === 'smiles' && prev === 'inchi' && window._getMolSmiles) {
        inputVal = window._getMolSmiles() || '';
    }
    if (fmt === 'inchi' && prev === 'smiles' && window._getMolInchi) {
        inputVal = window._getMolInchi() || '';
    }
    document.getElementById('smiles-input').value = inputVal;
    renderExamples();
}

function renderExamples() {
    const isInchi = inputMode === 'inchi';
    const links = exampleMolecules.map(m => {
        const val = isInchi ? m.inchi : m.smiles;
        return '<a href="#" onclick="parseInput(\'' + val.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\'); return false">' + m.name + '</a>';
    }).join(', ');
    document.getElementById('examples-list').innerHTML =
        '<i>examples:&nbsp;</i>' + links +
        ', <a href="#" onclick="pickRandomMolecule(); return false">random</a>';
}

// randomMolecule is loaded from examples/example-molecules.js via the module
// script tag above, which sets window.randomMolecule automatically.
// The inline array below is kept as a synchronous fallback for environments
// that cannot load ES modules; it can be removed once confirmed working.
var randomMolecule = [
  { smiles: "CCCCC", inchi: "InChI=1S/C5H12/c1-3-5-4-2/h3-5H2,1-2H3" },
  { smiles: "CC(C)CC", inchi: "InChI=1S/C5H12/c1-4-5(2)3/h5H,4H2,1-3H3" },
  { smiles: "CC(C)(C)C", inchi: "InChI=1S/C5H12/c1-5(2,3)4/h1-4H3" },
  { smiles: "CC=CC", inchi: "InChI=1S/C4H8/c1-3-4-2/h3-4H,1-2H3" },
  { smiles: "C=CCC", inchi: "InChI=1S/C4H8/c1-3-4-2/h3H,1,4H2,2H3" },
  { smiles: "C/C=C\\C", inchi: "InChI=1S/C4H8/c1-3-4-2/h3-4H,1-2H3/b4-3-" },
  { smiles: "C/C=C/C", inchi: "InChI=1S/C4H8/c1-3-4-2/h3-4H,1-2H3/b4-3+" },
  { smiles: "C=CC=C", inchi: "InChI=1S/C4H6/c1-3-4-2/h3-4H,1-2H2" },
  { smiles: "C=C=CC", inchi: "InChI=1S/C4H6/c1-3-4-2/h4H,1H2,2H3" },
  { smiles: "CC#CC", inchi: "InChI=1S/C4H6/c1-3-4-2/h1-2H3" },
  { smiles: "C#CCC", inchi: "InChI=1S/C4H6/c1-3-4-2/h1H,4H2,2H3" },
  { smiles: "OCCCC", inchi: "InChI=1S/C4H10O/c1-2-3-4-5/h5H,2-4H2,1H3" },
  { smiles: "CC(O)CC", inchi: "InChI=1S/C4H10O/c1-3-4(2)5/h4-5H,3H2,1-2H3" },
  { smiles: "CC(O)(C)C", inchi: "InChI=1S/C4H10O/c1-4(2,3)5/h5H,1-3H3" },
  { smiles: "C(=O)CCC", inchi: "InChI=1S/C4H8O/c1-2-3-4-5/h4H,2-3H2,1H3" },
  { smiles: "CC(=O)CC", inchi: "InChI=1S/C4H8O/c1-3-4(2)5/h3H2,1-2H3" },

  { smiles: "ClC(CCC)=O", inchi: "InChI=1S/C4H7ClO/c1-2-3-4(5)6/h2-3H2,1H3" },
  { smiles: "O=C(CC)OC(C)=O", inchi: "InChI=1S/C5H8O3/c1-3-5(7)8-4(2)6/h3H2,1-2H3" },
  { smiles: "C1CCCCC1", inchi: "InChI=1S/C6H12/c1-2-4-6-5-3-1/h1-6H2" },

import * as d3              from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';

import { parseINCHI, toInChI } from './src/io/inchi.js';

const atomBBox = mol2dHelpers.atomBBox ?? function atomBBoxFallback(atoms) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const a of atoms) {
        if (a.x < minX) minX = a.x;
        if (a.x > maxX) maxX = a.x;
        if (a.y < minY) minY = a.y;
        if (a.y > maxY) maxY = a.y;
    }
    return { minX, maxX, minY, maxY, cx: (minX + maxX) / 2, cy: (minY + maxY) / 2 };
};

// ---------------------------------------------------------------------------
// Functional-group SMARTS panel
// ---------------------------------------------------------------------------
/** Apply (or clear) a highlight from a list of SMARTS mappings and redraw. */
function _setHighlight(mappings) {
    _highlightedAtomIds.clear();
    _highlightedAtomSets = [];
    if (mappings) {
        for (const mapping of mappings) {
            const atomSet = new Set(mapping.values());
            // Include explicit H atoms bonded to any matched atom
            if (_highlightMol) {
                for (const atomId of [...atomSet]) {
                    for (const nb of (_highlightMol.atoms.get(atomId)?.getNeighbors(_highlightMol) ?? [])) {
                        if (nb.name === 'H') atomSet.add(nb.id);
                    }
                }
            }
            for (const atomId of atomSet) _highlightedAtomIds.add(atomId);
            _highlightedAtomSets.push(atomSet);
        }
    }
    if (mode === '2d' && _mol2d) draw2d();
    else applyForceHighlights();
}

/** Returns true if id1 and id2 belong to the same SMARTS match instance. */
function _isBondHighlighted(id1, id2) {
    for (const set of _highlightedAtomSets) {
        if (set.has(id1) && set.has(id2)) return true;
    }
    return false;
}

function updateFunctionalGroups(mol) {
    _highlightMol = mol;
    _highlightedAtomIds.clear();
    _highlightedAtomSets = [];
    const tbody = document.getElementById('fg-body');
    tbody.innerHTML = '';
    for (const [, fg] of Object.entries(functionalGroups)) {
        const mappings = [...findSMARTS(mol, fg.smarts)];
        if (mappings.length === 0) continue;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${fg.name}</td><td>${mappings.length}</td>`;
        tr._fgMappings = mappings;

        tr.addEventListener('mouseenter', () => {
            if (tbody.querySelector('tr.fg-active')) return;
            _setHighlight(mappings);
        });
        tr.addEventListener('mouseleave', () => {
            if (tbody.querySelector('tr.fg-active')) return;
            _setHighlight(null);
        });
        tr.addEventListener('click', () => {
            tbody.querySelectorAll('tr').forEach(r => r.classList.remove('fg-active'));
            tr.classList.add('fg-active');
            _setHighlight(mappings);
        });
        tbody.appendChild(tr);
    }
}

// Clear active functional-group row when clicking outside the table.
document.addEventListener('click', e => {
    if (e.target.closest('#fg-table')) return;
    const tbody = document.getElementById('fg-body');
    if (!tbody.querySelector('tr.fg-active')) return;
    tbody.querySelectorAll('tr').forEach(r => r.classList.remove('fg-active'));
    _setHighlight(null);
}, true);

function strokeColor(symbol) {
    const light = new Set(['H','F','Cl','Mg','Ca','He','Ne','Ar','B','Si','Be','Li']);
    return light.has(symbol) ? '#888' : 'rgba(0,0,0,0.25)';
}

// ---------------------------------------------------------------------------
// Shared state
// ---------------------------------------------------------------------------
let mode          = '2d'; // 'force' | '2d'
let currentMol    = null;
let currentSmiles = null;
let currentInchi  = null;
let rotationDeg   = 0;
let flipH         = false;  // mirror about vertical axis (x → -x)
let flipV         = false;  // mirror about horizontal axis (y → -y)

// ---------------------------------------------------------------------------
// D3 SVG setup (shared by both modes)
// ---------------------------------------------------------------------------
const plotEl  = document.getElementById('plot');
const tooltip = d3.select('#atom-tooltip');

plotEl.addEventListener('selectstart', event => {
    event.preventDefault();
});

const svg = d3.select('#plot')
    .append('svg')
    .attr('class', 'svg-plot labels-hidden');

svg.append('rect')
    .attr('fill', 'white')
    .attr('width', '100%')
    .attr('height', '100%');

const g = svg.append('g');

const zoom = d3.zoom()
    .scaleExtent([0.05, 30])
    .filter(event => {
        // In selection mode: block drag-to-pan on background
        // so mousedown starts rubber-band selection instead.
        // Scroll-to-zoom and pinch-zoom are unaffected.
        if (_selectMode &&
                ((mode === '2d' && _mol2d) || (mode === 'force' && currentMol)) &&
                (event.type === 'mousedown' || event.type === 'dblclick') && event.button === 0) {
            return false;
        }
        return !event.ctrlKey && !event.button;
    })
    .on('zoom', event => g.attr('transform', event.transform));

svg.call(zoom);

// ---------------------------------------------------------------------------
// ══ RUBBER-BAND SELECTION (2D mode) ═══════════════════════════════════════
// ---------------------------------------------------------------------------

// Overlay rect drawn directly on the SVG (outside the zoomed <g>) so it
// stays in screen-space and doesn't scale with zoom.
const selectionRect = svg.append('rect')
    .attr('class', 'selection-rect')
    .attr('fill', 'rgba(100, 160, 255, 0.12)')
    .attr('stroke', 'rgb(80, 140, 255)')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '5,3')
    .attr('pointer-events', 'none')
    .style('display', 'none');

let _selDragging = false;
let _selStart    = null; // {x,y} in SVG element coords
let _selAdditive = false;
let _suppressForceSelectionClearClick = false;

function _selectionEventPoint(event, clampToPlot = false) {
    const rect = svg.node().getBoundingClientRect();
    let x = event.clientX - rect.left;
    let y = event.clientY - rect.top;
    if (clampToPlot) {
        x = Math.max(0, Math.min(rect.width, x));
        y = Math.max(0, Math.min(rect.height, y));
    }
    return [x, y];
}

function _isAdditiveSelectionEvent(event) {
    return !!(event.metaKey || event.ctrlKey);
}

function _updateSelectionRect(x, y) {
    const rx = Math.min(_selStart.x, x);
    const ry = Math.min(_selStart.y, y);
    selectionRect
        .attr('x', rx).attr('y', ry)
        .attr('width', Math.abs(x - _selStart.x))
        .attr('height', Math.abs(y - _selStart.y));
}

function _finishSelectionDrag(event) {
    if (!_selDragging) return;
    _selDragging = false;
    selectionRect.style('display', 'none');
    if (mode !== '2d' && mode !== 'force') return;
    if (mode === '2d' && !_mol2d) return;
    if (mode === 'force' && !currentMol) return;

    const [x, y] = _selectionEventPoint(event, true);
    const rw = Math.abs(x - _selStart.x);
    const rh = Math.abs(y - _selStart.y);
    const additive = _selAdditive;
    _selAdditive = false;

    // A tiny drag (click) clears the selection.
    if (rw < 5 && rh < 5) {
        if (additive) {
            if (mode === 'force') applyForceSelection();
            else draw2d();
            return;
        }
        _clearPrimitiveHover();
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
        if (mode === 'force') applyForceSelection();
        else draw2d();
        return;
    }

    const rx = Math.min(_selStart.x, x);
    const ry = Math.min(_selStart.y, y);
    const transform = d3.zoomTransform(svg.node());

    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }
    _clearPrimitiveHover();

    if (mode === 'force') {
        const nodes = simulation.nodes();
        for (const node of nodes) {
            const sx = transform.applyX(node.x);
            const sy = transform.applyY(node.y);
            if (sx >= rx && sx <= rx + rw && sy >= ry && sy <= ry + rh) {
                _selectedAtomIds.add(node.id);
            }
        }

        for (const link of simulation.force('link').links()) {
            if (_selectedAtomIds.has(link.source.id) && _selectedAtomIds.has(link.target.id)) {
                _selectedBondIds.add(link.id);
            }
        }

        _suppressForceSelectionClearClick = true;
        applyForceSelection();
        return;
    }

    const atoms = [..._mol2d.atoms.values()].filter(a => a.x != null && a.visible !== false);
    for (const atom of atoms) {
        const { x: gX, y: gY } = _toSVGPt2d(atom);
        const sx = transform.applyX(gX);
        const sy = transform.applyY(gY);
        if (sx >= rx && sx <= rx + rw && sy >= ry && sy <= ry + rh) {
            _selectedAtomIds.add(atom.id);
        }
    }

    for (const bond of _mol2d.bonds.values()) {
        const [ba1, ba2] = bond.getAtomObjects(_mol2d);
        if (!ba1 || !ba2 || ba1.visible === false || ba2.visible === false) continue;
        if (_selectedAtomIds.has(ba1.id) && _selectedAtomIds.has(ba2.id)) {
            _selectedBondIds.add(bond.id);
        }
    }

    draw2d();
}

svg.on('mousedown.selection', function(event) {
    if (!_selectMode) return;
    if (mode === '2d' && !_mol2d) return;
    if (mode === 'force' && !currentMol) return;
    if (mode !== '2d' && mode !== 'force') return;
    if (event.button !== 0) return;
    // Don't start selection when clicking directly on an atom or bond.
    if (event.target.closest('.atom-hit, .bond-hit, .node, .bond-hover-target')) return;

    const [x, y] = _selectionEventPoint(event, true);
    _selDragging = true;
    _selStart    = { x, y };
    _selAdditive = _isAdditiveSelectionEvent(event);

    selectionRect
        .attr('x', x).attr('y', y)
        .attr('width', 0).attr('height', 0)
        .style('display', null);

    event.preventDefault();
});

svg.on('mousemove.selection', function(event) {
    if (!_selDragging) return;
    const [x, y] = _selectionEventPoint(event, true);
    _updateSelectionRect(x, y);
});

svg.on('mouseup.selection', function(event) {
    _finishSelectionDrag(event);
});

svg.on('click.force-selection-clear', function(event) {
    if (!_selectMode || mode !== 'force') return;
    if (_suppressForceSelectionClearClick) {
        _suppressForceSelectionClearClick = false;
        return;
    }
    if (event.target.closest('.node, .bond-hover-target')) return;
    if (_isAdditiveSelectionEvent(event)) return;
    _selectedAtomIds.clear();
    _selectedBondIds.clear();
    applyForceSelection();
});

document.addEventListener('mousemove', event => {
    if (!_selDragging) return;
    const [x, y] = _selectionEventPoint(event, true);
    _updateSelectionRect(x, y);
});

document.addEventListener('mouseup', event => {
    _finishSelectionDrag(event);
});

// ---------------------------------------------------------------------------

const BOND_MULT   = 3;
const BOND_OFFSET = 2;
const PI_STROKE   = { stroke: '#FFFFFF', width: '2px' };
const ARO_STROKE  = { stroke: '#696969', width: '3px', dashArray: '3,3' };
const AROMATIC_RENDER_MODE = 'localized'; // 'localized' | 'delocalized'

function singleBondWidth(order) {
    return `${(order * BOND_MULT - 1) * (BOND_MULT / 2)}px`;
}

function renderBondOrder(bond) {
    if (AROMATIC_RENDER_MODE === 'localized' && (bond.properties.aromatic ?? false)) {
        return bond.properties.localizedOrder ?? (bond.properties.order ?? 1.5);
    }
    return bond.properties.aromatic ? 1.5 : (bond.properties.order ?? 1);
}

function atomRadius(protons) {
    if (protons == null || protons >= 11) return 10;
    return Math.sqrt(protons + 2.7) * 2.8;
}

function xOffset(offset, src, tgt) {
    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    if (dy === 0 || Math.abs(dx / dy) > 1) return offset * (dy / dx);
    return offset;
}

function yOffset(offset, src, tgt) {
    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    if (dy === 0 || Math.abs(dx / dy) > 1) return -offset;
    return offset * -(dx / dy);
}

// ---------------------------------------------------------------------------
// ══ ATOM TOOLTIP ══════════════════════════════════════════════════════════
// ---------------------------------------------------------------------------

function bondTooltipHtml(bond, a1, a2) {
    const order = bond.properties.aromatic ? 1.5 : (bond.properties.order ?? 1);
    const typeLabel = order === 1.5 ? 'Aromatic'
                    : order === 1   ? 'Single'
                    : order === 2   ? 'Double'
                    : order === 3   ? 'Triple'
                    : `Order ${order}`;
    const bondSymbol = order === 2 ? '=' : order === 3 ? '≡' : '–';

    const row = (label, val) => `<tr><td>${label}</td><td><b>${val}</b></td></tr>`;
    let rows = row('Type', typeLabel);
    rows += row('Order', order);
    if (bond.properties.stereo) {
        rows += row('Stereo', bond.properties.stereo);
    }

    return `<div class="tt-head" style="color:#555">${a1.name}${bondSymbol}${a2.name}
        <span style="font-size:11px;font-weight:normal;color:#aaa;margin-left:4px">${bond.id}</span>
    </div><table>${rows}</table>`;
}

function atomTooltipHtml(atom, mol) {
    const p = atom.properties;
    const charge = p.charge ?? 0;

    // Formatted charge string for the header  (e.g.  +  2+  −  2−)
    let chargeSup = '';
    if (charge !== 0) {
        const abs = Math.abs(charge);
        const sign = charge > 0 ? '+' : '−';
        chargeSup = `<sup style="font-size:11px">${abs > 1 ? abs : ''}${sign}</sup>`;
    }

    // Isotope: standard mass = protons + round(neutrons from elements table).
    // If the stored neutrons differ noticeably, it's a non-standard isotope.
    let isotopePrefix = '';
    if (p.protons != null && p.neutrons != null) {
        const massNo = p.protons + Math.round(p.neutrons);
        // Detect non-standard by comparing to neutral-atom rounding
        const stdNeutrons = { H:0, C:6, N:7, O:8, S:16, P:16, F:10, Cl:18, Br:45, I:74 };
        const std = stdNeutrons[atom.name];
        if (std !== undefined && Math.round(p.neutrons) !== std) {
            isotopePrefix = `<sup style="font-size:11px">${massNo}</sup>`;
        }
    }

    const degree = atom.bonds.length;

    const row = (label, val) =>
        `<tr><td>${label}</td><td><b>${val}</b></td></tr>`;

    let rows = '';
    if (p.protons  != null) { rows += row('Atomic #',  p.protons); }
    if (p.electrons != null) { rows += row('Electrons', p.electrons); }
    rows += row('Bonds', degree);
    if (charge !== 0) {
        const sign = charge > 0 ? `+${charge}` : `${charge}`;
        rows += row('Charge', sign);
    }
    if (p.aromatic) { rows += row('Aromatic', 'yes'); }
    if (p.chirality) { rows += row('Chirality', p.chirality); }

    const color = atom.name === 'H' ? '#111' : atomColor(atom.name);
    return `<div class="tt-head" style="color:${color}">${isotopePrefix}${atom.name}${chargeSup}
        <span style="font-size:11px;font-weight:normal;color:#aaa;margin-left:4px">${atom.id}</span>
    </div><table>${rows}</table>`;
}

function convertMolecule(molecule) {
    const atomEntries = [...molecule.atoms.entries()];
    const idToIndex   = new Map(atomEntries.map(([id], i) => [id, i]));

    const nodes = atomEntries.map(([id, atom]) => ({
        id,
        name:      atom.name,
        protons:   atom.properties.protons,
        charge:    atom.properties.charge ?? 0,
        aromatic:  atom.properties.aromatic ?? false,
    }));

    const links = [...molecule.bonds.values()].map(bond => ({
        id:      bond.id,
        source:  idToIndex.get(bond.atoms[0]),
        target:  idToIndex.get(bond.atoms[1]),
        order:   renderBondOrder(bond),
        aromatic: bond.properties.aromatic ?? false,
    }));

    return { nodes, links };
}

function createDrag(sim) {
    return d3.drag()
        .on('start', (event, d) => {
            if (!event.active) sim.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        })
        .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on('end',   (event, d) => {
            if (!event.active) sim.alphaTarget(0);
            d.fx = null; d.fy = null;
        });
}

const simulation = d3.forceSimulation()
    .force('charge', d3.forceManyBody().strength(-150).distanceMax(200))
    .force('link',   d3.forceLink().strength(1.0).distance(25))
    .force('center', d3.forceCenter(plotEl.clientWidth / 2, plotEl.clientHeight / 2))
    .velocityDecay(0.35)
    .alphaDecay(0.02)
    .stop();

function updateForce(molecule, {
    preservePositions = false,
    preserveView = preservePositions,
} = {}) {
    const previousNodePositions = preservePositions
        ? new Map(simulation.nodes().map(node => [node.id, {
            x: node.x,
            y: node.y,
            vx: node.vx,
            vy: node.vy,
            fx: node.fx,
            fy: node.fy,
        }]))
        : null;
    const previousZoomTransform = preserveView ? d3.zoomTransform(svg.node()) : null;

    // Seed initial positions from 2D layout so all atoms start at valid positions.
    generateCoords(molecule, { suppressH: false, bondLength: 1.5 });
    if (_preserveSelectionOnNextRender) _syncSelectionToMolecule(molecule);
    else {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }
    _preserveSelectionOnNextRender = false;

    const graph = convertMolecule(molecule);
    g.selectAll('*').remove();

    // Reset zoom to identity for force layout
    if (!preserveView) {
        svg.call(zoom.transform, d3.zoomIdentity);
    }

    const bondEnter = g.selectAll('line.link-base')
        .data(graph.links, d => d.id)
        .enter();

    const singleBond = bondEnter.append('line')
        .filter(d => d.order === 1 || d.order === 2 || d.order === 3)
        .attr('class', 'link')
        .style('stroke-width', d => singleBondWidth(d.order));

    const doubleSep = bondEnter.append('line')
        .filter(d => d.order === 2)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const aroBond1 = bondEnter.append('line')
        .filter(d => d.order === 1.5)
        .attr('class', 'link separator')
        .style('stroke', ARO_STROKE.stroke)
        .style('stroke-width', ARO_STROKE.width);

    const aroBond2 = bondEnter.append('line')
        .filter(d => d.order === 1.5)
        .attr('class', 'link separator')
        .style('stroke', ARO_STROKE.stroke)
        .style('stroke-width', ARO_STROKE.width)
        .style('stroke-dasharray', ARO_STROKE.dashArray);

    const tripleSep1 = bondEnter.append('line')
        .filter(d => d.order === 3)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const tripleSep2 = bondEnter.append('line')
        .filter(d => d.order === 3)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const bondHoverTarget = bondEnter.append('line')
        .attr('class', 'bond-hover-target')
        .style('stroke', 'transparent')
        .style('stroke-width', '14px')
        .style('pointer-events', 'stroke')
        .on('click', (event, d) => {
            _handleForcePrimitiveClick(event, [], [d.id]);
        })
        .on('dblclick', (event, d) => {
            const bond = molecule.bonds.get(d.id);
            if (!bond) return;
            _handleForceComponentDblClick(event, bond.atoms);
        })
        .on('mouseover', (event, d) => {
            _showPrimitiveHover([], [d.id]);
            const bond = molecule.bonds.get(d.id);
            if (!bond) { return; }
            const atom1 = molecule.atoms.get(bond.atoms[0]);
            const atom2 = molecule.atoms.get(bond.atoms[1]);
            if (!atom1 || !atom2) { return; }
            tooltip.transition().delay(150).style('opacity', 0.9);
            tooltip.html(bondTooltipHtml(bond, atom1, atom2))
                .style('left', (event.clientX + 13) + 'px')
                .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mousemove', event => {
            tooltip.style('left', (event.clientX + 13) + 'px')
                   .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mouseout', () => {
            _clearPrimitiveHover();
            applyForceSelection();
            tooltip.transition().duration(50).style('opacity', 0);
        });

    const atom = g.selectAll('circle.node')
        .data(graph.nodes, d => d.id)
        .enter()
        .append('circle')
        .attr('class', 'node')
        .attr('r',           d => atomRadius(d.protons))
        .attr('fill',        d => atomColor(d.name))
        .attr('stroke',      d => strokeColor(d.name))
        .attr('stroke-width', 1)
        .call(createDrag(simulation))
        .on('click', (event, d) => {
            _handleForcePrimitiveClick(event, [d.id], []);
        })
        .on('dblclick', (event, d) => {
            _handleForceComponentDblClick(event, [d.id]);
        })
        .on('mouseover', (event, d) => {
            _showPrimitiveHover([d.id], []);
            const atom = molecule.atoms.get(d.id);
            if (!atom) { return; }
            tooltip.transition().delay(200).style('opacity', 0.9);
            tooltip.html(atomTooltipHtml(atom, molecule))
                .style('left', (event.clientX + 13) + 'px')
                .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mousemove', event => {
            tooltip.style('left', (event.clientX + 13) + 'px')
                   .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mouseout', () => {
            _clearPrimitiveHover();
            applyForceSelection();
            tooltip.transition().duration(50).style('opacity', 0);
        });

    const atomSymbol = g.selectAll('text.atom-symbol')
        .data(graph.nodes, d => d.id)
        .enter()
        .append('text')
        .attr('class', 'atom-symbol')
        .attr('pointer-events', 'none')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('font-family', 'Arial, Helvetica, sans-serif')
        .attr('font-weight', 'bold')
        .attr('font-size', d => d.name.length > 1 ? '7px' : '9px')
        .attr('fill', d => {
            if (d.name === 'H') {
                return '#111';
            }
            const hex = atomColor(d.name);
            // Use white text on dark atoms, dark text on light atoms
            const cr = parseInt(hex.slice(1,3),16), cg = parseInt(hex.slice(3,5),16), cb = parseInt(hex.slice(5,7),16);
            return (cr*0.299 + cg*0.587 + cb*0.114) > 140 ? '#333' : '#fff';
        })
        .text(d => d.name);

    const chargeLabel = g.selectAll('text.charge-label')
        .data(graph.nodes.filter(d => d.charge !== 0), d => d.id)
        .enter()
        .append('text')
        .attr('class', 'charge-label')
        .attr('pointer-events', 'none')
        .attr('font-family', 'Arial, Helvetica, sans-serif')
        .attr('font-size', '11px')
        .attr('font-weight', 'bold')
        .attr('fill', '#333')
        .text(d => {
            const c = d.charge;
            return c === 1 ? '+' : c > 1 ? `${c}+` : c === -1 ? '−' : `${Math.abs(c)}−`;
        });

    // Apply 2D seed positions to nodes so the simulation starts from a valid layout.
    // Scale factor matches force link distance / coord bond length (1.5 Å) = 20 px/Å.
    const FORCE_SCALE = 25;
    const W0 = plotEl.clientWidth || 600, H0 = plotEl.clientHeight || 400;
    const atoms2d = [...molecule.atoms.values()].filter(a => a.x != null);
    if (atoms2d.length > 0) {
        let cx2d = 0, cy2d = 0;
        for (const a of atoms2d) { cx2d += a.x; cy2d += a.y; }
        cx2d /= atoms2d.length; cy2d /= atoms2d.length;
        const idToNode = new Map(graph.nodes.map(n => [n.id, n]));
        for (const [id, atom] of molecule.atoms) {
            const node = idToNode.get(id);
            if (node && atom.x != null) {
                node.x = W0 / 2 + (atom.x - cx2d) * FORCE_SCALE;
                node.y = H0 / 2 + (atom.y - cy2d) * FORCE_SCALE;
            }
        }
    }

    if (previousNodePositions) {
        for (const node of graph.nodes) {
            const previous = previousNodePositions.get(node.id);
            if (!previous) continue;
            node.x = previous.x;
            node.y = previous.y;
            node.vx = previous.vx;
            node.vy = previous.vy;
            node.fx = previous.fx;
            node.fy = previous.fy;
        }

        // Seed genuinely new nodes from any preserved neighbor so edits do not
        // re-layout the surviving fragment.
        for (const link of graph.links) {
            const source = graph.nodes[link.source];
            const target = graph.nodes[link.target];
            const sourcePlaced = Number.isFinite(source?.x) && Number.isFinite(source?.y);
            const targetPlaced = Number.isFinite(target?.x) && Number.isFinite(target?.y);
            if (sourcePlaced && !targetPlaced) {
                target.x = source.x;
                target.y = source.y;
            } else if (targetPlaced && !sourcePlaced) {
                source.x = target.x;
                source.y = target.y;
            }
        }
    }

    simulation.nodes(graph.nodes);
    simulation.force('link').links(graph.links);
    simulation.force('center',
        d3.forceCenter(plotEl.clientWidth / 2, plotEl.clientHeight / 2));
    simulation.alpha(preservePositions ? 0.2 : 1).restart();

    simulation.on('tick', () => {
        singleBond
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        doubleSep
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        aroBond1
            .attr('x1', d => d.source.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset( BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset( BOND_OFFSET, d.source, d.target));

        aroBond2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

        tripleSep1
            .attr('x1', d => d.source.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset( BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset( BOND_OFFSET, d.source, d.target));

        tripleSep2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

        bondHoverTarget
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        atom.attr('cx', d => d.x).attr('cy', d => d.y);
        atomSymbol.attr('x', d => d.x).attr('y', d => d.y);

        const OFF = 0.707; // cos/sin 45°
        chargeLabel
            .attr('x', d => d.x + atomRadius(d.protons) * OFF + 4)
            .attr('y', d => d.y - atomRadius(d.protons) * OFF);

        // Functional-group highlight layer
        const _hl = g.select('g.fg-highlight-layer');
        _hl.selectAll('line')
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        _hl.selectAll('circle')
            .attr('cx', d => d.x).attr('cy', d => d.y);

        const _sel = g.select('g.force-selection-layer');
        _sel.selectAll('line')
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        _sel.selectAll('circle')
            .attr('cx', d => d.x).attr('cy', d => d.y);

        if (!preserveView) {
            // Auto zoom-out to keep molecule in view
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const n of graph.nodes) {
                const r = atomRadius(n.protons);
                if (n.x - r < minX) minX = n.x - r;
                if (n.x + r > maxX) maxX = n.x + r;
                if (n.y - r < minY) minY = n.y - r;
                if (n.y + r > maxY) maxY = n.y + r;
            }
            const W = plotEl.clientWidth, H = plotEl.clientHeight;
            const PAD   = 40;
            const scale = Math.min((W - PAD * 2) / (maxX - minX || 1),
                                   (H - PAD * 2) / (maxY - minY || 1), 1);
            const tx = W / 2 - ((minX + maxX) / 2) * scale;
            const ty = H / 2 - ((minY + maxY) / 2) * scale;
            svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        }
    });

    if (preserveView && previousZoomTransform) {
        svg.call(zoom.transform, previousZoomTransform);
    }

    if (_highlightedAtomIds.size > 0) applyForceHighlights();
    if (_selectedAtomIds.size > 0 || _selectedBondIds.size > 0) applyForceSelection();
}

function applyForceHighlights() {
    g.selectAll('g.fg-highlight-layer').remove();
    if (_highlightedAtomIds.size === 0) return;

    const HL_COLOR = 'rgb(130, 210, 80)';
    const OL_COLOR = 'rgb(70, 140, 40)';
    const HL_R = 8;
    const OL = 2;
    const hlLayer = g.insert('g', ':first-child').attr('class', 'fg-highlight-layer').attr('opacity', 0.45);

    const nodeMap = new Map(simulation.nodes().map(n => [n.id, n]));
    const allLinks = simulation.force('link').links();

    // Draw each match instance as its own unit so fills cover their own outlines.
    for (const atomSet of _highlightedAtomSets) {
        const mLinks = allLinks.filter(l => atomSet.has(l.source.id) && atomSet.has(l.target.id));
        const mNodes = [...atomSet].map(id => nodeMap.get(id)).filter(Boolean);

        const addLines = (stroke, extra) => {
            hlLayer.selectAll(null).data(mLinks).enter().append('line')
                .datum(d => d)
                .attr('stroke', stroke)
                .attr('stroke-width', d => Math.min(atomRadius(d.source.protons), atomRadius(d.target.protons)) * 2 + HL_R * 2 + extra * 2)
                .attr('stroke-linecap', 'round')
                .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        };
        const addCircles = (fill, extra) => {
            hlLayer.selectAll(null).data(mNodes).enter().append('circle')
                .datum(d => d)
                .attr('r', d => atomRadius(d.protons) + HL_R + extra)
                .attr('fill', fill).attr('stroke', 'none')
                .attr('cx', d => d.x).attr('cy', d => d.y);
        };

        addLines(OL_COLOR, OL); addCircles(OL_COLOR, OL); // outline
        addLines(HL_COLOR,  0); addCircles(HL_COLOR,  0); // fill
    }
}

function applyForceSelection() {
    g.selectAll('g.force-selection-layer').remove();
    const { atomIds: activeAtomIds, bondIds: activeBondIds } = _getRenderableSelectionIds();
    if (activeAtomIds.size === 0 && activeBondIds.size === 0) return;

    const SEL_COLOR = 'rgb(100, 160, 255)';
    const SEL_OL = 'rgb(40, 100, 210)';
    const SEL_R = 6;
    const OL = 2;
    const selLayer = g.insert('g', ':first-child').attr('class', 'force-selection-layer').attr('opacity', 0.45);

    const selectedNodes = simulation.nodes().filter(node => activeAtomIds.has(node.id));
    const selectedLinks = simulation.force('link').links().filter(link => activeBondIds.has(link.id));

    const addLines = (stroke, extra) => {
        selLayer.selectAll(null).data(selectedLinks).enter().append('line')
            .datum(d => d)
            .attr('stroke', stroke)
            .attr('stroke-width', d => Math.min(atomRadius(d.source.protons), atomRadius(d.target.protons)) * 2 + SEL_R * 2 + extra * 2)
            .attr('stroke-linecap', 'round')
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    };
    const addCircles = (fill, extra) => {
        selLayer.selectAll(null).data(selectedNodes).enter().append('circle')
            .datum(d => d)
            .attr('r', d => atomRadius(d.protons) + SEL_R + extra)
            .attr('fill', fill).attr('stroke', 'none')
            .attr('cx', d => d.x).attr('cy', d => d.y);
    };

    addLines(SEL_OL, OL); addCircles(SEL_OL, OL);
    addLines(SEL_COLOR, 0); addCircles(SEL_COLOR, 0);
}

function _syncSelectionToMolecule(mol) {
    _selectedAtomIds = new Set([..._selectedAtomIds].filter(id => mol.atoms.has(id)));
    _selectedBondIds = new Set([..._selectedBondIds].filter(id => mol.bonds.has(id)));
}

function _redraw2dSelection() {
    g.select('g.atom-selection').remove();
    const { atomIds: activeAtomIds, bondIds: activeBondIds } = _getRenderableSelectionIds();
    if ((activeAtomIds.size === 0 && activeBondIds.size === 0) || !_mol2d) return;

    const mol      = _mol2d;
    const hCounts  = _hCounts2d;
    const toSVGPt  = _toSVGPt2d;
    const atoms    = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);

    const SEL_COLOR = 'rgb(100, 160, 255)';
    const SEL_OL   = 'rgb(40,  100, 210)';
    const OL = 2;

    // Insert behind the bond layer (same stacking as fg highlights).
    const selLayer = g.insert('g', 'g.bonds').attr('class', 'atom-selection').attr('opacity', 0.45);

    const mBonds = [];
    for (const bond of mol.bonds.values()) {
        if (!activeBondIds.has(bond.id)) continue;
        const [ba1, ba2] = bond.getAtomObjects(mol);
        if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
        if (ba1.visible === false || ba2.visible === false) continue;
        const p1 = toSVGPt(ba1), p2 = toSVGPt(ba2);
        const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + 5;
        const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + 5;
        mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
    }
    const mAtoms = [];
    for (const atom of atoms) {
        if (!activeAtomIds.has(atom.id)) continue;
        const { x, y } = toSVGPt(atom);
        const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 5;
        mAtoms.push({ x, y, r });
    }

    const addL = (stroke, extra) => {
        for (const { p1, p2, w } of mBonds)
            selLayer.append('line')
                .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
                .attr('stroke', stroke).attr('stroke-width', w + extra * 2)
                .attr('stroke-linecap', 'round');
    };
    const addC = (fill, extra) => {
        for (const { x, y, r } of mAtoms)
            selLayer.append('circle')
                .attr('cx', x).attr('cy', y).attr('r', r + extra)
                .attr('fill', fill).attr('stroke', 'none');
    };
    addL(SEL_OL, OL); addC(SEL_OL, OL);
    addL(SEL_COLOR, 0); addC(SEL_COLOR, 0);
}

const SCALE       = 60;   // SVG pixels per Angstrom
const BOND_OFF_2D = 7;    // px gap between parallel bond lines
const STROKE_W    = 1.6;  // px
const FONT_SIZE   = 14;   // px
function renderAtomLabel(group, label, color) {
    const textEl = group.append('text')
        .attr('class', 'atom-label')
        .attr('fill', color)
        .attr('text-anchor', 'middle');
    let i = 0;
    let first = true;
    while (i < label.length) {
        const ch = label[i];
        if (ch >= '0' && ch <= '9') {
            let num = '';
            while (i < label.length && label[i] >= '0' && label[i] <= '9') num += label[i++];
            textEl.append('tspan').attr('baseline-shift', 'sub').attr('font-size', '0.72em').text(num);
        } else {
            let word = '';
            while (i < label.length && !(label[i] >= '0' && label[i] <= '9')) word += label[i++];
            const ts = textEl.append('tspan').text(word);
            if (first) { ts.attr('dy', '0.35em'); first = false; }
        }
    }
}

function addLine(group, x1, y1, x2, y2, extraClass) {
    return group.append('line')
        .attr('class', extraClass ? `bond ${extraClass}` : 'bond')
        .attr('x1', x1).attr('y1', y1)
        .attr('x2', x2).attr('y2', y2)
        .style('stroke-width', `${STROKE_W}px`);
}

// ── 2D persistent state (shared between render2d and draw2d) ──────────────
let _mol2d      = null;
let _hCounts2d  = null;
let _cx2d       = 0;
let _cy2d       = 0;
let _stereoMap2d = null;  // Map<bondId, 'wedge'|'dash'>
let _highlightedAtomIds  = new Set();
let _highlightedAtomSets = []; // one Set<atomId> per SMARTS match instance
let _highlightMol        = null; // molecule used for last updateFunctionalGroups call

let _selectedAtomIds = new Set();
let _selectedBondIds = new Set();
let _hoveredAtomIds = new Set();
let _hoveredBondIds = new Set();
let _selectionModifierActive = false;
let _selectMode      = false;
let _preserveSelectionOnNextRender = false;

function _clearPrimitiveHover() {
    _hoveredAtomIds.clear();
    _hoveredBondIds.clear();
}

function _refreshSelectionOverlay() {
    if (mode === 'force') {
        applyForceSelection();
    } else if (_mol2d) {
        _redraw2dSelection();
    }
}

function _getRenderableSelectionIds() {
    if (_selectedAtomIds.size === 0 && _selectedBondIds.size === 0) {
        return {
            atomIds: _selectMode ? _hoveredAtomIds : new Set(),
            bondIds: _selectMode ? _hoveredBondIds : new Set(),
        };
    }
    if (!_selectionModifierActive) {
        return {
            atomIds: _selectedAtomIds,
            bondIds: _selectedBondIds,
        };
    }
    return {
        atomIds: new Set([..._selectedAtomIds, ..._hoveredAtomIds]),
        bondIds: new Set([..._selectedBondIds, ..._hoveredBondIds]),
    };
}

function _showPrimitiveHover(atomIds = [], bondIds = []) {
    if (!_selectMode) return;

    _hoveredAtomIds.clear();
    _hoveredBondIds.clear();

    if (mode === '2d' && _mol2d) {
        for (const atomId of atomIds) {
            const atom = _mol2d.atoms.get(atomId);
            if (!atom || atom.x == null || atom.visible === false) continue;
            _hoveredAtomIds.add(atomId);
        }
        for (const bondId of bondIds) {
            const bond = _mol2d.bonds.get(bondId);
            if (!bond) continue;
            const [a1, a2] = bond.getAtomObjects(_mol2d);
            if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
            const isHiddenBond = a1.visible === false || a2.visible === false;
            if (isHiddenBond && !(_stereoMap2d && _stereoMap2d.has(bond.id))) continue;
            _hoveredBondIds.add(bondId);
        }
        _refreshSelectionOverlay();
        return;
    }

    if (mode === 'force' && currentMol) {
        for (const atomId of atomIds) {
            if (currentMol.atoms.has(atomId)) _hoveredAtomIds.add(atomId);
        }
        for (const bondId of bondIds) {
            if (currentMol.bonds.has(bondId)) _hoveredBondIds.add(bondId);
        }
        _refreshSelectionOverlay();
    }
}

function _toSVGPt2d(a) {
    const W = plotEl.clientWidth  || 600;
    const H = plotEl.clientHeight || 400;
    // Negate y so that molecule coords (y-up math convention) map correctly
    // to SVG/canvas coords (y-down). Without this the display is a mirror image.
    return { x: W / 2 + (a.x - _cx2d) * SCALE, y: H / 2 - (a.y - _cy2d) * SCALE };
}

function _getConnectedComponentAtomIds(mol, seedAtomIds) {
    const componentAtomIds = new Set();
    const queue = [...seedAtomIds];

    while (queue.length > 0) {
        const atomId = queue.shift();
        if (componentAtomIds.has(atomId)) continue;
        const atom = mol.atoms.get(atomId);
        if (!atom) continue;
        componentAtomIds.add(atomId);
        for (const bondId of atom.bonds) {
            const bond = mol.bonds.get(bondId);
            if (!bond) continue;
            const nextAtomId = bond.getOtherAtom(atomId);
            if (!componentAtomIds.has(nextAtomId)) queue.push(nextAtomId);
        }
    }

    return componentAtomIds;
}

function _select2dComponent(seedAtomIds, additive = false) {
    if (!_mol2d) return;
    const componentAtomIds = _getConnectedComponentAtomIds(_mol2d, seedAtomIds);

    _clearPrimitiveHover();
    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }

    for (const atomId of componentAtomIds) {
        const atom = _mol2d.atoms.get(atomId);
        if (!atom || atom.x == null || atom.visible === false) continue;
        _selectedAtomIds.add(atomId);
    }

    for (const bond of _mol2d.bonds.values()) {
        const [a1, a2] = bond.atoms;
        if (!componentAtomIds.has(a1) || !componentAtomIds.has(a2)) continue;
        _selectedBondIds.add(bond.id);
    }

    draw2d();
}

function _select2dPrimitive(atomIds = [], bondIds = [], additive = false) {
    if (!_mol2d) return;

    _clearPrimitiveHover();
    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }

    for (const atomId of atomIds) {
        const atom = _mol2d.atoms.get(atomId);
        if (!atom || atom.x == null || atom.visible === false) continue;
        _selectedAtomIds.add(atomId);
    }

    for (const bondId of bondIds) {
        const bond = _mol2d.bonds.get(bondId);
        if (!bond) continue;
        const [a1, a2] = bond.getAtomObjects(_mol2d);
        if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
        const isHiddenBond = a1.visible === false || a2.visible === false;
        if (isHiddenBond && !(_stereoMap2d && _stereoMap2d.has(bond.id))) continue;
        _selectedBondIds.add(bondId);
    }

    draw2d();
}

function _handle2dPrimitiveClick(event, atomIds = [], bondIds = []) {
    if (!_selectMode || mode !== '2d' || !_mol2d) return;
    event.preventDefault();
    event.stopPropagation();
    _select2dPrimitive(atomIds, bondIds, _isAdditiveSelectionEvent(event));
}

function _handle2dComponentDblClick(event, seedAtomIds) {
    if (!_selectMode || mode !== '2d' || !_mol2d) return;
    event.preventDefault();
    event.stopPropagation();
    _select2dComponent(seedAtomIds, _isAdditiveSelectionEvent(event));
}

function _selectForceComponent(seedAtomIds, additive = false) {
    if (!currentMol) return;
    const componentAtomIds = _getConnectedComponentAtomIds(currentMol, seedAtomIds);

    _clearPrimitiveHover();
    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }

    for (const atomId of componentAtomIds) {
        if (currentMol.atoms.has(atomId)) _selectedAtomIds.add(atomId);
    }

    for (const bond of currentMol.bonds.values()) {
        const [a1, a2] = bond.atoms;
        if (!componentAtomIds.has(a1) || !componentAtomIds.has(a2)) continue;
        _selectedBondIds.add(bond.id);
    }

    applyForceSelection();
}

function _selectForcePrimitive(atomIds = [], bondIds = [], additive = false) {
    if (!currentMol) return;

    _clearPrimitiveHover();
    if (!additive) {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }

    for (const atomId of atomIds) {
        if (currentMol.atoms.has(atomId)) _selectedAtomIds.add(atomId);
    }

    for (const bondId of bondIds) {
        if (currentMol.bonds.has(bondId)) _selectedBondIds.add(bondId);
    }

    applyForceSelection();
}

function _handleForcePrimitiveClick(event, atomIds = [], bondIds = []) {
    if (!_selectMode || mode !== 'force' || !currentMol || event.defaultPrevented) return;
    event.preventDefault();
    event.stopPropagation();
    _selectForcePrimitive(atomIds, bondIds, _isAdditiveSelectionEvent(event));
}

function _handleForceComponentDblClick(event, seedAtomIds) {
    if (!_selectMode || mode !== 'force' || !currentMol || event.defaultPrevented) return;
    event.preventDefault();
    event.stopPropagation();
    _selectForceComponent(seedAtomIds, _isAdditiveSelectionEvent(event));
}


/**
 * Distance (px) to shorten the bond from `atom`'s end so it stops at the
 * edge of the atom's label bounding box.  Returns 0 for unlabelled atoms.
 */
function _labelClearance(atom, otherSVGPt, toSVGPt) {
    const label = getAtomLabel(atom, _hCounts2d, toSVGPt, _mol2d);
    if (!label) return 0;
    const { x, y } = toSVGPt(atom);
    const dx = otherSVGPt.x - x, dy = otherSVGPt.y - y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const hw = labelHalfW(label, FONT_SIZE) + 1;
    const hh = labelHalfH(label, FONT_SIZE) + 1;
    const ux = Math.abs(dx) / len, uy = Math.abs(dy) / len;
    if (ux < 1e-9) return hh;
    if (uy < 1e-9) return hw;
    return Math.min(hw / ux, hh / uy);
}

function _drawBond(container, bond, a1, a2, mol, toSVGPt, stereoType = null) {
    // a1 is the chiral center (wedge/dash tip) when stereoType is set.
    if (stereoType === 'wedge' || stereoType === 'dash') {
        const s1 = toSVGPt(a1);
        const s2orig = toSVGPt(a2);
        const { nx, ny } = perpUnit(s2orig.x - s1.x, s2orig.y - s1.y);
        // Shorten the far end (a2) if it carries a label (e.g. F, Cl, N…)
        const c2 = _labelClearance(a2, s1, toSVGPt);
        const blen = Math.sqrt((s2orig.x - s1.x) ** 2 + (s2orig.y - s1.y) ** 2) || 1;
        const s2 = {
            x: s2orig.x - (s2orig.x - s1.x) / blen * c2,
            y: s2orig.y - (s2orig.y - s1.y) / blen * c2,
        };
        if (stereoType === 'wedge') {
            container.append('polygon')
                .attr('class', 'bond bond-wedge')
                .attr('points',
                    `${s1.x},${s1.y} ` +
                    `${s2.x - nx * WEDGE_HALF_W},${s2.y - ny * WEDGE_HALF_W} ` +
                    `${s2.x + nx * WEDGE_HALF_W},${s2.y + ny * WEDGE_HALF_W}`)
                .style('fill', '#111')
                .style('stroke', 'none');
        } else {
            for (let i = 1; i <= WEDGE_DASHES; i++) {
                const t = i / (WEDGE_DASHES + 1);
                const px = s1.x + t * (s2.x - s1.x);
                const py = s1.y + t * (s2.y - s1.y);
                const hw = WEDGE_HALF_W * t;
                container.append('line')
                    .attr('class', 'bond bond-hash')
                    .attr('x1', px - nx * hw).attr('y1', py - ny * hw)
                    .attr('x2', px + nx * hw).attr('y2', py + ny * hw)
                    .style('stroke', '#111')
                    .style('stroke-width', '1.2px')
                    .style('stroke-linecap', 'round');
            }
        }
        return;
    }

    const order = renderBondOrder(bond);
    const s1 = toSVGPt(a1), s2 = toSVGPt(a2);
    const c1 = _labelClearance(a1, s2, toSVGPt);
    const c2 = _labelClearance(a2, s1, toSVGPt);
    const dx = s2.x - s1.x, dy = s2.y - s1.y;
    const { nx, ny } = perpUnit(dx, dy);
    if (order === 1) {
        const l = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
        addLine(container, l.x1, l.y1, l.x2, l.y2);
    } else if (order === 2) {
        const dir = secondaryDir(a1, a2, mol, toSVGPt);
        const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
        addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
        const ox = nx * BOND_OFF_2D * dir, oy = ny * BOND_OFF_2D * dir;
        const lsec = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
            Math.max(c1, 4), Math.max(c2, 4));
        addLine(container, lsec.x1, lsec.y1, lsec.x2, lsec.y2);
    } else if (order === 3) {
        for (const d of [-BOND_OFF_2D, 0, BOND_OFF_2D]) {
            const ox = nx * d, oy = ny * d;
            const lt = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
                d !== 0 ? Math.max(c1, 4) : c1, d !== 0 ? Math.max(c2, 4) : c2);
            addLine(container, lt.x1, lt.y1, lt.x2, lt.y2);
        }
    } else if (order === 1.5) {
        const dir = secondaryDir(a1, a2, mol, toSVGPt);
        const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
        addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
        const ox = nx * BOND_OFF_2D * dir, oy = ny * BOND_OFF_2D * dir;
        const ldash = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
            Math.max(c1, 5), Math.max(c2, 5));
        addLine(container, ldash.x1, ldash.y1, ldash.x2, ldash.y2, 'bond-dashed');
    }
}

function _redraw2dHighlights() {
    g.select('g.atom-highlights').remove();
    if (_highlightedAtomIds.size === 0 || !_mol2d) return;
    const mol     = _mol2d;
    const hCounts = _hCounts2d;
    const toSVGPt = _toSVGPt2d;
    const atoms   = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
    const HL_COLOR = 'rgb(130, 210, 80)';
    const OL_COLOR = 'rgb(70, 140, 40)';
    const OL = 2;
    const hlLayer = g.insert('g', ':first-child').attr('class', 'atom-highlights').attr('opacity', 0.45);
    for (const atomSet of _highlightedAtomSets) {
        const mBonds = [];
        for (const bond of mol.bonds.values()) {
            const [ba1, ba2] = bond.getAtomObjects(mol);
            if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
            if (ba1.visible === false || ba2.visible === false) continue;
            if (!atomSet.has(ba1.id) || !atomSet.has(ba2.id)) continue;
            const p1 = toSVGPt(ba1), p2 = toSVGPt(ba2);
            const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + 5;
            const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + 5;
            mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
        }
        const mAtoms = [];
        for (const atom of atoms) {
            if (!atomSet.has(atom.id)) continue;
            const { x, y } = toSVGPt(atom);
            const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 5;
            mAtoms.push({ x, y, r });
        }
        const addL = (stroke, extra) => {
            for (const { p1, p2, w } of mBonds)
                hlLayer.append('line')
                    .attr('x1', p1.x).attr('y1', p1.y).attr('x2', p2.x).attr('y2', p2.y)
                    .attr('stroke', stroke).attr('stroke-width', w + extra * 2)
                    .attr('stroke-linecap', 'round');
        };
        const addC = (fill, extra) => {
            for (const { x, y, r } of mAtoms)
                hlLayer.append('circle')
                    .attr('cx', x).attr('cy', y).attr('r', r + extra)
                    .attr('fill', fill).attr('stroke', 'none');
        };
        addL(OL_COLOR, OL); addC(OL_COLOR, OL);
        addL(HL_COLOR,  0); addC(HL_COLOR,  0);
    }
}

function draw2d() {
    const mol      = _mol2d;
    const hCounts  = _hCounts2d;
    const toSVGPt  = _toSVGPt2d;

    const stereoMap = _stereoMap2d;
    const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
    const bondInfos = [];
    for (const bond of mol.bonds.values()) {
        const [a1, a2] = bond.getAtomObjects(mol);
        if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
        const isHBond = a1.visible === false || a2.visible === false;
        if (isHBond && !(stereoMap && stereoMap.has(bond.id))) continue;
        bondInfos.push({ bond, a1, a2 });
    }

    g.selectAll('*').remove();

    // Layer 0 — functional-group highlights (behind bonds)
    _redraw2dHighlights();
    // Layer 0b — selection highlights (behind bonds, in front of fg highlights)
    _redraw2dSelection();

    // Layer 1 — bonds (each wrapped in a <g data-bond-id> for incremental drag updates)
    const chiralCenterIds = new Set(mol.getChiralCenters());
    const bondLayer = g.append('g').attr('class', 'bonds');
    for (const bi of bondInfos) {
        const bg = bondLayer.append('g').attr('data-bond-id', bi.bond.id);
        const stereoType = stereoMap ? stereoMap.get(bi.bond.id) : null;
        // Orient so the chiral center is a1 (tip of wedge/dash).
        let sa1 = bi.a1, sa2 = bi.a2;
        if (stereoType && chiralCenterIds.has(sa2.id)) [sa1, sa2] = [sa2, sa1];
        _drawBond(bg, bi.bond, sa1, sa2, mol, toSVGPt, stereoType ?? null);

        // Invisible wide line for easy hover targeting
        const p1 = toSVGPt(sa1), p2 = toSVGPt(sa2);
        bg.append('line')
            .attr('class', 'bond-hit')
            .attr('x1', p1.x).attr('y1', p1.y)
            .attr('x2', p2.x).attr('y2', p2.y)
            .attr('stroke', 'rgba(0,0,0,0)')
            .attr('stroke-width', 12)
            .on('click', event => {
                _handle2dPrimitiveClick(event, [], [bi.bond.id]);
            })
            .on('dblclick', event => {
                _handle2dComponentDblClick(event, bi.bond.atoms);
            })
            .on('mouseover', event => {
                _showPrimitiveHover([], [bi.bond.id]);
                tooltip.transition().delay(150).style('opacity', 0.9);
                tooltip.html(bondTooltipHtml(bi.bond, sa1, sa2))
                    .style('left', (event.clientX + 13) + 'px')
                    .style('top',  (event.clientY - 20) + 'px');
            })
            .on('mousemove', event => {
                tooltip.style('left', (event.clientX + 13) + 'px')
                       .style('top',  (event.clientY - 20) + 'px');
            })
            .on('mouseout', () => {
                _clearPrimitiveHover();
                _redraw2dSelection();
                tooltip.transition().duration(50).style('opacity', 0);
            });
    }

    // Layer 2 — white clearance rects
    const bgLayer = g.append('g').attr('class', 'atom-bgs');
    for (const atom of atoms) {
        const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
        const hw = labelHalfW(label, FONT_SIZE);
        if (hw === 0) continue;
        const hh = labelHalfH(label, FONT_SIZE);
        const { x, y } = toSVGPt(atom);
        bgLayer.append('rect')
            .attr('class', 'atom-bg')
            .attr('data-atom-id', atom.id)
            .attr('x', x - hw).attr('y', y - hh)
            .attr('width', hw * 2).attr('height', hh * 2)
            .attr('rx', 2);
    }

    // Layer 3 — labels + hit targets + drag
    const labelLayer = g.append('g').attr('class', 'atom-labels');
    for (const atom of atoms) {
        const { x, y } = toSVGPt(atom);
        const symbol = atom.name;
        const charge = atom.properties.charge ?? 0;
        const label  = getAtomLabel(atom, hCounts, toSVGPt, mol);

        const hitGroup = labelLayer.append('g')
            .attr('data-atom-id', atom.id)
            .attr('transform', `translate(${x},${y})`);

        hitGroup.append('circle')
            .attr('class', 'atom-hit')
            .attr('r', Math.max(labelHalfW(label || symbol, FONT_SIZE), 10))
            .style('cursor', 'grab')
            .on('click', event => {
                _handle2dPrimitiveClick(event, [atom.id], []);
            })
            .on('dblclick', event => {
                _handle2dComponentDblClick(event, [atom.id]);
            })
            .on('mouseover', event => {
                _showPrimitiveHover([atom.id], []);
                tooltip.transition().delay(150).style('opacity', 0.9);
                tooltip.html(atomTooltipHtml(atom, mol))
                    .style('left', (event.clientX + 13) + 'px')
                    .style('top',  (event.clientY - 20) + 'px');
            })
            .on('mousemove', event => {
                tooltip.style('left', (event.clientX + 13) + 'px')
                       .style('top',  (event.clientY - 20) + 'px');
            })
            .on('mouseout', () => {
                _clearPrimitiveHover();
                _redraw2dSelection();
                tooltip.transition().duration(50).style('opacity', 0);
            });

        if (label) {
            renderAtomLabel(hitGroup, label, atomColor(symbol));
            if (charge !== 0) {
                const sign = charge === 1 ? '+' : charge > 1 ? `${charge}+`
                           : charge === -1 ? '−' : `${Math.abs(charge)}−`;
                hitGroup.append('text')
                    .attr('class', 'atom-charge')
                    .attr('x', labelHalfW(label, FONT_SIZE))
                    .attr('y', -(FONT_SIZE * 0.42))
                    .attr('fill', atomColor(symbol))
                    .text(sign);
            }
        }

        // Drag: move this atom, update only its bonds in-place
        hitGroup.call(d3.drag()
            .on('start', function(event) {
                event.sourceEvent.stopPropagation();
                _clearPrimitiveHover();
                _redraw2dSelection();
                tooltip.style('opacity', 0);
                hitGroup.select('circle').style('cursor', 'grabbing');
            })
            .on('drag', function(event) {
                const W = plotEl.clientWidth  || 600;
                const H = plotEl.clientHeight || 400;
                const [svgX, svgY] = d3.pointer(event.sourceEvent, g.node());
                atom.x = _cx2d + (svgX - W / 2) / SCALE;
                atom.y = _cy2d - (svgY - H / 2) / SCALE; // inverse of y-flip in _toSVGPt2d

                const np = toSVGPt(atom);
                hitGroup.attr('transform', `translate(${np.x},${np.y})`);

                const lbl = getAtomLabel(atom, hCounts, toSVGPt, mol);
                const hw  = labelHalfW(lbl, FONT_SIZE);
                const hh  = labelHalfH(lbl, FONT_SIZE);
                bgLayer.select(`[data-atom-id="${atom.id}"]`)
                    .attr('x', np.x - hw).attr('y', np.y - hh);

                for (const bi of bondInfos) {
                    if (bi.a1.id !== atom.id && bi.a2.id !== atom.id) continue;
                    const bg = bondLayer.select(`[data-bond-id="${bi.bond.id}"]`);
                    bg.selectAll('*').remove();
                    const stereoType = stereoMap ? stereoMap.get(bi.bond.id) : null;
                    let sa1 = bi.a1, sa2 = bi.a2;
                    if (stereoType && chiralCenterIds.has(sa2.id)) [sa1, sa2] = [sa2, sa1];
                    _drawBond(bg, bi.bond, sa1, sa2, mol, toSVGPt, stereoType ?? null);
                }
                _redraw2dHighlights();
                _redraw2dSelection();
            })
            .on('end', function() {
                hitGroup.select('circle').style('cursor', 'grab');
            })
        );
    }

}

function render2d(mol) {
    // Count H neighbours before stripping
    const hCounts = new Map();
    for (const [, atom] of mol.atoms) {
        if (atom.name === 'H') continue;
        const count = atom.getNeighbors(mol).filter(n => n.name === 'H').length;
        if (count > 0) hCounts.set(atom.id, count);
    }
    mol.hideHydrogens();

    generateCoords(mol, { suppressH: true, bondLength: 1.5 });

    // Place chiral H atoms at real positions so stereo bonds can be drawn.
    // All other hidden H stay at their parent's position (assigned by generateCoords)
    // and are excluded from rendering entirely.
    for (const [, atom] of mol.atoms) {
        if (atom.name !== 'H' || atom.visible !== false) continue;
        const nbrs = atom.getNeighbors(mol);
        if (nbrs.length !== 1) continue;
        const parent = nbrs[0];
        if (!parent.properties.chirality) continue;
        const others = parent.getNeighbors(mol).filter(n => n.id !== atom.id);
        let sumX = 0, sumY = 0, cnt = 0;
        for (const nb of others) {
            if (nb.x != null) { sumX += nb.x - parent.x; sumY += nb.y - parent.y; cnt++; }
        }
        const angle = cnt > 0 ? Math.atan2(-sumY, -sumX) : 0;
        const hLen  = 1.5 * 0.75;
        atom.x = parent.x + Math.cos(angle) * hLen;
        atom.y = parent.y + Math.sin(angle) * hLen;
    }

    // Apply rotation and/or flips (around centroid)
    if (rotationDeg !== 0 || flipH || flipV) {
        const allAtoms = [...mol.atoms.values()].filter(a => a.x != null);
        let mx = 0, my = 0;
        for (const a of allAtoms) { mx += a.x; my += a.y; }
        mx /= allAtoms.length; my /= allAtoms.length;
        if (rotationDeg !== 0) {
            const rad  = rotationDeg * Math.PI / 180;
            const cosR = Math.cos(rad), sinR = Math.sin(rad);
            for (const a of allAtoms) {
                const dx = a.x - mx, dy = a.y - my;
                a.x = mx + dx * cosR - dy * sinR;
                a.y = my + dx * sinR + dy * cosR;
            }
        }
        if (flipH) for (const a of allAtoms) a.x = 2 * mx - a.x;
        if (flipV) for (const a of allAtoms) a.y = 2 * my - a.y;
    }

    const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
    if (atoms.length === 0) return;

    const { minX, maxX, minY, maxY, cx, cy } = atomBBox(atoms);
    const W  = plotEl.clientWidth  || 600;
    const H  = plotEl.clientHeight || 400;

    const PAD      = 40;
    const molSVGW  = (maxX - minX) * SCALE || 1;
    const molSVGH  = (maxY - minY) * SCALE || 1;
    const fitScale = Math.min((W - PAD * 2) / molSVGW, (H - PAD * 2) / molSVGH, 1);
    const fitTx    = W / 2 * (1 - fitScale);
    const fitTy    = H / 2 * (1 - fitScale);
    svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));

    // Decrement hCount for any H shown via a stereo bond so the atom label
    // for that heavy atom does not show a spurious H subscript.
    const stereoMap = pickStereoWedges(mol);
    for (const [bondId] of stereoMap) {
        const bond = mol.bonds.get(bondId);
        if (!bond) continue;
        const [ba1, ba2] = bond.getAtomObjects(mol);
        const hAtom   = ba1?.visible === false ? ba1 : (ba2?.visible === false ? ba2 : null);
        const heavyAt = hAtom ? (hAtom === ba1 ? ba2 : ba1) : null;
        if (!heavyAt) continue;
        const n = (hCounts.get(heavyAt.id) ?? 0) - 1;
        if (n <= 0) hCounts.delete(heavyAt.id);
        else        hCounts.set(heavyAt.id, n);
    }

    _mol2d       = mol;
    _hCounts2d   = hCounts;
    _cx2d        = cx;
    _cy2d        = cy;
    _stereoMap2d = stereoMap;
    if (_preserveSelectionOnNextRender) _syncSelectionToMolecule(mol);
    else {
        _selectedAtomIds.clear();
        _selectedBondIds.clear();
    }
    _preserveSelectionOnNextRender = false;

    draw2d();

    // Sidebar updates — only on new molecule, not on every highlight redraw
    updateFormula(mol);
    updateDescriptors(mol);
    updateFunctionalGroups(mol);
}

function fitCurrent2dView() {
    if (!_mol2d) return;
    const atoms = [..._mol2d.atoms.values()].filter(a => a.x != null && a.visible !== false);
    if (atoms.length === 0) return;

    const { minX, maxX, minY, maxY, cx: _cx, cy: _cy } = atomBBox(atoms);
    _cx2d = _cx;
    _cy2d = _cy;

    const W = plotEl.clientWidth || 600;
    const H = plotEl.clientHeight || 400;
    const PAD = 40;
    const molSVGW = (maxX - minX) * SCALE || 1;
    const molSVGH = (maxY - minY) * SCALE || 1;
    const fitScale = Math.min((W - PAD * 2) / molSVGW, (H - PAD * 2) / molSVGH, 1);
    const fitTx = W / 2 * (1 - fitScale);
    const fitTy = H / 2 * (1 - fitScale);
    svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));
}

// ---------------------------------------------------------------------------
// Shared helper: build molecule SVG element from current 2D state
// ---------------------------------------------------------------------------
function _buildMolSvg(withWhiteBg) {
    const PAD  = 30;
    const bbox = g.node().getBBox();
    if (!bbox.width && !bbox.height) return null;

    const vbX = bbox.x - PAD,  vbY = bbox.y - PAD;
    const vbW = bbox.width  + PAD * 2;
    const vbH = bbox.height + PAD * 2;

    const ns    = 'http://www.w3.org/2000/svg';
    const svgEl = document.createElementNS(ns, 'svg');
    svgEl.setAttribute('xmlns', ns);
    svgEl.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
    svgEl.setAttribute('width',  vbW);
    svgEl.setAttribute('height', vbH);

    if (withWhiteBg) {
        const bgRect = document.createElementNS(ns, 'rect');
        bgRect.setAttribute('x', vbX);       bgRect.setAttribute('y', vbY);
        bgRect.setAttribute('width', vbW);   bgRect.setAttribute('height', vbH);
        bgRect.setAttribute('fill', 'white');
        svgEl.appendChild(bgRect);
    }

    const styleEl = document.createElementNS(ns, 'style');
    styleEl.textContent = [
        'line{stroke:#333;stroke-width:1.6px;stroke-linecap:round;fill:none}',
        '.bond-dashed{stroke-dasharray:5,3}',
        `.atom-bg{fill:${withWhiteBg ? 'white' : 'none'};stroke:none}`,
        '.atom-hit{display:none}',
        '.atom-label{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:bold}',
        '.atom-charge{font-family:Arial,Helvetica,sans-serif;font-size:9px;font-weight:bold}',
    ].join(' ');
    svgEl.appendChild(styleEl);

    const gClone = g.node().cloneNode(true);
    gClone.removeAttribute('transform');
    svgEl.appendChild(gClone);

    return svgEl;
}

// Render SVG → canvas → PNG blob Promise (for ClipboardItem)
function _svgToPngBlob(svgEl, scale = 2) {
    const w = parseFloat(svgEl.getAttribute('width'));
    const h = parseFloat(svgEl.getAttribute('height'));
    const svgStr = new XMLSerializer().serializeToString(svgEl);
    const url = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml' }));
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width  = w * scale;
            canvas.height = h * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            ctx.drawImage(img, 0, 0);
            URL.revokeObjectURL(url);
            canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob')), 'image/png');
        };
        img.onerror = reject;
        img.src = url;
    });
}

window.copyForcePng = function() {
    const PAD   = 30;
    const nodes = simulation.nodes();
    if (!nodes.length) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const n of nodes) {
        const r = atomRadius(n.protons);
        if (n.x - r < minX) minX = n.x - r;
        if (n.x + r > maxX) maxX = n.x + r;
        if (n.y - r < minY) minY = n.y - r;
        if (n.y + r > maxY) maxY = n.y + r;
    }

    const vbX = minX - PAD, vbY = minY - PAD;
    const vbW = (maxX - minX) + PAD * 2;
    const vbH = (maxY - minY) + PAD * 2;

    const ns    = 'http://www.w3.org/2000/svg';
    const svgEl = document.createElementNS(ns, 'svg');
    svgEl.setAttribute('xmlns', ns);
    svgEl.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
    svgEl.setAttribute('width',  vbW);
    svgEl.setAttribute('height', vbH);

    const bgRect = document.createElementNS(ns, 'rect');
    bgRect.setAttribute('x', vbX); bgRect.setAttribute('y', vbY);
    bgRect.setAttribute('width', vbW); bgRect.setAttribute('height', vbH);
    bgRect.setAttribute('fill', 'white');
    svgEl.appendChild(bgRect);

    const styleEl = document.createElementNS(ns, 'style');
    styleEl.textContent = [
        '.link{stroke:#696969;stroke-linecap:round;fill:none}',
        '.atom-symbol,.charge-label{font-family:Arial,Helvetica,sans-serif;font-weight:bold}',

        .catch(() => { btn.textContent = '✗'; setTimeout(reset, 1500); });
};
