* { box-sizing: border-box; }

html { height: 100%; }

body {
    height: 96%;
    font-family: arial, helvetica, sans-serif;

    margin: 0;
    background: #fff;
}

#wrapper {
    position: relative;
    min-width: 200px;

    height: 98%;

    padding: 0;
    box-shadow: 0 0 25px rgba(159,159,159,0.8);

#header {
    position: absolute;
    top: 0;
    width: 100%;
    min-height: 85px;
    margin: auto;

    height: auto;
    margin: auto;

#content-main {
    position: absolute;
    top: 90px;
    bottom: 50px;

}

#plot {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 70%;
    overflow: hidden;
}

#sidebar {
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 29%;
    overflow-y: auto;
    padding: 8px 12px;
    border-left: 1px solid #eee;
}

#footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50px;
    border-top: 1px solid #eee;
    background: #fff;
}

#content-info {
    width: auto;
    padding: 10px;

    overflow: hidden;
}

#content-source {
    width: auto;
    padding: 10px;
    float: right;
    overflow: hidden;
}

#content-source a {
    font-size: 14px;
    font-weight: normal;
    color: #53B2C8;
    text-decoration: none;
}

.group {
    position: relative;
    margin-bottom: 5px;
}

.examples {
    color: #999;
    margin: 0;
    padding-left: 15px;
    font-size: 12px;
    font-weight: normal;
    font-family: 'Lucida Sans Unicode', sans-serif;
}

.examples a {
    color: #53B2C8;
    font-weight: bold;
    text-decoration: none;
    cursor: pointer;
}

.examples a:hover { text-decoration: underline; }

input {
    width: 100%;
    font-size: 16px;
    padding: 10px 10px 10px 5px;
    display: block;
    border: none;
    border-bottom: 1px solid #757575;
    background: transparent;
}

input:focus { outline: none; }

input:focus ~ label, input:valid ~ label {
    top: -15px;
    font-size: 13px;
    color: #5264AE;
}

label {
    color: #999;
    font-size: 16px;
    font-weight: normal;
    position: absolute;
    pointer-events: none;
    left: 5px;
    top: 10px;
    transition: 0.2s ease all;
}

.bar {
    position: relative;
    display: block;
    width: 100%;
}

.bar::before, .bar::after {
    content: '';
    height: 2px;
    width: 0;
    bottom: 0;
    position: absolute;
    background: #5264AE;
    transition: 0.2s ease all;
}

.bar::before { left: 50%; }
.bar::after  { right: 50%; }

input:focus ~ .bar::before,
input:focus ~ .bar::after { width: 50%; }

.highlight {
    position: absolute;
    height: 60%;
    width: 100px;
    top: 25%;
    left: 0;
    pointer-events: none;
    opacity: 0.5;
}

input:focus ~ .highlight {
    animation: inputHighlighter 0.3s ease;
}

@keyframes inputHighlighter {
    from { background: #5264AE; }
    to   { width: 0; background: transparent; }
}

.svg-plot {
    width: 100%;
    height: 100%;
    display: block;
}

/* ── Tooltip ─────────────────────────────────────────────────────────── */

div.tooltip {
    position: fixed;
    text-align: left;
    width: auto;
    min-width: 120px;
    height: auto;
    padding: 6px 10px 8px;
    font-size: 12px;
    font-family: 'Lucida Sans Unicode', sans-serif;
    background: white;
    border: 1px solid #bbb;
    border-radius: 6px;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
    pointer-events: none;
    z-index: 100;
}
div.tooltip .tt-head {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 5px;
    border-bottom: 1px solid #eee;
    padding-bottom: 3px;
}
div.tooltip table {
    border-collapse: collapse;
    width: 100%;
}
div.tooltip td {
    padding: 1px 0;
    vertical-align: top;
}
div.tooltip td:first-child {
    color: #888;
    padding-right: 10px;
    white-space: nowrap;
}

/* ── Force-layout bond lines ─────────────────────────────────────────── */

.link {
    stroke: #696969;
    stroke-linecap: round;
}

/* ── 2D-structure bond lines ─────────────────────────────────────────── */

.bond {
    stroke: #111;
    stroke-linecap: round;
    fill: none;
}

.bond-dashed { stroke-dasharray: 5, 3; }

.atom-bg   { fill: white; stroke: none; }

.atom-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    font-weight: bold;
    text-anchor: middle;
    pointer-events: none;
    user-select: none;
}

.atom-charge {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 9px;
    font-weight: bold;
    pointer-events: none;
    user-select: none;
    dominant-baseline: auto;
}

.atom-hit {
    fill: transparent;
    stroke: none;
    cursor: default;
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */

#descriptor-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

#descriptor-table th {
    text-align: left;
    color: #555;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 1px solid #ddd;
    padding: 4px 2px;
}

#descriptor-table td {

}

#descriptor-table td:last-child {
    text-align: right;

}

#descriptor-section-title {
    font-size: 13px;

#molecularFormula {

}

#molecularWeight {
    font-size: 13px;
    color: #777;

#toggle-controls {

<script type="module">

import * as d3              from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';
import { parseSMILES }      from './src/io/smiles.js';
import { generateCoords }   from './src/layout/coords2d.js';
import { molecularFormula, molecularMass } from './src/descriptors/molecular.js';
import { allMatrices }      from './src/matrices/index.js';
import {
    atomColor, WEDGE_HALF_W, WEDGE_DASHES,
    perpUnit, shortenLine, secondaryDir,
    labelHalfW, labelHalfH,
    getAtomLabel, pickStereoWedges
} from './src/layout/mol2d-helpers.js?v=3';
import {
    wienerIndex, hyperWienerIndex, balabanIndex,
    randicIndex, zagreb1, zagreb2, hararyIndex,
    plattIndex, szegedIndex
} from './src/descriptors/topological.js';

function strokeColor(symbol) {
    const light = new Set(['H','F','Cl','Mg','Ca','He','Ne','Ar','B','Si','Be','Li']);
    return light.has(symbol) ? '#888' : 'rgba(0,0,0,0.25)';
}

// ---------------------------------------------------------------------------
// Shared state
// ---------------------------------------------------------------------------
let mode          = 'force'; // 'force' | '2d'
let currentSmiles = null;
let rotationDeg   = 0;

// ---------------------------------------------------------------------------
// D3 SVG setup (shared by both modes)
// ---------------------------------------------------------------------------
const plotEl  = document.getElementById('plot');
const tooltip = d3.select('#atom-tooltip');

const svg = d3.select('#plot')
    .append('svg')
    .attr('class', 'svg-plot labels-hidden');

svg.append('rect')
    .attr('fill', 'white')
    .attr('width', '100%')
    .attr('height', '100%');

const g = svg.append('g');

const zoom = d3.zoom()
    .scaleExtent([0.05, 30])
    .on('zoom', event => g.attr('transform', event.transform));

svg.call(zoom);

// ---------------------------------------------------------------------------
// ══ FORCE LAYOUT ══════════════════════════════════════════════════════════
// ---------------------------------------------------------------------------

const BOND_MULT   = 3;
const BOND_OFFSET = 2;
const PI_STROKE   = { stroke: '#FFFFFF', width: '2px' };
const ARO_STROKE  = { stroke: '#696969', width: '3px', dashArray: '3,3' };

function singleBondWidth(order) {
    return `${(order * BOND_MULT - 1) * (BOND_MULT / 2)}px`;
}

function atomRadius(protons) {
    if (protons == null || protons >= 11) return 10;
    return Math.sqrt(protons + 2.7) * 2.8;
}

function xOffset(offset, src, tgt) {
    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    if (dy === 0 || Math.abs(dx / dy) > 1) return offset * (dy / dx);
    return offset;
}

function yOffset(offset, src, tgt) {
    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    if (dy === 0 || Math.abs(dx / dy) > 1) return -offset;
    return offset * -(dx / dy);
}

// ---------------------------------------------------------------------------
// ══ ATOM TOOLTIP ══════════════════════════════════════════════════════════
// ---------------------------------------------------------------------------

function atomTooltipHtml(atom, mol) {
    const p = atom.properties;
    const charge = p.charge ?? 0;

    // Formatted charge string for the header  (e.g.  +  2+  −  2−)
    let chargeSup = '';
    if (charge !== 0) {
        const abs = Math.abs(charge);
        const sign = charge > 0 ? '+' : '−';
        chargeSup = `<sup style="font-size:11px">${abs > 1 ? abs : ''}${sign}</sup>`;
    }

    // Isotope: standard mass = protons + round(neutrons from elements table).
    // If the stored neutrons differ noticeably, it's a non-standard isotope.
    let isotopePrefix = '';
    if (p.protons != null && p.neutrons != null) {
        const massNo = p.protons + Math.round(p.neutrons);
        // Detect non-standard by comparing to neutral-atom rounding
        const stdNeutrons = { H:0, C:6, N:7, O:8, S:16, P:16, F:10, Cl:18, Br:45, I:74 };
        const std = stdNeutrons[atom.name];
        if (std !== undefined && Math.round(p.neutrons) !== std) {
            isotopePrefix = `<sup style="font-size:11px">${massNo}</sup>`;
        }
    }

    const degree = atom.bonds.length;

    const row = (label, val) =>
        `<tr><td>${label}</td><td><b>${val}</b></td></tr>`;

    let rows = '';
    if (p.protons  != null) { rows += row('Atomic #',  p.protons); }
    if (p.electrons != null) { rows += row('Electrons', p.electrons); }
    rows += row('Bonds', degree);
    const sign = charge > 0 ? `+${charge}` : `${charge}`;
    rows += row('Charge', sign);
    if (p.aromatic) { rows += row('Aromatic', 'yes'); }
    rows += row('Chirality', p.chirality ?? 'N/A');

    const color = atomColor(atom.name);
    return `<div class="tt-head" style="color:${color}">${isotopePrefix}${atom.name}${chargeSup}
        <span style="font-size:11px;font-weight:normal;color:#aaa;margin-left:4px">${atom.id}</span>
    </div><table>${rows}</table>`;
}

function convertMolecule(molecule) {
    const atomEntries = [...molecule.atoms.entries()];
    const idToIndex   = new Map(atomEntries.map(([id], i) => [id, i]));

    const nodes = atomEntries.map(([id, atom]) => ({
        id,
        name:      atom.name,
        protons:   atom.properties.protons,
        charge:    atom.properties.charge ?? 0,
        aromatic:  atom.properties.aromatic ?? false,
    }));

    const links = [...molecule.bonds.values()].map(bond => ({
        id:      bond.id,
        source:  idToIndex.get(bond.atoms[0]),
        target:  idToIndex.get(bond.atoms[1]),
        order:   bond.properties.aromatic ? 1.5 : (bond.properties.order ?? 1),
        aromatic: bond.properties.aromatic ?? false,
    }));

    return { nodes, links };
}

function createDrag(sim) {
    return d3.drag()
        .on('start', (event, d) => {
            if (!event.active) sim.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        })
        .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on('end',   (event, d) => {
            if (!event.active) sim.alphaTarget(0);
            d.fx = null; d.fy = null;
        });
}

const simulation = d3.forceSimulation()
    .force('charge', d3.forceManyBody().strength(-150).distanceMax(200))
    .force('link',   d3.forceLink().strength(1.0).distance(25))
    .force('center', d3.forceCenter(plotEl.clientWidth / 2, plotEl.clientHeight / 2))
    .velocityDecay(0.35)
    .alphaDecay(0.02)
    .stop();

function updateForce(molecule) {
    // Seed initial positions from 2D layout so all atoms start at valid positions.
    generateCoords(molecule, { suppressH: false, bondLength: 1.5 });

    const graph = convertMolecule(molecule);
    g.selectAll('*').remove();

    // Reset zoom to identity for force layout
    svg.call(zoom.transform, d3.zoomIdentity);

    const bondEnter = g.selectAll('line.link-base')
        .data(graph.links, d => d.id)
        .enter();

    const singleBond = bondEnter.append('line')
        .filter(d => d.order === 1 || d.order === 2 || d.order === 3)
        .attr('class', 'link')
        .style('stroke-width', d => singleBondWidth(d.order));

    const doubleSep = bondEnter.append('line')
        .filter(d => d.order === 2)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const aroBond1 = bondEnter.append('line')
        .filter(d => d.order === 1.5)
        .attr('class', 'link separator')
        .style('stroke', ARO_STROKE.stroke)
        .style('stroke-width', ARO_STROKE.width);

    const aroBond2 = bondEnter.append('line')
        .filter(d => d.order === 1.5)
        .attr('class', 'link separator')
        .style('stroke', ARO_STROKE.stroke)
        .style('stroke-width', ARO_STROKE.width)
        .style('stroke-dasharray', ARO_STROKE.dashArray);

    const tripleSep1 = bondEnter.append('line')
        .filter(d => d.order === 3)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const tripleSep2 = bondEnter.append('line')
        .filter(d => d.order === 3)
        .attr('class', 'separator')
        .style('stroke', PI_STROKE.stroke)
        .style('stroke-width', PI_STROKE.width);

    const atom = g.selectAll('circle.node')
        .data(graph.nodes, d => d.id)
        .enter()
        .append('circle')
        .attr('class', 'node')
        .attr('r',           d => atomRadius(d.protons))
        .attr('fill',        d => atomColor(d.name))
        .attr('stroke',      d => strokeColor(d.name))
        .attr('stroke-width', 1)
        .call(createDrag(simulation))
        .on('mouseover', (event, d) => {
            const atom = molecule.atoms.get(d.id);
            if (!atom) { return; }
            tooltip.transition().delay(200).style('opacity', 0.9);
            tooltip.html(atomTooltipHtml(atom, molecule))
                .style('left', (event.clientX + 13) + 'px')
                .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mousemove', event => {
            tooltip.style('left', (event.clientX + 13) + 'px')
                   .style('top',  (event.clientY - 20) + 'px');
        })
        .on('mouseout', () => {
            tooltip.transition().duration(50).style('opacity', 0);
        });

    const atomSymbol = g.selectAll('text.atom-symbol')
        .data(graph.nodes, d => d.id)
        .enter()
        .append('text')
        .attr('class', 'atom-symbol')
        .attr('pointer-events', 'none')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('font-family', 'Arial, Helvetica, sans-serif')
        .attr('font-weight', 'bold')
        .attr('font-size', d => d.name.length > 1 ? '7px' : '9px')
        .attr('fill', d => {
            const hex = atomColor(d.name);
            // Use white text on dark atoms, dark text on light atoms
            const cr = parseInt(hex.slice(1,3),16), cg = parseInt(hex.slice(3,5),16), cb = parseInt(hex.slice(5,7),16);
            return (cr*0.299 + cg*0.587 + cb*0.114) > 140 ? '#333' : '#fff';
        })
        .text(d => d.name);

    const chargeLabel = g.selectAll('text.charge-label')
        .data(graph.nodes.filter(d => d.charge !== 0), d => d.id)
        .enter()
        .append('text')
        .attr('class', 'charge-label')
        .attr('pointer-events', 'none')
        .attr('font-family', 'Arial, Helvetica, sans-serif')
        .attr('font-size', '11px')
        .attr('font-weight', 'bold')
        .attr('fill', '#333')
        .text(d => {
            const c = d.charge;
            return c === 1 ? '+' : c > 1 ? `${c}+` : c === -1 ? '−' : `${Math.abs(c)}−`;
        });

    // Apply 2D seed positions to nodes so the simulation starts from a valid layout.
    // Scale factor matches force link distance / coord bond length (1.5 Å) = 20 px/Å.
    const FORCE_SCALE = 25;
    const W0 = plotEl.clientWidth || 600, H0 = plotEl.clientHeight || 400;
    const atoms2d = [...molecule.atoms.values()].filter(a => a.x != null);
    if (atoms2d.length > 0) {
        let cx2d = 0, cy2d = 0;
        for (const a of atoms2d) { cx2d += a.x; cy2d += a.y; }
        cx2d /= atoms2d.length; cy2d /= atoms2d.length;
        const idToNode = new Map(graph.nodes.map(n => [n.id, n]));
        for (const [id, atom] of molecule.atoms) {
            const node = idToNode.get(id);
            if (node && atom.x != null) {
                node.x = W0 / 2 + (atom.x - cx2d) * FORCE_SCALE;
                node.y = H0 / 2 + (atom.y - cy2d) * FORCE_SCALE;
            }
        }
    }

    simulation.nodes(graph.nodes);
    simulation.force('link').links(graph.links);
    simulation.force('center',
        d3.forceCenter(plotEl.clientWidth / 2, plotEl.clientHeight / 2));
    simulation.alpha(1).restart();

    simulation.on('tick', () => {
        singleBond
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        doubleSep
            .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

        aroBond1
            .attr('x1', d => d.source.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset( BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset( BOND_OFFSET, d.source, d.target));

        aroBond2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

        tripleSep1
            .attr('x1', d => d.source.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset( BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset( BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset( BOND_OFFSET, d.source, d.target));

        tripleSep2
            .attr('x1', d => d.source.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y1', d => d.source.y - yOffset(-BOND_OFFSET, d.source, d.target))
            .attr('x2', d => d.target.x - xOffset(-BOND_OFFSET, d.source, d.target))
            .attr('y2', d => d.target.y - yOffset(-BOND_OFFSET, d.source, d.target));

        atom.attr('cx', d => d.x).attr('cy', d => d.y);
        atomSymbol.attr('x', d => d.x).attr('y', d => d.y);

        const OFF = 0.707; // cos/sin 45°
        chargeLabel
            .attr('x', d => d.x + atomRadius(d.protons) * OFF + 4)
            .attr('y', d => d.y - atomRadius(d.protons) * OFF);

        // Auto zoom-out to keep molecule in view
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const n of graph.nodes) {
            const r = atomRadius(n.protons);
            if (n.x - r < minX) minX = n.x - r;
            if (n.x + r > maxX) maxX = n.x + r;
            if (n.y - r < minY) minY = n.y - r;
            if (n.y + r > maxY) maxY = n.y + r;
        }
        const W = plotEl.clientWidth, H = plotEl.clientHeight;
        const PAD   = 40;
        const scale = Math.min((W - PAD * 2) / (maxX - minX || 1),
                               (H - PAD * 2) / (maxY - minY || 1), 1);
        const tx = W / 2 - ((minX + maxX) / 2) * scale;
        const ty = H / 2 - ((minY + maxY) / 2) * scale;
        svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    });
}

// ---------------------------------------------------------------------------
// ══ 2D STRUCTURE ══════════════════════════════════════════════════════════
// ---------------------------------------------------------------------------

const SCALE       = 60;   // SVG pixels per Angstrom
const BOND_OFF_2D = 7;    // px gap between parallel bond lines
const STROKE_W    = 1.6;  // px
const FONT_SIZE   = 14;   // px
function renderAtomLabel(group, label, color) {
    const textEl = group.append('text')
        .attr('class', 'atom-label')
        .attr('fill', color)
        .attr('text-anchor', 'middle');
    let i = 0;
    let first = true;
    while (i < label.length) {
        const ch = label[i];
        if (ch >= '0' && ch <= '9') {
            let num = '';
            while (i < label.length && label[i] >= '0' && label[i] <= '9') num += label[i++];
            textEl.append('tspan').attr('baseline-shift', 'sub').attr('font-size', '0.72em').text(num);
        } else {
            let word = '';
            while (i < label.length && !(label[i] >= '0' && label[i] <= '9')) word += label[i++];
            const ts = textEl.append('tspan').text(word);
            if (first) { ts.attr('dy', '0.35em'); first = false; }
        }
    }
}

function addLine(group, x1, y1, x2, y2, extraClass) {
    return group.append('line')
        .attr('class', extraClass ? `bond ${extraClass}` : 'bond')
        .attr('x1', x1).attr('y1', y1)
        .attr('x2', x2).attr('y2', y2)
        .style('stroke-width', `${STROKE_W}px`);
}

// ── 2D persistent state (shared between render2d and draw2d) ──────────────
let _mol2d      = null;
let _hCounts2d  = null;
let _cx2d       = 0;
let _cy2d       = 0;
let _stereoMap2d = null;  // Map<bondId, 'wedge'|'dash'>

function _toSVGPt2d(a) {
    const W = plotEl.clientWidth  || 600;
    const H = plotEl.clientHeight || 400;
    return { x: W / 2 + (a.x - _cx2d) * SCALE, y: H / 2 + (a.y - _cy2d) * SCALE };
}


function _drawBond(container, bond, a1, a2, mol, toSVGPt, stereoType = null) {
    // a1 is the chiral center (wedge/dash tip) when stereoType is set.
    if (stereoType === 'wedge' || stereoType === 'dash') {
        const s1 = toSVGPt(a1), s2 = toSVGPt(a2);
        const { nx, ny } = perpUnit(s2.x - s1.x, s2.y - s1.y);
        if (stereoType === 'wedge') {
            container.append('polygon')
                .attr('class', 'bond bond-wedge')
                .attr('points',
                    `${s1.x},${s1.y} ` +
                    `${s2.x - nx * WEDGE_HALF_W},${s2.y - ny * WEDGE_HALF_W} ` +
                    `${s2.x + nx * WEDGE_HALF_W},${s2.y + ny * WEDGE_HALF_W}`)
                .style('fill', '#111')
                .style('stroke', 'none');
        } else {
            for (let i = 1; i <= WEDGE_DASHES; i++) {
                const t = i / (WEDGE_DASHES + 1);
                const px = s1.x + t * (s2.x - s1.x);
                const py = s1.y + t * (s2.y - s1.y);
                const hw = WEDGE_HALF_W * t;
                container.append('line')
                    .attr('class', 'bond bond-hash')
                    .attr('x1', px - nx * hw).attr('y1', py - ny * hw)
                    .attr('x2', px + nx * hw).attr('y2', py + ny * hw)
                    .style('stroke', '#111')
                    .style('stroke-width', '1.2px')
                    .style('stroke-linecap', 'round');
            }
        }
        return;
    }

    const order = bond.properties.aromatic ? 1.5 : (bond.properties.order ?? 1);
    const s1 = toSVGPt(a1), s2 = toSVGPt(a2);
    const dx = s2.x - s1.x, dy = s2.y - s1.y;
    const { nx, ny } = perpUnit(dx, dy);
    if (order === 1) {
        addLine(container, s1.x, s1.y, s2.x, s2.y);
    } else if (order === 2) {
        const dir = secondaryDir(a1, a2, mol, toSVGPt);
        addLine(container, s1.x, s1.y, s2.x, s2.y);
        const ox = nx * BOND_OFF_2D * dir, oy = ny * BOND_OFF_2D * dir;
        const lsec = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, 4, 4);
        addLine(container, lsec.x1, lsec.y1, lsec.x2, lsec.y2);
    } else if (order === 3) {
        for (const d of [-BOND_OFF_2D, 0, BOND_OFF_2D]) {
            const ox = nx * d, oy = ny * d;
            const lt = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy,
                d !== 0 ? 4 : 0, d !== 0 ? 4 : 0);
            addLine(container, lt.x1, lt.y1, lt.x2, lt.y2);
        }
    } else if (order === 1.5) {
        const dir = secondaryDir(a1, a2, mol, toSVGPt);
        addLine(container, s1.x, s1.y, s2.x, s2.y);
        const ox = nx * BOND_OFF_2D * dir, oy = ny * BOND_OFF_2D * dir;
        const ldash = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, 5, 5);
        addLine(container, ldash.x1, ldash.y1, ldash.x2, ldash.y2, 'bond-dashed');
    }
}

function draw2d() {
    const mol      = _mol2d;
    const hCounts  = _hCounts2d;
    const toSVGPt  = _toSVGPt2d;

    const stereoMap = _stereoMap2d;
    const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
    const bondInfos = [];
    for (const bond of mol.bonds.values()) {
        const [a1, a2] = bond.getAtomObjects(mol);
        if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
        const isHBond = a1.visible === false || a2.visible === false;
        if (isHBond && !(stereoMap && stereoMap.has(bond.id))) continue;
        bondInfos.push({ bond, a1, a2 });
    }

    g.selectAll('*').remove();

    // Layer 1 — bonds (each wrapped in a <g data-bond-id> for incremental drag updates)
    const chiralCenterIds = new Set(mol.getChiralCenters());
    const bondLayer = g.append('g').attr('class', 'bonds');
    for (const bi of bondInfos) {
        const bg = bondLayer.append('g').attr('data-bond-id', bi.bond.id);
        const stereoType = stereoMap ? stereoMap.get(bi.bond.id) : null;
        // Orient so the chiral center is a1 (tip of wedge/dash).
        let sa1 = bi.a1, sa2 = bi.a2;
        if (stereoType && chiralCenterIds.has(sa2.id)) [sa1, sa2] = [sa2, sa1];
        _drawBond(bg, bi.bond, sa1, sa2, mol, toSVGPt, stereoType ?? null);
    }

    // Layer 2 — white clearance rects
    const bgLayer = g.append('g').attr('class', 'atom-bgs');
    for (const atom of atoms) {
        const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
        const hw = labelHalfW(label, FONT_SIZE);
        if (hw === 0) continue;
        const hh = labelHalfH(label, FONT_SIZE);
        const { x, y } = toSVGPt(atom);
        bgLayer.append('rect')
            .attr('class', 'atom-bg')
            .attr('data-atom-id', atom.id)
            .attr('x', x - hw).attr('y', y - hh)
            .attr('width', hw * 2).attr('height', hh * 2)
            .attr('rx', 2);
    }

    // Layer 3 — labels + hit targets + drag
    const labelLayer = g.append('g').attr('class', 'atom-labels');
    for (const atom of atoms) {
        const { x, y } = toSVGPt(atom);
        const symbol = atom.name;
        const charge = atom.properties.charge ?? 0;
        const label  = getAtomLabel(atom, hCounts, toSVGPt, mol);

        const hitGroup = labelLayer.append('g')
            .attr('data-atom-id', atom.id)
            .attr('transform', `translate(${x},${y})`);

        hitGroup.append('circle')
            .attr('class', 'atom-hit')
            .attr('r', Math.max(labelHalfW(label || symbol, FONT_SIZE), 10))
            .style('cursor', 'grab')
            .on('mouseover', event => {
                tooltip.transition().delay(150).style('opacity', 0.9);
                tooltip.html(atomTooltipHtml(atom, mol))
                    .style('left', (event.clientX + 13) + 'px')
                    .style('top',  (event.clientY - 20) + 'px');
            })
            .on('mousemove', event => {
                tooltip.style('left', (event.clientX + 13) + 'px')
                       .style('top',  (event.clientY - 20) + 'px');
            })
            .on('mouseout', () => {
                tooltip.transition().duration(50).style('opacity', 0);
            });

        if (label) {
            renderAtomLabel(hitGroup, label, atomColor(symbol));
            if (charge !== 0) {
                const sign = charge === 1 ? '+' : charge > 1 ? `${charge}+`
                           : charge === -1 ? '−' : `${Math.abs(charge)}−`;
                hitGroup.append('text')
                    .attr('class', 'atom-charge')
                    .attr('x', labelHalfW(label, FONT_SIZE))
                    .attr('y', -(FONT_SIZE * 0.42))
                    .attr('fill', atomColor(symbol))
                    .text(sign);
            }
        }

        // Drag: move this atom, update only its bonds in-place
        hitGroup.call(d3.drag()
            .on('start', function(event) {
                event.sourceEvent.stopPropagation();
                tooltip.style('opacity', 0);
                hitGroup.select('circle').style('cursor', 'grabbing');
            })
            .on('drag', function(event) {
                const W = plotEl.clientWidth  || 600;
                const H = plotEl.clientHeight || 400;
                const [svgX, svgY] = d3.pointer(event.sourceEvent, g.node());
                atom.x = _cx2d + (svgX - W / 2) / SCALE;
                atom.y = _cy2d + (svgY - H / 2) / SCALE;

                const np = toSVGPt(atom);
                hitGroup.attr('transform', `translate(${np.x},${np.y})`);

                const lbl = getAtomLabel(atom, hCounts, toSVGPt, mol);
                const hw  = labelHalfW(lbl, FONT_SIZE);
                const hh  = labelHalfH(lbl, FONT_SIZE);
                bgLayer.select(`[data-atom-id="${atom.id}"]`)
                    .attr('x', np.x - hw).attr('y', np.y - hh);

                for (const bi of bondInfos) {
                    if (bi.a1.id !== atom.id && bi.a2.id !== atom.id) continue;
                    const bg = bondLayer.select(`[data-bond-id="${bi.bond.id}"]`);
                    bg.selectAll('*').remove();
                    const stereoType = stereoMap ? stereoMap.get(bi.bond.id) : null;
                    let sa1 = bi.a1, sa2 = bi.a2;
                    if (stereoType && chiralCenterIds.has(sa2.id)) [sa1, sa2] = [sa2, sa1];
                    _drawBond(bg, bi.bond, sa1, sa2, mol, toSVGPt, stereoType ?? null);
                }
            })
            .on('end', function() {
                hitGroup.select('circle').style('cursor', 'grab');
            })
        );
    }

    // With hideHydrogens(), all H atoms remain in mol.atoms so getFormula()
    // already counts them — do not add extraH or they get double-counted.
    updateFormula(mol);
    updateDescriptors(mol);
}

function render2d(mol) {
    // Count H neighbours before stripping
    const hCounts = new Map();
    for (const [, atom] of mol.atoms) {
        if (atom.name === 'H') continue;
        const count = atom.getNeighbors(mol).filter(n => n.name === 'H').length;
        if (count > 0) hCounts.set(atom.id, count);
    }
    mol.hideHydrogens();

    generateCoords(mol, { suppressH: true, bondLength: 1.5 });

    // Place chiral H atoms at real positions so stereo bonds can be drawn.
    // All other hidden H stay at their parent's position (assigned by generateCoords)
    // and are excluded from rendering entirely.
    for (const [, atom] of mol.atoms) {
        if (atom.name !== 'H' || atom.visible !== false) continue;
        const nbrs = atom.getNeighbors(mol);
        if (nbrs.length !== 1) continue;
        const parent = nbrs[0];
        if (!parent.properties.chirality) continue;
        const others = parent.getNeighbors(mol).filter(n => n.id !== atom.id);
        let sumX = 0, sumY = 0, cnt = 0;
        for (const nb of others) {
            if (nb.x != null) { sumX += nb.x - parent.x; sumY += nb.y - parent.y; cnt++; }
        }
        const angle = cnt > 0 ? Math.atan2(-sumY, -sumX) : 0;
        const hLen  = 1.5 * 0.75;
        atom.x = parent.x + Math.cos(angle) * hLen;
        atom.y = parent.y + Math.sin(angle) * hLen;
    }

    // Apply rotation
    if (rotationDeg !== 0) {
        const allAtoms = [...mol.atoms.values()].filter(a => a.x != null);
        let mx = 0, my = 0;
        for (const a of allAtoms) { mx += a.x; my += a.y; }
        mx /= allAtoms.length; my /= allAtoms.length;
        const rad  = rotationDeg * Math.PI / 180;
        const cosR = Math.cos(rad), sinR = Math.sin(rad);
        for (const a of allAtoms) {
            const dx = a.x - mx, dy = a.y - my;
            a.x = mx + dx * cosR - dy * sinR;
            a.y = my + dx * sinR + dy * cosR;
        }
    }

    const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
    if (atoms.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const a of atoms) {
        if (a.x < minX) minX = a.x; if (a.x > maxX) maxX = a.x;
        if (a.y < minY) minY = a.y; if (a.y > maxY) maxY = a.y;
    }
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const W  = plotEl.clientWidth  || 600;
    const H  = plotEl.clientHeight || 400;

    const PAD      = 40;
    const molSVGW  = (maxX - minX) * SCALE || 1;
    const molSVGH  = (maxY - minY) * SCALE || 1;
    const fitScale = Math.min((W - PAD * 2) / molSVGW, (H - PAD * 2) / molSVGH, 1);
    const fitTx    = W / 2 * (1 - fitScale);
    const fitTy    = H / 2 * (1 - fitScale);
    svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));

    // Decrement hCount for any H shown via a stereo bond so the atom label
    // for that heavy atom does not show a spurious H subscript.
    const stereoMap = pickStereoWedges(mol);
    for (const [bondId] of stereoMap) {
        const bond = mol.bonds.get(bondId);
        if (!bond) continue;
        const [ba1, ba2] = bond.getAtomObjects(mol);
        const hAtom   = ba1?.visible === false ? ba1 : (ba2?.visible === false ? ba2 : null);
        const heavyAt = hAtom ? (hAtom === ba1 ? ba2 : ba1) : null;
        if (!heavyAt) continue;
        const n = (hCounts.get(heavyAt.id) ?? 0) - 1;
        if (n <= 0) hCounts.delete(heavyAt.id);
        else        hCounts.set(heavyAt.id, n);
    }

    _mol2d       = mol;
    _hCounts2d   = hCounts;
    _cx2d        = cx;
    _cy2d        = cy;
    _stereoMap2d = stereoMap;

    draw2d();
}

// ---------------------------------------------------------------------------
// Shared helper: build molecule SVG element from current 2D state
// ---------------------------------------------------------------------------
function _buildMolSvg(withWhiteBg) {
    const PAD  = 30;
    const bbox = g.node().getBBox();
    if (!bbox.width && !bbox.height) return null;

    const vbX = bbox.x - PAD,  vbY = bbox.y - PAD;
    const vbW = bbox.width  + PAD * 2;
    const vbH = bbox.height + PAD * 2;

    const ns    = 'http://www.w3.org/2000/svg';
    const svgEl = document.createElementNS(ns, 'svg');
    svgEl.setAttribute('xmlns', ns);
    svgEl.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
    svgEl.setAttribute('width',  vbW);
    svgEl.setAttribute('height', vbH);

    if (withWhiteBg) {
        const bgRect = document.createElementNS(ns, 'rect');
        bgRect.setAttribute('x', vbX);       bgRect.setAttribute('y', vbY);
        bgRect.setAttribute('width', vbW);   bgRect.setAttribute('height', vbH);
        bgRect.setAttribute('fill', 'white');
        svgEl.appendChild(bgRect);
    }

    const styleEl = document.createElementNS(ns, 'style');
    styleEl.textContent = [
        'line{stroke:#333;stroke-width:1.6px;stroke-linecap:round;fill:none}',
        '.bond-dashed{stroke-dasharray:5,3}',
        `.atom-bg{fill:${withWhiteBg ? 'white' : 'none'};stroke:none}`,
        '.atom-hit{display:none}',
        '.atom-label{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:bold}',
        '.atom-charge{font-family:Arial,Helvetica,sans-serif;font-size:9px;font-weight:bold}',
    ].join(' ');
    svgEl.appendChild(styleEl);

    const gClone = g.node().cloneNode(true);
    gClone.removeAttribute('transform');
    svgEl.appendChild(gClone);

    return svgEl;
}

// Render SVG → canvas → PNG blob Promise (for ClipboardItem)
function _svgToPngBlob(svgEl, scale = 2) {
    const w = parseFloat(svgEl.getAttribute('width'));
    const h = parseFloat(svgEl.getAttribute('height'));
    const svgStr = new XMLSerializer().serializeToString(svgEl);
    const url = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml' }));
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width  = w * scale;
            canvas.height = h * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            ctx.drawImage(img, 0, 0);
            URL.revokeObjectURL(url);
            canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob')), 'image/png');
        };
        img.onerror = reject;
        img.src = url;
    });
}

// ---------------------------------------------------------------------------
// Copy force layout as PNG (white background)
// ---------------------------------------------------------------------------
window.copyForcePng = function() {
    const PAD   = 30;
    const nodes = simulation.nodes();
    if (!nodes.length) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const n of nodes) {
        const r = atomRadius(n.protons);
        if (n.x - r < minX) minX = n.x - r;
        if (n.x + r > maxX) maxX = n.x + r;
        if (n.y - r < minY) minY = n.y - r;
        if (n.y + r > maxY) maxY = n.y + r;
    }

    const vbX = minX - PAD, vbY = minY - PAD;
    const vbW = (maxX - minX) + PAD * 2;
    const vbH = (maxY - minY) + PAD * 2;

    const ns    = 'http://www.w3.org/2000/svg';
    const svgEl = document.createElementNS(ns, 'svg');
    svgEl.setAttribute('xmlns', ns);
    svgEl.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
    svgEl.setAttribute('width',  vbW);
    svgEl.setAttribute('height', vbH);

    const bgRect = document.createElementNS(ns, 'rect');
    bgRect.setAttribute('x', vbX); bgRect.setAttribute('y', vbY);
    bgRect.setAttribute('width', vbW); bgRect.setAttribute('height', vbH);
    bgRect.setAttribute('fill', 'white');
    svgEl.appendChild(bgRect);

    const styleEl = document.createElementNS(ns, 'style');
    styleEl.textContent = [
        '.link{stroke:#696969;stroke-linecap:round;fill:none}',
        '.atom-symbol,.charge-label{font-family:Arial,Helvetica,sans-serif;font-weight:bold}',
        '.atom-symbol{font-size:9px;text-anchor:middle;dominant-baseline:central}',
        '.charge-label{font-size:11px}',
    ].join(' ');
    svgEl.appendChild(styleEl);

    const gClone = g.node().cloneNode(true);
    gClone.removeAttribute('transform');
    if (document.querySelector('.svg-plot').classList.contains('labels-hidden')) {
        gClone.querySelectorAll('.atom-symbol, .charge-label').forEach(el => el.remove());
    }
    svgEl.appendChild(gClone);

    const btn   = document.getElementById('copy-force-png-btn');
    const reset = () => { btn.textContent = 'PNG'; };
    navigator.clipboard.write([new ClipboardItem({ 'image/png': _svgToPngBlob(svgEl) })])
        .then(() => { btn.textContent = '✓'; setTimeout(reset, 1500); })
        .catch(() => { btn.textContent = '✗'; setTimeout(reset, 1500); });
};

// ---------------------------------------------------------------------------
// Copy 2D layout as PNG with white background (SVG button)
// ---------------------------------------------------------------------------
window.copySvg2d = function() {
    if (!_mol2d) return;
    const svgEl = _buildMolSvg(true);
    if (!svgEl) return;

    const btn   = document.getElementById('copy-svg-btn');
    const reset = () => { btn.textContent = 'SVG'; };
    navigator.clipboard.write([new ClipboardItem({ 'image/png': _svgToPngBlob(svgEl) })])
        .then(() => { btn.textContent = '✓'; setTimeout(reset, 1500); })
        .catch(() => { btn.textContent = '✗'; setTimeout(reset, 1500); });
};

// Copy 2D layout as PNG (transparent background, 2× resolution)
// ---------------------------------------------------------------------------
window.savePng2d = function() {
    if (!_mol2d) return;
    const svgEl = _buildMolSvg(false);
    if (!svgEl) return;

    const btn   = document.getElementById('save-png-btn');
    const reset = () => { btn.textContent = 'PNG'; };
    navigator.clipboard.write([new ClipboardItem({ 'image/png': _svgToPngBlob(svgEl) })])
        .then(() => { btn.textContent = '✓'; setTimeout(reset, 1500); })
        .catch(() => { btn.textContent = '✗'; setTimeout(reset, 1500); });
};

// Mode toggle
// ---------------------------------------------------------------------------
window.toggleLabels = function() {
    const svgEl = document.querySelector('.svg-plot');
    svgEl.classList.toggle('labels-hidden');
};

// ---------------------------------------------------------------------------
window.toggleMode = function() {
    mode = mode === 'force' ? '2d' : 'force';

    const btn          = document.getElementById('toggle-btn');
    const rotateCtrls  = document.getElementById('rotate-controls');

    const forceCtrls = document.getElementById('force-controls');
    if (mode === 'force') {
        btn.textContent           = '⬡ 2D Structure';
        rotateCtrls.style.display = 'none';
        forceCtrls.style.display  = 'flex';
    } else {
        btn.textContent           = '⚡ Force Layout';
        rotateCtrls.style.display = 'flex';
        forceCtrls.style.display  = 'none';
    }

    if (currentSmiles) {
        simulation.stop();
        rotationDeg = 0;
        const mol = parseSMILES(currentSmiles);
        if (mode === 'force') {
            updateForce(mol);
            updateFormula(mol);
            updateDescriptors(mol);
        } else {
            render2d(mol);
        }
    }
};

let _rotateInterval = null;
function stopRotate() {
    if (_rotateInterval !== null) { clearInterval(_rotateInterval); _rotateInterval = null; }
}
function startRotate(delta) {
    stopRotate();
    if (mode !== '2d' || !_mol2d) return;
    const step = () => {
        const allAtoms = [..._mol2d.atoms.values()].filter(a => a.x != null);
        if (!allAtoms.length) return;
        let mx = 0, my = 0;
        for (const a of allAtoms) { mx += a.x; my += a.y; }
        mx /= allAtoms.length; my /= allAtoms.length;
        const rad = delta * Math.PI / 180;
        const cosR = Math.cos(rad), sinR = Math.sin(rad);
        for (const a of allAtoms) {
            const dx = a.x - mx, dy = a.y - my;
            a.x = mx + dx * cosR - dy * sinR;
            a.y = my + dx * sinR + dy * cosR;
        }

        // Recompute bounding box centre and update persistent state so the
        // molecule stays visually centred as it rotates.
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const a of allAtoms) {
            if (a.x < minX) minX = a.x; if (a.x > maxX) maxX = a.x;
            if (a.y < minY) minY = a.y; if (a.y > maxY) maxY = a.y;
        }
        _cx2d = (minX + maxX) / 2;
        _cy2d = (minY + maxY) / 2;

        // Zoom out if the rotated molecule no longer fits in the viewport.
        const W = plotEl.clientWidth  || 600;
        const H = plotEl.clientHeight || 400;
        const PAD = 40;
        const molSVGW = (maxX - minX) * SCALE || 1;
        const molSVGH = (maxY - minY) * SCALE || 1;
        const neededScale = Math.min((W - PAD * 2) / molSVGW, (H - PAD * 2) / molSVGH, 1);
        const currentScale = d3.zoomTransform(svg.node()).k;
        if (neededScale < currentScale) {
            svg.call(zoom.transform, d3.zoomIdentity
                .translate(W / 2 * (1 - neededScale), H / 2 * (1 - neededScale))
                .scale(neededScale));
        }

        draw2d();
    };
    step();
    _rotateInterval = setInterval(step, 40);
}
// Use event delegation so no getElementById timing issues.
document.addEventListener('mousedown', e => {
    const btn = e.target.closest('#rotate-ccw, #rotate-cw');
    if (!btn) return;
    startRotate(btn.id === 'rotate-cw' ? 5 : -5);
});
document.addEventListener('mouseup',    stopRotate);
document.addEventListener('mouseleave', stopRotate);

// ---------------------------------------------------------------------------
// Formula & weight
// ---------------------------------------------------------------------------
function updateFormula(molecule, extraH = 0) {
    const formula = molecularFormula(molecule);
    if (extraH > 0) formula['H'] = (formula['H'] ?? 0) + extraH;
    const CHNOPS = ['C','H','N','O','P','S'];
    const ordered = {};
    for (const el of CHNOPS) if (el in formula) ordered[el] = formula[el];
    for (const el of Object.keys(formula).sort()) if (!(el in ordered)) ordered[el] = formula[el];

    let html = Object.entries(ordered)
        .map(([el, n]) => n === 1 ? el : `${el}${n}`)
        .join('')
        .replace(/(\d+)/g, '<sub>$1</sub>');

    const charge = molecule.properties.charge ?? 0;
    if (charge !== 0) {
        const n = charge === 1 ? '+' : charge > 1 ? `${charge}+`
                : charge === -1 ? '−' : `${Math.abs(charge)}−`;
        html += `<sup>${n}</sup>`;
    }
    document.getElementById('molecularFormula').innerHTML = html;

    const mass = molecularMass(molecule) + extraH * 1.008;
    document.getElementById('molecularWeight').textContent =
        `${(Math.round(mass * 100) / 100).toFixed(2)} g/mol`;
}

// ---------------------------------------------------------------------------
// Descriptor sidebar
// ---------------------------------------------------------------------------
function fmtVal(v) {
    if (v == null || !isFinite(v)) return '—';
    return Number.isInteger(v) ? v : v.toFixed(2);
}

function updateDescriptors(molecule, extraH = 0) {
    const tbody = document.getElementById('descriptor-body');

    let heavyCount = 0;
    for (const atom of molecule.atoms.values()) {
        if (atom.name !== 'H') heavyCount++;
    }

    let rows = [
        ['Atoms (total)', molecule.atoms.size + extraH],
        ['Heavy atoms',   heavyCount],
        ['Bonds',         molecule.bonds.size],
    ];

    try {
        if (heavyCount >= 2) {
            const { adjacency, degree, distance, reciprocal } = allMatrices(molecule);
            const W   = wienerIndex(distance);
            const WW  = hyperWienerIndex(distance);
            const H   = hararyIndex(reciprocal);
            const chi = randicIndex(adjacency, degree);
            const M1  = zagreb1(degree);
            const M2  = zagreb2(adjacency, degree);
            const F   = plattIndex(adjacency, degree);
            const Sz  = szegedIndex(distance, adjacency);
            let J = null;
            try { J = balabanIndex(distance, adjacency); } catch {}
            rows = rows.concat([
                ['Wiener Index (W)',   W],
                ['Hyper-Wiener (WW)',  WW],
                ['Harary Index (H)',   H],
                ['Balaban Index (J)',  J],
                ['Randić Index (χ)',   chi],
                ['Zagreb M1',         M1],
                ['Zagreb M2',         M2],
                ['Platt Index (F)',    F],
                ['Szeged Index (Sz)', Sz],
            ]);
        }
    } catch {}

    tbody.innerHTML = rows
        .map(([label, val]) => `<tr><td>${label}</td><td>${fmtVal(val)}</td></tr>`)
        .join('');
}

// ---------------------------------------------------------------------------
// Input handling
// ---------------------------------------------------------------------------
function parseAndRender(smiles) {
    if (typeof smiles !== 'string' || smiles.length === 0 || smiles.length > 1000) return;
    if (smiles === currentSmiles && mode === 'force') return; // force re-renders are fine after mode switch

    let mol;
    try {
        mol = parseSMILES(smiles);
    } catch (e) {
        console.warn('SMILES parse error:', e.message);
        return;
    }

    if (!mol || mol.atoms.size === 0) return;

    currentSmiles = smiles;
    rotationDeg   = 0;

    if (mode === 'force') {
        updateForce(mol);
        updateFormula(mol);
        updateDescriptors(mol);
    } else {
        simulation.stop();
        render2d(mol);
    }
}

window._parseSmiles = parseAndRender;

document.getElementById('smiles-input').addEventListener('keyup', event => {
    if (event.key === 'Enter') parseAndRender(event.target.value);
});

document.getElementById('smiles-input').addEventListener('paste', event => {
    setTimeout(() => parseAndRender(event.target.value), 0);
});

window.addEventListener('resize', () => {
    if (!currentSmiles) return;
    if (mode === 'force') {
        simulation.force('center',
            d3.forceCenter(plotEl.clientWidth / 2, plotEl.clientHeight / 2));
        simulation.alpha(0.3).restart();
    } else {
        rotationDeg = 0;
        render2d(parseSMILES(currentSmiles));
    }
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
const initialSmiles = 'C12=CC=CC=C1C3=C(C=CC=C3)C=C2'; // anthracene
document.getElementById('smiles-input').value = initialSmiles;
parseAndRender(initialSmiles);

</script>
