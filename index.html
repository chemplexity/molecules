      /**
       * Distance (px) to shorten the bond from `atom`'s end so it stops at the
       * edge of the atom's label bounding box.  Returns 0 for unlabelled atoms.
       */
      function _labelClearance(atom, otherSVGPt, toSVGPt) {
        const label = getAtomLabel(atom, _hCounts2d, toSVGPt, _mol2d);
        if (!label) return 0;
        const { x, y } = toSVGPt(atom);
        const dx = otherSVGPt.x - x,
          dy = otherSVGPt.y - y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const prefixHydrogenMatch = label.match(/^(H\d*)([A-Z][a-z]?)$/);
        const suffixHydrogenMatch = label.match(/^([A-Z][a-z]?)(H\d*)$/);
        const elementLabel = prefixHydrogenMatch?.[2] ?? suffixHydrogenMatch?.[1] ?? null;
        const heavyNeighbors = atom.getNeighbors(_mol2d).filter(n => n?.name !== 'H');
        const isCarbonylAdjacentHydroxyl =
          atom.name === 'O' &&
          !!elementLabel &&
          heavyNeighbors.length === 1 &&
          heavyNeighbors[0].name === 'C' &&
          heavyNeighbors[0].getNeighbors(_mol2d).some(nb => {
            if (!nb || nb.id === atom.id || nb.name !== 'O') return false;
            const bond = _mol2d.getBond(heavyNeighbors[0].id, nb.id);
            return (bond?.properties.order ?? 1) >= 2;
          });
        const useElementAnchorBox = isCarbonylAdjacentHydroxyl;
        const cx = useElementAnchorBox ? 0 : labelTextOffset(label, FONT_SIZE);
        const hw = useElementAnchorBox
          ? (FONT_SIZE * 0.38 * elementLabel.length + 4) / 2 + 7
          : labelHalfW(label, FONT_SIZE) + 1;
        const hh = labelHalfH(label, FONT_SIZE) + 1;
        const dirX = dx / len;
        const dirY = dy / len;

        const txCandidates = [];
        if (Math.abs(dirX) > 1e-9) {
          txCandidates.push((cx + hw) / dirX);
          txCandidates.push((cx - hw) / dirX);
        }
        const tyCandidates = [];
        if (Math.abs(dirY) > 1e-9) {
          tyCandidates.push(hh / dirY);
          tyCandidates.push(-hh / dirY);
        }

        let best = Infinity;
        for (const t of [...txCandidates, ...tyCandidates]) {
          if (!(t > 0)) continue;
          const px = dirX * t;
          const py = dirY * t;
          if (px < cx - hw - 1e-6 || px > cx + hw + 1e-6) continue;
          if (py < -hh - 1e-6 || py > hh + 1e-6) continue;
          best = Math.min(best, t);
        }
        return Number.isFinite(best) ? best : Math.max(hw, hh);
      }

      function _drawBond(container, bond, a1, a2, mol, toSVGPt, stereoType = null) {
        // a1 is the chiral center (wedge/dash tip) when stereoType is set.
        if (stereoType === 'wedge' || stereoType === 'dash') {
          const s1 = toSVGPt(a1);
          const s2orig = toSVGPt(a2);
          const { nx, ny } = perpUnit(s2orig.x - s1.x, s2orig.y - s1.y);
          // Shorten the far end (a2) if it carries a label (e.g. F, Cl, N…)
          const c2 = _labelClearance(a2, s1, toSVGPt);
          const blen = Math.sqrt((s2orig.x - s1.x) ** 2 + (s2orig.y - s1.y) ** 2) || 1;
          const s2 = {
            x: s2orig.x - ((s2orig.x - s1.x) / blen) * c2,
            y: s2orig.y - ((s2orig.y - s1.y) / blen) * c2
          };
          if (stereoType === 'wedge') {
            container
              .append('polygon')
              .attr('class', 'bond bond-wedge')
              .attr(
                'points',
                `${s1.x},${s1.y} ` +
                  `${s2.x - nx * WEDGE_HALF_W},${s2.y - ny * WEDGE_HALF_W} ` +
                  `${s2.x + nx * WEDGE_HALF_W},${s2.y + ny * WEDGE_HALF_W}`
              )
              .style('fill', '#111')
              .style('stroke', 'none');
          } else {
            for (let i = 1; i <= WEDGE_DASHES; i++) {
              const t = i / (WEDGE_DASHES + 1);
              const px = s1.x + t * (s2.x - s1.x);
              const py = s1.y + t * (s2.y - s1.y);
              const hw = WEDGE_HALF_W * t;
              container
                .append('line')
                .attr('class', 'bond bond-hash')
                .attr('x1', px - nx * hw)
                .attr('y1', py - ny * hw)
                .attr('x2', px + nx * hw)
                .attr('y2', py + ny * hw)
                .style('stroke', '#111')
                .style('stroke-width', '1.2px')
                .style('stroke-linecap', 'round');
            }
          }
          return;
        }

        const order = renderBondOrder(bond);
        const s1 = toSVGPt(a1),
          s2 = toSVGPt(a2);
        const c1 = _labelClearance(a1, s2, toSVGPt);
        const c2 = _labelClearance(a2, s1, toSVGPt);
        const dx = s2.x - s1.x,
          dy = s2.y - s1.y;
        const { nx, ny } = perpUnit(dx, dy);
        if (order === 1) {
          const l = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
          addLine(container, l.x1, l.y1, l.x2, l.y2);
        } else if (order === 2) {
          const dir = secondaryDir(a1, a2, mol, toSVGPt);
          const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
          addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
          const ox = nx * BOND_OFF_2D * dir,
            oy = ny * BOND_OFF_2D * dir;
          const lsec = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, Math.max(c1, 4), Math.max(c2, 4));
          addLine(container, lsec.x1, lsec.y1, lsec.x2, lsec.y2);
        } else if (order === 3) {
          for (const d of [-BOND_OFF_2D, 0, BOND_OFF_2D]) {
            const ox = nx * d,
              oy = ny * d;
            const lt = shortenLine(
              s1.x + ox,
              s1.y + oy,
              s2.x + ox,
              s2.y + oy,
              d !== 0 ? Math.max(c1, 4) : c1,
              d !== 0 ? Math.max(c2, 4) : c2
            );
            addLine(container, lt.x1, lt.y1, lt.x2, lt.y2);
          }
        } else if (order === 1.5) {
          const dir = secondaryDir(a1, a2, mol, toSVGPt);
          const lp = shortenLine(s1.x, s1.y, s2.x, s2.y, c1, c2);
          addLine(container, lp.x1, lp.y1, lp.x2, lp.y2);
          const ox = nx * BOND_OFF_2D * dir,
            oy = ny * BOND_OFF_2D * dir;
          const ldash = shortenLine(s1.x + ox, s1.y + oy, s2.x + ox, s2.y + oy, Math.max(c1, 5), Math.max(c2, 5));
          addLine(container, ldash.x1, ldash.y1, ldash.x2, ldash.y2, 'bond-dashed');
        }
      }

      function _redraw2dHighlights() {
        g.select('g.atom-highlights').remove();
        if (getHighlightedAtomIds().size === 0 || !_mol2d) return;
        const mol = _mol2d;
        const hCounts = _hCounts2d;
        const toSVGPt = _toSVGPt2d;
        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
        const highlightStyle = HIGHLIGHT_STYLES[getHighlightStyle()] ?? HIGHLIGHT_STYLES.default;
        const OL = 2;
        const hlLayer = g.insert('g', ':first-child').attr('class', 'atom-highlights').attr('opacity', 0.45);
        for (const atomSet of getHighlightedAtomSets()) {
          const mBonds = [];
          for (const bond of mol.bonds.values()) {
            const [ba1, ba2] = bond.getAtomObjects(mol);
            if (!ba1 || !ba2 || ba1.x == null || ba2.x == null) continue;
            if (ba1.visible === false || ba2.visible === false) continue;
            if (!atomSet.has(ba1.id) || !atomSet.has(ba2.id)) continue;
            const p1 = toSVGPt(ba1),
              p2 = toSVGPt(ba2);
            const r1 = Math.max(labelHalfW(getAtomLabel(ba1, hCounts, toSVGPt, mol) || ba1.name, FONT_SIZE), 10) + 5;
            const r2 = Math.max(labelHalfW(getAtomLabel(ba2, hCounts, toSVGPt, mol) || ba2.name, FONT_SIZE), 10) + 5;
            mBonds.push({ p1, p2, w: Math.min(r1, r2) * 2 });
          }
          const mAtoms = [];
          for (const atom of atoms) {
            if (!atomSet.has(atom.id)) continue;
            const { x, y } = toSVGPt(atom);
            const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 5;
            mAtoms.push({ x, y, r });
          }
          const addL = (stroke, extra) => {
            for (const { p1, p2, w } of mBonds)
              hlLayer
                .append('line')
                .attr('x1', p1.x)
                .attr('y1', p1.y)
                .attr('x2', p2.x)
                .attr('y2', p2.y)
                .attr('stroke', stroke)
                .attr('stroke-width', w + extra * 2)
                .attr('stroke-linecap', 'round');
          };
          const addC = (fill, extra) => {
            for (const { x, y, r } of mAtoms)
              hlLayer
                .append('circle')
                .attr('cx', x)
                .attr('cy', y)
                .attr('r', r + extra)
                .attr('fill', fill)
                .attr('stroke', 'none');
          };
          addL(highlightStyle.outline, OL);
          addC(highlightStyle.outline, OL);
          addL(highlightStyle.fill, 0);
          addC(highlightStyle.fill, 0);
        }
      }

      // ---------------------------------------------------------------------------
      // Draw-bond tool helpers
      // ---------------------------------------------------------------------------

      function _promoteBondOrder(bondId) {
        const reactionEdit = _prepareReactionPreviewBondEditTarget(bondId);
        if (reactionEdit === null) return;
        bondId = reactionEdit?.bondId ?? bondId;
        const mol = mode === 'force' ? currentMol : _mol2d;
        if (!mol) return;
        const bond = mol.bonds.get(bondId);
        if (!bond) return;

        if (mode === 'force') {
          const [a1, a2] = bond.getAtomObjects(mol);
          if (a1?.name === 'H' || a2?.name === 'H') return;
        }

        _takeSnapshot();

        // For aromatic bonds (order=1.5) use the Kekulé integer order as the base;
        // for plain bonds round in case of any fractional remnant.
        const cur = bond.properties.aromatic
          ? Number.isInteger(bond.properties.localizedOrder)
            ? bond.properties.localizedOrder
            : 1
          : Math.round(bond.properties.order ?? 1);
        const nextOrder = cur >= 3 ? 1 : cur + 1;

        bond.properties.order = nextOrder;
        bond.properties.aromatic = false;
        delete bond.properties.localizedOrder;

        const [a1, a2] = bond.getAtomObjects(mol);
        const affected = new Set([a1?.id, a2?.id].filter(Boolean));
        mol.clearStereoAnnotations(affected);
        kekulize(mol);
        refreshAromaticity(mol, { preserveKekule: true });
        mol.repairImplicitHydrogens(affected);

        if (mode !== 'force') {
          _hCounts2d = new Map();
          for (const [, a] of mol.atoms) {
            if (a.name === 'H') continue;
            const cnt = a.getNeighbors(mol).filter(n => n.name === 'H').length;
            if (cnt > 0) _hCounts2d.set(a.id, cnt);
          }
          _stereoMap2d = pickStereoWedges(mol);
        }
        _drawBondHoverSuppressed = true;

        _syncInputField(mol);

        updateFormula(mol);
        updateDescriptors(mol);
        updateFunctionalGroups(mol);
        updateReactionTemplatesPanel();
        if (mode === 'force') {
          const prevNodeIds = new Set(simulation.nodes().map(n => n.id));

          updateForce(mol, { preservePositions: true });

          const nodes = simulation.nodes();
          const allLinks = simulation.force('link').links();

          // Identify genuinely new H atoms added by repairImplicitHydrogens.
          const newHNodes = nodes.filter(n => n.name === 'H' && !prevNodeIds.has(n.id));
          const newHIds = new Set(newHNodes.map(n => n.id));

          // Pre-place each new H atom at the best open angle around its parent.
          if (newHNodes.length > 0) {
            const H_DIST = 25;
            const newHByParent = new Map();
            for (const hNode of newHNodes) {
              const link = allLinks.find(l => l.source === hNode || l.target === hNode);
              if (!link) continue;
              const parent = link.source === hNode ? link.target : link.source;
              if (!newHByParent.has(parent)) newHByParent.set(parent, []);
              newHByParent.get(parent).push(hNode);
            }
            for (const [parent, hNodes] of newHByParent) {
              _placeHydrogensAroundParent(parent, hNodes, allLinks, {
                distance: H_DIST,
                excludeIds: newHIds
              });
            }
          }

          // Pin every atom — including pre-placed new H atoms — so nothing moves.
          // alpha(0) lets the simulation fire exactly one render tick then stop.
          for (const node of nodes) {
            node.vx = 0;
            node.vy = 0;
            node.fx = node.x;
            node.fy = node.y;
          }
          simulation.on('end.unfix', () => {
            for (const node of simulation.nodes()) {
              node.fx = null;
              node.fy = null;
            }
            simulation.on('end.unfix', null);
            simulation.alpha(0.08).restart();
          });
          simulation.alpha(0);
        } else {
          draw2d();
        }
      }

      function _startDrawBond(atomId, gX, gY) {
        // Compute the origin in g-space from the atom's actual rendered position.
        let ox, oy;
        if (atomId === null) {
          // Blank-space start: origin is the click position itself.
          ox = gX;
          oy = gY;
        } else if (mode === 'force') {
          const node = simulation.nodes().find(n => n.id === atomId);
          ox = node ? node.x : gX;
          oy = node ? node.y : gY;
        } else {
          const atom = _mol2d && _mol2d.atoms.get(atomId);
          if (!atom || atom.x == null) return;
          const W = plotEl.clientWidth || 600;
          const H = plotEl.clientHeight || 400;
          ox = W / 2 + (atom.x - _cx2d) * SCALE;
          oy = H / 2 - (atom.y - _cy2d) * SCALE;
        }
        const ex = ox; // start collapsed; preview follows mouse immediately
        const ey = oy;
        _drawBondState = { atomId, ox, oy, ex, ey, dragged: false };
        g.append('line')
          .attr('class', 'draw-bond-preview')
          .attr('x1', ox)
          .attr('y1', oy)
          .attr('x2', ex)
          .attr('y2', ey)
          .attr('stroke', '#111')
          .attr('stroke-width', mode === 'force' ? parseFloat(singleBondWidth(1)) : STROKE_W)
          .attr('stroke-linecap', 'round')
          .attr('pointer-events', 'none');
        // In force mode, show ghost atom circles at origin and destination.
        // In 2D mode, show ghost text labels for heteroatoms (N/O/S) only.
        if (mode === 'force') {
          const _pr = atomRadius(_DRAW_ELEM_PROTONS[_drawBondElement] ?? 6);
          const _fc = atomColor(_drawBondElement);
          const _sc = strokeColor(_drawBondElement);
          if (atomId === null) {
            g.append('circle')
              .attr('class', 'draw-bond-origin-node')
              .attr('cx', ox)
              .attr('cy', oy)
              .attr('r', _pr)
              .attr('fill', _fc)
              .attr('stroke', _sc)
              .attr('stroke-width', 1)
              .attr('pointer-events', 'none');
          }
          g.append('circle')
            .attr('class', 'draw-bond-dest-node')
            .attr('cx', ox)
            .attr('cy', oy)
            .attr('r', _pr)
            .attr('fill', _fc)
            .attr('stroke', _sc)
            .attr('stroke-width', 1)
            .attr('pointer-events', 'none');
        } else if (_drawBondElement !== 'C') {
          const _lc = atomColor(_drawBondElement);
          if (atomId === null) {
            g.append('text')
              .attr('class', 'draw-bond-origin-label')
              .attr('x', ox)
              .attr('y', oy)
              .attr('text-anchor', 'middle')
              .attr('dominant-baseline', 'central')
              .attr('fill', _lc)
              .attr('font-size', FONT_SIZE)
              .attr('font-weight', 'bold')
              .attr('pointer-events', 'none')
              .text(_drawBondElement);
          }
          g.append('text')
            .attr('class', 'draw-bond-dest-label')
            .attr('x', ox)
            .attr('y', oy)
            .attr('text-anchor', 'middle')
            .attr('dominant-baseline', 'central')
            .attr('fill', _lc)
            .attr('font-size', FONT_SIZE)
            .attr('font-weight', 'bold')
            .attr('pointer-events', 'none')
            .text(_drawBondElement);
        }
      }

      function _updateDrawBondPreview([mx, my]) {
        if (!_drawBondState) return;
        const { ox, oy } = _drawBondState;
        const BL = mode === 'force' ? FORCE_LAYOUT_BOND_LENGTH : 1.5 * SCALE;
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;
        const SNAP_R = 30;
        let ex,
          ey,
          snapAtomId = null;

        // Snap to a nearby existing atom if cursor is within SNAP_R px of it.
        if (mode === 'force') {
          for (const node of simulation.nodes()) {
            if (node.id === _drawBondState.atomId) continue;
            if (Math.hypot(mx - node.x, my - node.y) <= SNAP_R) {
              ex = node.x;
              ey = node.y;
              snapAtomId = node.id;
              break;
            }
          }
        } else if (_mol2d) {
          for (const [, a] of _mol2d.atoms) {
            if (a.id === _drawBondState.atomId || a.x == null || a.visible === false) continue;
            const ax = W / 2 + (a.x - _cx2d) * SCALE;
            const ay = H / 2 - (a.y - _cy2d) * SCALE;
            if (Math.hypot(mx - ax, my - ay) <= SNAP_R) {
              ex = ax;
              ey = ay;
              snapAtomId = a.id;
              break;
            }
          }
        }

        if (snapAtomId === null) {
          if (mode === 'force') {
            const dist = Math.hypot(mx - ox, my - oy);
            if (dist < 1e-6) {
              ex = ox + BL;
              ey = oy;
            } else {
              const clamped = Math.min(dist, BL);
              ex = ox + ((mx - ox) / dist) * clamped;
              ey = oy + ((my - oy) / dist) * clamped;
            }
          } else {
            const dist = Math.hypot(mx - ox, my - oy);
            if (dist < 1e-6) {
              ex = ox + BL;
              ey = oy;
            } else {
              const clamped = Math.min(dist, BL);
              ex = ox + ((mx - ox) / dist) * clamped;
              ey = oy + ((my - oy) / dist) * clamped;
            }
          }
        }

        _drawBondState.ex = ex;
        _drawBondState.ey = ey;
        _drawBondState.snapAtomId = snapAtomId;

        // In 2D mode, shorten line endpoints to clear heteroatom labels.
        // In force mode the ghost circles cover the line ends, so no shortening needed.
        if (mode !== 'force') {
          const dx = ex - ox,
            dy = ey - oy;
          const dist = Math.hypot(dx, dy);
          let lx1 = ox,
            ly1 = oy,
            lx2 = ex,
            ly2 = ey;
          if (dist > 1) {
            const ux = dx / dist,
              uy = dy / dist;
            // Source: blank-space start will place _drawBondElement; existing atom uses its own name.
            const srcName = _drawBondState.atomId
              ? (_mol2d?.atoms.get(_drawBondState.atomId)?.name ?? 'C')
              : _drawBondElement;
            if (srcName !== 'C' && srcName !== 'H') {
              const gap = labelHalfW(srcName, FONT_SIZE) + 3;
              lx1 = ox + ux * gap;
              ly1 = oy + uy * gap;
            }
            // Dest: new atom uses _drawBondElement; snap target uses its own name.
            const dstName = snapAtomId ? (_mol2d?.atoms.get(snapAtomId)?.name ?? 'C') : _drawBondElement;
            if (dstName !== 'C' && dstName !== 'H') {
              const gap = labelHalfW(dstName, FONT_SIZE) + 3;
              lx2 = ex - ux * gap;
              ly2 = ey - uy * gap;
            }
          }
          g.select('line.draw-bond-preview').attr('x1', lx1).attr('y1', ly1).attr('x2', lx2).attr('y2', ly2);
        } else {
          g.select('line.draw-bond-preview').attr('x2', ex).attr('y2', ey);
        }

        // Update destination-preview circle (force mode).
        // Hide when snapping to an existing atom — no new atom will be created.
        const destCircle = g.select('circle.draw-bond-dest-node');
        if (!destCircle.empty()) {
          if (snapAtomId !== null) {
            destCircle.attr('display', 'none');
          } else {
            destCircle.attr('display', null).attr('cx', ex).attr('cy', ey);
          }
        }

        // Update destination-preview label (2D mode, heteroatoms only).
        const destLabel = g.select('text.draw-bond-dest-label');
        if (!destLabel.empty()) {
          if (snapAtomId !== null) {
            destLabel.attr('display', 'none');
          } else {
            destLabel.attr('display', null).attr('x', ex).attr('y', ey);
          }
        }
      }

      // During a bond drag, reset hover to only the source atom (clears any
      // transient highlights from atoms/bonds the cursor passed over).
      function _resetDrawBondHover() {
        _hoveredAtomIds.clear();
        _hoveredBondIds.clear();
        if (_drawBondState?.atomId) _hoveredAtomIds.add(_drawBondState.atomId);
        if (mode === 'force') applyForceSelection();
        else _redraw2dSelection();
      }

      function _cancelDrawBond() {
        if (_drawBondState) {
          g.select('line.draw-bond-preview').remove();
          g.select('circle.draw-bond-origin-node').remove();
          g.select('circle.draw-bond-dest-node').remove();
          g.select('text.draw-bond-origin-label').remove();
          g.select('text.draw-bond-dest-label').remove();
          _drawBondState = null;
          _clearPrimitiveHover();
          if (mode === 'force') applyForceSelection();
          else _redraw2dSelection();
        }
      }

      // Places a new bonded C at the best 30°-grid angle from the source atom.
      // Returns the active molecule, creating an empty one if none exists yet.
      function _ensureMol() {
        if (mode === 'force') {
          if (!currentMol) {
            currentMol = new Molecule();
          }
          return currentMol;
        } else {
          if (!_mol2d) {
            _mol2d = new Molecule();
            _hCounts2d = new Map();
            _stereoMap2d = new Map();
          }
          return _mol2d;
        }
      }

      // atomId may be null (blank-space click) — in that case a source C is created at (ox, oy).
      // ox, oy are always required (g-space origin of the draw-bond gesture).
      function _autoPlaceBond(atomId, ox, oy) {
        const reactionEdit = _prepareReactionPreviewEditTargets({ atomId });
        if (reactionEdit === null) return;
        atomId = reactionEdit?.atomId ?? atomId;
        _takeSnapshot();
        const mol = _ensureMol();

        const FORCE_SCALE_VAL = 25;
        const steps = 12; // 30° increments
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;

        // ── Resolve / create source atom ─────────────────────────────────────────
        let srcAtom, resolvedId;
        if (atomId === null) {
          srcAtom = mol.addAtom(null, _drawBondElement, {});
          if (mode === 'force') {
            let cx2d = 0,
              cy2d = 0,
              cnt = 0;
            for (const [, a] of mol.atoms) {
              if (a.x != null) {
                cx2d += a.x;
                cy2d += a.y;
                cnt++;
              }
            }
            if (cnt > 0) {
              cx2d /= cnt;
              cy2d /= cnt;
            }
            srcAtom.x = cx2d + (ox - W / 2) / FORCE_SCALE_VAL;
            srcAtom.y = cy2d - (oy - H / 2) / FORCE_SCALE_VAL;
          } else {
            srcAtom.x = _cx2d + (ox - W / 2) / SCALE;
            srcAtom.y = _cy2d - (oy - H / 2) / SCALE;
          }
          resolvedId = srcAtom.id;
        } else {
          srcAtom = mol.atoms.get(atomId);
          if (!srcAtom) return;
          resolvedId = atomId;
        }

        // ── Source position in the rendering coordinate system ───────────────────
        // force: g-space (node coords); 2D: mol coords (y-up).
        let srcRX, srcRY;
        if (mode === 'force') {
          const srcNode = simulation.nodes().find(n => n.id === resolvedId);
          srcRX = srcNode ? srcNode.x : ox; // fall back to g-space click for brand-new atom
          srcRY = srcNode ? srcNode.y : oy;
        } else {
          srcRX = srcAtom.x;
          srcRY = srcAtom.y;
        }

        // ── Collect existing bond angles ──────────────────────────────────────────
        const existingAngles = [];
        for (const bId of srcAtom.bonds) {
          const b = mol.bonds.get(bId);
          if (!b) continue;
          const otherId = b.getOtherAtom(resolvedId);
          if (mode === 'force') {
            const otherNode = simulation.nodes().find(n => n.id === otherId);
            if (!otherNode) continue;
            existingAngles.push(Math.atan2(otherNode.y - srcRY, otherNode.x - srcRX));
          } else {
            const otherAtom = mol.atoms.get(otherId);
            if (!otherAtom || otherAtom.x == null || otherAtom.visible === false) continue;
            existingAngles.push(Math.atan2(otherAtom.y - srcRY, otherAtom.x - srcRX));
          }
        }

        // ── Pick best angle ───────────────────────────────────────────────────────
        let bestAngle;

        if (existingAngles.length === 0) {
          // No heavy bonds yet: start at 330° (−30°) so zig-zag alternates cleanly.
          bestAngle = (11 / 12) * 2 * Math.PI;
        } else if (existingAngles.length === 1) {
          // Terminal atom: continue the chain with a 120° internal angle (zig-zag).
          // backAngle = direction from source toward its one heavy neighbor.
          const back = existingAngles[0];
          const opt1 = back + (2 * Math.PI) / 3; // +120°
          const opt2 = back - (2 * Math.PI) / 3; // −120°
          const sBack = Math.sin(back);
          const s1 = Math.sin(opt1);
          const s2 = Math.sin(opt2);
          if (Math.abs(sBack) > 1e-6) {
            // Pick the option whose sin has the same sign as sBack — this makes
            // consecutive bonds alternate their y-component (zig-zag).
            const ok1 = s1 * sBack > 0;
            const ok2 = s2 * sBack > 0;
            if (ok1 && !ok2) bestAngle = opt1;
            else if (ok2 && !ok1) bestAngle = opt2;
            else bestAngle = Math.cos(opt1) >= Math.cos(opt2) ? opt1 : opt2; // rightward tiebreak
          } else {
            // Back-bond is horizontal: prefer the downward option (negative sin).
            bestAngle = s1 <= s2 ? opt1 : opt2;
          }
          bestAngle = ((bestAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        } else {
          // Multiple existing bonds: maximize minimum angular separation.
          bestAngle = 0;
          let bestMinSep = -1;
          for (let i = 0; i < steps; i++) {
            const candidate = (i / steps) * 2 * Math.PI;
            let minSep = Math.PI;
            for (const a of existingAngles) {
              let diff = Math.abs(candidate - a);
              if (diff > Math.PI) diff = 2 * Math.PI - diff;
              if (diff < minSep) minSep = diff;
            }
            if (minSep > bestMinSep) {
              bestMinSep = minSep;
              bestAngle = candidate;
            }
          }
        }

        // ── Avoid placing on top of an existing atom ─────────────────────────────
        // Proposed destination distance: bond length in the current coordinate space.
        // Force: g-space pixels (1.5 Å × 25 px/Å). 2D: mol coords Å.
        {
          const BL = mode === 'force' ? 1.5 * FORCE_SCALE_VAL : 1.5;
          const THRESH2 = (BL * 0.7) ** 2;
          const overlaps = angle => {
            const px = srcRX + Math.cos(angle) * BL;
            const py = srcRY + Math.sin(angle) * BL;
            if (mode === 'force') {
              for (const node of simulation.nodes()) {
                if (node.id === resolvedId) continue;
                const dx = node.x - px,
                  dy = node.y - py;
                if (dx * dx + dy * dy < THRESH2) return true;
              }
            } else {
              for (const [id, atom] of mol.atoms) {
                if (id === resolvedId || atom.x == null || atom.visible === false) continue;
                const dx = atom.x - px,
                  dy = atom.y - py;
                if (dx * dx + dy * dy < THRESH2) return true;
              }
            }
            return false;
          };
          if (overlaps(bestAngle)) {
            let fallback = bestAngle,
              bestSep = -1;
            for (let i = 0; i < steps; i++) {
              const cand = (i / steps) * 2 * Math.PI;
              if (overlaps(cand)) continue;
              let minSep = Math.PI;
              for (const a of existingAngles) {
                let diff = Math.abs(cand - a);
                if (diff > Math.PI) diff = 2 * Math.PI - diff;
                if (diff < minSep) minSep = diff;
              }
              if (minSep > bestSep) {
                bestSep = minSep;
                fallback = cand;
              }
            }
            bestAngle = fallback;
          }
        }

        // ── Remove H from source and place new atom ───────────────────────────────
        const srcH = srcAtom.getNeighbors(mol).find(n => n.name === 'H');
        if (srcH) mol.removeAtom(srcH.id);
        const newAtom = mol.addAtom(null, _drawBondElement, {});
        mol.addBond(null, resolvedId, newAtom.id, { order: 1 }, true);
        const affected = new Set([resolvedId, newAtom.id]);

        if (mode === 'force') {
          const BL_PX = 1.5 * FORCE_SCALE_VAL;
          const destGX = srcRX + Math.cos(bestAngle) * BL_PX;
          const destGY = srcRY + Math.sin(bestAngle) * BL_PX;
          let cx2d = 0,
            cy2d = 0,
            cnt = 0;
          for (const [, a] of mol.atoms) {
            if (a.x != null) {
              cx2d += a.x;
              cy2d += a.y;
              cnt++;
            }
          }
          if (cnt > 0) {
            cx2d /= cnt;
            cy2d /= cnt;
          }
          newAtom.x = cx2d + (destGX - W / 2) / FORCE_SCALE_VAL;
          newAtom.y = cy2d - (destGY - H / 2) / FORCE_SCALE_VAL;

          mol.clearStereoAnnotations(affected);
          kekulize(mol);
          refreshAromaticity(mol, { preserveKekule: true });
          mol.repairImplicitHydrogens(affected);
          _syncInputField(mol);
          updateFormula(mol);
          updateDescriptors(mol);
          updateFunctionalGroups(mol);
          updateReactionTemplatesPanel();
          updateForce(mol, { preservePositions: true });
          _enableForceKeepInView();

          // Patch node positions immediately so generateCoords doesn't misplace them.
          const patchPos = new Map([[newAtom.id, { x: destGX, y: destGY }]]);
          patchPos.set(resolvedId, { x: srcRX, y: srcRY });
          _patchForceNodePositions(patchPos);
          _reseatHydrogensAroundPatched(patchPos);
        } else {
          newAtom.x = srcRX + Math.cos(bestAngle) * 1.5;
          newAtom.y = srcRY + Math.sin(bestAngle) * 1.5;

          mol.clearStereoAnnotations(affected);
          kekulize(mol);
          refreshAromaticity(mol, { preserveKekule: true });
          mol.repairImplicitHydrogens(affected);

          _hCounts2d = new Map();
          for (const [, a] of mol.atoms) {
            if (a.name === 'H') continue;
            const cnt = a.getNeighbors(mol).filter(n => n.name === 'H').length;
            if (cnt > 0) _hCounts2d.set(a.id, cnt);
          }
          _stereoMap2d = pickStereoWedges(mol);
          _syncInputField(mol);
          updateFormula(mol);
          updateDescriptors(mol);
          updateFunctionalGroups(mol);
          updateReactionTemplatesPanel();
          draw2d();
          _zoomToFitIf2d();
        }
      }

      function _commitDrawBond() {
        if (!_drawBondState) {
          _cancelDrawBond();
          return;
        }
        let { atomId, ox, oy, ex, ey, snapAtomId, dragged } = _drawBondState;

        // No drag (pure click) → auto-place at best angle.
        if (!dragged) {
          g.select('line.draw-bond-preview').remove();
          g.select('circle.draw-bond-origin-node').remove();
          g.select('circle.draw-bond-dest-node').remove();
          g.select('text.draw-bond-origin-label').remove();
          g.select('text.draw-bond-dest-label').remove();
          _drawBondState = null;
          _clearPrimitiveHover();
          _drawBondHoverSuppressed = true;

          // Click on an existing non-H atom with a different element → replace element.
          if (atomId !== null) {
            const reactionEdit = _prepareReactionPreviewEditTargets({ atomId });
            if (reactionEdit === null) return;
            atomId = reactionEdit.atomId;
            const mol = mode === 'force' ? currentMol : _mol2d;
            const clickedAtom = mol?.atoms.get(atomId);
            if (clickedAtom && clickedAtom.name !== _drawBondElement) {
              _takeSnapshot();
              mol.changeAtomElement(atomId, _drawBondElement);
              const affected = new Set([atomId]);
              mol.clearStereoAnnotations(affected);
              kekulize(mol);
              refreshAromaticity(mol, { preserveKekule: true });
              mol.repairImplicitHydrogens(affected);
              _syncInputField(mol);
              updateFormula(mol);
              updateDescriptors(mol);
              updateFunctionalGroups(mol);
              updateReactionTemplatesPanel();
              if (mode === 'force') {
                const preNode = simulation.nodes().find(n => n.id === atomId);
                updateForce(mol, {
                  preservePositions: true,
                  preserveView: true
                });
                if (preNode) {
                  const patchPos = new Map([[atomId, { x: preNode.x, y: preNode.y }]]);
                  _patchForceNodePositions(patchPos);
                  _reseatHydrogensAroundPatched(patchPos);
                }
              } else {
                _hCounts2d = new Map();
                for (const [, a] of mol.atoms) {
                  if (a.name === 'H') continue;
                  const cnt = a.getNeighbors(mol).filter(n => n.name === 'H').length;
                  if (cnt > 0) _hCounts2d.set(a.id, cnt);
                }
                _stereoMap2d = pickStereoWedges(mol);
                draw2d();
              }
              return;
            }
          }

          _autoPlaceBond(atomId, ox, oy);
          return;
        }

        // Drag released near origin → no-op (cancel without creating anything).
        if (Math.hypot(ex - ox, ey - oy) < 30) {
          _cancelDrawBond();
          return;
        }

        g.select('line.draw-bond-preview').remove();
        g.select('circle.draw-bond-origin-node').remove();
        g.select('text.draw-bond-origin-label').remove();
        g.select('text.draw-bond-dest-label').remove();
        _drawBondState = null;
        _clearPrimitiveHover();
        _drawBondHoverSuppressed = true;

        // Don't create a bond to a hydrogen atom.
        const reactionEdit = _prepareReactionPreviewEditTargets({
          atomId,
          snapAtomId
        });
        if (reactionEdit === null) return;
        atomId = reactionEdit.atomId;
        snapAtomId = reactionEdit.snapAtomId;
        if (snapAtomId !== null) {
          const checkMol = mode === 'force' ? currentMol : _mol2d;
          if (checkMol?.atoms.get(snapAtomId)?.name === 'H') return;
        }

        _takeSnapshot();

        // ── Force mode path ───────────────────────────────────────────────────────
        if (mode === 'force') {
          const mol = _ensureMol();
          const W = plotEl.clientWidth || 600;
          const H = plotEl.clientHeight || 400;
          const FORCE_SCALE = 25;

          // Centroid before adding new atoms.
          let cx2d = 0,
            cy2d = 0,
            cnt = 0;
          for (const [, a] of mol.atoms) {
            if (a.x != null) {
              cx2d += a.x;
              cy2d += a.y;
              cnt++;
            }
          }
          if (cnt > 0) {
            cx2d /= cnt;
            cy2d /= cnt;
          }

          // Resolve source atom (create from origin if blank-space start).
          let resolvedAtomId = atomId;
          if (atomId === null) {
            const newSrc = mol.addAtom(null, _drawBondElement, {});
            newSrc.x = cx2d + (ox - W / 2) / FORCE_SCALE;
            newSrc.y = cy2d - (oy - H / 2) / FORCE_SCALE;
            resolvedAtomId = newSrc.id;
          }
          const srcAtom = mol.atoms.get(resolvedAtomId);
          if (!srcAtom) return;
          let affected;

          // Node positions to patch after updateForce (counteract generateCoords).
          const patchPos = new Map();
          if (atomId === null) {
            patchPos.set(resolvedAtomId, { x: ox, y: oy });
          } else {
            const srcN = simulation.nodes().find(n => n.id === resolvedAtomId);
            if (srcN) patchPos.set(resolvedAtomId, { x: srcN.x, y: srcN.y });
          }

          if (snapAtomId !== null) {
            const destAtom = mol.atoms.get(snapAtomId);
            if (!destAtom) return;
            const alreadyBonded = [...mol.bonds.values()].some(b => {
              const [a1, a2] = b.getAtomObjects(mol);
              return (
                (a1?.id === resolvedAtomId && a2?.id === snapAtomId) ||
                (a1?.id === snapAtomId && a2?.id === resolvedAtomId)
              );
            });
            if (alreadyBonded) {
              // Snap-to existing bond → promote its order instead of creating a duplicate.
              const existing = [...mol.bonds.values()].find(b => {
                const [a1, a2] = b.getAtomObjects(mol);
                return (
                  (a1?.id === resolvedAtomId && a2?.id === snapAtomId) ||
                  (a1?.id === snapAtomId && a2?.id === resolvedAtomId)
                );
              });
              if (existing) _promoteBondOrder(existing.id);
              return;
            }
            const srcH = srcAtom.getNeighbors(mol).find(n => n.name === 'H');
            if (srcH) mol.removeAtom(srcH.id);
            const dstH = destAtom.getNeighbors(mol).find(n => n.name === 'H');
            if (dstH) mol.removeAtom(dstH.id);
            mol.addBond(null, resolvedAtomId, snapAtomId, { order: 1 }, true);
            affected = new Set([resolvedAtomId, snapAtomId]);
            const snapN = simulation.nodes().find(n => n.id === snapAtomId);
            if (snapN) patchPos.set(snapAtomId, { x: snapN.x, y: snapN.y });
          } else {
            const srcH = srcAtom.getNeighbors(mol).find(n => n.name === 'H');
            if (srcH) mol.removeAtom(srcH.id);
            const newAtom = mol.addAtom(null, _drawBondElement, {});
            newAtom.x = cx2d + (ex - W / 2) / FORCE_SCALE;
            newAtom.y = cy2d - (ey - H / 2) / FORCE_SCALE;
            mol.addBond(null, resolvedAtomId, newAtom.id, { order: 1 }, true);
            affected = new Set([resolvedAtomId, newAtom.id]);
            patchPos.set(newAtom.id, { x: ex, y: ey });
          }

          mol.clearStereoAnnotations(affected);
          kekulize(mol);
          refreshAromaticity(mol, { preserveKekule: true });
          mol.repairImplicitHydrogens(affected);

          _syncInputField(mol);
          updateFormula(mol);
          updateDescriptors(mol);
          updateFunctionalGroups(mol);
          updateReactionTemplatesPanel();
          updateForce(mol, { preservePositions: true });
          _enableForceKeepInView();

          // Patch new node positions so generateCoords doesn't misplace them.
          _patchForceNodePositions(patchPos);
          _reseatHydrogensAroundPatched(patchPos);
          return;
        }

        // ── 2D mode path ──────────────────────────────────────────────────────────
        const mol = _ensureMol();
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;
        let affected;

        // Resolve source atom (create from origin if blank-space start).
        let resolvedAtomId = atomId;
        if (atomId === null) {
          const newSrc = mol.addAtom(null, _drawBondElement, {});
          newSrc.x = _cx2d + (ox - W / 2) / SCALE;
          newSrc.y = _cy2d - (oy - H / 2) / SCALE;
          resolvedAtomId = newSrc.id;
        }
        const srcAtom = mol.atoms.get(resolvedAtomId);
        if (!srcAtom) return;

        if (snapAtomId !== null) {
          // ── Bond to existing atom ──────────────────────────────────────────
          const destAtom = mol.atoms.get(snapAtomId);
          if (!destAtom) return;

          // Do nothing if a bond already exists between these two atoms.
          const alreadyBonded = [...mol.bonds.values()].some(b => {
            const [a1, a2] = b.getAtomObjects(mol);
            return (
              (a1?.id === resolvedAtomId && a2?.id === snapAtomId) ||
              (a1?.id === snapAtomId && a2?.id === resolvedAtomId)
            );
          });
          if (alreadyBonded) {
            // Snap-to existing bond → promote its order instead of creating a duplicate.
            const existing = [...mol.bonds.values()].find(b => {
              const [a1, a2] = b.getAtomObjects(mol);
              return (
                (a1?.id === resolvedAtomId && a2?.id === snapAtomId) ||
                (a1?.id === snapAtomId && a2?.id === resolvedAtomId)
              );
            });
            if (existing) _promoteBondOrder(existing.id);
            return;
          }

          // Remove one explicit H from each endpoint if present.
          const srcH = srcAtom.getNeighbors(mol).find(n => n.name === 'H');
          if (srcH) mol.removeAtom(srcH.id);
          const dstH = destAtom.getNeighbors(mol).find(n => n.name === 'H');
          if (dstH) mol.removeAtom(dstH.id);

          mol.addBond(null, resolvedAtomId, snapAtomId, { order: 1 }, true);
          affected = new Set([resolvedAtomId, snapAtomId]);
        } else {
          // ── Create new carbon atom ─────────────────────────────────────────
          // Snap the drag angle to the nearest 30° grid.
          const rawAngle = Math.atan2(ey - oy, ex - ox);
          const snapStep = Math.PI / 6;
          const snapped = Math.round(rawAngle / snapStep) * snapStep;
          const BL = 1.5; // Å
          // mol coords: x rightward, y upward — so negate the SVG-space sin
          const newMolX = srcAtom.x + Math.cos(snapped) * BL;
          const newMolY = srcAtom.y - Math.sin(snapped) * BL;

          // Remove one explicit H from source if present.
          const srcH = srcAtom.getNeighbors(mol).find(n => n.name === 'H');
          if (srcH) mol.removeAtom(srcH.id);

          const newAtom = mol.addAtom(null, _drawBondElement, {});
          newAtom.x = newMolX;
          newAtom.y = newMolY;

          mol.addBond(null, resolvedAtomId, newAtom.id, { order: 1 }, true);
          affected = new Set([resolvedAtomId, newAtom.id]);
        }

        // Repair aromaticity and hydrogen counts on affected atoms.
        mol.clearStereoAnnotations(affected);
        kekulize(mol);
        refreshAromaticity(mol, { preserveKekule: true });
        mol.repairImplicitHydrogens(affected);

        // Refresh 2D display state.
        _hCounts2d = new Map();
        for (const [, a] of mol.atoms) {
          if (a.name === 'H') continue;
          const cnt = a.getNeighbors(mol).filter(n => n.name === 'H').length;
          if (cnt > 0) _hCounts2d.set(a.id, cnt);
        }
        _stereoMap2d = pickStereoWedges(mol);

        _syncInputField(mol);

        updateFormula(mol);
        updateDescriptors(mol);
        updateFunctionalGroups(mol);
        updateReactionTemplatesPanel();
        draw2d();
        _zoomToFitIf2d();
      }

      function draw2d() {
        const mol = _mol2d;
        const hCounts = _hCounts2d;
        const toSVGPt = _toSVGPt2d;
        const valenceWarningMap = valenceWarningMapFor(mol);
        _activeValenceWarningMap = valenceWarningMap;

        const stereoMap = _stereoMap2d;
        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
        const bondInfos = [];
        for (const bond of mol.bonds.values()) {
          const [a1, a2] = bond.getAtomObjects(mol);
          if (!a1 || !a2 || a1.x == null || a2.x == null) continue;
          const isHBond = a1.visible === false || a2.visible === false;
          if (isHBond && !(stereoMap && stereoMap.has(bond.id))) continue;
          bondInfos.push({ bond, a1, a2 });
        }

        g.selectAll('*').remove();
        _forceSelLines = null;
        _forceSelCircles = null;
        _forceValenceWarningCircles = null;
        _fgHlLines = null;
        _fgHlCircles = null;

        let bgLayer;
        let labelLayer;

        function _capture2dDragState(event, atomIds = [], bondIds = []) {
          const [pX, pY] = d3.pointer(event.sourceEvent, g.node());
          const selectedDragAtomIds = _getSelectedDragAtomIds(mol, atomIds, bondIds);
          const movedAtomIds = selectedDragAtomIds ? new Set(selectedDragAtomIds) : new Set(atomIds);
          if (!selectedDragAtomIds) {
            for (const bondId of bondIds) {
              const bond = mol.bonds.get(bondId);
              if (!bond) continue;
              movedAtomIds.add(bond.atoms[0]);
              movedAtomIds.add(bond.atoms[1]);
            }
          }

          const atomPositions = new Map();
          for (const atomId of movedAtomIds) {
            const movedAtom = mol.atoms.get(atomId);
            if (!movedAtom || movedAtom.x == null) continue;
            atomPositions.set(atomId, { x: movedAtom.x, y: movedAtom.y });
          }
          return {
            pX,
            pY,
            atomPositions,
            movedAtomIds: new Set(atomPositions.keys())
          };
        }

        function _redraw2dDragTargets(movedAtomIds) {
          for (const atomId of movedAtomIds) {
            const movedAtom = mol.atoms.get(atomId);
            if (!movedAtom || movedAtom.x == null) continue;
            const np = toSVGPt(movedAtom);
            labelLayer.select(`[data-atom-id="${atomId}"]`).attr('transform', `translate(${np.x},${np.y})`);
            const lbl = getAtomLabel(movedAtom, hCounts, toSVGPt, mol);
            const hw = labelHalfW(lbl, FONT_SIZE);
            const hh = labelHalfH(lbl, FONT_SIZE);
            const dxLabel = labelTextOffset(lbl, FONT_SIZE);
            bgLayer
              .select(`[data-atom-id="${atomId}"]`)
              .attr('x', np.x + dxLabel - hw)
              .attr('y', np.y - hh);
          }

          for (const bInfo of bondInfos) {
            if (!movedAtomIds.has(bInfo.a1.id) && !movedAtomIds.has(bInfo.a2.id)) continue;
            const bGroup = bondLayer.select(`[data-bond-id="${bInfo.bond.id}"]`);
            const hitLine = bGroup.select('.bond-hit');
            bGroup.selectAll(':not(.bond-hit)').remove();
            const st = stereoMap ? stereoMap.get(bInfo.bond.id) : null;
            let ssa1 = bInfo.a1,
              ssa2 = bInfo.a2;
            if (st) {
              const centerId = stereoBondCenterIdForRender(mol, bInfo.bond.id);
              if (centerId === ssa2.id) [ssa1, ssa2] = [ssa2, ssa1];
            }
            _drawBond(bGroup, bInfo.bond, ssa1, ssa2, mol, toSVGPt, st ?? null);
            const hp1 = toSVGPt(ssa1),
              hp2 = toSVGPt(ssa2);
            hitLine.attr('x1', hp1.x).attr('y1', hp1.y).attr('x2', hp2.x).attr('y2', hp2.y).raise();
          }

          _redraw2dHighlights();
          _redraw2dSelection();
          _redraw2dValenceWarnings();
        }

        function _redraw2dValenceWarnings() {
          g.select('g.valence-warning-layer').remove();
          const warningAtoms = atoms.filter(atom => valenceWarningMap.has(atom.id));
          if (warningAtoms.length === 0) return;
          const warningLayer = g.append('g').attr('class', 'valence-warning-layer').style('pointer-events', 'none');
          for (const atom of warningAtoms) {
            const { x, y } = toSVGPt(atom);
            const r = Math.max(labelHalfW(getAtomLabel(atom, hCounts, toSVGPt, mol) || atom.name, FONT_SIZE), 10) + 7;
            warningLayer
              .append('circle')
              .attr('class', 'valence-warning')
              .attr('cx', x)
              .attr('cy', y)
              .attr('r', r)
              .attr('fill', VALENCE_WARNING_FILL)
              .attr('stroke', 'none');
          }
        }

        // Layer 0 — functional-group highlights (behind bonds)
        _redraw2dHighlights();
        // Layer 0b — selection highlights (behind bonds, in front of fg highlights)
        _redraw2dSelection();
        // Layer 0c — valence warnings (behind bonds and labels)
        _redraw2dValenceWarnings();

        // Layer 1 — bonds (each wrapped in a <g data-bond-id> for incremental drag updates)
        const chiralCenterIds = new Set(mol.getChiralCenters());
        const bondLayer = g.append('g').attr('class', 'bonds');
        for (const bi of bondInfos) {
          const bg = bondLayer.append('g').attr('data-bond-id', bi.bond.id);
          const stereoType = stereoMap ? stereoMap.get(bi.bond.id) : null;
          // Orient so the chiral center is a1 (tip of wedge/dash).
          let sa1 = bi.a1,
            sa2 = bi.a2;
          if (stereoType) {
            const centerId = stereoBondCenterIdForRender(mol, bi.bond.id);
            if (centerId === sa2.id) [sa1, sa2] = [sa2, sa1];
          }
          _drawBond(bg, bi.bond, sa1, sa2, mol, toSVGPt, stereoType ?? null);

          // Invisible wide line for easy hover targeting
          const p1 = toSVGPt(sa1),
            p2 = toSVGPt(sa2);
          bg.append('line')
            .attr('class', 'bond-hit')
            .attr('x1', p1.x)
            .attr('y1', p1.y)
            .attr('x2', p2.x)
            .attr('y2', p2.y)
            .attr('stroke', 'rgba(0,0,0,0)')
            .attr('stroke-width', 12)
            .on('click', event => {
              if (_drawBondMode) {
                _promoteBondOrder(bi.bond.id);
                return;
              }
              if (_eraseMode) {
                _eraseItem([], [bi.bond.id]);
                return;
              }
              _handle2dPrimitiveClick(event, [], [bi.bond.id]);
            })
            .on('dblclick', event => {
              _handle2dComponentDblClick(event, bi.bond.atoms);
            })
            .on('mouseover', event => {
              if (_eraseMode && _erasePainting) {
                _showPrimitiveHover([], [bi.bond.id]);
                const bondId = bi.bond.id;
                requestAnimationFrame(() => {
                  if (_eraseMode && _erasePainting) _eraseItem([], [bondId]);
                });
                return;
              }
              _showPrimitiveHover([], [bi.bond.id]);
              if (_drawBondMode && mode === '2d' && !_drawBondHoverSuppressed) {
                _hoveredBondIds.add(bi.bond.id);
                _refreshSelectionOverlay();
              }
              if (_selectMode || _drawBondMode || _eraseMode) {
                return;
              }
              tooltip.transition().delay(150).style('opacity', 0.9);
              tooltip
                .html(bondTooltipHtml(bi.bond, sa1, sa2))
                .style('left', event.clientX + 13 + 'px')
                .style('top', event.clientY - 20 + 'px');
            })
            .on('mousemove', event => {
              tooltip.style('left', event.clientX + 13 + 'px').style('top', event.clientY - 20 + 'px');
            })
            .on('mouseout', () => {
              if (_drawBondState) _resetDrawBondHover();
              else {
                _clearPrimitiveHover();
                _refreshSelectionOverlay();
              }
              tooltip.transition().duration(50).style('opacity', 0);
            })
            .style('cursor', 'grab')
            .call(
              d3
                .drag()
                .filter(event => !_drawBondMode && !_eraseMode)
                .on('start', function (event) {
                  if (_drawBondMode) return;
                  event.sourceEvent.stopPropagation();
                  _clearPrimitiveHover();
                  _redraw2dSelection();
                  tooltip.style('opacity', 0);
                  d3.select(this).style('cursor', 'grabbing');
                  this._dragState = _capture2dDragState(event, [], [bi.bond.id]);
                  if (this._dragState) this._dragState._snapped = false;
                })
                .on('drag', function (event) {
                  const state = this._dragState;
                  if (!state) return;
                  if (!state._snapped) {
                    _takeSnapshot({ clearReactionPreview: false });
                    state._snapped = true;
                  }
                  const [svgX, svgY] = d3.pointer(event.sourceEvent, g.node());
                  const dx = (svgX - state.pX) / SCALE;
                  const dy = -(svgY - state.pY) / SCALE;
                  for (const [atomId, pos] of state.atomPositions) {
                    const movedAtom = mol.atoms.get(atomId);
                    if (!movedAtom) continue;
                    movedAtom.x = pos.x + dx;
                    movedAtom.y = pos.y + dy;
                  }
                  _redraw2dDragTargets(state.movedAtomIds);
                })
                .on('end', function () {
                  this._dragState = null;
                  d3.select(this).style('cursor', 'grab');
                })
            );
        }

        _drawReactionPreviewArrow2d(toSVGPt, atoms);

        // Layer 2 — white clearance rects
        bgLayer = g.append('g').attr('class', 'atom-bgs');
        for (const atom of atoms) {
          const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
          const hw = labelHalfW(label, FONT_SIZE);
          if (hw === 0) continue;
          const hh = labelHalfH(label, FONT_SIZE);
          const dx = labelTextOffset(label, FONT_SIZE);
          const { x, y } = toSVGPt(atom);
          bgLayer
            .append('rect')
            .attr('class', 'atom-bg')
            .attr('data-atom-id', atom.id)
            .attr('x', x + dx - hw)
            .attr('y', y - hh)
            .attr('width', hw * 2)
            .attr('height', hh * 2)
            .attr('rx', 2);
        }

        // Layer 3 — labels + hit targets + drag
        labelLayer = g.append('g').attr('class', 'atom-labels');
        for (const atom of atoms) {
          const { x, y } = toSVGPt(atom);
          const symbol = atom.name;
          const charge = atom.getCharge();
          const label = getAtomLabel(atom, hCounts, toSVGPt, mol);
          const labelDx = labelTextOffset(label, FONT_SIZE);

          const hitGroup = labelLayer
            .append('g')
            .attr('data-atom-id', atom.id)
            .attr('transform', `translate(${x},${y})`);

          hitGroup
            .append('circle')
            .attr('class', 'atom-hit')
            .attr('r', Math.max(labelHalfW(label || symbol, FONT_SIZE), 10))
            .style('cursor', 'grab')
            .on('mousedown.drawbond', function (event) {
              // Intercept mousedown before it bubbles to hitGroup's d3.drag.
              if (!_drawBondMode || mode !== '2d' || !_mol2d) return;
              event.stopPropagation();
              const [gX, gY] = d3.pointer(event, g.node());
              _startDrawBond(atom.id, gX, gY);
            })
            .on('click', event => {
              if (_drawBondMode) return; // handled by mousedown.drawbond
              if (_eraseMode) {
                _eraseItem([atom.id], []);
                return;
              }
              _handle2dPrimitiveClick(event, [atom.id], []);
            })
            .on('dblclick', event => {
              _handle2dComponentDblClick(event, [atom.id]);
            })
            .on('mouseover', event => {
              if (_eraseMode && _erasePainting) {
                _showPrimitiveHover([atom.id], []);
                const atomId = atom.id;
                requestAnimationFrame(() => {
                  if (_eraseMode && _erasePainting) _eraseItem([atomId], []);
                });
                return;
              }
              _showPrimitiveHover([atom.id], []);
              if (_drawBondMode && mode === '2d' && !_drawBondHoverSuppressed) {
                _hoveredAtomIds.add(atom.id);
                _refreshSelectionOverlay();
              }
              const valenceWarning = valenceWarningMap.get(atom.id) ?? null;
              if (_eraseMode || ((_selectMode || _drawBondMode) && !valenceWarning)) {
                return;
              }
              if ((_selectMode || _drawBondMode) && valenceWarning) {
                _selectionValenceTooltipAtomId = atom.id;
                tooltip.interrupt().style('opacity', 0.9);
              } else {
                tooltip.transition().delay(150).style('opacity', 0.9);
              }
              tooltip
                .html(atomTooltipHtml(atom, mol, valenceWarning))
                .style('left', event.clientX + 13 + 'px')
                .style('top', event.clientY - 20 + 'px');
            })
            .on('mousemove', event => {
              tooltip.style('left', event.clientX + 13 + 'px').style('top', event.clientY - 20 + 'px');
            })
            .on('mouseout', () => {
              if (_selectMode && _selectionValenceTooltipAtomId === atom.id) {
                return;
              }
              if (_drawBondState) _resetDrawBondHover();
              else {
                _clearPrimitiveHover();
                _refreshSelectionOverlay();
              }
              tooltip.transition().duration(50).style('opacity', 0);
            });

          if (label) {
            renderAtomLabel(hitGroup, label, symbol === 'H' ? '#333333' : atomColor(symbol), labelDx);
            if (charge !== 0) {
              const sign =
                charge === 1 ? '+' : charge > 1 ? `${charge}+` : charge === -1 ? '−' : `${Math.abs(charge)}−`;
              hitGroup
                .append('text')
                .attr('class', 'atom-charge')
                .attr('x', labelDx + labelHalfW(label, FONT_SIZE))
                .attr('y', -(FONT_SIZE * 0.42))
                .attr('pointer-events', 'none')
                .attr('fill', symbol === 'H' ? '#333333' : atomColor(symbol))
                .text(sign);
            }
          }

          // Drag: move this atom, or the whole selection when dragging a selected primitive.
          hitGroup.call(
            d3
              .drag()
              .filter(event => !_drawBondMode && !_eraseMode)
              .on('start', function (event) {
                if (_drawBondMode) return; // draw-bond mode uses its own mousedown
                event.sourceEvent.stopPropagation();
                _clearPrimitiveHover();
                _redraw2dSelection();
                tooltip.style('opacity', 0);
                hitGroup.select('circle').style('cursor', 'grabbing');
                this._dragState = _capture2dDragState(event, [atom.id], []);
                if (this._dragState) this._dragState._snapped = false;
              })
              .on('drag', function (event) {
                const state = this._dragState;
                if (!state) return;
                if (!state._snapped) {
                  _takeSnapshot({ clearReactionPreview: false });
                  state._snapped = true;
                }
                const [svgX, svgY] = d3.pointer(event.sourceEvent, g.node());
                const dx = (svgX - state.pX) / SCALE;
                const dy = -(svgY - state.pY) / SCALE;
                for (const [atomId, pos] of state.atomPositions) {
                  const movedAtom = mol.atoms.get(atomId);
                  if (!movedAtom) continue;
                  movedAtom.x = pos.x + dx;
                  movedAtom.y = pos.y + dy;
                }
                _redraw2dDragTargets(state.movedAtomIds);
              })
              .on('end', function () {
                this._dragState = null;
                hitGroup.select('circle').style('cursor', 'grab');
              })
          );
        }
      }

      function render2d(mol) {
        // Count H neighbours before stripping
        const hCounts = new Map();
        for (const [, atom] of mol.atoms) {
          if (atom.name === 'H') continue;
          const count = atom.getNeighbors(mol).filter(n => n.name === 'H').length;
          if (count > 0) hCounts.set(atom.id, count);
        }
        mol.hideHydrogens();
        prepareAromaticBondRendering(mol);

        generateAndRefine2dCoords(mol, { suppressH: true, bondLength: 1.5 });
        _alignReaction2dProductOrientation(mol);
        _spreadReaction2dProductComponents(mol, 1.5);
        _centerReaction2dPairCoords(mol, 1.5);

        // Place chiral H atoms at real positions so stereo bonds can be drawn.
        // All other hidden H stay at their parent's position (assigned by generateCoords)
        // and are excluded from rendering entirely.
        for (const [, atom] of mol.atoms) {
          if (atom.name !== 'H' || atom.visible !== false) continue;
          const nbrs = atom.getNeighbors(mol);
          if (nbrs.length !== 1) continue;
          const parent = nbrs[0];
          if (!parent.getChirality()) continue;
          const others = parent.getNeighbors(mol).filter(n => n.id !== atom.id);
          let sumX = 0,
            sumY = 0,
            cnt = 0;
          for (const nb of others) {
            if (nb.x != null) {
              sumX += nb.x - parent.x;
              sumY += nb.y - parent.y;
              cnt++;
            }
          }
          const angle = cnt > 0 ? Math.atan2(-sumY, -sumX) : 0;
          const hLen = 1.5 * 0.75;
          atom.x = parent.x + Math.cos(angle) * hLen;
          atom.y = parent.y + Math.sin(angle) * hLen;
        }

        // Apply rotation and/or flips (around centroid)
        if (rotationDeg !== 0 || flipH || flipV) {
          const allAtoms = [...mol.atoms.values()].filter(a => a.x != null);
          let mx = 0,
            my = 0;
          for (const a of allAtoms) {
            mx += a.x;
            my += a.y;
          }
          mx /= allAtoms.length;
          my /= allAtoms.length;
          if (rotationDeg !== 0) {
            const rad = (rotationDeg * Math.PI) / 180;
            const cosR = Math.cos(rad),
              sinR = Math.sin(rad);
            for (const a of allAtoms) {
              const dx = a.x - mx,
                dy = a.y - my;
              a.x = mx + dx * cosR - dy * sinR;
              a.y = my + dx * sinR + dy * cosR;
            }
          }
          if (flipH) for (const a of allAtoms) a.x = 2 * mx - a.x;
          if (flipV) for (const a of allAtoms) a.y = 2 * my - a.y;
        }

        const atoms = [...mol.atoms.values()].filter(a => a.x != null && a.visible !== false);
        if (atoms.length === 0) return;

        const { minX, maxX, minY, maxY, cx, cy } = atomBBox(atoms);
        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;

        const PAD = _hasReactionPreview() ? 12 : 18;
        const pads = _viewportFitPadding(PAD);
        const molSVGW = (maxX - minX) * SCALE || 1;
        const molSVGH = (maxY - minY) * SCALE || 1;
        const fitCap = _hasReactionPreview() ? 1.28 : 1;
        const fitScale = Math.min(
          Math.max(1, W - pads.left - pads.right) / molSVGW,
          Math.max(1, H - pads.top - pads.bottom) / molSVGH,
          fitCap
        );
        const fitTx = pads.left + Math.max(1, W - pads.left - pads.right) / 2 - (W / 2) * fitScale;
        const fitTy = pads.top + Math.max(1, H - pads.top - pads.bottom) / 2 - (H / 2) * fitScale;
        svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));

        // Decrement hCount for any H shown via a stereo bond so the atom label
        // for that heavy atom does not show a spurious H subscript.
        const stereoMap = pickStereoWedges(mol);
        for (const [bondId] of stereoMap) {
          const bond = mol.bonds.get(bondId);
          if (!bond) continue;
          const [ba1, ba2] = bond.getAtomObjects(mol);
          const hAtom = ba1?.visible === false ? ba1 : ba2?.visible === false ? ba2 : null;
          const heavyAt = hAtom ? (hAtom === ba1 ? ba2 : ba1) : null;
          if (!heavyAt) continue;
          const n = (hCounts.get(heavyAt.id) ?? 0) - 1;
          if (n <= 0) hCounts.delete(heavyAt.id);
          else hCounts.set(heavyAt.id, n);
        }

        _mol2d = mol;
        _hCounts2d = hCounts;
        _cx2d = cx;
        _cy2d = cy;
        _stereoMap2d = stereoMap;
        if (_preserveSelectionOnNextRender) _syncSelectionToMolecule(mol);
        else {
          _selectedAtomIds.clear();
          _selectedBondIds.clear();
        }
        _preserveSelectionOnNextRender = false;

        draw2d();

        // Sidebar updates — only on new molecule, not on every highlight redraw
        updateFormula(mol);
        updateDescriptors(mol);
        updateFunctionalGroups(mol);
        updateReactionTemplatesPanel();
      }

      function fitCurrent2dView() {
        if (!_mol2d) return;
        const atoms = [..._mol2d.atoms.values()].filter(a => a.x != null && a.visible !== false);
        if (atoms.length === 0) return;

        const { minX, maxX, minY, maxY, cx: _cx, cy: _cy } = atomBBox(atoms);
        _cx2d = _cx;
        _cy2d = _cy;

        const W = plotEl.clientWidth || 600;
        const H = plotEl.clientHeight || 400;
        const PAD = _hasReactionPreview() ? 12 : 18;
        const pads = _viewportFitPadding(PAD);
        const molSVGW = (maxX - minX) * SCALE || 1;
        const molSVGH = (maxY - minY) * SCALE || 1;
        const fitCap = _hasReactionPreview() ? 1.28 : 1;
        const fitScale = Math.min(
          Math.max(1, W - pads.left - pads.right) / molSVGW,
          Math.max(1, H - pads.top - pads.bottom) / molSVGH,
          fitCap
        );
        const fitTx = pads.left + Math.max(1, W - pads.left - pads.right) / 2 - (W / 2) * fitScale;
        const fitTy = pads.top + Math.max(1, H - pads.top - pads.bottom) / 2 - (H / 2) * fitScale;
        svg.call(zoom.transform, d3.zoomIdentity.translate(fitTx, fitTy).scale(fitScale));
      }

      // Mode toggle
      // ---------------------------------------------------------------------------
      window.toggleLabels = function () {
        const svgEl = document.querySelector('.svg-plot');
        svgEl.classList.toggle('labels-hidden');
        const btn = document.getElementById('label-toggle');
        btn.classList.toggle('active', !svgEl.classList.contains('labels-hidden'));
      };

      let _clean2dBtnTimer = null;
      window.cleanLayout2d = function () {
        if (mode !== '2d' || !_mol2d) return;
        _takeSnapshot({ clearReactionPreview: false });
        refineExistingCoords(_mol2d, {
          bondLength: 1.5,
          maxPasses: 6,
          freezeRings: true,
          freezeChiralCenters: false,
          allowBranchReflect: true
        });
        _alignReaction2dProductOrientation(_mol2d);
        _spreadReaction2dProductComponents(_mol2d, 1.5);
        _centerReaction2dPairCoords(_mol2d, 1.5);
        fitCurrent2dView();
        draw2d();
        const btn = document.getElementById('clean-2d-btn');
        btn.textContent = '✓';
        clearTimeout(_clean2dBtnTimer);
        _clean2dBtnTimer = setTimeout(() => {
          btn.textContent = '🧹';
        }, 1500);
      };

      let _cleanForceBtnTimer = null;
      window.cleanLayoutForce = function () {
        if (mode !== 'force' || !currentMol) return;
        _takeSnapshot({ clearReactionPreview: false });
        updateForce(currentMol);
        const btn = document.getElementById('clean-force-btn');
        btn.textContent = '✓';
        clearTimeout(_cleanForceBtnTimer);
        _cleanForceBtnTimer = setTimeout(() => {
          btn.textContent = '🧹';
        }, 1500);
      };

      function _syncElemBtns() {
        for (const e of ['C', 'N', 'O', 'S', 'P', 'F', 'Cl', 'Br', 'I']) {
          const btn = document.getElementById(`elem-btn-${e}`);
          if (btn) btn.classList.toggle('active', e === _drawBondElement);
        }
      }

      function _clearElemBtns() {
        for (const e of ['C', 'N', 'O', 'S', 'P', 'F', 'Cl', 'Br', 'I']) {
          const btn = document.getElementById(`elem-btn-${e}`);
          if (btn) btn.classList.remove('active');
        }
      }

      window.togglePanMode = function () {
        if (!_selectMode && !_drawBondMode && !_eraseMode) return; // already in pan mode
        _selectMode = false;
        _drawBondMode = false;
        _eraseMode = false;
        _cancelDrawBond();
        _clearPrimitiveHover();
        _clearElemBtns();
        document.getElementById('pan-mode-btn').classList.add('active');
        document.getElementById('select-mode-btn').classList.remove('active');
        document.getElementById('draw-bond-btn').classList.remove('active');
        document.getElementById('erase-btn').classList.remove('active');
        if (mode === 'force') applyForceSelection();
        else if (_mol2d) draw2d();
      };

      window.toggleSelectMode = function () {
        if (_selectMode) return; // already in selection mode
        _selectMode = true;
        _drawBondMode = false;
        _eraseMode = false;
        _cancelDrawBond();
        _clearPrimitiveHover();
        _clearElemBtns();
        document.getElementById('select-mode-btn').classList.add('active');
        document.getElementById('pan-mode-btn').classList.remove('active');

      const _DRAW_ELEM_PROTONS = {

      window.toggleMode = function () {

        if (currentMol || currentSmiles || currentInchi) {
          simulation.stop();
          rotationDeg = 0;
          flipH = false;
          flipV = false;
          _preserveSelectionOnNextRender = true;

      let _rotateInterval = null;
      function stopRotate() {
        if (_rotateInterval !== null) {
          clearInterval(_rotateInterval);
          _rotateInterval = null;
        }
      }
      function startRotate(delta) {
        stopRotate();
        if (mode !== '2d' || !_mol2d) return;
        _takeSnapshot({ clearReactionPreview: false });
        _restorePersistentHighlight();
        const step = () => {
          const allAtoms = [..._mol2d.atoms.values()].filter(a => a.x != null);
          if (!allAtoms.length) return;
          let mx = 0,
            my = 0;
          for (const a of allAtoms) {
            mx += a.x;
            my += a.y;
          }
          mx /= allAtoms.length;
          my /= allAtoms.length;
          const rad = (delta * Math.PI) / 180;
          const cosR = Math.cos(rad),
            sinR = Math.sin(rad);
          for (const a of allAtoms) {
            const dx = a.x - mx,
              dy = a.y - my;
            a.x = mx + dx * cosR - dy * sinR;
            a.y = my + dx * sinR + dy * cosR;
          }
          rotationDeg = (rotationDeg + delta) % 360;

          // Recompute bounding box centre and update persistent state so the
          // molecule stays visually centred as it rotates.
          const { minX, maxX, minY, maxY, cx: _cx, cy: _cy } = atomBBox(allAtoms);
          _cx2d = _cx;
          _cy2d = _cy;

          const W = plotEl.clientWidth || 600;
          const H = plotEl.clientHeight || 400;
          const PAD = _hasReactionPreview() ? 12 : 18;
          const pads = _viewportFitPadding(PAD);
          const molSVGW = (maxX - minX) * SCALE || 1;
          const molSVGH = (maxY - minY) * SCALE || 1;
          const fitCap = _hasReactionPreview() ? 1.28 : 1;
          const neededScale = Math.min(
            Math.max(1, W - pads.left - pads.right) / molSVGW,
            Math.max(1, H - pads.top - pads.bottom) / molSVGH,
            fitCap
          );
          const currentScale = d3.zoomTransform(svg.node()).k;
          if (Math.abs(neededScale - currentScale) > 0.001) {
            svg.call(
              zoom.transform,
              d3.zoomIdentity
                .translate(
                  pads.left + Math.max(1, W - pads.left - pads.right) / 2 - (W / 2) * neededScale,
                  pads.top + Math.max(1, H - pads.top - pads.bottom) / 2 - (H / 2) * neededScale
                )
                .scale(neededScale)
            );
          }

          draw2d();
        };
        step();
        _rotateInterval = setInterval(step, 40);
      }
      // Use event delegation so no getElementById timing issues.
      document.addEventListener('mousedown', e => {
        const btn = e.target.closest('#rotate-ccw, #rotate-cw');
        if (!btn) return;
        startRotate(btn.id === 'rotate-cw' ? -5 : 5);

      document.addEventListener('mouseup', stopRotate);

      document.addEventListener('click', e => {
        const btn = e.target.closest('#flip-h, #flip-v');
        if (!btn) return;

        _takeSnapshot({ clearReactionPreview: false });
        _restorePersistentHighlight();
        if (btn.id === 'flip-h') flipH = !flipH;
        else flipV = !flipV;

        // Apply the flip directly to the existing (already-rotated) atom coordinates,
        // mirroring around the current centroid — same pattern as startRotate().
        const allAtoms = [..._mol2d.atoms.values()].filter(a => a.x != null);
        let mx = 0,
          my = 0;
        for (const a of allAtoms) {
          mx += a.x;
          my += a.y;
        }
        mx /= allAtoms.length;
        my /= allAtoms.length;

        if (btn.id === 'flip-h') for (const a of allAtoms) a.x = 2 * mx - a.x;
        else for (const a of allAtoms) a.y = 2 * my - a.y;

        // Recompute centroid and stereo wedge assignments (orientation has changed).
        ({ cx: _cx2d, cy: _cy2d } = atomBBox(allAtoms));
        _stereoMap2d = pickStereoWedges(_mol2d);

        draw2d();
      });
      document.addEventListener('mouseleave', stopRotate);

      // Physicochemical row tooltips — event delegation on the table
      {

        const setPcRowHighlight = tr => {

          if (tr) tr.classList.add('pc-hover');

        const hidePcTooltip = () => {

          _pcTooltipRow = null;
          _pcTooltipCell = null;
          _pcTooltipPoint = null;

        const showPcTooltip = () => {

            .html(`<div style="max-width:220px;white-space:normal;line-height:1.4">${_pcTooltipRow.dataset.desc}</div>`)
            .style('left', _pcTooltipPoint.x + 14 + 'px')
            .style('top', _pcTooltipPoint.y - 10 + 'px')
            .style('opacity', 0.95);
        };
        const applyPcHighlight = tr => {
          if (!tr?.dataset.highlight) return false;
          try {
            const groups = JSON.parse(tr.dataset.highlight);
            if (!Array.isArray(groups) || groups.length === 0) return false;
            _setHighlight(
              groups.map(group => new Map(group.map(id => [id, id]))),

            );
            return true;

        pcTable.addEventListener('mousemove', event => {

          const tooltipVisible = tooltip.style('opacity') !== '0';
          const tooltipTargetChanged = tr !== _pcTooltipRow || td !== _pcTooltipCell;
          if (tooltipTargetChanged) {
            clearTimeout(_pcTipTimer);
            _pcTooltipRow = tr;
            _pcTooltipCell = td;

          if (tooltipVisible) {
            showPcTooltip();
            return;

          if (tooltipTargetChanged) {
            _pcTipTimer = setTimeout(() => {
              _pcTipTimer = null;
              showPcTooltip();

        });
        pcTable.addEventListener('mouseleave', () => {

      // ---------------------------------------------------------------------------
      // Input handling
